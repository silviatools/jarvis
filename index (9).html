function SavingsListView({ data, setData }) {
  const [editing,      setEditing]      = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [showArchive,  setShowArchive]  = useState(false);
  const [filterCats,   setFilterCats]   = useState([]);
  const [filterMonths, setFilterMonths] = useState([]);
  const [sortCol,      setSortCol]      = useState('targetDate');
  const [sortDir,      setSortDir]      = useState('asc');

  const cats    = getExpenseCats(data);
  const allExpenses = (data.budgetExpenses || []);
  const expenses = allExpenses.filter(e => !e.archived);
  const archivedExpenses = allExpenses.filter(e => e.archived);
  const transactions = data.savingsTransactions || [];

  const getItemBalance = (exp) => {
    let dep = 0, wd = 0;
    transactions.forEach(t => {
      if (t.expenseId === exp.id) {
        if (t.type === 'income') dep += t.amount || 0;
        else wd += t.amount || 0;
      }
    });
    return { deposit: dep, withdrawal: wd, balance: dep - wd };
  };

  const save = (exp) => {
    exp = { ...exp, updatedAt: Date.now() };
    setData(d => {
      const list = d.budgetExpenses || [];
      const exists = list.find(e => e.id === exp.id);
      return { ...d, budgetExpenses: exists ? list.map(e => e.id === exp.id ? exp : e) : [...list, exp] };
    });
    setEditing(null);
  };

  const remove = (id) => {
    if (!confirm('Удалить накопление?')) return;
    setData(d => ({ ...d, budgetExpenses: (d.budgetExpenses || []).filter(e => e.id !== id) }));
  };

  const toggleArchive = (id) => {
    setData(d => ({ ...d, budgetExpenses: (d.budgetExpenses || []).map(e => e.id === id ? { ...e, archived: !e.archived } : e) }));
  };

  const newExp = () => setEditing({
    id: crypto.randomUUID(), name: '', category: cats[0]?.id || 'other', amount: '',
    startDate: getCurrentMonthStr(), targetDate: addMonthsStr(getCurrentMonthStr(), 6),
    notes: '', archived: false,
  });

  const addTransaction = (expenseId, type, amount, date) => {
    setData(d => ({
      ...d,
      savingsTransactions: [...(d.savingsTransactions || []), {
        id: crypto.randomUUID(), expenseId, type, amount, date,
      }],
    }));
  };

  const toggleSort = (col) => {
    if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortCol(col); setSortDir('asc'); }
  };

  const curMonth = getCurrentMonthStr();
  const today    = new Date().toISOString().slice(0, 10);

  const catOptions = [...new Set(expenses.map(e => e.category))].map(cid => {
    const cat = cats.find(c => c.id === cid) || { emoji: '💡', label: cid };
    return { value: cid, label: `${cat.emoji} ${cat.label}` };
  });

  const monthOptions = (() => {
    if (!expenses.length) return [];
    const minStart = [...expenses.map(e => e.startDate)].sort()[0];
    const maxEnd   = [...expenses.map(e => e.targetDate)].sort().reverse()[0];
    const months = [];
    let m = minStart;
    while (m <= maxEnd && months.length < 60) {
      months.push({ value: m, label: formatMonthShortBudget(m) });
      m = addMonthsStr(m, 1);
    }
    return months;
  })();

  const filtered = expenses
    .filter(e => filterCats.length === 0 || filterCats.includes(e.category))
    .filter(e => filterMonths.length === 0 || filterMonths.some(m => e.startDate <= m && e.targetDate >= m));

  const sorted = [...filtered].sort((a, b) => {
    const vals = {
      name:       [a.name, b.name],
      category:   [(cats.find(c => c.id === a.category) || {}).label || 'Я', (cats.find(c => c.id === b.category) || {}).label || 'Я'],
      amount:     [a.amount || 0,   b.amount || 0],
      saved:      [getItemBalance(a).balance, getItemBalance(b).balance],
      monthly:    [calcMonthly(a, getItemBalance(a).balance),  calcMonthly(b, getItemBalance(b).balance)],
      startDate:  [a.startDate,     b.startDate],
      targetDate: [a.targetDate,    b.targetDate],
      months:     [monthsBetweenStr(a.startDate, a.targetDate), monthsBetweenStr(b.startDate, b.targetDate)],
    };
    const [av, bv] = vals[sortCol] || vals.targetDate;
    const cmp = typeof av === 'string' ? av.localeCompare(bv, 'ru') : av - bv;
    return sortDir === 'asc' ? cmp : -cmp;
  });

  const SortArrow = ({ col }) => (
    <span className={`ml-0.5 text-[11px] ${sortCol === col ? 'opacity-100' : 'opacity-25'}`}>
      {sortCol === col ? (sortDir === 'asc' ? '↑' : '↓') : '↕'}
    </span>
  );

  const COLS = [
    { col: 'name',       label: 'Название',    cls: 'text-left' },
    { col: 'category',   label: 'Категория',   cls: 'text-left' },
    { col: 'saved',      label: 'Накоплено',   cls: 'text-right' },
    { col: 'amount',     label: 'Сумма',       cls: 'text-right' },
    { col: 'monthly',    label: '/ мес',       cls: 'text-right' },
    { col: 'startDate',  label: 'Начало',      cls: 'text-left' },
    { col: 'targetDate', label: 'До даты',     cls: 'text-left' },
    { col: 'months',     label: 'Месяцев',     cls: 'text-right' },
  ];

  const totalBalance = sorted.reduce((s, e) => s + getItemBalance(e).balance, 0);
  const totalTarget = sorted.reduce((s, e) => s + (e.amount || 0), 0);

  return (
    <div>
      {expenses.length > 0 && (
        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5 mb-6 flex items-center justify-between flex-wrap gap-3">
          <div>
            <div className="text-xs text-[var(--text-subtle)] uppercase tracking-widest mb-1">Баланс счёта</div>
            <div className={`font-display text-3xl ${totalBalance >= 0 ? 'text-green-600' : 'text-red-500'}`}>
              {totalBalance >= 0 ? '+' : ''}{formatRub(totalBalance)} <span className="text-base">₽</span>
            </div>
          </div>
          <div className="text-right text-sm text-[var(--text-muted)]">
            <div>Цель: {formatRub(totalTarget)} ₽</div>
          </div>
        </div>
      )}

      <div className="flex items-center gap-2 flex-wrap mb-6">
        <button onClick={newExp} className="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl bg-[var(--text)] text-white text-sm font-medium hover:opacity-85 transition-all">
          <Icon name="plus" size={16} />Добавить накопление
        </button>
        {expenses.length > 0 && (
          <>
            <BudgetMultiSelect
              label="Месяц"
              options={monthOptions}
              selected={filterMonths}
              onChange={setFilterMonths}
            />
            <BudgetMultiSelect
              label="Категория"
              options={catOptions}
              selected={filterCats}
              onChange={setFilterCats}
            />
          </>
        )}
        <button onClick={() => setShowSettings(true)}
          className="inline-flex items-center justify-center px-3 py-2.5 rounded-xl border border-[var(--border)] bg-[var(--surface)] text-[var(--text-muted)] hover:text-[var(--text)] transition-colors"
          title="Настройки категорий">
          <Icon name="settings" size={16} />
        </button>
      </div>

      {!expenses.length ? (
        <EmptyState title="Нет накоплений" text="Добавьте плановые накопления и получите план по месяцам" />
      ) : (
        <>
          <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-sm" style={{ minWidth: '940px' }}>
                <thead>
                  <tr className="bg-[var(--bg)] border-b border-[var(--border)]">
                    {COLS.map(({ col, label, cls }) => (
                      <th key={col} onClick={() => toggleSort(col)}
                        className={`px-3 py-3 text-xs font-semibold uppercase tracking-wide text-[var(--text-subtle)] cursor-pointer hover:text-[var(--text)] transition-colors select-none whitespace-nowrap ${cls}`}>
                        {label}<SortArrow col={col} />
                      </th>
                    ))}
                    <th className="px-3 py-3 w-24" />
                  </tr>
                </thead>
                <tbody>
                  {sorted.map((e, i) => {
                    const cat      = cats.find(c => c.id === e.category) || { emoji: '💡', label: e.category };
                    const bal      = getItemBalance(e);
                    const monthly  = calcMonthly(e, bal.balance);
                    const mTotal   = monthsBetweenStr(e.startDate, e.targetDate);
                    const mLeft    = e.targetDate < curMonth ? 0 : monthsBetweenStr(curMonth, e.targetDate);
                    const isOver   = e.targetDate < curMonth;
                    const pct      = e.amount > 0 ? Math.min(100, Math.round((bal.balance / e.amount) * 100)) : 0;
                    return (
                      <tr key={e.id} className={`border-b border-[var(--border)] last:border-0 hover:bg-black/[0.02] transition-colors ${i % 2 === 1 ? 'bg-[var(--bg)]/50' : ''}`}>
                        <td className="px-3 py-3">
                          <div className="font-medium whitespace-nowrap">{e.name}</div>
                          {e.notes && <div className="text-xs text-[var(--text-subtle)] truncate max-w-[180px]">{e.notes}</div>}
                        </td>
                        <td className="px-3 py-3 whitespace-nowrap text-[var(--text-muted)]">
                          {cat.emoji} {cat.label}
                        </td>
                        <td className="px-3 py-3 text-right whitespace-nowrap">
                          <div className="flex items-center justify-end gap-2">
                            <div className="w-14 bg-[var(--bg)] rounded-full h-1.5 overflow-hidden">
                              <div className={`h-full rounded-full ${pct >= 100 ? 'bg-green-500' : pct >= 50 ? 'bg-blue-500' : 'bg-violet-500'}`}
                                style={{ width: Math.max(0, pct) + '%' }} />
                            </div>

                <span className="font-display text-base">{formatRub(totalTarget)} ₽</span>
                <span className="text-xs text-[var(--text-subtle)]">{formatRub(sorted.reduce((s, e) => s + calcMonthly(e, getItemBalance(e).balance), 0))} ₽/мес</span>

            <Icon name={showArchive ? 'chevron-down' : 'chevron-right'} size={14} />

            Архив ({archivedExpenses.length})

            <div className="mt-3 space-y-2">
              {archivedExpenses.map(e => {
                const cat = cats.find(c => c.id === e.category) || { emoji: '💡', label: e.category };

                  <div key={e.id} className="flex items-center justify-between bg-[var(--surface)] border border-[var(--border)] rounded-xl px-4 py-3 opacity-60">
                    <div className="flex items-center gap-3">

                      <div>
                        <div className="font-medium">{e.name}</div>
                        <div className="text-xs text-[var(--text-subtle)]">{formatRub(e.amount)} ₽ · накоплено {formatRub(bal.balance)} ₽</div>

                      <button onClick={() => toggleArchive(e.id)} className="p-2 rounded-lg hover:bg-black/5 text-[var(--text-muted)]" title="Восстановить">

// ---- Savings DDS (Cash Flow) View ----
function SavingsDDSView({ data, setData }) {
  const [showAdd, setShowAdd] = useState(false);
  const [sortCol, setSortCol] = useState('date');
  const [sortDir, setSortDir] = useState('desc');
  const [filterOpen, setFilterOpen] = useState(null);
  const [filterAnchor, setFilterAnchor] = useState(null);
  const [filters, setFilters] = useState({});

  const expenses = (data.budgetExpenses || []).filter(e => !e.archived);
  const transactions = data.savingsTransactions || [];

  const getExpName = (id) => {
    const e = expenses.find(x => x.id === id);
    return e ? e.name : '(удалено)';
  };

  const formatDate = (d) => {
    if (!d) return '—';
    const [y, m, day] = d.split('-');
    return `${day}.${m}.${y}`;
  };

  const toggleSort = (col) => {
    if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortCol(col); setSortDir('desc'); }
  };

  const toggleFilterValue = (colId, val) => {
    setFilters(f => {
      const cur = f[colId] || [];
      const next = cur.includes(val) ? cur.filter(v => v !== val) : [...cur, val];
      const updated = { ...f };
      if (next.length === 0) delete updated[colId];
      else updated[colId] = next;
      return updated;
    });
  };

  const setFilter = (colId, values) => {
    setFilters(f => {
      const next = { ...f };
      if (!values || values.length === 0) delete next[colId];
      else next[colId] = values;
      return next;
    });
  };

  const COLUMNS = [
    { id: 'date',   label: 'Дата',   align: 'left',  getValue: t => t.date || '' },
    { id: 'name',   label: 'Статья', align: 'left',  getValue: t => getExpName(t.expenseId) },
    { id: 'type',   label: 'Тип',    align: 'left',  getValue: t => t.type === 'income' ? 'Доход' : 'Расход' },
    { id: 'amount', label: 'Сумма',  align: 'right', getValue: t => t.amount || 0 },
  ];

  const getUniqueVals = (colId) => {
    const col = COLUMNS.find(c => c.id === colId);
    if (!col) return [];
    const vals = [...new Set(transactions.map(t => {
      const v = col.getValue(t);
      if (colId === 'date') return formatDate(v);
      return v;
    }))];
    return vals.sort((a, b) => typeof a === 'string' ? a.localeCompare(b, 'ru') : a - b);
  };

  const activeFilterCount = Object.keys(filters).length;

  const filtered = transactions.filter(t => {
    return Object.entries(filters).every(([colId, allowed]) => {
      const col = COLUMNS.find(c => c.id === colId);
      if (!col) return true;
      let v = col.getValue(t);
      if (colId === 'date') v = formatDate(v);
      return allowed.includes(v);
    });
  });

  const sorted = [...filtered].sort((a, b) => {
    const col = COLUMNS.find(c => c.id === sortCol);
    if (!col) return 0;
    const av = col.getValue(a);
    const bv = col.getValue(b);
    const cmp = typeof av === 'string' ? av.localeCompare(bv, 'ru') : av - bv;
    return sortDir === 'asc' ? cmp : -cmp;
  });

  const removeTransaction = (id) => {
    if (!confirm('Удалить операцию?')) return;
    setData(d => ({
      ...d,
      savingsTransactions: (d.savingsTransactions || []).filter(t => t.id !== id),
    }));
  };

  const totalIncome = sorted.filter(t => t.type === 'income').reduce((s, t) => s + (t.amount || 0), 0);
  const totalExpense = sorted.filter(t => t.type === 'expense').reduce((s, t) => s + (t.amount || 0), 0);

  const SortArrow = ({ col }) => (
    <span className={`ml-0.5 text-[11px] ${sortCol === col ? 'opacity-100' : 'opacity-25'}`}>
      {sortCol === col ? (sortDir === 'asc' ? '↑' : '↓') : '↕'}
    </span>
  );

  return (
    <div>
      <div className="flex items-center gap-2 flex-wrap mb-6">
        <button onClick={() => setShowAdd(true)}
          className="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl bg-[var(--text)] text-white text-sm font-medium hover:opacity-85 transition-all">
          <Icon name="plus" size={16} />Добавить операцию
        </button>
        {activeFilterCount > 0 && (
          <button onClick={() => setFilters({})}
            className="inline-flex items-center gap-1.5 px-3 py-2.5 rounded-xl text-xs border border-amber-200 bg-amber-50 text-amber-700 hover:bg-amber-100 transition-colors">
            Сбросить фильтры ({activeFilterCount})
          </button>
        )}
      </div>

      {transactions.length === 0 ? (
        <EmptyState title="Нет операций" text="Добавьте операцию — пополнение или списание со счёта накоплений" />
      ) : (
        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm" style={{ minWidth: '520px' }}>
              <thead>
                <tr className="bg-[var(--bg)] border-b border-[var(--border)]">
                  {COLUMNS.map(col => (
                    <th key={col.id} className={`px-3 py-3 text-${col.align} text-xs font-semibold uppercase tracking-wide text-[var(--text-subtle)] whitespace-nowrap`}>
                      <div className={`flex items-center gap-1 ${col.align === 'right' ? 'justify-end' : ''}`}>
                        <button onClick={() => toggleSort(col.id)}
                          className="hover:text-[var(--text)] transition-colors select-none flex items-center gap-0.5">
                          {col.label}<SortArrow col={col.id} />
                        </button>
                        <button onClick={(e) => { e.stopPropagation(); if (filterOpen === col.id) { setFilterOpen(null); return; } setFilterAnchor(e.currentTarget); setFilterOpen(col.id); }}
                          className={`p-0.5 rounded hover:bg-black/5 transition-colors ${filters[col.id] ? 'text-blue-600' : 'text-[var(--text-subtle)] opacity-40 hover:opacity-100'}`}>
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />
                          </svg>
                        </button>
                      </div>
                    </th>
                  ))}
                  <th className="px-3 py-3 w-10" />
                </tr>
              </thead>
              <tbody>
                {sorted.map((t, i) => {
                  const isIncome = t.type === 'income';
                  return (
                    <tr key={t.id} className={`border-b border-[var(--border)] last:border-0 hover:bg-black/[0.02] transition-colors ${i % 2 === 1 ? 'bg-[var(--bg)]/50' : ''}`}>
                      <td className="px-3 py-2.5 whitespace-nowrap text-[var(--text-muted)]">{formatDate(t.date)}</td>
                      <td className="px-3 py-2.5 font-medium">{getExpName(t.expenseId)}</td>
                      <td className="px-3 py-2.5 whitespace-nowrap">
                        <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${isIncome ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-600'}`}>
                          {isIncome ? '↑ Доход' : '↓ Расход'}
                        </span>
                      </td>
                      <td className={`px-3 py-2.5 text-right whitespace-nowrap font-semibold ${isIncome ? 'text-green-600' : 'text-red-500'}`}>
                        {isIncome ? '+' : '−'}{formatRub(t.amount)} ₽
                      </td>
                      <td className="px-2 py-2.5">
                        <button onClick={() => removeTransaction(t.id)}
                          className="p-1 rounded-lg hover:bg-red-50 text-[var(--text-muted)] hover:text-red-500">
                          <Icon name="trash" size={13} />
                        </button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div className="px-4 py-3 bg-[var(--bg)] border-t border-[var(--border)] flex flex-wrap gap-4 justify-between items-center">
            <span className="text-xs text-[var(--text-subtle)] uppercase tracking-wide">{sorted.length} операций</span>
            <div className="flex gap-5 text-sm">
              <span className="text-green-600">Доходы: <b>+{formatRub(totalIncome)} ₽</b></span>
              <span className="text-red-500">Расходы: <b>−{formatRub(totalExpense)} ₽</b></span>
              <span className={`font-semibold ${totalIncome - totalExpense >= 0 ? 'text-green-600' : 'text-red-500'}`}>
                Баланс: {totalIncome - totalExpense >= 0 ? '+' : ''}{formatRub(totalIncome - totalExpense)} ₽
              </span>
            </div>
          </div>
        </div>
      )}

      <FilterDropdownPortal anchorRef={filterAnchor} isOpen={!!filterOpen} onClose={() => setFilterOpen(null)}>
        {filterOpen && (() => {
          const col = COLUMNS.find(c => c.id === filterOpen);
          if (!col) return null;
          return (
            <>
              <div className="flex items-center justify-between mb-1.5 px-1">
                <span className="text-[10px] font-semibold text-gray-400 uppercase">Фильтр: {col.label}</span>
                {filters[filterOpen] && (
                  <button onClick={() => setFilter(filterOpen, null)} className="text-[10px] text-blue-600 hover:underline">Сбросить</button>
                )}
              </div>
              {getUniqueVals(filterOpen).map(val => (
                <label key={String(val)} className="flex items-center gap-2 px-1.5 py-1.5 rounded-lg hover:bg-gray-50 cursor-pointer text-sm font-normal">
                  <input type="checkbox" checked={(filters[filterOpen] || []).includes(val)}
                    onChange={() => toggleFilterValue(filterOpen, val)} className="rounded border-gray-300" />
                  <span>{filterOpen === 'amount' ? formatRub(val) + ' ₽' : String(val) || '(пусто)'}</span>
                </label>
              ))}
            </>
          );
        })()}
      </FilterDropdownPortal>

      {showAdd && (
        <SavingsTransactionModal
          expenses={expenses}
          transactions={transactions}
          onSave={(expId, type, amount, date) => {
            setData(d => ({
              ...d,
              savingsTransactions: [...(d.savingsTransactions || []), {
                id: crypto.randomUUID(), expenseId: expId, type, amount, date,
              }],
            }));
            setShowAdd(false);
          }}
          onClose={() => setShowAdd(false)}
        />
      )}
    </div>
  );
}

function SavingsTransactionModal({ expenses, transactions = [], preselectedId, preselectedType, onSave, onClose }) {
  const today = new Date().toISOString().slice(0, 10);
  const [expenseId, setExpenseId] = useState(preselectedId || (expenses[0]?.id || ''));
  const [type, setType] = useState(preselectedType || 'income');
  const [amount, setAmount] = useState('');
  const [date, setDate] = useState(today);

  const selectedExp = expenses.find(e => e.id === expenseId);
  const expBalance = selectedExp ? transactions.filter(t => t.expenseId === selectedExp.id).reduce((s, t) => s + (t.type === 'income' ? 1 : -1) * (t.amount || 0), 0) : 0;
  const planMonthly = selectedExp ? calcMonthly(selectedExp, expBalance) : 0;

  const submit = () => {
    const val = Number(amount);
    if (!val || val <= 0) return;
    if (!expenseId) return;
    onSave(expenseId, type, val, date || today);
  };

  return (
    <Modal title="Добавить операцию" onClose={onClose}>
      <div className="space-y-4">
        <div>
          <label>Тип операции</label>
          <div className="flex gap-2">
            <button onClick={() => setType('income')}
              className={`flex-1 px-3 py-2.5 rounded-xl text-sm font-medium border transition-all ${type === 'income' ? 'bg-green-50 border-green-300 text-green-700' : 'border-[var(--border)] text-[var(--text-muted)]'}`}>
              ↑ Доход
            </button>
            <button onClick={() => setType('expense')}
              className={`flex-1 px-3 py-2.5 rounded-xl text-sm font-medium border transition-all ${type === 'expense' ? 'bg-red-50 border-red-300 text-red-600' : 'border-[var(--border)] text-[var(--text-muted)]'}`}>
              ↓ Расход
            </button>
          </div>
        </div>
        <div>
          <label>Статья</label>
          <select value={expenseId} onChange={e => setExpenseId(e.target.value)}>
            {expenses.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
          </select>
        </div>
        <div>
          <label>Сумма (₽)</label>
          <input type="number" inputMode="numeric" min="1" value={amount}
            onChange={e => setAmount(e.target.value)} placeholder="5 000" autoFocus />
          {planMonthly > 0 && (
            <div className="text-xs text-[var(--text-subtle)] mt-1">
              По плану: {formatRub(planMonthly)} ₽/мес
            </div>
          )}
        </div>
        <div>
          <label>Дата</label>
          <input type="date" value={date} onChange={e => setDate(e.target.value)} />
        </div>
        <div className="flex gap-3 pt-2">
          <button onClick={onClose} className="btn-secondary flex-1">Отмена</button>
          <button onClick={submit}
            className={`flex-1 px-4 py-2.5 rounded-xl text-sm font-medium text-white transition-all hover:opacity-90 ${type === 'income' ? 'bg-green-600' : 'bg-red-500'}`}>
            {type === 'income' ? 'Пополнить' : 'Списать'}
          </button>
        </div>
      </div>
    </Modal>
  );
}

function BudgetExpenseModal({ expense, cats, onSave, onClose }) {
  const [form, setForm] = useState({ ...expense });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const months  = form.startDate && form.targetDate ? monthsBetweenStr(form.startDate, form.targetDate) : 0;
  const monthly = months > 0 && form.amount > 0 ? Math.ceil(Number(form.amount) / months) : 0;

  const submit = () => {
    if (!form.name.trim()) return;
    if (!form.amount || Number(form.amount) <= 0) return;
    if (!form.startDate || !form.targetDate) return;
    if (form.startDate > form.targetDate) { alert('Дата начала должна быть раньше даты цели'); return; }
    onSave({ ...form, amount: Number(form.amount) });
  };

  return (
    <Modal title={expense.name ? 'Редактировать расход' : 'Новый расход'} onClose={onClose}>
      <div className="space-y-4">
        <div>
          <label>Название</label>
          <input value={form.name} onChange={e => set('name', e.target.value)} placeholder="Отпуск в Турции" />
        </div>

        <div>
          <label>Категория</label>
          <select value={form.category} onChange={e => set('category', e.target.value)}>
            {(cats || BUDGET_CATS).map(c => <option key={c.id} value={c.id}>{c.emoji} {c.label}</option>)}
          </select>
        </div>

        <div>
          <label>Сумма цели (₽)</label>
          <input type="number" inputMode="numeric" min="1"
            value={form.amount || ''}
            onChange={e => set('amount', e.target.value)}
            placeholder="150 000" />
        </div>

        <div className="grid grid-cols-2 gap-3">
          <div>
            <label>Начать копить</label>
            <input type="month" value={form.startDate || ''} onChange={e => set('startDate', e.target.value)} />
          </div>
          <div>
            <label>Накопить к</label>
            <input type="month" value={form.targetDate || ''} onChange={e => set('targetDate', e.target.value)} />
          </div>
        </div>

        {monthly > 0 && (
          <div className="bg-[var(--bg)] border border-[var(--border)] rounded-2xl p-4 fade-in">
            <div className="text-xs text-[var(--text-subtle)] uppercase tracking-widest mb-3">Ваш план накопления</div>
            <div className="flex items-baseline gap-2 mb-1">
              <span className="font-display text-4xl">{formatRub(monthly)}</span>
              <span className="text-[var(--text-muted)] text-base">₽ в месяц</span>
            </div>
            <div className="text-sm text-[var(--text-subtle)]">
              {months} {pluralMonths(months)} · {formatRub(Number(form.amount))} ₽ итого
            </div>
            {/* Mini timeline */}
            <div className="mt-3 flex gap-1 flex-wrap">
              {Array.from({ length: Math.min(months, 12) }).map((_, i) => {
                const mo = addMonthsStr(form.startDate, i);
                return (
                  <div key={mo} className="flex-1 min-w-[32px] text-center">
                    <div className="h-6 bg-[var(--text)] rounded opacity-80" style={{ opacity: 0.3 + (i / Math.max(months - 1, 1)) * 0.7 }} />
                    <div className="text-[9px] text-[var(--text-subtle)] mt-0.5">{formatMonthShortBudget(mo).split(' ')[0]}</div>
                  </div>
                );
              })}
              {months > 12 && <div className="text-xs text-[var(--text-subtle)] self-end">+{months - 12} мес</div>}
            </div>
          </div>
        )}

        <div>
          <label>Заметка (необязательно)</label>
          <textarea value={form.notes || ''} onChange={e => set('notes', e.target.value)} rows={2} placeholder="Дополнительная информация..." />
        </div>

        <div className="flex gap-3 pt-2">
          <button onClick={onClose} className="btn-secondary flex-1">Отмена</button>
          <button onClick={submit} className="btn-primary flex-1">Сохранить</button>
        </div>
      </div>
    </Modal>
  );
}

// ---- Budget Categories Settings Modal ----
function BudgetCategoriesModal({ title, cats, defaultCats, onSaveCategories, onClose }) {
  const [list,      setList]      = useState([...cats]);
  const [editId,    setEditId]    = useState(null);
  const [editEmoji, setEditEmoji] = useState('');
  const [editLabel, setEditLabel] = useState('');
  const [newEmoji,  setNewEmoji]  = useState('');
  const [newLabel,  setNewLabel]  = useState('');

  const startEdit = (cat) => { setEditId(cat.id); setEditEmoji(cat.emoji); setEditLabel(cat.label); };
  const cancelEdit = () => setEditId(null);
  const saveEdit = () => {
    if (!editLabel.trim()) return;
    setList(l => l.map(c => c.id === editId ? { ...c, emoji: editEmoji.trim() || c.emoji, label: editLabel.trim() } : c));
    setEditId(null);
  };
  const doAdd = () => {
    if (!newLabel.trim()) return;
    setList(l => [...l, { id: crypto.randomUUID(), emoji: newEmoji.trim() || '📌', label: newLabel.trim() }]);
    setNewEmoji(''); setNewLabel('');
  };
  const doDelete = (id) => {
    if (list.length <= 1) { alert('Нужна хотя бы одна категория'); return; }
    setList(l => l.filter(c => c.id !== id));
  };
  const doReset = () => { if (confirm('Сбросить к стандартным категориям?')) setList([...defaultCats]); };

  return (
    <Modal title={title} onClose={onClose}>
      <div className="space-y-1.5 max-h-[55vh] overflow-y-auto pr-1">
        {list.map(cat => (
          <div key={cat.id} className="flex items-center gap-2 bg-[var(--bg)] rounded-xl px-3 py-2">
            {editId === cat.id ? (
              <>
                <input
                  className="w-12 text-center text-lg border border-[var(--border)] rounded-lg p-1 bg-[var(--surface)]"
                  value={editEmoji} onChange={e => setEditEmoji(e.target.value)} placeholder="🏠" />
                <input
                  className="flex-1 text-sm border border-[var(--border)] rounded-lg p-1.5 bg-[var(--surface)]"
                  value={editLabel} onChange={e => setEditLabel(e.target.value)} placeholder="Название"
                  onKeyDown={e => e.key === 'Enter' && saveEdit()} autoFocus />
                <button onClick={saveEdit}   className="p-1.5 rounded-lg bg-[var(--text)] text-white hover:opacity-90"><Icon name="check" size={14} /></button>
                <button onClick={cancelEdit} className="p-1.5 rounded-lg hover:bg-black/5 text-[var(--text-muted)]"><Icon name="x"     size={14} /></button>
              </>
            ) : (
              <>
                <span className="text-xl w-8 text-center shrink-0">{cat.emoji}</span>
                <span className="flex-1 text-sm">{cat.label}</span>
                <button onClick={() => startEdit(cat)} className="p-1.5 rounded-lg hover:bg-black/5 text-[var(--text-muted)]"><Icon name="edit"  size={14} /></button>
                <button onClick={() => doDelete(cat.id)} className="p-1.5 rounded-lg hover:bg-red-50 text-[var(--text-muted)] hover:text-red-500"><Icon name="trash" size={14} /></button>
              </>
            )}
          </div>
        ))}

        {/* Добавить новую */}
        <div className="flex items-center gap-2 border-2 border-dashed border-[var(--border)] rounded-xl px-3 py-2 mt-2">
          <input
            className="w-12 text-center text-lg border border-[var(--border)] rounded-lg p-1 bg-[var(--surface)]"
            value={newEmoji} onChange={e => setNewEmoji(e.target.value)} placeholder="🏠" />
          <input
            className="flex-1 text-sm border border-[var(--border)] rounded-lg p-1.5 bg-[var(--surface)]"
            value={newLabel} onChange={e => setNewLabel(e.target.value)} placeholder="Новая категория"
            onKeyDown={e => e.key === 'Enter' && doAdd()} />
          <button onClick={doAdd} className="p-1.5 rounded-lg bg-[var(--text)] text-white hover:opacity-90"><Icon name="plus" size={14} /></button>
        </div>
      </div>

      <div className="flex items-center gap-3 mt-5 pt-4 border-t border-[var(--border)]">
        <button onClick={doReset} className="btn-secondary text-sm">Сбросить</button>
        <div className="flex-1" />
        <button onClick={onClose} className="btn-secondary">Отмена</button>
        <button onClick={() => { onSaveCategories(list); onClose(); }} className="btn-primary">Сохранить</button>
      </div>
    </Modal>
  );
}

// ---- Recurring Payments (Постоянные) ----
function BudgetRecurringView({ data, setData }) {
  const [editing,      setEditing]      = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [filterCats,   setFilterCats]   = useState([]);
  const [sortCol,      setSortCol]      = useState('name');
  const [sortDir,      setSortDir]      = useState('asc');

  const cats  = getRecurringCats(data);
  const items = (data.budgetRecurring || []).filter(r => !r.archived);

  const save = (item) => {
    item = { ...item, updatedAt: Date.now() };
    setData(d => {
      const list = d.budgetRecurring || [];
      const exists = list.find(r => r.id === item.id);
      return { ...d, budgetRecurring: exists ? list.map(r => r.id === item.id ? item : r) : [...list, item] };
    });
    setEditing(null);
  };

  const remove = (id) => {
    if (!confirm('Удалить платёж?')) return;
    setData(d => ({ ...d, budgetRecurring: (d.budgetRecurring || []).filter(r => r.id !== id) }));
  };

  const newItem = () => setEditing({
    id: crypto.randomUUID(), name: '', category: cats[0]?.id || 'other',
    amount: '', notes: '', archived: false,
  });

  const toggleSort = (col) => {
    if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortCol(col); setSortDir('asc'); }
  };

  const catOptions = [...new Set(items.map(r => r.category))].map(cid => {
    const cat = cats.find(c => c.id === cid) || { emoji: '📌', label: cid };
    return { value: cid, label: `${cat.emoji} ${cat.label}` };
  });

  const filtered = items.filter(r => filterCats.length === 0 || filterCats.includes(r.category));

  const sorted = [...filtered].sort((a, b) => {
    const vals = {
      name:     [a.name, b.name],
      category: [(cats.find(c => c.id === a.category) || {}).label || 'Я', (cats.find(c => c.id === b.category) || {}).label || 'Я'],
      amount:   [a.amount || 0, b.amount || 0],
    };
    const [av, bv] = vals[sortCol] || vals.name;
    const cmp = typeof av === 'string' ? av.localeCompare(bv, 'ru') : av - bv;
    return sortDir === 'asc' ? cmp : -cmp;
  });

  const totalMonthly = sorted.reduce((s, r) => s + (r.amount || 0), 0);

  const SortArrow = ({ col }) => (
    <span className={`ml-0.5 text-[11px] ${sortCol === col ? 'opacity-100' : 'opacity-25'}`}>
      {sortCol === col ? (sortDir === 'asc' ? '↑' : '↓') : '↕'}
    </span>
  );

  return (
    <div>
      <div className="flex items-center gap-2 flex-wrap mb-6">
        <button onClick={newItem} className="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl bg-[var(--text)] text-white text-sm font-medium hover:opacity-85 transition-all">
          <Icon name="plus" size={16} />Добавить платёж
        </button>
        {items.length > 0 && (
          <BudgetMultiSelect
            label="Категория"
            options={catOptions}
            selected={filterCats}
            onChange={setFilterCats}
          />
        )}
        <button onClick={() => setShowSettings(true)}
          className="inline-flex items-center justify-center px-3 py-2.5 rounded-xl border border-[var(--border)] bg-[var(--surface)] text-[var(--text-muted)] hover:text-[var(--text)] transition-colors"
          title="Настройки категорий">
          <Icon name="settings" size={16} />
        </button>
      </div>

      {!items.length ? (
        <EmptyState title="Нет постоянных платежей" text="Добавьте регулярные расходы: подписки, интернет, аренду и прочее" />
      ) : (
        <>
          {/* Сводка */}
          <div className="inline-flex items-baseline gap-2 bg-[var(--surface)] border border-[var(--border)] rounded-2xl px-5 py-3 mb-4">
            <span className="font-display text-3xl">{formatRub(totalMonthly)}</span>
            <span className="text-[var(--text-muted)]">₽/мес</span>
          </div>

          {/* Table */}
          <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-sm" style={{ minWidth: '480px' }}>
                <thead>
                  <tr className="bg-[var(--bg)] border-b border-[var(--border)]">
                    {[
                      { col: 'name',     label: 'Название',  cls: 'text-left'  },
                      { col: 'category', label: 'Категория', cls: 'text-left'  },
                      { col: 'amount',   label: 'Сумма/мес', cls: 'text-right' },
                    ].map(({ col, label, cls }) => (
                      <th key={col} onClick={() => toggleSort(col)}
                        className={`px-3 py-3 text-xs font-semibold uppercase tracking-wide text-[var(--text-subtle)] cursor-pointer hover:text-[var(--text)] transition-colors select-none whitespace-nowrap ${cls}`}>
                        {label}<SortArrow col={col} />
                      </th>
                    ))}
                    <th className="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wide text-[var(--text-subtle)] whitespace-nowrap">Заметка</th>
                    <th className="px-3 py-3 w-16" />
                  </tr>
                </thead>
                <tbody>
                  {sorted.map((r, i) => {
                    const cat = cats.find(c => c.id === r.category) || { emoji: '📌', label: r.category };
                    return (
                      <tr key={r.id} className={`border-b border-[var(--border)] last:border-0 hover:bg-black/[0.02] transition-colors ${i % 2 === 1 ? 'bg-[var(--bg)]/50' : ''}`}>
                        <td className="px-3 py-3 font-medium whitespace-nowrap">{r.name}</td>
                        <td className="px-3 py-3 whitespace-nowrap text-[var(--text-muted)]">{cat.emoji} {cat.label}</td>
                        <td className="px-3 py-3 text-right whitespace-nowrap font-semibold text-[var(--text)]">{formatRub(r.amount)} ₽</td>
                        <td className="px-3 py-3 text-[var(--text-subtle)] text-sm max-w-[200px] truncate">{r.notes || '—'}</td>
                        <td className="px-2 py-3">
                          <div className="flex gap-1 justify-end">
                            <button onClick={() => setEditing(r)} className="p-1.5 rounded-lg hover:bg-black/5 text-[var(--text-muted)]"><Icon name="edit"  size={14} /></button>
                            <button onClick={() => remove(r.id)} className="p-1.5 rounded-lg hover:bg-red-50 text-[var(--text-muted)] hover:text-red-500"><Icon name="trash" size={14} /></button>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div className="px-4 py-3 bg-[var(--bg)] border-t border-[var(--border)] flex justify-between items-center">
              <span className="text-xs text-[var(--text-subtle)] uppercase tracking-wide">{sorted.length} позиций</span>
              <span className="font-display text-base">{formatRub(totalMonthly)} ₽/мес</span>
            </div>
          </div>
        </>
      )}

      {editing && <BudgetRecurringModal item={editing} cats={cats} onSave={save} onClose={() => setEditing(null)} />}
      {showSettings && (
        <BudgetCategoriesModal
          title="Категории постоянных платежей"
          cats={cats}
          defaultCats={BUDGET_RECURRING_CATS}
          onSaveCategories={newCats => setData(d => ({ ...d, budgetRecurringCategories: newCats }))}
          onClose={() => setShowSettings(false)}
        />
      )}
    </div>
  );
}

function BudgetRecurringModal({ item, cats, onSave, onClose }) {
  const [form, setForm] = useState({ ...item });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const submit = () => {
    if (!form.name.trim()) return;
    if (!form.amount || Number(form.amount) <= 0) return;
    onSave({ ...form, amount: Number(form.amount) });
  };

  return (
    <Modal title={item.name ? 'Редактировать платёж' : 'Новый платёж'} onClose={onClose}>
      <div className="space-y-4">
        <div>
          <label>Название</label>
          <input value={form.name} onChange={e => set('name', e.target.value)} placeholder="Netflix, Интернет..." />
        </div>

        <div>
          <label>Категория</label>
          <select value={form.category} onChange={e => set('category', e.target.value)}>
            {cats.map(c => <option key={c.id} value={c.id}>{c.emoji} {c.label}</option>)}
          </select>
        </div>

        <div>
          <label>Сумма в месяц (₽)</label>
          <input type="number" inputMode="numeric" min="1"
            value={form.amount || ''}
            onChange={e => set('amount', e.target.value)}
            placeholder="1 000" />
        </div>

        <div>
          <label>Заметка (необязательно)</label>
          <textarea value={form.notes || ''} onChange={e => set('notes', e.target.value)} rows={2} placeholder="Дополнительная информация..." />
        </div>

        <div className="flex gap-3 pt-2">
          <button onClick={onClose} className="btn-secondary flex-1">Отмена</button>
          <button onClick={submit}  className="btn-primary flex-1">Сохранить</button>
        </div>
      </div>
    </Modal>
  );
}


// ============== DEBTS (Долги) ==============

const DEBT_SOURCES = ['Альфа', '9816', 'Накопления'];

function BudgetDebtsView({ data, setData }) {
  const [editing,   setEditing]   = useState(null);
  const [showClosed, setShowClosed] = useState(false);

  const debts = data.budgetDebts || [];
  const active = debts.filter(d => !d.closed);
  const closed = debts.filter(d => d.closed);

  const save = (debt) => {
    debt = { ...debt, updatedAt: Date.now() };
    setData(d => {
      const list = d.budgetDebts || [];
      const exists = list.find(x => x.id === debt.id);
      return { ...d, budgetDebts: exists ? list.map(x => x.id === debt.id ? debt : x) : [...list, debt] };
    });
    setEditing(null);
  };

  const remove = (id) => {
    if (!confirm('Удалить долг?')) return;
    setData(d => ({ ...d, budgetDebts: (d.budgetDebts || []).filter(x => x.id !== id) }));
  };

  const toggleClosed = (id) => {
    setData(d => ({ ...d, budgetDebts: (d.budgetDebts || []).map(x => x.id === id ? { ...x, closed: !x.closed } : x) }));
  };

  const newDebt = () => setEditing({
    id: crypto.randomUUID(), amount: '', debtor: '', source: DEBT_SOURCES[0],
    returnDate: '', notify: false, notifyDate: '', notifyTime: '12:00',
    comment: '', closed: false,
  });

  const totalActive = active.reduce((s, d) => s + (d.amount || 0), 0);

  const fmtDate = (s) => {
    if (!s) return '—';
    const [y, m, dd] = s.split('-');
    return `${dd}.${m}.${y}`;
  };
  const isOverdue = (d) => d.returnDate && !d.closed && d.returnDate < new Date().toISOString().slice(0, 10);

  const DebtRow = ({ d }) => (
    <tr className={`border-b border-[var(--border)] last:border-0 hover:bg-black/[0.02] transition-colors ${d.closed ? 'opacity-50' : ''}`}>
      <td className="px-3 py-3 whitespace-nowrap font-semibold text-[var(--text)]">{formatRub(d.amount)} ₽</td>
      <td className="px-3 py-3 whitespace-nowrap font-medium">{d.debtor || '—'}</td>
      <td className="px-3 py-3 whitespace-nowrap text-[var(--text-muted)]">{d.source || '—'}</td>
      <td className={`px-3 py-3 whitespace-nowrap ${isOverdue(d) ? 'text-red-500 font-medium' : 'text-[var(--text-muted)]'}`}>
        {fmtDate(d.returnDate)}
        {isOverdue(d) && <span className="block text-[10px] text-red-400">просрочен</span>}
      </td>
      <td className="px-3 py-3 whitespace-nowrap text-[var(--text-muted)] text-xs">
        {d.notify && d.notifyDate ? `🔔 ${fmtDate(d.notifyDate)} ${d.notifyTime || ''}` : '—'}
      </td>
      <td className="px-3 py-3 text-[var(--text-subtle)] text-sm max-w-[200px] truncate">{d.comment || '—'}</td>
      <td className="px-2 py-3">
        <div className="flex gap-0.5 justify-end">
          <button onClick={() => toggleClosed(d.id)} title={d.closed ? 'Вернуть в активные' : 'Отметить закрытым'}
            className={`p-1.5 rounded-lg hover:bg-black/5 ${d.closed ? 'text-[var(--text-muted)]' : 'text-green-500 hover:text-green-700'}`}>
            <Icon name={d.closed ? 'restore' : 'check'} size={14} />
          </button>
          <button onClick={() => setEditing(d)} className="p-1.5 rounded-lg hover:bg-black/5 text-[var(--text-muted)]" title="Редактировать"><Icon name="edit" size={14} /></button>
          <button onClick={() => remove(d.id)} className="p-1.5 rounded-lg hover:bg-red-50 text-[var(--text-muted)] hover:text-red-500" title="Удалить"><Icon name="trash" size={14} /></button>
        </div>
      </td>
    </tr>
  );

  const headCells = ['Сумма', 'Кому', 'Откуда', 'Вернуть до', 'Напоминание', 'Комментарий'];

  return (
    <div>
      <div className="flex items-center gap-2 flex-wrap mb-6">
        <button onClick={newDebt} className="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl bg-[var(--text)] text-white text-sm font-medium hover:opacity-85 transition-all">
          <Icon name="plus" size={16} />Добавить
        </button>
      </div>

      {!debts.length ? (
        <EmptyState title="Нет долгов" text="Добавьте долг: сумму, кому дали, откуда и когда должны вернуть" />
      ) : (
        <>
          <div className="inline-flex items-baseline gap-2 bg-[var(--surface)] border border-[var(--border)] rounded-2xl px-5 py-3 mb-4">
            <span className="font-display text-3xl">{formatRub(totalActive)}</span>
            <span className="text-[var(--text-muted)]">₽ в долгах</span>
          </div>

          {active.length > 0 && (
            <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl overflow-hidden">
              <div className="overflow-x-auto">
                <table className="w-full text-sm" style={{ minWidth: '720px' }}>
                  <thead>
                    <tr className="bg-[var(--bg)] border-b border-[var(--border)]">
                      {headCells.map(h => (
                        <th key={h} className="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wide text-[var(--text-subtle)] whitespace-nowrap">{h}</th>
                      ))}
                      <th className="px-3 py-3 w-24" />
                    </tr>
                  </thead>
                  <tbody>
                    {active.map(d => <DebtRow key={d.id} d={d} />)}
                  </tbody>
                </table>
              </div>
              <div className="px-4 py-3 bg-[var(--bg)] border-t border-[var(--border)] flex justify-between items-center">
                <span className="text-xs text-[var(--text-subtle)] uppercase tracking-wide">{active.length} активных</span>
                <span className="font-display text-base">{formatRub(totalActive)} ₽</span>
              </div>
            </div>
          )}

          {closed.length > 0 && (
            <div className="mt-4">
              <button onClick={() => setShowClosed(v => !v)}
                className="flex items-center gap-2 text-sm text-[var(--text-muted)] hover:text-[var(--text)] transition-colors">
                <Icon name={showClosed ? 'chevronDown' : 'chevronDown'} size={14} />
                Закрытые ({closed.length})
              </button>
              {showClosed && (
                <div className="mt-3 bg-[var(--surface)] border border-[var(--border)] rounded-2xl overflow-hidden">
                  <div className="overflow-x-auto">
                    <table className="w-full text-sm" style={{ minWidth: '720px' }}>
                      <thead>
                        <tr className="bg-[var(--bg)] border-b border-[var(--border)]">
                          {headCells.map(h => (
                            <th key={h} className="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wide text-[var(--text-subtle)] whitespace-nowrap">{h}</th>
                          ))}
                          <th className="px-3 py-3 w-24" />
                        </tr>
                      </thead>
                      <tbody>
                        {closed.map(d => <DebtRow key={d.id} d={d} />)}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </div>
          )}
        </>
      )}

      {editing && <BudgetDebtModal debt={editing} onSave={save} onClose={() => setEditing(null)} />}
    </div>
  );
}

function BudgetDebtModal({ debt, onSave, onClose }) {
  const [form, setForm] = useState({ ...debt });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const submit = () => {
    if (!form.amount || Number(form.amount) <= 0) return;
    if (!form.debtor.trim()) return;
    onSave({
      ...form,
      amount: Number(form.amount),
      debtor: form.debtor.trim(),
      comment: (form.comment || '').trim(),
      notify: !!(form.notify && form.notifyDate),
    });
