  };

  const removePending = (i) => {
    setPending(p => { URL.revokeObjectURL(p[i].preview); return p.filter((_,j) => j!==i); });
  };

  const setPendingCategory = (i, cat) => {
    setPending(p => p.map((item, j) => j === i ? { ...item, category: cat } : item));
  };

  const setExistingCategory = (filename, cat) => {
    setPhotos(p => p.map(ph => ph.filename === filename ? { ...ph, category: cat } : ph));
  };

  const removeExisting = async (filename) => {
    await deletePhoto(filename);
    setPhotos(p => p.filter(ph => ph.filename !== filename));
  };

  const handleSave = async () => {
    setUploading(true);
    try {
      const uploaded = await Promise.all(pending.map(async p => {
        const filename = await uploadPhoto(p.file);
        return { filename, category: p.category || '' };
      }));
      pending.forEach(p => URL.revokeObjectURL(p.preview));
      onSave({ ...entry, date, values, photos: [...photos, ...uploaded], notes });
    } catch(e) {
      alert('Ошибка загрузки фото: ' + e.message);
    } finally {
      setUploading(false);
    }
  };

  const PhotoCategoryPills = ({ value, onChange }) => (
    <div className="flex flex-wrap gap-1 mt-1.5">
      <button onClick={() => onChange('')}
        className={`px-2 py-0.5 rounded-full text-[10px] font-medium border transition-all ${!value ? 'bg-[var(--text)] text-white border-transparent' : 'border-[var(--border)] text-[var(--text-muted)] hover:bg-black/5'}`}>
        Без категории
      </button>
      {cats.map(c => (
        <button key={c} onClick={() => onChange(c)}
          className={`px-2 py-0.5 rounded-full text-[10px] font-medium border transition-all ${value===c ? 'bg-[var(--text)] text-white border-transparent' : 'border-[var(--border)] text-[var(--text-muted)] hover:bg-black/5'}`}>
          {c}
        </button>
      ))}
    </div>
  );

  return (
    <div className="fade-in">
      <div className="mb-6 flex items-center gap-3">
        <button onClick={onCancel} className="p-2 rounded-xl hover:bg-black/5 text-[var(--text-muted)]">
          <Icon name="x" size={20} />
        </button>
        <h2 className="font-display text-2xl">{entry ? 'Редактировать запись' : 'Новая запись'}</h2>
      </div>

      <div className="space-y-4">
        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
          <label>Дата</label>
          <input type="date" value={date} max={today} onChange={e => setDate(e.target.value)} />
        </div>

        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
          <h3 className="font-display text-lg mb-4">Показатели</h3>
          <div className="grid grid-cols-2 gap-4">
            {fields.map(f => (
              <div key={f.id}>
                <label>{f.label}{f.unit ? ` (${f.unit})` : ''}</label>
                <input type="number" step="0.1" placeholder="—"
                  value={values[f.id] ?? ''}
                  onChange={e => setValues(v => ({
                    ...v,
                    [f.id]: e.target.value === '' ? undefined : parseFloat(e.target.value)
                  }))}
                />
              </div>
            ))}
          </div>
        </div>

        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
          <h3 className="font-display text-lg mb-3">Фото</h3>
          <div className="space-y-3">
            {photos.map(ph => (
              <div key={ph.filename} className="flex gap-3 items-start bg-[var(--bg)] rounded-xl p-2">
                <div className="relative flex-shrink-0">
                  <img src={`/api/photos/${ph.filename}`} className="w-16 h-16 object-cover rounded-xl" />
                  <button onClick={() => removeExisting(ph.filename)}
                    className="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 text-white rounded-full text-xs flex items-center justify-center">×</button>
                </div>
                <div className="flex-1 min-w-0">
                  <div className="text-xs text-[var(--text-muted)] mb-0.5">Категория:</div>
                  <PhotoCategoryPills value={ph.category} onChange={cat => setExistingCategory(ph.filename, cat)} />
                </div>
              </div>
            ))}
            {pending.map((p, i) => (
              <div key={i} className="flex gap-3 items-start bg-[var(--bg)] rounded-xl p-2">
                <div className="relative flex-shrink-0">
                  <img src={p.preview} className="w-16 h-16 object-cover rounded-xl opacity-70" />
                  <button onClick={() => removePending(i)}
                    className="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 text-white rounded-full text-xs flex items-center justify-center">×</button>
                </div>
                <div className="flex-1 min-w-0">
                  <div className="text-xs text-[var(--text-muted)] mb-0.5">Категория:</div>
                  <PhotoCategoryPills value={p.category} onChange={cat => setPendingCategory(i, cat)} />
                </div>
              </div>
            ))}
            <label className="flex items-center gap-2 px-3 py-2.5 border-2 border-dashed border-[var(--border-strong)] rounded-xl cursor-pointer hover:bg-black/5 text-[var(--text-subtle)]">
              <input type="file" accept="image/*" multiple className="hidden" onChange={handleFiles} />
              <Icon name="plus" size={18} />
              <span className="text-sm">Добавить фото</span>
            </label>
          </div>
        </div>

        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
          <label>Заметки</label>
          <textarea value={notes} rows={2} placeholder="Необязательно..."
            onChange={e => setNotes(e.target.value)}
            style={{ resize:'vertical' }} />
        </div>

        <div className="flex gap-3 pb-8">
          <button onClick={handleSave} disabled={uploading} className="btn-primary flex-1">
            {uploading ? 'Загружаю фото...' : 'Сохранить'}
          </button>
          <button onClick={onCancel} className="btn-secondary">Отмена</button>
        </div>
      </div>
    </div>
  );
}

function BodyHistory({ entries, fields, categories, onEdit, onDelete }) {
  const [lightbox, setLightbox] = useState(null);

  if (!entries.length) return <EmptyState title="Нет записей" text="Нажмите «Запись» чтобы внести первые данные" />;

  return (
    <div className="space-y-3">
      {entries.map((entry, idx) => {
        const prev = entries[idx + 1];
        const filled = fields.filter(f => entry.values?.[f.id] !== undefined);
        const photos = (entry.photos || []).map(normalizePhoto);
        return (
          <div key={entry.id} className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
            <div className="flex items-start justify-between mb-3">
              <div>
                <div className="font-display text-lg">{formatBodyDate(entry.date)}</div>
                {entry.notes && <div className="text-sm text-[var(--text-muted)] mt-0.5">{entry.notes}</div>}
              </div>
              <div className="flex gap-1 flex-shrink-0">
                <button onClick={() => onEdit(entry)} className="p-2 rounded-xl hover:bg-black/5 text-[var(--text-muted)]">
                  <Icon name="edit" size={16} />
                </button>
                <button onClick={() => { if(confirm('Удалить запись?')) onDelete(entry.id); }}
                  className="p-2 rounded-xl hover:bg-black/5 text-[var(--text-muted)]">
                  <Icon name="trash" size={16} />
                </button>
              </div>
            </div>

            {filled.length > 0 && (
              <div className="grid grid-cols-3 sm:grid-cols-4 gap-2 mb-3">
                {filled.map(f => {
                  const val = entry.values[f.id];
                  const prevVal = prev?.values?.[f.id];
                  const delta = prevVal !== undefined ? val - prevVal : null;
                  return (
                    <div key={f.id} className="bg-[var(--bg)] rounded-xl p-2 text-center">
                      <div className="text-[9px] text-[var(--text-subtle)] uppercase tracking-wide leading-tight mb-0.5">{f.label}</div>
                      <div className="text-sm font-semibold leading-tight">
                        {val}<span className="text-[9px] font-normal text-[var(--text-subtle)]">{f.unit ? ' '+f.unit : ''}</span>
                      </div>
                      {delta !== null && delta !== 0 && (
                        <div className={`text-[9px] font-medium ${delta < 0 ? 'text-green-500' : 'text-red-400'}`}>
                          {delta > 0 ? '+' : ''}{delta.toFixed(1)}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {photos.length > 0 && (
              <div className="flex gap-2 flex-wrap">
                {photos.map(ph => (
                  <div key={ph.filename} className="flex flex-col items-center gap-0.5">
                    <img src={`/api/photos/${ph.filename}`}
                      className="w-16 h-16 object-cover rounded-xl cursor-pointer hover:opacity-90 transition-opacity"
                      onClick={() => setLightbox(`/api/photos/${ph.filename}`)} />
                    {ph.category && (
                      <span className="text-[9px] font-medium text-[var(--text-subtle)] bg-[var(--bg)] px-1.5 py-0.5 rounded-full border border-[var(--border)] leading-tight">
                        {ph.category}
                      </span>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}

      {lightbox && (
        <div className="fixed inset-0 z-50 bg-black/85 flex items-center justify-center p-4" onClick={() => setLightbox(null)}>
          <img src={lightbox} className="max-w-full max-h-full rounded-2xl object-contain" />
        </div>
      )}
    </div>
  );
}

function BodyProgress({ entries, fields }) {
  if (entries.length < 2) return <EmptyState title="Мало данных" text="Добавьте хотя бы 2 записи чтобы увидеть прогресс" />;

  const sorted = [...entries].sort((a, b) => a.date.localeCompare(b.date));
  const first = sorted[0];
  const last = sorted[sorted.length - 1];

  const activeFields = fields.filter(f =>
    sorted.some(e => e.values?.[f.id] !== undefined)
  );

  return (
    <div className="space-y-4">
      <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
        <h3 className="font-display text-lg mb-1">Изменения за весь период</h3>
        <div className="text-xs text-[var(--text-muted)] mb-4">{formatBodyDate(first.date)} → {formatBodyDate(last.date)}</div>
        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
          {activeFields.map(f => {
            const fv = first.values?.[f.id];
            const lv = last.values?.[f.id];
            if (fv === undefined || lv === undefined) return null;
            const delta = lv - fv;
            return (
              <div key={f.id} className="bg-[var(--bg)] rounded-xl p-3">
                <div className="text-[10px] text-[var(--text-subtle)] uppercase tracking-wide mb-1">{f.label}</div>
                <div className="flex items-baseline gap-1.5">
                  <span className="text-lg font-semibold">{lv}</span>
                  <span className="text-xs text-[var(--text-subtle)]">{f.unit}</span>
                </div>
                {delta !== 0 && (
                  <div className={`text-xs font-medium mt-0.5 ${delta < 0 ? 'text-green-500' : 'text-red-400'}`}>
                    {delta > 0 ? '+' : ''}{delta.toFixed(1)} от начала
                  </div>
                )}
                <div className="text-[10px] text-[var(--text-subtle)] mt-0.5">было: {fv} {f.unit}</div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5 overflow-x-auto">
        <h3 className="font-display text-lg mb-3">Все записи</h3>
        <table className="w-full text-sm" style={{ minWidth: Math.max(320, activeFields.length * 80 + 120) }}>
          <thead>
            <tr className="text-left border-b border-[var(--border)]">
              <th className="pb-2 pr-4 text-[10px] uppercase tracking-wide text-[var(--text-subtle)] font-medium">Дата</th>
              {activeFields.map(f => (
                <th key={f.id} className="pb-2 pr-3 text-right text-[10px] uppercase tracking-wide text-[var(--text-subtle)] font-medium whitespace-nowrap">
                  {f.label}{f.unit ? ` (${f.unit})` : ''}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {[...sorted].reverse().map((entry, idx, arr) => {
              const prev = arr[idx + 1];
              return (
                <tr key={entry.id} className="border-b border-[var(--border)] last:border-0">
                  <td className="py-2 pr-4 text-xs text-[var(--text-muted)] whitespace-nowrap">{formatBodyDate(entry.date)}</td>
                  {activeFields.map(f => {
                    const val = entry.values?.[f.id];
                    const prevVal = prev?.values?.[f.id];
                    const delta = val !== undefined && prevVal !== undefined ? val - prevVal : null;
                    return (
                      <td key={f.id} className="py-2 pr-3 text-right">
                        {val !== undefined ? (
                          <span>
                            {val}
                            {delta !== null && delta !== 0 && (
                              <span className={`text-[9px] ml-1 ${delta < 0 ? 'text-green-500' : 'text-red-400'}`}>
                                {delta > 0 ? '+' : ''}{delta.toFixed(1)}
                              </span>
                            )}
                          </span>
                        ) : <span className="text-[var(--text-subtle)]">—</span>}
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function BodyPhotoGallery({ entries, categories }) {
  const [filter, setFilter] = useState('');
  const [lightbox, setLightbox] = useState(null);

  const cats = categories || DEFAULT_BODY_PHOTO_CATEGORIES;

  const allPhotos = entries.flatMap(entry =>
    (entry.photos || []).map(normalizePhoto).map(ph => ({ ...ph, date: entry.date, entryId: entry.id }))
  ).filter(ph => !filter || ph.category === filter);

  const formatDate = (d) => {
    try {
      return new Date(d + 'T12:00:00').toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' });
    } catch { return d; }
  };

  return (
    <div>
      <div className="flex gap-2 flex-wrap mb-4">
        <button onClick={() => setFilter('')}
          className={`px-3 py-1.5 rounded-full text-sm font-medium border transition-all ${!filter ? 'bg-[var(--text)] text-white border-transparent' : 'border-[var(--border)] text-[var(--text-muted)] hover:bg-black/5'}`}>
          Все
        </button>
        {cats.map(c => (
          <button key={c} onClick={() => setFilter(c)}
            className={`px-3 py-1.5 rounded-full text-sm font-medium border transition-all ${filter===c ? 'bg-[var(--text)] text-white border-transparent' : 'border-[var(--border)] text-[var(--text-muted)] hover:bg-black/5'}`}>
            {c}
          </button>
        ))}
      </div>

      {allPhotos.length === 0 ? (
        <EmptyState title="Нет фото" text={filter ? `Нет фото с категорией «${filter}»` : 'Добавьте фото при создании записи'} />
      ) : (
        <div className="grid grid-cols-3 sm:grid-cols-4 gap-2">
          {allPhotos.map((ph, i) => (
            <div key={ph.filename + i} className="flex flex-col">
              <img src={`/api/photos/${ph.filename}`}
                className="w-full aspect-square object-cover rounded-xl cursor-pointer hover:opacity-90 transition-opacity"
                onClick={() => setLightbox(ph)} />
              <div className="text-[9px] text-[var(--text-subtle)] text-center mt-0.5 leading-tight">
                {formatDate(ph.date)}
              </div>
            </div>
          ))}
        </div>
      )}

      {lightbox && (
        <div className="fixed inset-0 z-50 bg-black/90 flex flex-col items-center justify-center p-4" onClick={() => setLightbox(null)}>
          <img src={`/api/photos/${lightbox.filename}`} className="max-w-full max-h-[80vh] rounded-2xl object-contain" onClick={e => e.stopPropagation()} />
          <div className="mt-3 text-center" onClick={e => e.stopPropagation()}>
            {lightbox.category && (
              <span className="inline-block px-3 py-1 rounded-full bg-white/20 text-white text-sm font-medium mr-2">{lightbox.category}</span>
            )}
            <span className="text-white/70 text-sm">{formatDate(lightbox.date)}</span>
          </div>
          <button className="mt-3 text-white/50 text-sm" onClick={() => setLightbox(null)}>Закрыть</button>
        </div>
      )}
    </div>
  );
}

function BodyFieldsSettings({ data, setData }) {
  const [customLabel, setCustomLabel] = useState('');
  const [customUnit, setCustomUnit] = useState('');
  const [newCatName, setNewCatName] = useState('');

  const fields = data.bodyFields || DEFAULT_BODY_FIELDS;
  const setFields = (f) => setData(d => ({ ...d, bodyFields: f }));

  const cats = data.bodyPhotoCategories || DEFAULT_BODY_PHOTO_CATEGORIES;
  const setCats = (c) => setData(d => ({ ...d, bodyPhotoCategories: c }));

  const remove = (id) => setFields(fields.filter(f => f.id !== id));
  const move = (idx, dir) => {
    const arr = [...fields];
    const to = idx + dir;
    if (to < 0 || to >= arr.length) return;
    [arr[idx], arr[to]] = [arr[to], arr[idx]];
    setFields(arr);
  };
  const addPreset = (p) => { if (!fields.find(f => f.id === p.id)) setFields([...fields, { ...p }]); };
  const addCustom = () => {
    if (!customLabel.trim()) return;
    setFields([...fields, { id: 'custom_' + Date.now(), label: customLabel.trim(), unit: customUnit.trim() }]);
    setCustomLabel(''); setCustomUnit('');
  };

  const removeCat = (c) => setCats(cats.filter(x => x !== c));
  const moveCat = (idx, dir) => {
    const arr = [...cats];
    const to = idx + dir;
    if (to < 0 || to >= arr.length) return;
    [arr[idx], arr[to]] = [arr[to], arr[idx]];
    setCats(arr);
  };
  const addCat = () => {
    const name = newCatName.trim();
    if (!name || cats.includes(name)) return;
    setCats([...cats, name]);
    setNewCatName('');
  };

  const available = [...DEFAULT_BODY_FIELDS, ...PRESET_BODY_FIELDS].filter(p => !fields.find(f => f.id === p.id));

  return (
    <div className="space-y-4">
      <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
        <h3 className="font-display text-lg mb-3">Текущие поля</h3>
        <div className="space-y-2">
          {fields.map((f, i) => (
            <div key={f.id} className="flex items-center gap-2 bg-[var(--bg)] rounded-xl px-3 py-2.5">
              <div className="flex-1 text-sm">
                <span className="font-medium">{f.label}</span>
                {f.unit && <span className="text-[var(--text-muted)] ml-1 text-xs">({f.unit})</span>}
              </div>
              <button onClick={() => move(i,-1)} disabled={i===0} className="p-1 text-[var(--text-subtle)] disabled:opacity-25 text-base leading-none">↑</button>
              <button onClick={() => move(i, 1)} disabled={i===fields.length-1} className="p-1 text-[var(--text-subtle)] disabled:opacity-25 text-base leading-none">↓</button>
              <button onClick={() => remove(f.id)} className="p-1 text-red-400 hover:text-red-600">
                <Icon name="trash" size={14} />
              </button>
            </div>
          ))}
        </div>
      </div>

      {available.length > 0 && (
        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
          <h3 className="font-display text-lg mb-3">Добавить стандартное поле</h3>
          <div className="flex flex-wrap gap-2">
            {available.map(p => (
              <button key={p.id} onClick={() => addPreset(p)}
                className="flex items-center gap-1 px-3 py-1.5 bg-[var(--bg)] border border-[var(--border)] rounded-xl text-sm hover:bg-black/5">
                <Icon name="plus" size={13} /> {p.label}{p.unit ? ` (${p.unit})` : ''}
              </button>
            ))}
          </div>
        </div>
      )}

      <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
        <h3 className="font-display text-lg mb-3">Своё поле</h3>
        <div className="flex gap-3 flex-wrap">
          <div className="flex-1 min-w-[140px]">
            <label>Название</label>
            <input type="text" value={customLabel} onChange={e => setCustomLabel(e.target.value)} placeholder="Например, Давление" />
          </div>
          <div style={{width:100}}>
            <label>Ед. изм.</label>
            <input type="text" value={customUnit} onChange={e => setCustomUnit(e.target.value)} placeholder="мм рт." />
          </div>
          <div className="flex items-end">
            <button onClick={addCustom} disabled={!customLabel.trim()} className="btn-primary">Добавить</button>
          </div>
        </div>
      </div>

      <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
        <h3 className="font-display text-lg mb-3">Категории фото</h3>
        <div className="space-y-2 mb-3">
          {cats.map((c, i) => (
            <div key={c} className="flex items-center gap-2 bg-[var(--bg)] rounded-xl px-3 py-2.5">
              <div className="flex-1 text-sm font-medium">{c}</div>
              <button onClick={() => moveCat(i,-1)} disabled={i===0} className="p-1 text-[var(--text-subtle)] disabled:opacity-25 text-base leading-none">↑</button>
              <button onClick={() => moveCat(i, 1)} disabled={i===cats.length-1} className="p-1 text-[var(--text-subtle)] disabled:opacity-25 text-base leading-none">↓</button>
              <button onClick={() => removeCat(c)} className="p-1 text-red-400 hover:text-red-600">
                <Icon name="trash" size={14} />
              </button>
            </div>
          ))}
        </div>
        <div className="flex gap-2">
          <input type="text" value={newCatName} onChange={e => setNewCatName(e.target.value)}
            placeholder="Новая категория..."
            onKeyDown={e => e.key === 'Enter' && addCat()}
            style={{ flex:1 }} />
          <button onClick={addCat} disabled={!newCatName.trim() || cats.includes(newCatName.trim())} className="btn-primary whitespace-nowrap">
            Добавить
          </button>
        </div>
      </div>
    </div>
  );
}

function CarsSettings({ data, setData }) {
  const [editing, setEditing] = useState(null);
  const [showArchive, setShowArchive] = useState(false);

  const active   = (data.cars || []).filter(c => !c.archived);
  const archived = (data.cars || []).filter(c =>  c.archived);

  const save = (car) => {
    setData(d => {
      const list = d.cars || [];
      const exists = list.find(c => c.id === car.id);
      return { ...d, cars: exists ? list.map(c => c.id === car.id ? car : c) : [...list, car] };
    });
    setEditing(null);
  };

  const remove = (id) => {
    if (!confirm('Удалить автомобиль? Вся история обслуживания этого автомобиля будет удалена.')) return;
    setData(d => ({
      ...d,
      cars: (d.cars || []).filter(c => c.id !== id),
      serviceRecords: (d.serviceRecords || []).filter(r => r.carId !== id),
    }));
  };

  const toggleArchive = (id) => {
    setData(d => ({
      ...d,
      cars: (d.cars || []).map(c => c.id === id ? { ...c, archived: !c.archived } : c),
    }));
  };

  return (
    <div>
      <button
        onClick={() => setEditing({ id: crypto.randomUUID(), name: '', year: '', plate: '', notes: '', archived: false })}
        className="btn-primary w-full flex items-center justify-center gap-2 mb-6"
      >
        <Icon name="plus" size={18} />
        Добавить автомобиль
      </button>

      <div className="space-y-3 mb-8">
        {active.length === 0 && (
          <div className="text-center py-8 text-[var(--text-subtle)] text-sm">Нет автомобилей</div>
        )}
        {active.map(car => (
          <CarSettingsRow key={car.id} car={car}
            onEdit={() => setEditing(car)}
            onArchive={() => toggleArchive(car.id)}
            onDelete={() => remove(car.id)}
          />
        ))}
      </div>

      {archived.length > 0 && (
        <div>
          <button onClick={() => setShowArchive(!showArchive)}
            className="flex items-center gap-2 text-[var(--text-muted)] hover:text-[var(--text)] mb-4 text-sm">
            <Icon name="archive" size={16} />
            Архив ({archived.length})
            <span className={`transition-transform ${showArchive ? 'rotate-180' : ''}`}>
              <Icon name="chevronDown" size={16} />
            </span>
          </button>
          {showArchive && (
            <div className="space-y-3 fade-in">
              {archived.map(car => (
                <CarSettingsRow key={car.id} car={car} archived
                  onEdit={() => setEditing(car)}
                  onArchive={() => toggleArchive(car.id)}
                  onDelete={() => remove(car.id)}
                />
              ))}
            </div>
          )}
        </div>
      )}

      {editing && <CarModal car={editing} onSave={save} onClose={() => setEditing(null)} />}
    </div>
  );
}

function CarSettingsRow({ car, archived, onEdit, onArchive, onDelete }) {
  return (
    <div className={`bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5 ${archived ? 'opacity-60' : ''}`}>
      <div className="flex items-start justify-between gap-4">
        <div className="flex-1 min-w-0">
          <div className="flex items-baseline gap-3 mb-1">
            <h3 className="font-display text-lg truncate">{car.name}</h3>
            {car.year && <span className="text-sm text-[var(--text-muted)]">{car.year}</span>}
          </div>
          {car.plate && <div className="text-xs text-[var(--text-subtle)] uppercase tracking-widest font-mono">{car.plate}</div>}
          {car.notes && <div className="text-sm text-[var(--text-muted)] italic mt-1">{car.notes}</div>}
        </div>
        <div className="flex gap-1 flex-shrink-0">
          <button onClick={onEdit} className="p-2 rounded-lg hover:bg-black/5 text-[var(--text-muted)]"><Icon name="edit" size={18} /></button>
          <button onClick={onArchive} className="p-2 rounded-lg hover:bg-black/5 text-[var(--text-muted)]"><Icon name={archived ? 'restore' : 'archive'} size={18} /></button>
          <button onClick={onDelete} className="p-2 rounded-lg hover:bg-black/5 text-[var(--text-muted)]"><Icon name="trash" size={18} /></button>
        </div>
      </div>
    </div>
  );
}

function CarModal({ car, onSave, onClose }) {
  const [form, setForm] = useState(car);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const submit = () => {
    if (!form.name.trim()) return alert('Введите название автомобиля');
    onSave(form);
  };

  return (
    <Modal onClose={onClose} title={car.name ? 'Редактировать автомобиль' : 'Новый автомобиль'}>
      <div className="space-y-4">
        <div>
          <label>Название</label>
          <input value={form.name} onChange={e => set('name', e.target.value)} placeholder="Например, Toyota Camry 2021" />
        </div>
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label>Год</label>
            <input type="number" value={form.year} onChange={e => set('year', e.target.value)} placeholder="2021" min="1900" max="2099" />
          </div>
          <div>
            <label>Гос. номер</label>
            <input value={form.plate} onChange={e => set('plate', e.target.value)} placeholder="А123ВС77" />
          </div>
        </div>
        <div>
          <label>Заметки</label>
          <textarea value={form.notes} onChange={e => set('notes', e.target.value)} rows={2} placeholder="Цвет, особенности..." />
        </div>
        <div className="flex gap-3 pt-2">
          <button onClick={onClose} className="btn-secondary flex-1">Отмена</button>
          <button onClick={submit} className="btn-primary flex-1">Сохранить</button>
        </div>
      </div>
    </Modal>
  );
}

function ServiceHistoryView({ data, setData }) {
  const [filterCar, setFilterCar] = useState('all');
  const [filterService, setFilterService] = useState('');
  const [editRecord, setEditRecord] = useState(null);

  const cars = (data.cars || []).filter(c => !c.archived);
  const allRecords = data.serviceRecords || [];

  // Нормализация: старые записи имели service+price на верхнем уровне
  const getItems = (r) =>
    r.items || (r.service ? [{ id: 'legacy', service: r.service, price: r.price || 0 }] : []);

  const visibleServiceNames = [...new Set(
    allRecords
      .filter(r => filterCar === 'all' || r.carId === filterCar)
      .flatMap(r => getItems(r).map(i => i.service))
      .filter(Boolean)
  )].sort();

  const filtered = allRecords
    .filter(r => filterCar === 'all' || r.carId === filterCar)
    .filter(r => !filterService || getItems(r).some(i => i.service === filterService))
    .sort((a, b) => b.date.localeCompare(a.date));

  const getCarName = (carId) => (data.cars || []).find(c => c.id === carId)?.name || '—';

  const saveRecord = (record) => {
    setData(d => {
      const list = d.serviceRecords || [];
      const exists = list.find(r => r.id === record.id);
      return { ...d, serviceRecords: exists ? list.map(r => r.id === record.id ? record : r) : [...list, record] };
    });
    setEditRecord(null);
  };

  const deleteRecord = (id) => {
    if (!confirm('Удалить запись?')) return;
    setData(d => ({ ...d, serviceRecords: (d.serviceRecords || []).filter(r => r.id !== id) }));
  };

  const fmtDate = (s) => {
    if (!s) return '';
    const d = new Date(s + 'T00:00:00');
    const mo = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
    return `${d.getDate()} ${mo[d.getMonth()]} ${d.getFullYear()}`;
  };

  const fmtMoney = (n) => n ? new Intl.NumberFormat('ru-RU').format(n) + ' ₽' : null;
  const fmtKm    = (n) => n ? new Intl.NumberFormat('ru-RU').format(n) + ' км' : null;
  const totalCost = filtered.reduce((s, r) => s + getItems(r).reduce((a, i) => a + (Number(i.price) || 0), 0), 0);

  const newRecord = () => ({
    id: crypto.randomUUID(),
    carId: filterCar !== 'all' ? filterCar : cars[0].id,
    date: new Date().toISOString().split('T')[0],
    items: [{ id: crypto.randomUUID(), service: '', price: '' }],
    mileage: '', notes: '',
  });

  if (cars.length === 0) {
    return <EmptyState title="Нет автомобилей" text="Добавьте автомобиль во вкладке «Автомобили»" />;
  }

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <h2 className="font-display text-2xl">История</h2>
        <button onClick={() => setEditRecord(newRecord())} className="btn-primary flex items-center gap-2 text-sm">
          <Icon name="plus" size={16} />
          Добавить
        </button>
      </div>

      {/* Фильтры */}
      <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-4 mb-4 space-y-3">
        <div>
          <label>Автомобиль</label>
          <select value={filterCar} onChange={e => { setFilterCar(e.target.value); setFilterService(''); }}>
            <option value="all">Все автомобили</option>
            {cars.map(c => <option key={c.id} value={c.id}>{c.name}{c.year ? ` (${c.year})` : ''}</option>)}
          </select>
        </div>
        {visibleServiceNames.length > 0 && (
          <div>
            <label>Вид работ</label>
            <select value={filterService} onChange={e => setFilterService(e.target.value)}>
              <option value="">Все работы</option>
              {visibleServiceNames.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
        )}
      </div>

      {/* Итог */}
      {filtered.length > 0 && (
        <div className="flex items-center gap-4 text-sm text-[var(--text-muted)] mb-4 px-1">
          <span>
            {filtered.length}{' '}
            {filtered.length === 1 ? 'запись' : filtered.length < 5 ? 'записи' : 'записей'}
          </span>
          {totalCost > 0 && (
            <span>Итого: <strong className="text-[var(--text)]">{fmtMoney(totalCost)}</strong></span>
          )}
        </div>
      )}

      {filtered.length === 0 ? (
        <EmptyState title="Нет записей" text="Нажмите «Добавить» чтобы внести первое обслуживание" />
      ) : (
        <div className="space-y-3">
          {filtered.map(record => {
            const items = getItems(record);
            const recTotal = items.reduce((s, i) => s + (Number(i.price) || 0), 0);
            return (
              <div key={record.id} className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
                <div className="flex items-start justify-between gap-4">
                  <div className="flex-1 min-w-0">
                    {/* Шапка: дата, авто, пробег */}
                    <div className="flex flex-wrap items-center gap-x-3 gap-y-0.5 text-sm mb-3">
                      <span className="font-medium text-[var(--text)]">{fmtDate(record.date)}</span>
                      {filterCar === 'all' && (
                        <span className="text-[var(--text-subtle)]">{getCarName(record.carId)}</span>
                      )}
                      {record.mileage > 0 && (
                        <span className="text-[var(--text-muted)]">{fmtKm(record.mileage)}</span>
                      )}
                    </div>
                    {/* Таблица работ */}
                    <div className="border border-[var(--border)] rounded-xl overflow-hidden text-sm">
                      {items.map((item, idx) => (
                        <div key={item.id || idx}
                          className={`flex items-center gap-3 px-3 py-2 ${idx > 0 ? 'border-t border-[var(--border)]' : ''}`}>
                          <span className="flex-1">{item.service}</span>
                          {Number(item.price) > 0 && (
                            <span className="text-[var(--text-muted)] flex-shrink-0 tabular-nums">{fmtMoney(item.price)}</span>
                          )}
                        </div>
                      ))}
                      {items.length > 1 && recTotal > 0 && (
                        <div className="flex items-center gap-3 px-3 py-2 border-t border-[var(--border-strong)] bg-[var(--bg)]">
                          <span className="flex-1 text-xs uppercase tracking-wide text-[var(--text-subtle)]">Итого</span>
                          <span className="font-semibold flex-shrink-0 tabular-nums">{fmtMoney(recTotal)}</span>
                        </div>
                      )}
                    </div>
                    {record.notes && <div className="text-sm text-[var(--text-muted)] mt-2 italic">{record.notes}</div>}
                  </div>
                  <div className="flex gap-1 flex-shrink-0">
                    <button onClick={() => setEditRecord(record)} className="p-2 rounded-lg hover:bg-black/5 text-[var(--text-muted)]">
                      <Icon name="edit" size={16} />
                    </button>
                    <button onClick={() => deleteRecord(record.id)} className="p-2 rounded-lg hover:bg-black/5 text-[var(--text-muted)]">
                      <Icon name="trash" size={16} />
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {editRecord && (
        <ServiceRecordModal
          record={editRecord}
          cars={cars}
          allServiceNames={[...new Set((data.serviceRecords || []).flatMap(r =>
            (r.items || (r.service ? [{ service: r.service }] : [])).map(i => i.service)
          ).filter(Boolean))].sort()}
          onSave={saveRecord}
          onClose={() => setEditRecord(null)}
        />
      )}
    </div>
  );
}

function ServiceRecordModal({ record, cars, allServiceNames, onSave, onClose }) {
  const initItems = () =>
    record.items
      ? record.items.map(i => ({ ...i }))
      : record.service
        ? [{ id: crypto.randomUUID(), service: record.service, price: record.price || '' }]
        : [{ id: crypto.randomUUID(), service: '', price: '' }];

  const [carId,   setCarId]   = useState(record.carId);
  const [date,    setDate]    = useState(record.date);
  const [mileage, setMileage] = useState(record.mileage || '');
  const [notes,   setNotes]   = useState(record.notes || '');
  const [items,   setItems]   = useState(initItems);
  const [activeSuggId, setActiveSuggId] = useState(null);

  const addItem    = () => setItems(it => [...it, { id: crypto.randomUUID(), service: '', price: '' }]);
  const removeItem = (id) => setItems(it => it.filter(i => i.id !== id));
  const updateItem = (id, key, val) => setItems(it => it.map(i => i.id === id ? { ...i, [key]: val } : i));

  const getSugg = (service) =>
    allServiceNames
      .filter(s => s !== service && s.toLowerCase().includes((service || '').toLowerCase()))
      .slice(0, 5);

  const total = items.reduce((s, i) => s + (Number(i.price) || 0), 0);

  const submit = () => {
    if (!carId) return alert('Выберите автомобиль');
    if (!date)  return alert('Укажите дату');
    const filled = items.filter(i => i.service.trim());
    if (!filled.length) return alert('Добавьте хотя бы одну работу');
    onSave({
      id: record.id,
      carId, date, notes,
      mileage: Number(mileage) || 0,
      items: filled.map(i => ({ ...i, service: i.service.trim(), price: Number(i.price) || 0 })),
    });
  };

  const isNew = !record.items && !record.service;

  return (
    <Modal onClose={onClose} title={isNew ? 'Новая запись' : 'Редактировать запись'}>
      <div className="space-y-4">
        <div>
          <label>Автомобиль</label>
          <select value={carId} onChange={e => setCarId(e.target.value)}>
            {cars.map(c => <option key={c.id} value={c.id}>{c.name}{c.year ? ` (${c.year})` : ''}</option>)}
          </select>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label>Дата</label>
            <input type="date" value={date} max={new Date().toISOString().split('T')[0]} onChange={e => setDate(e.target.value)} />
          </div>
          <div>
            <label>Пробег (км)</label>
            <input type="number" min="0" value={mileage} onChange={e => setMileage(e.target.value)} placeholder="50000" />
          </div>
        </div>

        {/* Таблица работ */}
        <div>
          <label>Работы</label>
          <div className="space-y-2">
            {items.map((item, idx) => (
              <div key={item.id} className="flex gap-2 items-start">
                <div className="flex-1 relative">
                  <input
                    value={item.service}
                    onChange={e => { updateItem(item.id, 'service', e.target.value); setActiveSuggId(item.id); }}
                    onFocus={() => setActiveSuggId(item.id)}
                    onBlur={() => setTimeout(() => setActiveSuggId(null), 150)}
                    placeholder={`Работа ${idx + 1}...`}
                  />
                  {activeSuggId === item.id && getSugg(item.service).length > 0 && (
                    <div className="absolute left-0 right-0 top-full mt-1 bg-[var(--surface)] border border-[var(--border)] rounded-xl shadow-lg z-20 overflow-hidden">
                      {getSugg(item.service).map(s => (
                        <button key={s}
                          onMouseDown={() => { updateItem(item.id, 'service', s); setActiveSuggId(null); }}
                          className="w-full text-left px-4 py-2.5 text-sm hover:bg-black/5 text-[var(--text)]">
                          {s}
                        </button>
                      ))}
                    </div>
                  )}
                </div>
                <div style={{ width: 100, flexShrink: 0 }}>
                  <input
                    type="number" min="0"
                    value={item.price}
                    onChange={e => updateItem(item.id, 'price', e.target.value)}
                    placeholder="₽"
                  />
                </div>
                {items.length > 1 && (
                  <button onClick={() => removeItem(item.id)}
                    className="flex-shrink-0 p-2.5 text-[var(--text-subtle)] hover:text-red-400 transition-colors mt-0.5">
                    <Icon name="x" size={16} />
                  </button>
                )}
              </div>
            ))}
          </div>

          {total > 0 && (
            <div className="flex justify-between items-center px-1 pt-2 text-sm">
              <span className="text-[var(--text-subtle)]">Итого</span>
              <span className="font-semibold tabular-nums">{new Intl.NumberFormat('ru-RU').format(total)} ₽</span>
            </div>
          )}

          <button onClick={addItem}
            className="mt-2 flex items-center gap-1.5 text-sm text-[var(--text-muted)] hover:text-[var(--text)] transition-colors">
            <Icon name="plus" size={15} />
            Добавить работу
          </button>
        </div>

        <div>
          <label>Заметки</label>
          <textarea value={notes} onChange={e => setNotes(e.target.value)} rows={2} placeholder="Сервис, мастер, бренд запчасти..." />
        </div>
        <div className="flex gap-3 pt-2">
          <button onClick={onClose} className="btn-secondary flex-1">Отмена</button>
          <button onClick={submit} className="btn-primary flex-1">Сохранить</button>
        </div>
      </div>
    </Modal>
  );
}

// ============== SHARED ==============
function Modal({ title, children, onClose }) {
  useEffect(() => {
    const handler = (e) => e.key === 'Escape' && onClose();
    window.addEventListener('keydown', handler);
    return () => {
      window.removeEventListener('keydown', handler);
    };
  }, [onClose]);

  return (
    <div
      className="fixed inset-0 z-50 overflow-y-auto bg-black/30 backdrop-blur-sm fade-in"
      onClick={onClose}
    >
      <div className="min-h-full flex items-start justify-center p-4 sm:py-10">
        <div
          onClick={e => e.stopPropagation()}
          className="bg-[var(--bg)] w-full max-w-lg rounded-2xl my-auto"
        >
          <div className="bg-[var(--bg)] px-6 py-5 flex items-center justify-between border-b border-[var(--border)] rounded-t-2xl">
            <h2 className="font-display text-2xl">{title}</h2>
            <button onClick={onClose} className="p-2 rounded-lg hover:bg-black/5 text-[var(--text-muted)]">
              <Icon name="x" size={20} />
            </button>
          </div>
          <div className="p-6">{children}</div>
        </div>
      </div>
    </div>
  );
}

function EmptyState({ title, text }) {
  return (
    <div className="bg-[var(--surface)] border border-dashed border-[var(--border-strong)] rounded-2xl p-12 text-center">
      <div className="font-display text-2xl mb-2">{title}</div>
      <div className="text-[var(--text-muted)] text-sm">{text}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
