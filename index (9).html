function EngSyncBtn({cfg,toMark,toUnmark,rawData,tcRef,atRef}){
  const [st,setSt]=useState('idle');const [msg,setMsg]=useState('');
  const sync=async()=>{
    if(!cfg.clientId){alert('OAuth Client ID не настроен в ⚙ настройках');return;}
    setSt('loading');setMsg('Авторизация...');
    const doSync=async()=>{
      try{
        setMsg('Запись...');
        const data=[...toMark.map(i=>({range:`${cfg.sheetName}!I${i}`,values:[[true]]})),...toUnmark.map(i=>({range:`${cfg.sheetName}!I${i}`,values:[[false]]}))];
        const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${cfg.sheetId}/values:batchUpdate`,{method:'POST',headers:{'Authorization':'Bearer '+atRef.current,'Content-Type':'application/json'},body:JSON.stringify({valueInputOption:'USER_ENTERED',data})});
        if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||'HTTP '+r.status);}
        setSt('done');setMsg(`✓ ${toMark.length?'+'+toMark.length+' помечено':''}${toUnmark.length?' −'+toUnmark.length+' снято':''}`);
      }catch(e){setSt('err');setMsg('✗ '+e.message);}
    };
    if(atRef.current){await doSync();return;}
    if(!tcRef.current){alert('OAuth не готов');setSt('idle');return;}
    tcRef.current.requestAccessToken({prompt:'consent'});
    let tries=0;
    const wait=setInterval(async()=>{if(atRef.current){clearInterval(wait);await doSync();}else if(++tries>30){clearInterval(wait);setSt('err');setMsg('Таймаут');}},500);
  };
  return(
    <div>
      <button onClick={sync} disabled={st==='loading'||st==='done'} className="btn-primary w-full py-3">
        {st==='loading'?'⏳ '+msg:st==='done'?msg:'↻ Синхронизировать с таблицей'}
      </button>
      {st==='err'&&<p className="text-xs text-red-500 mt-1">{msg}</p>}
    </div>
  );
}

function FlashcardsTab({rawData,cfg}){
  const [phase,setPhase]=useState('setup');
  const [settings,setSettings]=useState({direction:'en-ru',count:20,order:'random',filter:'all',dateRange:'all',sentence:true,synonyms:true,tts:false,hide:true,repeat:true,auto:false});
  const [sess,setSess]=useState(null);
  const sessRef=useRef(null);
  useEffect(()=>{sessRef.current=sess;},[sess]);
  const tcRef=useRef(null);const atRef=useRef(null);

  useEffect(()=>{
    if(!cfg.clientId) return;
    const load=()=>{
      if(!window.google?.accounts) return;
      try{tcRef.current=window.google.accounts.oauth2.initTokenClient({client_id:cfg.clientId,scope:'https://www.googleapis.com/auth/spreadsheets',callback:(r)=>{if(r.access_token)atRef.current=r.access_token;}});}catch(e){}
    };
    if(window.google?.accounts){load();return;}
    const s=document.createElement('script');s.src='https://accounts.google.com/gsi/client';s.onload=()=>setTimeout(load,300);document.head.appendChild(s);
  },[cfg.clientId]);

  useEffect(()=>{
    const h=(e)=>{
      const s=sessRef.current;if(!s||phase!=='study') return;
      if(e.code==='Space'){e.preventDefault();setSess(x=>x?{...x,flipped:!x.flipped}:x);}
      else if(e.key==='h'||e.key==='H') toggleHard();
      else if(s.flipped&&['1','2','3','4'].includes(e.key)){doAnswer({'1':'again','2':'hard','3':'good','4':'easy'}[e.key]);}
      else if(!s.flipped){
        if(e.key==='ArrowRight') setSess(x=>x?{...x,cur:x.cur+1}:x);
        else if(e.key==='ArrowLeft'&&s.cur>0) setSess(x=>x?{...x,cur:x.cur-1,flipped:false}:x);
      }
    };
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[phase]);

  const autoRef=useRef(null);
  useEffect(()=>{
    if(autoRef.current) clearTimeout(autoRef.current);
    if(!sess||sess.flipped||!settings.auto||phase!=='study') return;
    autoRef.current=setTimeout(()=>setSess(s=>s?{...s,flipped:true}:s),5000);
    return()=>clearTimeout(autoRef.current);
  },[sess?.cur,sess?.flipped,settings.auto,phase]);

  const getIY=(data)=>{const ys=data.map(w=>engParseDate(w.date)?.getFullYear()).filter(Boolean);return ys.length?Math.max(...ys):new Date().getFullYear();};

  const startSession=()=>{
    if(!rawData?.length) return;
    const iy=getIY(rawData);
    let pool=rawData.slice();
    if(settings.filter==='hard') pool=pool.filter(w=>w.hard);
    else if(settings.filter==='not-hard') pool=pool.filter(w=>!w.hard);
    else if(settings.filter==='not-shown') pool=pool.filter(w=>!w.showNew);
    if(settings.dateRange!=='all'){
      const days=parseInt(settings.dateRange);
      const times=rawData.map(w=>engParseDate(w.date,iy)).filter(Boolean).map(d=>d.getTime());
      const ref=times.length?Math.max(...times):Date.now();
      pool=pool.filter(w=>{const d=engParseDate(w.date,iy);return d&&d.getTime()>=ref-(days-1)*86400000;});
    }
    if(!pool.length){alert('Нет слов по выбранным фильтрам');return;}
    if(settings.order==='random') pool.sort(()=>Math.random()-.5);
    else if(settings.order==='newest') pool.sort((a,b)=>(engParseDate(b.date,iy)?.getTime()||0)-(engParseDate(a.date,iy)?.getTime()||0));
    else if(settings.order==='oldest') pool.sort((a,b)=>(engParseDate(a.date,iy)?.getTime()||0)-(engParseDate(b.date,iy)?.getTime()||0));
    const pd=()=>settings.direction==='mixed'?(Math.random()<.5?'en-ru':'ru-en'):settings.direction;
    const cnt=settings.count>0&&settings.count<pool.length?settings.count:pool.length;
    setSess({queue:pool.slice(0,cnt).map(w=>({...w,_dir:pd()})),again:[],done:[],cur:0,flipped:false,markHard:new Set(),unmarkHard:new Set(),stats:{again:0,hard:0,good:0,easy:0},iy});
    setPhase('study');
  };

  const toggleHard=()=>setSess(s=>{
    if(!s) return s;
    const w=s.queue[s.cur];if(!w) return s;
    const idx=w.rowIndex;const nm=new Set(s.markHard),nu=new Set(s.unmarkHard);
    if(w.hard){nu.has(idx)?nu.delete(idx):nu.add(idx);}else{nm.has(idx)?nm.delete(idx):nm.add(idx);}
    return{...s,markHard:nm,unmarkHard:nu};
  });

  const doAnswer=(type)=>setSess(s=>{
    if(!s) return s;
    const w=s.queue[s.cur];
    const ns={...s.stats,[type]:s.stats[type]+1};
    const na=(type==='again'||type==='hard')?[...s.again,{...w}]:s.again;
    const nd=[...s.done,w];let nq=[...s.queue];nq.splice(s.cur,1);let nc=s.cur;
    if(nc>=nq.length){
      if(settings.repeat&&na.length) return{...s,queue:na,again:[],done:nd,cur:0,flipped:false,stats:ns};
      setTimeout(()=>setPhase('finish'),0);
      return{...s,queue:nq,again:na,done:nd,cur:nc,stats:ns};
    }
    return{...s,queue:nq,again:na,done:nd,cur:nc,flipped:false,stats:ns};
  });

  if(!rawData?.length) return(
    <div className="text-center py-20 text-[var(--text-subtle)]">
      <div className="font-display text-5xl mb-4">A↻</div><p>Загрузите слова из Google Sheets</p>
    </div>
  );

  // --- SETUP ---
  if(phase==='setup') return(
    <div className="max-w-lg mx-auto space-y-5 pb-8">
      <div><label>Направление</label>
        <div className="flex gap-2 mt-1">
          {[['en-ru','EN → RU'],['ru-en','RU → EN'],['mixed','Mixed']].map(([v,l])=>(
            <button key={v} onClick={()=>setSettings(s=>({...s,direction:v}))} className={`flex-1 py-2.5 rounded-lg text-sm font-medium border transition-all ${settings.direction===v?'bg-[var(--text)] text-white border-[var(--text)]':'border-[var(--border)] text-[var(--text-muted)]'}`}>{l}</button>
          ))}
        </div>
      </div>
      <div><label>Количество карточек</label><input type="number" min="0" max="500" value={settings.count||''} onChange={e=>setSettings(s=>({...s,count:parseInt(e.target.value)||0}))} placeholder="0 = все"/><p className="text-xs text-[var(--text-subtle)] mt-1">0 = все подходящие</p></div>
      <div><label>Порядок</label><select value={settings.order} onChange={e=>setSettings(s=>({...s,order:e.target.value}))}><option value="random">Случайный</option><option value="newest">Новые сначала</option><option value="oldest">Старые сначала</option></select></div>
      <div><label>Фильтр</label><select value={settings.filter} onChange={e=>setSettings(s=>({...s,filter:e.target.value}))}><option value="all">Все слова</option><option value="hard">Только сложные ★</option><option value="not-hard">Без сложных</option><option value="not-shown">Не изученные</option></select></div>
      <div><label>Период</label><select value={settings.dateRange} onChange={e=>setSettings(s=>({...s,dateRange:e.target.value}))}><option value="all">Все время</option><option value="7">Последние 7 дней</option><option value="14">Последние 14 дней</option><option value="30">Последние 30 дней</option></select></div>
      <div className="bg-[var(--surface)] border border-[var(--border)] rounded-xl p-4 space-y-3">
        {[['sentence','Показывать пример'],['synonyms','Показывать синонимы'],['hide','Скрыть слово в примере'],['repeat','Повторять ошибки'],['auto','Авто-переворот (5 сек)'],['tts','TTS произношение']].map(([k,l])=>(
          <div key={k} className="flex items-center justify-between"><span className="text-sm">{l}</span><Toggle checked={!!settings[k]} onChange={v=>setSettings(s=>({...s,[k]:v}))}/></div>
        ))}
      </div>
      <button onClick={startSession} className="btn-primary w-full py-3.5 flex items-center justify-center gap-2">▶ Начать сессию ({rawData.length} слов)</button>
    </div>
  );

  // --- FINISH ---
  if(phase==='finish'&&sess){
    const s=sess.stats;const correct=s.good+s.easy,total=s.again+s.hard+s.good+s.easy;
    const pct=total?Math.round(correct/total*100):0;
    const toMark=[...sess.markHard],toUnmark=[...sess.unmarkHard];
    const wFor=(idx)=>{const w=rawData.find(x=>x.rowIndex===idx);return w?w.en:`row ${idx}`;};
    return(
      <div className="text-center py-8 max-w-lg mx-auto pb-12">
        <div className="font-display text-7xl font-bold mb-1">{pct}%</div>
        <h2 className="font-display text-2xl mb-1">Сессия завершена</h2>
        <p className="text-[var(--text-muted)] mb-6">{correct} из {total} с первого раза</p>
        <div className="flex justify-center gap-3 mb-8 flex-wrap">
          {[['again',s.again,'text-red-500'],['hard',s.hard,'text-amber-500'],['good',s.good,'text-green-500'],['easy',s.easy,'text-green-600']].map(([l,v,c])=>(
            <div key={l} className="bg-[var(--surface)] border border-[var(--border)] rounded-xl px-4 py-3 min-w-[64px]">
              <div className={`font-display text-2xl font-bold ${c}`}>{v}</div>
              <div className="text-xs text-[var(--text-subtle)] mt-1">{l}</div>
            </div>
          ))}
        </div>
        {(toMark.length>0||toUnmark.length>0)&&(
          <div className="mb-6 text-left space-y-3">
            {toMark.length>0&&<div className="bg-[var(--surface)] border border-[var(--border)] rounded-xl p-4"><div className="text-xs text-[var(--text-subtle)] uppercase tracking-wide mb-2">+ Отметить как сложные ({toMark.length})</div><div className="text-sm">{toMark.map(wFor).join(', ')}</div></div>}
            {toUnmark.length>0&&<div className="bg-[var(--surface)] border border-[var(--border)] rounded-xl p-4"><div className="text-xs text-[var(--text-subtle)] uppercase tracking-wide mb-2">− Снять отметку ({toUnmark.length})</div><div className="text-sm">{toUnmark.map(wFor).join(', ')}</div></div>}
            <EngSyncBtn cfg={cfg} toMark={toMark} toUnmark={toUnmark} rawData={rawData} tcRef={tcRef} atRef={atRef}/>
          </div>
        )}
        <button onClick={()=>{setSess(null);setPhase('setup');}} className="btn-primary px-8 py-3">↻ Новая сессия</button>
      </div>
    );
  }

  // --- STUDY ---
  if(!sess||sess.cur>=sess.queue.length) return null;
  const w=sess.queue[sess.cur];const dir=w._dir;
  const front=dir==='en-ru'?w.en:w.ru;const back=dir==='en-ru'?w.ru:w.en;
  const total=sess.queue.length+sess.done.length;
  const prog=sess.done.length/Math.max(total,1)*100;
  const isHard=sess.markHard.has(w.rowIndex)?'marking':(sess.unmarkHard.has(w.rowIndex)?'unmarking':(w.hard?'hard':'none'));
  let sentF=w.sentence;
  if(settings.hide&&dir==='en-ru'&&sentF) sentF=sentF.replace(new RegExp('\\b'+engEscRe(w.en.split(' ')[0])+'\\w*','ig'),'___');
  if(settings.tts&&!sess.flipped){const u=new SpeechSynthesisUtterance(dir==='en-ru'?w.en:'');u.lang='en-US';u.rate=.9;window.speechSynthesis?.cancel();window.speechSynthesis?.speak(u);}

  return(
    <div className="max-w-2xl mx-auto space-y-4 pb-8">
      <div className="h-1.5 bg-[var(--surface)] rounded-full overflow-hidden"><div className="h-full bg-[var(--text)] rounded-full transition-all" style={{width:prog+'%'}}/></div>
      <div className="flex gap-2 text-xs flex-wrap">
        {[['карт',`${sess.done.length+1}/${total}`,''],[' again',sess.stats.again,'text-red-500'],['hard',sess.stats.hard,'text-amber-500'],['good',sess.stats.good+sess.stats.easy,'text-green-500'],['очередь',sess.again.length,'']].map(([l,v,c],i)=>(
          <div key={i} className={`bg-[var(--surface)] border border-[var(--border)] rounded-lg px-2.5 py-1 ${c}`}>{l} <span className="font-semibold">{v}</span></div>
        ))}
      </div>
      <div style={ENG_CARD_S.wrap} onClick={()=>setSess(s=>s?{...s,flipped:!s.flipped}:s)}>
        <div key={w.rowIndex + '_' + w._dir} style={ENG_CARD_S.card(sess.flipped)}>
          <div style={ENG_CARD_S.face}>
            <div className="absolute top-3 left-4 text-[10px] uppercase tracking-widest text-[var(--text-subtle)]">{dir==='en-ru'?'ENGLISH':'RUSSIAN'}</div>
            <button onClick={e=>{e.stopPropagation();toggleHard();}} className={`absolute top-2 right-3 text-xs px-2.5 py-1 rounded-full border transition-all ${isHard==='hard'||isHard==='marking'?'border-amber-400 text-amber-500':'border-[var(--border)] text-[var(--text-subtle)]'}`}>
              {isHard==='marking'?'★ +hard':isHard==='unmarking'?'✕ −hard':isHard==='hard'?'★ hard':'☆ hard'}
            </button>
            <div className="font-display text-4xl sm:text-5xl font-bold leading-tight mb-3">{front}</div>
            {settings.sentence&&sentF&&<div className="text-sm text-[var(--text-muted)] italic max-w-sm leading-relaxed">{sentF}</div>}
            <div className="absolute bottom-3 text-[10px] text-[var(--text-subtle)]">↻ нажмите или Space</div>
          </div>
          <div style={{...ENG_CARD_S.face,...ENG_CARD_S.back}}>
            <div className="absolute top-3 left-4 text-[10px] uppercase tracking-widest text-[var(--text-subtle)]">{dir==='en-ru'?'RUSSIAN':'ENGLISH'}</div>
            <button onClick={e=>{e.stopPropagation();toggleHard();}} className={`absolute top-2 right-3 text-xs px-2.5 py-1 rounded-full border transition-all ${isHard==='hard'||isHard==='marking'?'border-amber-400 text-amber-500':'border-[var(--border)] text-[var(--text-subtle)]'}`}>
              {isHard==='marking'?'★ +hard':isHard==='hard'?'★ hard':'☆ hard'}
            </button>
            <div className="font-display text-4xl sm:text-5xl font-bold leading-tight mb-3">{back}</div>
            {settings.sentence&&w.sentence&&<div className="text-sm text-[var(--text-muted)] italic max-w-sm leading-relaxed" dangerouslySetInnerHTML={{__html:engHighlight(w.sentence,w.en)}}/>}
            {settings.synonyms&&w.syn&&<div className="text-xs text-[var(--text-subtle)] mt-2">syn: {w.syn}</div>}
            <div className="absolute bottom-3 text-[10px] text-[var(--text-subtle)]">оцените ниже · 1–4</div>
          </div>
        </div>
      </div>
      {sess.flipped?(
        <div className="grid grid-cols-4 gap-2">
          {[['again','Снова','1','border-red-300 text-red-500 hover:bg-red-500/5'],['hard','Сложно','2','border-amber-300 text-amber-500 hover:bg-amber-500/5'],['good','Хорошо','3','border-green-300 text-green-500 hover:bg-green-500/5'],['easy','Легко','4','bg-green-500 text-white border-green-500']].map(([t,l,k,cls])=>(
            <button key={t} onClick={()=>doAnswer(t)} className={`py-3 rounded-xl text-sm font-semibold border transition-all flex flex-col items-center gap-0.5 ${cls}`}>
              {l}<span className="text-[10px] opacity-60 font-normal">{k}</span>
            </button>
          ))}
        </div>
      ):(
        <div className="flex gap-2 justify-between">
          <button onClick={()=>setSess(s=>s&&s.cur>0?{...s,cur:s.cur-1,flipped:false}:s)} disabled={sess.cur===0} className="btn-secondary text-sm px-4">← Назад</button>
          <div className="flex gap-2">
            <button onClick={()=>setSess(s=>s?{...s,flipped:true}:s)} className="btn-primary text-sm px-4">Показать (Space)</button>
            <button onClick={()=>setSess(s=>s?{...s,cur:s.cur+1}:s)} className="btn-secondary text-sm px-3">Пропустить →</button>
            <button onClick={()=>setPhase('finish')} className="btn-secondary text-sm px-3 text-red-500">Завершить</button>
          </div>
        </div>
      )}
    </div>
  );
}

function FillTab({rawData,ai}){
  const [filter,setFilter]=useState('random');
  const [count,setCount]=useState(0);
  const [hideWords,setHideWords]=useState(false);
  const [words,setWords]=useState([]);
  const [sentences,setSentences]=useState([]);
  const [genPhase,setGenPhase]=useState('idle'); // idle|loading|done
  const [answers,setAnswers]=useState({});

  const getPool=()=>{
    if(!rawData) return [];
    let pool=rawData.slice();
    if(filter==='hard') pool=pool.filter(w=>w.hard);
    if(filter==='oldest') pool.sort((a,b)=>(engParseDate(a.date)?.getTime()||0)-(engParseDate(b.date)?.getTime()||0));
    else if(filter==='newest') pool.sort((a,b)=>(engParseDate(b.date)?.getTime()||0)-(engParseDate(a.date)?.getTime()||0));
    else pool.sort(()=>Math.random()-.5);
    return pool;
  };

  const generate=async()=>{
    if(!rawData){alert('Загрузите данные');return;}
    const pool=getPool();if(!pool.length){alert('Нет слов');return;}
    const n=count>0?Math.min(count,pool.length):pool.length;
    if(n>50&&!confirm(`Сгенерировать ${n} предложений?`)) return;
    const batch=pool.slice(0,n);setWords(batch);setGenPhase('loading');setSentences([]);setAnswers({});
    const prompt=`English teacher. For each word create ONE natural B2-C1 sentence. Return ONLY valid JSON array, no markdown.\nWords:\n${batch.map(w=>`- "${w.en}" (${w.ru})`).join('\n')}\nFormat: [{"word":"word1","sentence":"..."},...]`;
    try{
      const raw=await engCallAI(ai,prompt);
      const match=raw.match(/\[[\s\S]*\]/);if(!match) throw new Error('Неверный формат');
      const items=JSON.parse(match[0]);if(!Array.isArray(items)||!items.length) throw new Error('Пустой ответ');
      const result=items.map((item,idx)=>{
        const wo=batch.find(w=>w.en.toLowerCase()===(item.word||'').toLowerCase())||batch[idx]||batch[0];
        const sentence=item.sentence||'';
        const m=sentence.match(new RegExp('\\b('+engEscRe(wo.en.split(' ')[0])+'\\w*)','i'));
        return{word:wo,sentence,exactForm:m?m[1]:wo.en};
      });
      setSentences(result);setGenPhase('done');
    }catch(e){alert('Ошибка AI: '+e.message);setGenPhase('idle');}
  };

  const check=(i)=>{
    const item=sentences[i];if(!item) return;
    const val=(answers[i]?.val||'').trim().toLowerCase();
    const target=(item.exactForm||item.word.en).toLowerCase();
    const ok=engLev(val,target)<=1;
    setAnswers(a=>({...a,[i]:{...a[i],checked:true,ok}}));
  };
  const reveal=(i)=>{
    const item=sentences[i];if(!item) return;
    setAnswers(a=>({...a,[i]:{val:item.exactForm||item.word.en,checked:true,ok:true,revealed:true}}));
  };

  const pool=rawData?getPool():[];const avail=count>0?Math.min(count,pool.length):pool.length;

  return(
    <div className="space-y-5 pb-8">
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
        <div><label>Фильтр слов</label>
          <div className="flex flex-col gap-1.5 mt-1">
            {[['random','🔀 Случайный'],['oldest','📅 Старые сначала'],['newest','🆕 Новые сначала'],['hard','★ Только сложные']].map(([f,l])=>(
              <button key={f} onClick={()=>setFilter(f)} className={`text-left px-3 py-2 rounded-lg text-sm border transition-all ${filter===f?'bg-[var(--text)] text-white border-[var(--text)]':'border-[var(--border)] text-[var(--text-muted)]'}`}>{l}</button>
            ))}
          </div>
        </div>
        <div className="space-y-4">
          <div><label>Количество (0 = все)</label><input type="number" min="0" max="500" value={count||''} onChange={e=>setCount(parseInt(e.target.value)||0)} placeholder="0"/><p className="text-xs text-[var(--text-subtle)] mt-1">{avail} слов доступно</p></div>
          <div className="flex items-center justify-between"><span className="text-sm">Скрыть список слов</span><Toggle checked={hideWords} onChange={setHideWords}/></div>
          <button onClick={generate} disabled={genPhase==='loading'||!rawData} className="btn-primary w-full py-3">{genPhase==='loading'?'⏳ Генерирую...':'✨ Сгенерировать'}</button>
        </div>
      </div>
      {words.length>0&&(
        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-xl p-4">
          <div className="text-xs text-[var(--text-subtle)] uppercase tracking-wide mb-3">Слова в сессии</div>
          <div className="flex flex-wrap gap-2">
            {words.map((w,i)=><span key={i} className={`px-2.5 py-1 bg-[var(--bg)] border border-[var(--border)] rounded-lg text-sm ${hideWords?'blur-sm select-none':''}`}>{w.en}</span>)}
          </div>
        </div>
      )}
      {sentences.map((item,i)=>{
        const ans=answers[i]||{};
        const blank=item.sentence.replace(new RegExp('\\b'+engEscRe(item.word.en.split(' ')[0])+'\\w*','i'),'___');
        return(
          <div key={i} className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5 space-y-3">
            <div className="text-xs text-[var(--text-subtle)]">№{i+1} · <span className="cursor-pointer blur-sm hover:blur-none transition-all select-none" onClick={e=>e.currentTarget.classList.remove('blur-sm')}>{item.word.en} — {item.word.ru}</span></div>
            <div className="font-display text-lg italic">{ans.checked?item.sentence:blank}</div>
            <div className="flex items-center gap-2 flex-wrap">
              <input className={`w-44 ${ans.checked?(ans.ok?'border-green-400':'border-red-400'):''}`} value={ans.val||''} onChange={e=>setAnswers(a=>({...a,[i]:{...a[i],val:e.target.value}}))} onKeyDown={e=>e.key==='Enter'&&check(i)} placeholder="введите слово..." disabled={ans.checked}/>
              {!ans.checked&&<><button onClick={()=>check(i)} className="btn-primary py-2 px-3 text-sm">Проверить</button><button onClick={()=>reveal(i)} className="btn-secondary py-2 px-3 text-sm">Подсказка</button></>}
              {ans.checked&&<span className={`text-sm font-medium ${ans.ok?'text-green-500':'text-red-500'}`}>{ans.ok?'✓ Верно!':ans.revealed?`Слово: ${item.exactForm||item.word.en}`:`✗ Ответ: ${item.exactForm||item.word.en}`}</span>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function TypingTab({rawData,ai}){
  const [filter,setFilter]=useState('random');
  const [count,setCount]=useState(20);
  const [aiMode,setAiMode]=useState('always');
  const [phase,setPhase]=useState('setup');
  const [queue,setQueue]=useState([]);
  const [cur,setCur]=useState(0);
  const [stats,setStats]=useState({correct:0,close:0,wrong:0});
  const [answer,setAnswer]=useState('');
  const [result,setResult]=useState(null);
  const inputRef=useRef(null);
  useEffect(()=>{if(phase==='study'&&inputRef.current)inputRef.current.focus();},[cur,phase]);
  useEffect(()=>{
    if(phase!=='study'||result) return;
    const h=(e)=>{if(e.key==='Enter'&&answer.trim())check();};
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[phase,result,answer]);

  const start=()=>{
    if(!rawData){alert('Загрузите данные');return;}
    let pool=rawData.slice();
    if(filter==='hard') pool=pool.filter(w=>w.hard);
    else if(filter==='oldest') pool.sort((a,b)=>(engParseDate(a.date)?.getTime()||0)-(engParseDate(b.date)?.getTime()||0));
    else if(filter==='newest') pool.sort((a,b)=>(engParseDate(b.date)?.getTime()||0)-(engParseDate(a.date)?.getTime()||0));
    else pool.sort(()=>Math.random()-.5);
    const n=count>0?Math.min(count,pool.length):pool.length;
    if(!n){alert('Нет слов');return;}
    setQueue(pool.slice(0,n));setCur(0);setStats({correct:0,close:0,wrong:0});setAnswer('');setResult(null);setPhase('study');
  };

  const check=async()=>{
    if(!answer.trim()) return;
    const w=queue[cur];const dist=engLev(answer.trim().toLowerCase(),w.en.toLowerCase());
    const type=dist===0?'correct':dist<=2?'close':'wrong';
    setStats(s=>({...s,[type]:s[type]+1}));
    const needAI=aiMode==='always'||(aiMode==='wrong'&&type!=='correct');
    setResult({type,comment:null,loading:needAI});
    if(needAI){
      const prompt=`English teacher feedback. Student shown "${w.ru}", typed "${answer}", correct is "${w.en}".${w.sentence?`\nExample: "${w.sentence}"`:''}${w.syn?`\nSynonyms: ${w.syn}`:''}\nShort comment (2-3 sentences, English, friendly, no markdown).`;
      try{const c=await engCallAI(ai,prompt);setResult(r=>r?{...r,comment:c,loading:false}:r);}
      catch(e){setResult(r=>r?{...r,comment:'(AI недоступен)',loading:false}:r);}
    }
  };

  const next=()=>{setAnswer('');setResult(null);if(cur+1>=queue.length){setPhase('finish');return;}setCur(c=>c+1);};

  if(!rawData) return <div className="text-center py-20 text-[var(--text-subtle)]"><p>Загрузите данные из Google Sheets</p></div>;

  if(phase==='setup') return(
    <div className="max-w-lg mx-auto space-y-5 pb-8">
      <div><label>Фильтр</label>
        <div className="flex flex-col gap-1.5 mt-1">
          {[['random','🔀 Случайный'],['oldest','📅 Старые сначала'],['newest','🆕 Новые сначала'],['hard','★ Только сложные']].map(([f,l])=>(
            <button key={f} onClick={()=>setFilter(f)} className={`text-left px-3 py-2 rounded-lg text-sm border transition-all ${filter===f?'bg-[var(--text)] text-white border-[var(--text)]':'border-[var(--border)] text-[var(--text-muted)]'}`}>{l}</button>
          ))}

function buildVoiceSystemPrompt(appData) {
  const DAY_NAMES = ['вс','пн','вт','ср','чт','пт','сб'];
  const PERIOD_NAMES = { morning: 'утро', evening: 'вечер', allday: 'весь день' };
  const FREQ_LABELS = { daily:'каждый день', every2:'каждые 2 дня', every3:'каждые 3 дня', weekly:'раз в неделю', biweekly:'раз в 2 нед', monthly:'раз в месяц', custom:'своя' };

  const today = new Date();
  const todayStr = today.toISOString().split('T')[0];
  const todayDayName = DAY_NAMES[today.getDay()];

  const chores = (appData.chores || []).filter(c => !c.archived);
  const bossTasks = (appData.bossTasks || []).filter(t => !t.archived);

  const choreLines = chores.length
    ? chores.map(c => {
        const next = getChoreNextDate(c);
        const nextStr = isChoreDueToday(c) ? 'СЕГОДНЯ' : next.toISOString().split('T')[0];
        const freq = FREQ_LABELS[c.frequency] || c.frequency;
        const custom = c.frequency === 'custom' ? ` (${c.customDays} дн)` : '';
        return `  • ${c.name} | ${freq}${custom} | последний раз: ${c.lastDone || 'никогда'} | следующий: ${nextStr}`;
      }).join('\n')
    : '  (пусто)';

  const bossLines = bossTasks.length
    ? bossTasks.map(t => {
        const days = (t.days || []).map(d => DAY_NAMES[d]).join(',');
        return `  • ${t.name} | ${PERIOD_NAMES[t.period] || t.period} | дни: ${days}`;
      }).join('\n')
    : '  (пусто)';

  return `Ты голосовой помощник приложения Jarvis. Отвечай кратко, по-русски.

СЕГОДНЯ: ${todayStr} (${todayDayName})

РАЗДЕЛ "ПО ДОМУ" — регулярные домашние дела:
${choreLines}

РАЗДЕЛ "БОСС" — задачи по расписанию:
${bossLines}

ТЫ УМЕЕШЬ:
1. Ответить на любой вопрос о делах пользователя (что сегодня, что просрочено, когда последний раз, что на этой неделе и т.д.)
2. Добавить новое дело в один из разделов

ФОРМАТ ОТВЕТА — только JSON, без markdown, без пояснений:

Ответить на вопрос:
{"action":"answer","text":"краткий разговорный ответ на русском"}

Добавить в "По дому":
{"action":"add","section":"chores","name":"...","frequency":"daily|every2|every3|weekly|biweekly|monthly|custom","customDays":null}

Добавить в "Босс":
{"action":"add","section":"boss","name":"...","period":"morning|evening|allday","days":[1,2,3,4,5]}

Уточнить (если непонятно):
{"action":"clarify","question":"короткий вопрос"}`;
}

async function callAI(messages, settings, appData) {
  const systemPrompt = buildVoiceSystemPrompt(appData || {});
  const provider = settings.voiceProvider || 'claude';
  const key = (settings.voiceApiKey || '').trim();
  if (!key) throw new Error('no_key');

  const model = (settings.voiceModel || '').trim() ||
    (provider === 'claude' ? 'claude-sonnet-4-6' : 'gpt-4o');

  if (provider === 'claude') {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model,
        max_tokens: 400,
        system: systemPrompt,
        messages,
      }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `Claude API ${res.status}`);
    }
    const resp = await res.json();
    const text = resp.content?.[0]?.text || '';
    return JSON.parse(text);
  } else {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${key}`,
      },
      body: JSON.stringify({
        model,
        max_tokens: 400,
        messages: [{ role: 'system', content: systemPrompt }, ...messages],
      }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `OpenAI API ${res.status}`);
    }
    const resp = await res.json();
    const text = resp.choices?.[0]?.message?.content || '';
    return JSON.parse(text);
  }
}

function applyVoiceTask(parsed, setData) {

      }],
    }));
  }
}

let _currentAudio = null;

function speak(text, settings) {
  // Stop any currently playing audio
  if (_currentAudio) { _currentAudio.pause(); _currentAudio = null; }
  window.speechSynthesis?.cancel();

  const key = (settings?.voiceApiKey || '').trim();
  if (key) {
    // OpenAI TTS — returns promise that resolves when audio finishes
    const voice = settings?.voiceTtsVoice || 'nova';
    return fetch('https://api.openai.com/v1/audio/speech', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${key}`,
      },
      body: JSON.stringify({ model: 'tts-1', voice, input: text }),
    }).then(res => {
      if (!res.ok) throw new Error('tts_fail');
      return res.blob();
    }).then(blob => {
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      _currentAudio = audio;
      return new Promise(resolve => {
        audio.onended = () => { URL.revokeObjectURL(url); _currentAudio = null; resolve(); };
        audio.onerror = () => { URL.revokeObjectURL(url); _currentAudio = null; resolve(); };
        audio.play().catch(resolve);
      });
    }).catch(() => Promise.resolve());
  }

  // Fallback: browser SpeechSynthesis — returns promise that resolves when done
  if (!window.speechSynthesis) return Promise.resolve();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ru-RU';
  u.rate = 1.05;
  const voices = window.speechSynthesis.getVoices();
  const ruVoice = voices.find(v => v.lang.startsWith('ru'));
  if (ruVoice) u.voice = ruVoice;
  return new Promise(resolve => {
    u.onend = resolve;
    u.onerror = resolve;
    window.speechSynthesis.speak(u);
  });
}

function VoiceButton({ data, setData, settings }) {
  const [phase, setPhase] = useState('idle'); // idle|recording|processing|clarifying|success|answered|error
  const [transcript, setTranscript] = useState('');
  const [clarifyQuestion, setClarifyQuestion] = useState('');
  const [messages, setMessages] = useState([]);
  const [lastAdded, setLastAdded] = useState('');
  const [answerText, setAnswerText] = useState('');
  const [errorMsg, setErrorMsg] = useState('');
  const recogRef = React.useRef(null);
  const transcriptRef = React.useRef(''); // kept in sync for onend closure

  const processTranscript = async (text, existingMessages) => {
    if (!text) {
      setPhase(existingMessages.length > 0 ? 'clarifying' : 'idle');
      return;
    }
    const newMessages = [...existingMessages, { role: 'user', content: text }];
    setMessages(newMessages);
    setPhase('processing');
    try {
      const parsed = await callAI(newMessages, settings, data);
      if (parsed.action === 'add') {
        applyVoiceTask(parsed, setData);
        const name = parsed.name || 'задача';
        setLastAdded(name);
        speak(`Добавлено: ${name}`, settings);
        setPhase('success');
        setTimeout(() => { setPhase('idle'); setMessages([]); }, 2500);
      } else if (parsed.action === 'answer') {
        const answerStr = parsed.text || 'Готово';
        setAnswerText(answerStr);
        setPhase('answered');
        await speak(answerStr, settings);
        setPhase('idle');
        setMessages([]);
      } else if (parsed.action === 'clarify') {
        const q = parsed.question || 'Уточните запрос';
        const updatedMessages = [...newMessages, { role: 'assistant', content: q }];
        setClarifyQuestion(q);
        setMessages(updatedMessages);
        setPhase('clarifying');
        await speak(q, settings);
        startRecording(updatedMessages);
      } else {
        setErrorMsg('Непонятный ответ ИИ. Попробуйте ещё раз.');
        setPhase('error');
        setTimeout(() => setPhase('idle'), 3000);
      }
    } catch (e) {
      const msg = e.message === 'no_key'
        ? 'Настройте API-ключ в Настройках → Ассистент'
        : `Ошибка: ${e.message}`;
      setErrorMsg(msg);
      setPhase('error');
      setTimeout(() => setPhase('idle'), 4000);
    }
  };

  const startRecording = (existingMessages) => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      setErrorMsg('Браузер не поддерживает распознавание речи');
      setPhase('error');
      setTimeout(() => setPhase('idle'), 3000);
      return;
    }
    const r = new SR();
    r.lang = 'ru-RU';
    r.interimResults = true;
    r.maxAlternatives = 1;
    // continuous=false (default): auto-stops after a natural speech pause
    transcriptRef.current = '';
    recogRef.current = r;

    r.onresult = (e) => {
      let t = '';
      for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript;
      transcriptRef.current = t;
      setTranscript(t);
    };

    r.onerror = (e) => {
      recogRef.current = null;
      if (e.error === 'no-speech') { setPhase('idle'); return; }
      setErrorMsg(`Ошибка записи: ${e.error}`);
      setPhase('error');
      setTimeout(() => setPhase('idle'), 3000);
    };

    // Auto-triggered when user stops speaking (or manually via r.stop())
    r.onend = () => {
      recogRef.current = null;
      processTranscript(transcriptRef.current.trim(), existingMessages);
    };

    r.start();
    setPhase('recording');
    setTranscript('');
  };

  const handleMainButton = () => {
    if (phase === 'idle') {
      const key = (settings?.voiceApiKey || '').trim();
      if (!key) {
        setErrorMsg('Настройте API-ключ в Настройках → Ассистент');
        setPhase('error');
        setTimeout(() => setPhase('idle'), 4000);
        return;
      }
      setMessages([]);
      startRecording([]);
    } else if (phase === 'recording') {
      // Manual early stop — triggers onend which calls processTranscript
      if (recogRef.current) recogRef.current.stop();
    } else if (phase === 'clarifying') {
      startRecording(messages);
    }
    // processing/success/error: do nothing
  };

  const cancel = () => {
    window.speechSynthesis?.cancel();
    if (_currentAudio) { _currentAudio.pause(); _currentAudio = null; }
    if (recogRef.current) { recogRef.current.onend = null; recogRef.current.stop(); recogRef.current = null; }
    setPhase('idle');
    setMessages([]);
    setTranscript('');
  };

  const showPanel = phase !== 'idle';

  const btnBg = {
    idle: 'bg-[var(--text)] text-white',
    recording: 'bg-red-500 text-white',
    processing: 'bg-[var(--text)] text-white',
    clarifying: 'bg-blue-500 text-white',
    answered: 'bg-blue-500 text-white',
    success: 'bg-green-500 text-white',
    error: 'bg-red-500 text-white',
  }[phase] || 'bg-[var(--text)] text-white';

  return (
    <div className="fixed bottom-24 right-4 z-30 flex flex-col items-end gap-2 md:bottom-8">
      {/* Mini panel */}
      {showPanel && (
        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl shadow-lg p-4 max-w-[260px] w-[260px] fade-in">
          {phase === 'recording' && (
            <div>
              <div className="text-xs text-red-500 font-medium mb-1 flex items-center gap-1">
                <span className="w-2 h-2 rounded-full bg-red-500 animate-pulse inline-block"></span>
                Слушаю...
              </div>
              <div className="text-sm text-[var(--text)] min-h-[40px] leading-snug">
                {transcript || <span className="text-[var(--text-subtle)]">Говорите...</span>}
              </div>
              <div className="text-xs text-[var(--text-subtle)] mt-2">Остановится автоматически после паузы</div>
            </div>
          )}
          {phase === 'processing' && (
            <div className="flex items-center gap-2">
              <div className="w-4 h-4 border-2 border-[var(--text)] border-t-transparent rounded-full animate-spin flex-shrink-0"></div>
              <span className="text-sm text-[var(--text-muted)]">Обрабатываю...</span>
            </div>
          )}
          {phase === 'clarifying' && (
            <div>
              <div className="text-xs text-blue-500 font-medium mb-1">Уточнение</div>
              <div className="text-sm text-[var(--text)] mb-3">{clarifyQuestion}</div>
              <div className="flex items-center gap-2">
                <button
                  onClick={() => startRecording(messages)}
                  className="flex-1 flex items-center justify-center gap-1.5 bg-blue-500 text-white rounded-xl py-2 text-sm font-medium"
                >
                  <Icon name="mic" size={16} />
                  Ответить
                </button>
                <button onClick={cancel} className="p-2 rounded-xl hover:bg-black/5 text-[var(--text-muted)]">
                  <Icon name="x" size={18} />
                </button>
              </div>
            </div>
          )}
          {phase === 'success' && (
            <div className="flex items-center gap-2">
              <span className="text-green-500"><Icon name="check" size={18} /></span>
              <span className="text-sm text-[var(--text)]">Добавлено: <b>{lastAdded}</b></span>
            </div>
          )}
          {phase === 'answered' && (
            <div>
              <div className="text-xs text-blue-500 font-medium mb-1 flex items-center gap-1">
                <span className="w-2 h-2 rounded-full bg-blue-500 animate-pulse inline-block"></span>
                Ответ
              </div>
              <div className="text-sm text-[var(--text)] leading-snug">{answerText}</div>
            </div>
          )}
          {phase === 'error' && (
            <div>
              <div className="text-xs text-red-500 font-medium mb-1">Ошибка</div>
              <div className="text-sm text-[var(--text-muted)]">{errorMsg}</div>
            </div>
          )}
        </div>
      )}

      {/* Main button */}
      <button
        onClick={handleMainButton}
        disabled={phase === 'processing' || phase === 'success'}
        className={`w-14 h-14 rounded-full shadow-lg flex items-center justify-center transition-all ${btnBg} ${phase === 'recording' ? 'voice-pulse' : ''} ${phase === 'processing' ? 'opacity-70' : ''}`}
        title="Голосовой ассистент"
      >
        {phase === 'processing' ? (
          <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
        ) : phase === 'success' ? (
          <Icon name="check" size={24} />
        ) : (
          <Icon name="mic" size={24} />
        )}
      </button>
    </div>
  );
}

function formatBodyDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const months = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
  const days = ['вс','пн','вт','ср','чт','пт','сб'];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()} (${days[d.getDay()]})`;
}

async function compressImage(file, maxPx = 1200, quality = 0.85) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { width, height } = img;
      if (width > maxPx || height > maxPx) {
        if (width > height) { height = Math.round(height * maxPx / width); width = maxPx; }
        else { width = Math.round(width * maxPx / height); height = maxPx; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('compress failed')), 'image/jpeg', quality);
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('load failed')); };
    img.src = url;
  });
}

async function uploadPhoto(file) {
  let blob;
  try {
    blob = await compressImage(file);
  } catch {
    blob = file;
  }
  const res = await fetch('/api/photos?ext=jpg', {
    method: 'POST',
    headers: { 'Content-Type': 'image/jpeg' },
    body: blob,
  });
  if (!res.ok) throw new Error('upload failed');
  return (await res.json()).filename;
}

async function deletePhoto(filename) {
  await fetch(`/api/photos/${filename}`, { method: 'DELETE' }).catch(() => {});
}

// Generic file upload (training programs etc.) — any allowed type
async function uploadFile(file) {
  const ext = (file.name.split('.').pop() || 'bin').toLowerCase().slice(0, 5);
  const res = await fetch(`/api/files?ext=${encodeURIComponent(ext)}`, {
    method: 'POST',
    headers: { 'Content-Type': file.type || 'application/octet-stream' },
    body: file,
  });
  if (!res.ok) throw new Error('upload failed');
  return (await res.json()).filename;
}

async function deleteFile(filename) {
  await fetch(`/api/files/${filename}`, { method: 'DELETE' }).catch(() => {});
}

function BodyEntryForm({ entry, fields, categories, onSave, onCancel }) {
  const today = new Date().toISOString().split('T')[0];
  const [date, setDate] = useState(entry?.date || today);
  const [values, setValues] = useState(entry?.values || {});
  const [photos, setPhotos] = useState((entry?.photos || []).map(normalizePhoto));
  const [pending, setPending] = useState([]); // {file, preview, category}
  const [notes, setNotes] = useState(entry?.notes || '');
  const [uploading, setUploading] = useState(false);

  const cats = categories || DEFAULT_BODY_PHOTO_CATEGORIES;

  const handleFiles = (e) => {
    const files = Array.from(e.target.files);
    setPending(p => [...p, ...files.map(f => ({ file: f, preview: URL.createObjectURL(f), category: '' }))]);
    e.target.value = '';
  };

  const removePending = (i) => {
    setPending(p => { URL.revokeObjectURL(p[i].preview); return p.filter((_,j) => j!==i); });
  };

  const setPendingCategory = (i, cat) => {
    setPending(p => p.map((item, j) => j === i ? { ...item, category: cat } : item));
  };

  const setExistingCategory = (filename, cat) => {
    setPhotos(p => p.map(ph => ph.filename === filename ? { ...ph, category: cat } : ph));
  };

  const removeExisting = async (filename) => {
    await deletePhoto(filename);
    setPhotos(p => p.filter(ph => ph.filename !== filename));
  };

  const handleSave = async () => {
    setUploading(true);
    try {
      const uploaded = await Promise.all(pending.map(async p => {
        const filename = await uploadPhoto(p.file);
        return { filename, category: p.category || '' };
      }));
      pending.forEach(p => URL.revokeObjectURL(p.preview));
      onSave({ ...entry, date, values, photos: [...photos, ...uploaded], notes });
    } catch(e) {
      alert('Ошибка загрузки фото: ' + e.message);
    } finally {
      setUploading(false);
    }
  };

  const PhotoCategoryPills = ({ value, onChange }) => (
    <div className="flex flex-wrap gap-1 mt-1.5">
      <button onClick={() => onChange('')}
        className={`px-2 py-0.5 rounded-full text-[10px] font-medium border transition-all ${!value ? 'bg-[var(--text)] text-white border-transparent' : 'border-[var(--border)] text-[var(--text-muted)] hover:bg-black/5'}`}>
        Без категории
      </button>
      {cats.map(c => (
        <button key={c} onClick={() => onChange(c)}
          className={`px-2 py-0.5 rounded-full text-[10px] font-medium border transition-all ${value===c ? 'bg-[var(--text)] text-white border-transparent' : 'border-[var(--border)] text-[var(--text-muted)] hover:bg-black/5'}`}>
          {c}
        </button>
      ))}
    </div>
  );

  return (
    <div className="fade-in">
      <div className="mb-6 flex items-center gap-3">
        <button onClick={onCancel} className="p-2 rounded-xl hover:bg-black/5 text-[var(--text-muted)]">
          <Icon name="x" size={20} />
        </button>
        <h2 className="font-display text-2xl">{entry ? 'Редактировать запись' : 'Новая запись'}</h2>
      </div>

      <div className="space-y-4">
        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
          <label>Дата</label>
          <input type="date" value={date} max={today} onChange={e => setDate(e.target.value)} />
        </div>

        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
          <h3 className="font-display text-lg mb-4">Показатели</h3>
          <div className="grid grid-cols-2 gap-4">
            {fields.map(f => (
              <div key={f.id}>
                <label>{f.label}{f.unit ? ` (${f.unit})` : ''}</label>
                <input type="number" step="0.1" placeholder="—"
                  value={values[f.id] ?? ''}
                  onChange={e => setValues(v => ({
                    ...v,
                    [f.id]: e.target.value === '' ? undefined : parseFloat(e.target.value)
                  }))}
                />
              </div>
            ))}
          </div>
        </div>

        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
          <h3 className="font-display text-lg mb-3">Фото</h3>
          <div className="space-y-3">
            {photos.map(ph => (
              <div key={ph.filename} className="flex gap-3 items-start bg-[var(--bg)] rounded-xl p-2">
                <div className="relative flex-shrink-0">
                  <img src={`/api/photos/${ph.filename}`} className="w-16 h-16 object-cover rounded-xl" />
                  <button onClick={() => removeExisting(ph.filename)}
                    className="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 text-white rounded-full text-xs flex items-center justify-center">×</button>
                </div>
                <div className="flex-1 min-w-0">
                  <div className="text-xs text-[var(--text-muted)] mb-0.5">Категория:</div>
                  <PhotoCategoryPills value={ph.category} onChange={cat => setExistingCategory(ph.filename, cat)} />
                </div>
              </div>
            ))}
            {pending.map((p, i) => (
              <div key={i} className="flex gap-3 items-start bg-[var(--bg)] rounded-xl p-2">
                <div className="relative flex-shrink-0">
                  <img src={p.preview} className="w-16 h-16 object-cover rounded-xl opacity-70" />
                  <button onClick={() => removePending(i)}
                    className="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 text-white rounded-full text-xs flex items-center justify-center">×</button>
                </div>
                <div className="flex-1 min-w-0">
                  <div className="text-xs text-[var(--text-muted)] mb-0.5">Категория:</div>
                  <PhotoCategoryPills value={p.category} onChange={cat => setPendingCategory(i, cat)} />
                </div>
              </div>
            ))}
            <label className="flex items-center gap-2 px-3 py-2.5 border-2 border-dashed border-[var(--border-strong)] rounded-xl cursor-pointer hover:bg-black/5 text-[var(--text-subtle)]">
              <input type="file" accept="image/*" multiple className="hidden" onChange={handleFiles} />
              <Icon name="plus" size={18} />
              <span className="text-sm">Добавить фото</span>
            </label>
          </div>
        </div>

        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
          <label>Заметки</label>
          <textarea value={notes} rows={2} placeholder="Необязательно..."
            onChange={e => setNotes(e.target.value)}
            style={{ resize:'vertical' }} />
        </div>

        <div className="flex gap-3 pb-8">
          <button onClick={handleSave} disabled={uploading} className="btn-primary flex-1">
            {uploading ? 'Загружаю фото...' : 'Сохранить'}
          </button>
          <button onClick={onCancel} className="btn-secondary">Отмена</button>
        </div>
      </div>
    </div>
  );
}

function addDaysStr(dateStr, days) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}

function valueAtOrBefore(sorted, fieldId, dateStr) {
  let val;
  for (const e of sorted) {
    if (e.date > dateStr) break;
    if (e.values?.[fieldId] !== undefined) val = e.values[fieldId];
  }
  return val;
}

function BodyWeeklyPlanVsActual({ sorted, fields, targets, effectiveStart }) {
  const todayStr = new Date().toISOString().split('T')[0];
  const [expandedId, setExpandedId] = useState(null);
  const targetFields = fields.filter(f => targets[f.id] !== undefined && targets[f.id] !== 0);
  if (targetFields.length === 0 || !effectiveStart) return null;

  const start = new Date(effectiveStart + 'T00:00:00');
  const now = new Date(todayStr + 'T00:00:00');
  const totalDays = Math.max(0, Math.round((now - start) / 86400000));
  const totalWeeks = Math.max(1, Math.floor(totalDays / 7) + 1);

  return (
    <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
      <h3 className="font-display text-lg mb-1">План и факт по неделям</h3>
      <p className="text-xs text-[var(--text-muted)] mb-4">Сравнение фактического изменения показателя с плановым (задаётся в ⚙ → Плановые изменения).</p>
      <div className="space-y-5">
        {targetFields.map(f => {
          const target = targets[f.id];
          const baseline = valueAtOrBefore(sorted, f.id, effectiveStart)
            ?? sorted.find(e => e.values?.[f.id] !== undefined)?.values?.[f.id];
          if (baseline === undefined) return null;

          const rows = [];
          for (let w = 1; w <= totalWeeks; w++) {
            const weekStartStr = addDaysStr(effectiveStart, (w - 1) * 7);
            const weekEndStr = w === totalWeeks ? todayStr : addDaysStr(effectiveStart, w * 7 - 1);
            const actualVal = valueAtOrBefore(sorted, f.id, weekEndStr);
            const plannedCum = target * w;
            const actualCum = actualVal !== undefined ? actualVal - baseline : null;
            const diff = actualCum !== null ? actualCum - plannedCum : null;
            const good = diff !== null ? (target < 0 ? diff <= 0 : diff >= 0) : null;
            rows.push({ w, weekStartStr, plannedCum, actualCum, diff, good, hasData: actualVal !== undefined });
          }
          const visibleRows = expandedId === f.id ? rows : rows.slice(-6);

          return (
            <div key={f.id} className="bg-[var(--bg)] rounded-xl p-4">
              <div className="flex items-center justify-between mb-3">
                <div className="text-sm font-medium">{f.label}</div>
                <div className="text-xs text-[var(--text-subtle)]">план: {target > 0 ? '+' : ''}{target} {f.unit}/нед</div>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full text-xs" style={{ minWidth: 360 }}>
                  <thead>
                    <tr className="text-left border-b border-[var(--border)]">
                      <th className="pb-1.5 pr-2 text-[10px] uppercase tracking-wide text-[var(--text-subtle)] font-medium">Неделя</th>
                      <th className="pb-1.5 pr-2 text-right text-[10px] uppercase tracking-wide text-[var(--text-subtle)] font-medium">План</th>
                      <th className="pb-1.5 pr-2 text-right text-[10px] uppercase tracking-wide text-[var(--text-subtle)] font-medium">Факт</th>
                      <th className="pb-1.5 text-right text-[10px] uppercase tracking-wide text-[var(--text-subtle)] font-medium">Разница</th>
                    </tr>
                  </thead>
                  <tbody>
                    {visibleRows.map(r => (
                      <tr key={r.w} className="border-b border-[var(--border)] last:border-0">
                        <td className="py-1.5 pr-2 whitespace-nowrap text-[var(--text-muted)]">#{r.w} · {formatBodyDate(r.weekStartStr)}</td>
                        <td className="py-1.5 pr-2 text-right text-[var(--text-muted)]">{r.plannedCum > 0 ? '+' : ''}{r.plannedCum.toFixed(1)}</td>
                        <td className="py-1.5 pr-2 text-right font-medium">
                          {r.hasData ? `${r.actualCum > 0 ? '+' : ''}${r.actualCum.toFixed(1)}` : '—'}
                        </td>
                        <td className={`py-1.5 text-right font-medium ${r.diff === null ? 'text-[var(--text-subtle)]' : r.good ? 'text-green-500' : 'text-red-400'}`}>
                          {r.diff === null ? '—' : `${r.diff > 0 ? '+' : ''}${r.diff.toFixed(1)}`}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              {rows.length > 6 && (
                <button onClick={() => setExpandedId(expandedId === f.id ? null : f.id)}
                  className="text-xs text-[var(--text-subtle)] hover:text-[var(--text)] mt-2">
                  {expandedId === f.id ? 'Скрыть' : `Показать все ${rows.length} недель`}
                </button>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function BodyProgress({ entries, fields, startDate, onStartDateChange, targets }) {
  const filtered = startDate
    ? entries.filter(e => e.date >= startDate)
    : entries;

  if (filtered.length < 2) {
    return (
      <div className="space-y-4">
        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
          <label className="block text-xs text-[var(--text-muted)] font-medium mb-1.5">Начальная дата периода</label>
          <input
            type="date"
            value={startDate}
            onChange={e => onStartDateChange(e.target.value)}
            className="w-full bg-[var(--bg)] border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-[var(--text)]"
          />
          <p className="text-xs text-[var(--text-subtle)] mt-2">Дата сохраняется и используется для всех расчётов прогресса.</p>
        </div>
        <EmptyState
          title="Мало данных"
          text={startDate ? 'Нужно минимум 2 записи с выбранной даты' : 'Добавьте хотя бы 2 записи чтобы увидеть прогресс'}
        />
      </div>
    );
  }

  const sorted = [...filtered].sort((a, b) => a.date.localeCompare(b.date));
  const first = sorted[0];
  const last = sorted[sorted.length - 1];

  const activeFields = fields.filter(f =>
    sorted.some(e => e.values?.[f.id] !== undefined)
  );

  return (
    <div className="space-y-4">
      <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
        <label className="block text-xs text-[var(--text-muted)] font-medium mb-1.5">Начальная дата периода</label>
        <input
          type="date"
          value={startDate}
          max={last.date}
          onChange={e => onStartDateChange(e.target.value)}
          className="w-full bg-[var(--bg)] border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-[var(--text)]"
        />
        <p className="text-xs text-[var(--text-subtle)] mt-2">Дата сохраняется и используется для всех расчётов прогресса.</p>
      </div>

      <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
        <h3 className="font-display text-lg mb-1">Изменения за период</h3>
        <div className="text-xs text-[var(--text-muted)] mb-4">{formatBodyDate(first.date)} → {formatBodyDate(last.date)}</div>
        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
          {activeFields.map(f => {
            const fv = first.values?.[f.id];
            const lv = last.values?.[f.id];
            if (fv === undefined || lv === undefined) return null;
            const delta = lv - fv;
            return (
              <div key={f.id} className="bg-[var(--bg)] rounded-xl p-3">
                <div className="text-[10px] text-[var(--text-subtle)] uppercase tracking-wide mb-1">{f.label}</div>
                <div className="flex items-baseline gap-1.5">
                  <span className="text-lg font-semibold">{lv}</span>
                  <span className="text-xs text-[var(--text-subtle)]">{f.unit}</span>
                </div>
                {delta !== 0 && (
                  <div className={`text-xs font-medium mt-0.5 ${delta < 0 ? 'text-green-500' : 'text-red-400'}`}>
                    {delta > 0 ? '+' : ''}{delta.toFixed(1)} от начала
                  </div>
                )}
                <div className="text-[10px] text-[var(--text-subtle)] mt-0.5">было: {fv} {f.unit}</div>
              </div>
            );
          })}
        </div>
      </div>

      <BodyWeeklyPlanVsActual
        sorted={sorted}
        fields={fields}
        targets={targets || {}}
        effectiveStart={startDate || first.date}
      />

      <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5 overflow-x-auto">
        <h3 className="font-display text-lg mb-3">Все записи</h3>
        <table className="w-full text-sm" style={{ minWidth: Math.max(320, activeFields.length * 80 + 120) }}>
          <thead>
            <tr className="text-left border-b border-[var(--border)]">
              <th className="pb-2 pr-4 text-[10px] uppercase tracking-wide text-[var(--text-subtle)] font-medium">Дата</th>
              {activeFields.map(f => (
                <th key={f.id} className="pb-2 pr-3 text-right text-[10px] uppercase tracking-wide text-[var(--text-subtle)] font-medium whitespace-nowrap">
                  {f.label}{f.unit ? ` (${f.unit})` : ''}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {[...sorted].reverse().map((entry, idx, arr) => {
              const prev = arr[idx + 1];
              return (
                <tr key={entry.id} className="border-b border-[var(--border)] last:border-0">
                  <td className="py-2 pr-4 text-xs text-[var(--text-muted)] whitespace-nowrap">{formatBodyDate(entry.date)}</td>
                  {activeFields.map(f => {
                    const val = entry.values?.[f.id];
                    const prevVal = prev?.values?.[f.id];
                    const delta = val !== undefined && prevVal !== undefined ? val - prevVal : null;
                    return (
                      <td key={f.id} className="py-2 pr-3 text-right">
                        {val !== undefined ? (
                          <span>
                            {val}
                            {delta !== null && delta !== 0 && (
                              <span className={`text-[9px] ml-1 ${delta < 0 ? 'text-green-500' : 'text-red-400'}`}>
                                {delta > 0 ? '+' : ''}{delta.toFixed(1)}
                              </span>
                            )}
                          </span>
                        ) : <span className="text-[var(--text-subtle)]">—</span>}
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function BodyPhotoGallery({ entries, categories }) {
  const [filter, setFilter] = useState('');
  const [lightbox, setLightbox] = useState(null);

  const cats = categories || DEFAULT_BODY_PHOTO_CATEGORIES;

  const allPhotos = entries.flatMap(entry =>
    (entry.photos || []).map(normalizePhoto).map(ph => ({ ...ph, date: entry.date, entryId: entry.id }))
  ).filter(ph => !filter || ph.category === filter);

  const formatDate = (d) => {
    try {
      return new Date(d + 'T12:00:00').toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' });
    } catch { return d; }
  };

  return (
    <div>
      <div className="flex gap-2 flex-wrap mb-4">
        <button onClick={() => setFilter('')}
          className={`px-3 py-1.5 rounded-full text-sm font-medium border transition-all ${!filter ? 'bg-[var(--text)] text-white border-transparent' : 'border-[var(--border)] text-[var(--text-muted)] hover:bg-black/5'}`}>
          Все
        </button>
        {cats.map(c => (
          <button key={c} onClick={() => setFilter(c)}
            className={`px-3 py-1.5 rounded-full text-sm font-medium border transition-all ${filter===c ? 'bg-[var(--text)] text-white border-transparent' : 'border-[var(--border)] text-[var(--text-muted)] hover:bg-black/5'}`}>
            {c}
          </button>
        ))}
      </div>

      {allPhotos.length === 0 ? (
        <EmptyState title="Нет фото" text={filter ? `Нет фото с категорией «${filter}»` : 'Добавьте фото при создании записи'} />
      ) : (
        <div className="grid grid-cols-3 sm:grid-cols-4 gap-2">
          {allPhotos.map((ph, i) => (
            <div key={ph.filename + i} className="flex flex-col">
              <img src={`/api/photos/${ph.filename}`}
                className="w-full aspect-square object-cover rounded-xl cursor-pointer hover:opacity-90 transition-opacity"
                onClick={() => setLightbox(ph)} />
              <div className="text-[9px] text-[var(--text-subtle)] text-center mt-0.5 leading-tight">
                {formatDate(ph.date)}
              </div>
            </div>
          ))}
        </div>
      )}

      {lightbox && (
        <div className="fixed inset-0 z-50 bg-black/90 flex flex-col items-center justify-center p-4" onClick={() => setLightbox(null)}>
          <img src={`/api/photos/${lightbox.filename}`} className="max-w-full max-h-[80vh] rounded-2xl object-contain" onClick={e => e.stopPropagation()} />
          <div className="mt-3 text-center" onClick={e => e.stopPropagation()}>
            {lightbox.category && (
              <span className="inline-block px-3 py-1 rounded-full bg-white/20 text-white text-sm font-medium mr-2">{lightbox.category}</span>
            )}
            <span className="text-white/70 text-sm">{formatDate(lightbox.date)}</span>
          </div>
          <button className="mt-3 text-white/50 text-sm" onClick={() => setLightbox(null)}>Закрыть</button>
        </div>
      )}
    </div>
  );
}

function BodyFieldTargetsSettings({ data, setData, fields }) {
  const targets = data.bodyFieldTargets || {};

  const setTarget = (fieldId, raw) => {
    setData(d => {
      const cur = { ...(d.bodyFieldTargets || {}) };
      const trimmed = (raw || '').trim();
      if (trimmed === '' || trimmed === '-') {
        delete cur[fieldId];
      } else {
        const num = parseFloat(trimmed.replace(',', '.'));
        if (Number.isNaN(num)) return d;
        cur[fieldId] = num;
      }
      return { ...d, bodyFieldTargets: cur };
    });
  };

  return (
    <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
      <h3 className="font-display text-lg mb-1">Плановые изменения</h3>
      <p className="text-sm text-[var(--text-muted)] mb-4">
        Ожидаемое изменение показателя за неделю. Можно указывать со знаком «−» для снижения (например, −0.5 для веса).
        Используется во вкладке «Прогресс» для сравнения плана с фактом по неделям.
      </p>
      <div className="space-y-2">
        {fields.map(f => {
          const val = targets[f.id];
          return (
            <div key={f.id} className="flex items-center gap-3 bg-[var(--bg)] rounded-xl px-3 py-2.5">
              <div className="flex-1 text-sm font-medium">{f.label}</div>
              <input
                type="text"
                inputMode="decimal"
                defaultValue={val !== undefined ? String(val) : ''}
                onBlur={e => setTarget(f.id, e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); }}
                placeholder="0"
                className="w-20 bg-[var(--surface)] border border-[var(--border)] rounded-lg px-2 py-1.5 text-sm text-right focus:outline-none focus:border-[var(--text)]"
              />
              <span className="text-xs text-[var(--text-subtle)] w-16 shrink-0">{f.unit ? `${f.unit}/нед` : '/нед'}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function BodyFieldsSettings({ data, setData }) {
  const [customLabel, setCustomLabel] = useState('');
  const [customUnit, setCustomUnit] = useState('');
  const [newCatName, setNewCatName] = useState('');

  const fields = data.bodyFields || DEFAULT_BODY_FIELDS;
  const cats = data.bodyPhotoCategories || DEFAULT_BODY_PHOTO_CATEGORIES;

  const remove = (id) => setData(d => ({
    ...d,
    bodyFields: (d.bodyFields || DEFAULT_BODY_FIELDS).filter(f => f.id !== id),
    deletedIds: withDeletedId(d, 'bodyFields', id),
  }));
  const move = (idx, dir) => {
    setData(d => {
      const arr = [...(d.bodyFields || DEFAULT_BODY_FIELDS)];
      const to = idx + dir;
      if (to < 0 || to >= arr.length) return d;
      [arr[idx], arr[to]] = [arr[to], arr[idx]];
      return { ...d, bodyFields: arr };
    });
  };
  const addPreset = (p) => setData(d => {
    const cur = d.bodyFields || DEFAULT_BODY_FIELDS;
    if (cur.find(f => f.id === p.id)) return d;
    return { ...d, bodyFields: [...cur, { ...p, updatedAt: Date.now() }] };
  });
  const addCustom = () => {
    if (!customLabel.trim()) return;
    setData(d => ({
      ...d,
      bodyFields: [...(d.bodyFields || DEFAULT_BODY_FIELDS), { id: 'custom_' + Date.now(), label: customLabel.trim(), unit: customUnit.trim(), updatedAt: Date.now() }],
    }));
    setCustomLabel(''); setCustomUnit('');
  };

  const removeCat = (c) => setData(d => ({
    ...d,
    bodyPhotoCategories: (d.bodyPhotoCategories || DEFAULT_BODY_PHOTO_CATEGORIES).filter(x => x !== c),
    deletedIds: withDeletedId(d, 'bodyPhotoCategories', c),
  }));
  const moveCat = (idx, dir) => {
    setData(d => {
      const arr = [...(d.bodyPhotoCategories || DEFAULT_BODY_PHOTO_CATEGORIES)];
      const to = idx + dir;
      if (to < 0 || to >= arr.length) return d;
      [arr[idx], arr[to]] = [arr[to], arr[idx]];
      return { ...d, bodyPhotoCategories: arr };
    });
  };
  const addCat = () => {
    const name = newCatName.trim();
    if (!name) return;
    setData(d => {
      const cur = d.bodyPhotoCategories || DEFAULT_BODY_PHOTO_CATEGORIES;
      if (cur.includes(name)) return d;
      return { ...d, bodyPhotoCategories: [...cur, name] };
    });
    setNewCatName('');
  };

  const available = [...DEFAULT_BODY_FIELDS, ...PRESET_BODY_FIELDS].filter(p => !fields.find(f => f.id === p.id));

  const reminder = data.dietReminder || { enabled: false, time: '20:00', days: [0,1,2,3,4,5,6] };
  const setReminder = (patch) => setData(d => ({ ...d, dietReminder: { ...(d.dietReminder || { enabled: false, time: '20:00', days: [0,1,2,3,4,5,6] }), ...patch } }));
  const toggleDietDay = (dayId) => {
    const cur = reminder.days || [];
    setReminder({ days: cur.includes(dayId) ? cur.filter(x => x !== dayId) : [...cur, dayId].sort() });
  };

  const checklistReminder = data.dailyChecklistReminder || { enabled: false, time: '21:00', days: [0,1,2,3,4,5,6] };
  const setChecklistReminder = (patch) => setData(d => ({
    ...d,
    dailyChecklistReminder: { ...(d.dailyChecklistReminder || { enabled: false, time: '21:00', days: [0,1,2,3,4,5,6] }), ...patch },
  }));
  const toggleChecklistDay = (dayId) => {
    const cur = checklistReminder.days || [];
    setChecklistReminder({ days: cur.includes(dayId) ? cur.filter(x => x !== dayId) : [...cur, dayId].sort() });
  };

  const checklistFields = data.dailyChecklistFields || [];
  const hasToken = !!(data.settings && data.settings.telegramToken);

  const DayPicker = ({ days, onToggle }) => (
    <div className="flex flex-wrap gap-1.5">
      {WEEKDAYS.map(w => {
        const on = (days || []).includes(w.id);
        return (
          <button key={w.id} onClick={() => onToggle(w.id)}
            className={`w-10 h-10 rounded-xl text-sm font-medium transition-all ${on ? 'bg-[var(--text)] text-white' : 'bg-[var(--bg)] border border-[var(--border)] text-[var(--text-muted)]'}`}>
            {w.label}
          </button>
        );
      })}
    </div>
  );

  return (
    <div className="space-y-4">
      <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5 space-y-5">
        <div>
          <h3 className="font-display text-lg mb-1">Напоминания в Telegram</h3>
          <p className="text-sm text-[var(--text-muted)]">Бот пришлёт вопросы и запишет ответы прямо из Telegram.</p>
          <p className="text-xs text-[var(--text-subtle)] mt-1">Время указывается по вашему часовому поясу — на сервер автоматически передаётся московское время.</p>
        </div>

        <div className="border border-[var(--border)] rounded-xl p-4 space-y-4">
          <div className="flex items-center justify-between">
            <div>
              <div className="text-sm font-medium">Питание</div>
              <div className="text-xs text-[var(--text-muted)] mt-0.5">«Как ты кушал сегодня?»</div>
            </div>
            <button onClick={() => setReminder({ enabled: !reminder.enabled })}
              className={`relative w-11 h-6 rounded-full transition-colors ${reminder.enabled ? 'bg-green-500' : 'bg-[var(--border)]'}`}>
              <span className={`absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform ${reminder.enabled ? 'translate-x-5' : ''}`} />
            </button>
          </div>
          {reminder.enabled && (
            <div className="space-y-3">
              <div>
                <label className="block text-xs text-[var(--text-muted)] font-medium mb-1.5">Время</label>
                <MskTimeInput value={reminder.time || '20:00'} onChange={t => setReminder({ time: t })}
                  className="bg-[var(--bg)] border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-[var(--text)]" />
              </div>
              <div>
                <label className="block text-xs text-[var(--text-muted)] font-medium mb-1.5">Дни недели</label>
                <DayPicker days={reminder.days} onToggle={toggleDietDay} />
              </div>
            </div>
          )}
        </div>

        <div className="border border-[var(--border)] rounded-xl p-4 space-y-4">
          <div className="flex items-center justify-between">
            <div>
              <div className="text-sm font-medium">Чек-лист</div>
              <div className="text-xs text-[var(--text-muted)] mt-0.5">Ежедневные пункты для отметки</div>
            </div>
            <button onClick={() => setChecklistReminder({ enabled: !checklistReminder.enabled })}
              className={`relative w-11 h-6 rounded-full transition-colors ${checklistReminder.enabled ? 'bg-green-500' : 'bg-[var(--border)]'}`}>
              <span className={`absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform ${checklistReminder.enabled ? 'translate-x-5' : ''}`} />
            </button>
          </div>
          {checklistReminder.enabled && (
            <div className="space-y-3">
              <div>
                <label className="block text-xs text-[var(--text-muted)] font-medium mb-1.5">Время</label>
                <MskTimeInput value={checklistReminder.time || '21:00'} onChange={t => setChecklistReminder({ time: t })}
                  className="bg-[var(--bg)] border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-[var(--text)]" />
              </div>
              <div>
                <label className="block text-xs text-[var(--text-muted)] font-medium mb-1.5">Дни недели</label>
                <DayPicker days={checklistReminder.days} onToggle={toggleChecklistDay} />
              </div>
              {checklistFields.length === 0 && (
                <div className="text-xs text-amber-600 bg-amber-500/10 border border-amber-500/20 rounded-xl px-3 py-2">
                  Добавьте хотя бы один пункт чек-листа ниже.
                </div>
              )}
            </div>
          )}
        </div>

        {!hasToken && (
          <div className="text-xs text-amber-600 bg-amber-500/10 border border-amber-500/20 rounded-xl px-3 py-2">
            Укажите токен Telegram-бота в Настройках → Общее, иначе напоминания не будут отправляться.
          </div>
        )}
      </div>

      <DailyChecklistFieldsConfig data={data} setData={setData} />

      <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
        <h3 className="font-display text-lg mb-3">Текущие поля</h3>
        <div className="space-y-2">
          {fields.map((f, i) => (
            <div key={f.id} className="flex items-center gap-2 bg-[var(--bg)] rounded-xl px-3 py-2.5">
              <div className="flex-1 text-sm">
                <span className="font-medium">{f.label}</span>
                {f.unit && <span className="text-[var(--text-muted)] ml-1 text-xs">({f.unit})</span>}
              </div>
              <button onClick={() => move(i,-1)} disabled={i===0} className="p-1 text-[var(--text-subtle)] disabled:opacity-25 text-base leading-none">↑</button>
              <button onClick={() => move(i, 1)} disabled={i===fields.length-1} className="p-1 text-[var(--text-subtle)] disabled:opacity-25 text-base leading-none">↓</button>
              <button onClick={() => remove(f.id)} className="p-1 text-red-400 hover:text-red-600">
                <Icon name="trash" size={14} />
              </button>
            </div>
          ))}
        </div>
      </div>

      <BodyFieldTargetsSettings data={data} setData={setData} fields={fields} />

      {available.length > 0 && (
        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
          <h3 className="font-display text-lg mb-3">Добавить стандартное поле</h3>
          <div className="flex flex-wrap gap-2">
            {available.map(p => (
              <button key={p.id} onClick={() => addPreset(p)}
                className="flex items-center gap-1 px-3 py-1.5 bg-[var(--bg)] border border-[var(--border)] rounded-xl text-sm hover:bg-black/5">
                <Icon name="plus" size={13} /> {p.label}{p.unit ? ` (${p.unit})` : ''}
              </button>
            ))}
          </div>
        </div>
      )}

      <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
        <h3 className="font-display text-lg mb-3">Своё поле</h3>
        <div className="flex gap-3 flex-wrap">
          <div className="flex-1 min-w-[140px]">
            <label>Название</label>
            <input type="text" value={customLabel} onChange={e => setCustomLabel(e.target.value)} placeholder="Например, Давление" />
          </div>
          <div style={{width:100}}>
            <label>Ед. изм.</label>
            <input type="text" value={customUnit} onChange={e => setCustomUnit(e.target.value)} placeholder="мм рт." />
          </div>
          <div className="flex items-end">
            <button onClick={addCustom} disabled={!customLabel.trim()} className="btn-primary">Добавить</button>
          </div>
        </div>
      </div>

      <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
        <h3 className="font-display text-lg mb-3">Категории фото</h3>
        <div className="space-y-2 mb-3">
          {cats.map((c, i) => (
            <div key={c} className="flex items-center gap-2 bg-[var(--bg)] rounded-xl px-3 py-2.5">
              <div className="flex-1 text-sm font-medium">{c}</div>
              <button onClick={() => moveCat(i,-1)} disabled={i===0} className="p-1 text-[var(--text-subtle)] disabled:opacity-25 text-base leading-none">↑</button>
              <button onClick={() => moveCat(i, 1)} disabled={i===cats.length-1} className="p-1 text-[var(--text-subtle)] disabled:opacity-25 text-base leading-none">↓</button>
              <button onClick={() => removeCat(c)} className="p-1 text-red-400 hover:text-red-600">
                <Icon name="trash" size={14} />
              </button>
            </div>
          ))}
        </div>
        <div className="flex gap-2">
          <input type="text" value={newCatName} onChange={e => setNewCatName(e.target.value)}
            placeholder="Новая категория..."
            onKeyDown={e => e.key === 'Enter' && addCat()}
            style={{ flex:1 }} />
          <button onClick={addCat} disabled={!newCatName.trim() || cats.includes(newCatName.trim())} className="btn-primary whitespace-nowrap">
            Добавить
          </button>
        </div>
      </div>
    </div>
  );
}
