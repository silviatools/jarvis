                  )}
                  <rect x={x} y={y} width={barW} height={h} rx={hasAnswer ? 3 : 1} fill={color} opacity={hasAnswer ? 1 : 0.5} />
                  {isToday && (
                    <rect x={x - 1} y={TOP - 3} width={barW + 2} height={plotH + 6} rx={4}
                      fill="none" stroke="var(--text)" strokeWidth={1.5} opacity={0.3} />
                  )}
                  <text x={cx} y={svgH - 18} textAnchor="middle" fontSize="8"
                    fill={weekend ? '#ef4444' : 'var(--text-subtle)'} opacity={weekend ? 0.75 : 0.55}>
                    {['вс','пн','вт','ср','чт','пт','сб'][day.dow]}
                  </text>
                  <text x={cx} y={svgH - 6} textAnchor="middle" fontSize="9"
                    fill="var(--text-muted)" fontWeight={isToday ? 700 : 400}>
                    {day.dayNum}
                  </text>
                  {hasAnswer && <title>{formatDate(day.date)}: {answer}</title>}
                </g>
              );
            })}
          </svg>
        </div>
        <div className="flex flex-wrap items-center gap-x-3 gap-y-1.5 mt-3 text-xs text-[var(--text-muted)]">
          {opts.map(opt => (
            <div key={opt.label} className="flex items-center gap-1.5">
              <div className="w-2.5 h-2.5 rounded-sm" style={{ background: opt.color }} />
              {opt.label}
            </div>
          ))}
          <div className="flex items-center gap-1.5">
            <div className="w-2.5 h-0.5 rounded-sm bg-[var(--border)]" /> нет данных
          </div>
        </div>
      </div>
    </div>
  );
}

function DailyChecklistFieldsConfig({ data, setData }) {
  const fields = data.dailyChecklistFields || [];

  const [newLabel, setNewLabel] = useState('');
  const [newOptions, setNewOptions] = useState('Да, Нет');
  const [editingId, setEditingId] = useState(null);
  const [editLabel, setEditLabel] = useState('');
  const [editOptionsList, setEditOptionsList] = useState([]);
  const editSnapshotRef = React.useRef(null);

  const parseLabels = (str) => str.split(/[,;]/).map(s => s.trim()).filter(Boolean);

  // Сразу сохраняем правки (название, цвета, варианты) в data
  React.useEffect(() => {
    if (!editingId) return;
    const label = editLabel.trim();
    const options = editOptionsList
      .map(o => ({ label: (o.label || '').trim(), color: o.color }))
      .filter(o => o.label);
    if (!label || options.length === 0) return;
    setData(d => {
      const cur = (d.dailyChecklistFields || []).find(f => f.id === editingId);
      if (!cur) return d;
      const same = cur.label === label && JSON.stringify(cur.options) === JSON.stringify(options);
      if (same) return d;
      return {
        ...d,
        dailyChecklistFields: (d.dailyChecklistFields || []).map(f =>
          f.id === editingId ? { ...f, label, options, updatedAt: Date.now() } : f
        ),
      };
    });
  }, [editingId, editLabel, editOptionsList, setData]);

  const addField = () => {
    const label = newLabel.trim();
    const labels = parseLabels(newOptions);
    if (!label || labels.length === 0) return;
    setData(d => ({
      ...d,
      dailyChecklistFields: [...(d.dailyChecklistFields || []), { id: crypto.randomUUID(), label, options: labelsToOptions(labels), updatedAt: Date.now() }],
    }));
    setNewLabel('');
    setNewOptions('Да, Нет');
  };

  const startEdit = (f) => {
    const opts = getFieldOptions(f).map(o => ({ ...o }));
    editSnapshotRef.current = { label: f.label, options: opts };
    setEditingId(f.id);
    setEditLabel(f.label);
    setEditOptionsList(opts);
  };

  const finishEdit = () => {
    editSnapshotRef.current = null;
    setEditingId(null);
  };

  const cancelEdit = () => {
    const snap = editSnapshotRef.current;
    if (snap && editingId) {
      setData(d => ({
        ...d,
        dailyChecklistFields: (d.dailyChecklistFields || []).map(f =>
          f.id === editingId ? { ...f, label: snap.label, options: snap.options } : f
        ),
      }));
    }
    editSnapshotRef.current = null;
    setEditingId(null);
  };

  const addEditOption = () => {
    const i = editOptionsList.length;
    setEditOptionsList([...editOptionsList, { label: '', color: CHECKLIST_OPTION_COLORS[i % CHECKLIST_OPTION_COLORS.length] }]);
  };

  const updateEditOption = (idx, patch) => {
    setEditOptionsList(list => list.map((o, i) => i === idx ? { ...o, ...patch } : o));
  };

  const removeEditOption = (idx) => {
    setEditOptionsList(list => list.filter((_, i) => i !== idx));
  };

  const removeField = (id) => {
    if (!confirm('Удалить поле?')) return;
    setData(d => ({
      ...d,
      dailyChecklistFields: (d.dailyChecklistFields || []).filter(f => f.id !== id),
      dailyChecklistLog: (d.dailyChecklistLog || []).map(e => {
        const answers = { ...(e.answers || {}) };
        delete answers[id];
        return { ...e, answers };
      }),
      deletedIds: withDeletedId(d, 'dailyChecklistFields', id),
    }));
    if (editingId === id) {
      editSnapshotRef.current = null;
      setEditingId(null);
    }
  };

  const moveField = (idx, dir) => {
    setData(d => {
      const arr = [...(d.dailyChecklistFields || [])];
      const to = idx + dir;
      if (to < 0 || to >= arr.length) return d;
      [arr[idx], arr[to]] = [arr[to], arr[idx]];
      return { ...d, dailyChecklistFields: arr };
    });
  };

  return (
    <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
      <h3 className="font-display text-lg mb-1">Ежедневный чек-лист</h3>
      <p className="text-sm text-[var(--text-muted)] mb-4">
        Пункты для ежедневной отметки и варианты ответа.
      </p>

      {fields.length > 0 && (
        <div className="space-y-3 mb-4">
          {fields.map((f, i) => (
            <div key={f.id} className="bg-[var(--bg)] border border-[var(--border)] rounded-xl p-4">
              {editingId === f.id ? (
                <div className="space-y-3">
                  <input value={editLabel} onChange={e => setEditLabel(e.target.value)} placeholder="Название" className="w-full bg-[var(--surface)] border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-[var(--text)]" />
                  <div className="space-y-2">
                    <div className="text-xs text-[var(--text-muted)] font-medium">Варианты ответа</div>
                    {editOptionsList.map((opt, oi) => (
                      <div key={oi} className="flex items-center gap-2">
                        <input type="color" value={opt.color} onChange={e => updateEditOption(oi, { color: e.target.value })}
                          className="w-9 h-9 rounded-lg border border-[var(--border)] cursor-pointer p-0.5 bg-transparent shrink-0" title="Цвет на графике" />
                        <input value={opt.label} onChange={e => updateEditOption(oi, { label: e.target.value })} placeholder="Вариант"
                          className="flex-1 bg-[var(--surface)] border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-[var(--text)]" />
                        <button onClick={() => removeEditOption(oi)} disabled={editOptionsList.length <= 1}
                          className="p-2 rounded-lg hover:bg-red-50 text-[var(--text-muted)] hover:text-red-500 disabled:opacity-25 shrink-0">
                          <Icon name="trash" size={14} />
                        </button>
                      </div>
                    ))}
                    <button onClick={addEditOption} className="text-xs text-[var(--text-muted)] hover:text-[var(--text)] flex items-center gap-1">
                      <Icon name="plus" size={12} /> Добавить вариант
                    </button>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={finishEdit} className="btn-primary text-sm flex-1">Готово</button>
                    <button onClick={cancelEdit} className="btn-secondary text-sm flex-1">Отмена</button>
                  </div>
                </div>
              ) : (
                <div className="flex items-start justify-between gap-3">
                  <div className="flex-1 min-w-0">
                    <div className="font-medium text-sm">{f.label}</div>
                    <div className="flex flex-wrap gap-1.5 mt-2">
                      {getFieldOptions(f).map(opt => (
                        <span key={opt.label} className="text-xs px-2 py-1 rounded-lg border font-medium"
                          style={{ borderColor: opt.color + '66', color: opt.color, background: opt.color + '18' }}>
                          {opt.label}
                        </span>
                      ))}
                    </div>
                  </div>
                  <div className="flex gap-1 shrink-0">
                    <button onClick={() => moveField(i, -1)} disabled={i === 0} className="p-1 text-[var(--text-subtle)] disabled:opacity-25">↑</button>
                    <button onClick={() => moveField(i, 1)} disabled={i === fields.length - 1} className="p-1 text-[var(--text-subtle)] disabled:opacity-25">↓</button>
                    <button onClick={() => startEdit(f)} className="p-2 rounded-lg hover:bg-black/5 text-[var(--text-muted)]"><Icon name="edit" size={14} /></button>
                    <button onClick={() => removeField(f.id)} className="p-2 rounded-lg hover:bg-red-50 text-[var(--text-muted)] hover:text-red-500"><Icon name="trash" size={14} /></button>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      <div className="border border-dashed border-[var(--border)] rounded-xl p-4 space-y-3">
        <div className="text-xs uppercase tracking-wide text-[var(--text-subtle)] font-medium">Новый пункт</div>
        <input value={newLabel} onChange={e => setNewLabel(e.target.value)} placeholder="Например, Вакуум" className="w-full bg-[var(--bg)] border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-[var(--text)]" />
        <input value={newOptions} onChange={e => setNewOptions(e.target.value)} placeholder="Варианты: Да, Нет, Пропустил" className="w-full bg-[var(--bg)] border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-[var(--text)]" />
        <button onClick={addField} disabled={!newLabel.trim()} className="btn-primary text-sm flex items-center gap-2 disabled:opacity-40">
          <Icon name="plus" size={14} /> Добавить
        </button>
      </div>
    </div>
  );
}

function DailyChecklistStats({ data, setData }) {
  const today = new Date().toISOString().split('T')[0];
  const fields = data.dailyChecklistFields || [];
  const log = [...(data.dailyChecklistLog || [])].sort((a, b) => b.date.localeCompare(a.date));
  const [selDate, setSelDate] = useState(today);
  const [showHistory, setShowHistory] = useState(false);

  const fmtDate = (dateStr) => {
    const d = new Date(dateStr + 'T00:00:00');
    const months = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
    const dows = ['вс','пн','вт','ср','чт','пт','сб'];
    return `${d.getDate()} ${months[d.getMonth()]} (${dows[d.getDay()]})`;
  };

  const setAnswer = (fieldId, option) => {
    setData(d => {
      const list = d.dailyChecklistLog || [];
      const existing = list.find(e => e.date === selDate);
      const answers = { ...(existing?.answers || {}), [fieldId]: option };
      const entry = { id: existing?.id || crypto.randomUUID(), date: selDate, answers };
      return { ...d, dailyChecklistLog: [...list.filter(e => e.date !== selDate), entry].sort((a, b) => b.date.localeCompare(a.date)) };
    });
  };

  const deleteDay = (date) => {
    if (!confirm('Удалить запись за этот день?')) return;
    deleteLogEntryOnServer('dailyChecklistLog', date);
    setData(d => ({ ...d, dailyChecklistLog: (d.dailyChecklistLog || []).filter(e => e.date !== date) }));
    if (selDate === date) setSelDate(today);
  };

  const selEntry = log.find(e => e.date === selDate);
  const todayEntry = log.find(e => e.date === today);
  const todayFilled = fields.filter(f => todayEntry?.answers?.[f.id]).length;

  if (fields.length === 0) {
    return (
      <EmptyState title="Нет пунктов" text="Добавьте пункты чек-листа в настройках раздела (⚙), чтобы видеть статистику." />
    );
  }

  return (
    <div className="fade-in space-y-5">
      {/* Сводка сегодня */}
      <div className="flex flex-wrap gap-3">
        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl px-4 py-3 flex-1 min-w-[140px]">
          <div className="text-[10px] uppercase tracking-wide text-[var(--text-subtle)]">Сегодня</div>
          <div className="text-xl font-semibold mt-0.5">{todayFilled}/{fields.length}</div>
          <div className="text-xs text-[var(--text-muted)]">пунктов отмечено</div>
        </div>
        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl px-4 py-3 flex-1 min-w-[140px]">
          <div className="text-[10px] uppercase tracking-wide text-[var(--text-subtle)]">Всего записей</div>
          <div className="text-xl font-semibold mt-0.5">{log.length}</div>
          <div className="text-xs text-[var(--text-muted)]">дней в журнале</div>
        </div>
      </div>

      {/* Быстрая отметка */}
      <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5 space-y-4">
        <div className="flex items-center justify-between gap-3">
          <h3 className="font-display text-lg">Отметить за день</h3>
          <input type="date" value={selDate} max={today} onChange={e => setSelDate(e.target.value)}
            className="bg-[var(--bg)] border border-[var(--border)] rounded-xl px-3 py-1.5 text-sm focus:outline-none focus:border-[var(--text)]" />
        </div>
        <div className="space-y-3">
          {fields.map(f => {
            const opts = getFieldOptions(f);
            return (
            <div key={f.id} className="bg-[var(--bg)] rounded-xl p-3">
              <div className="text-xs text-[var(--text-muted)] font-medium mb-2">{f.label}</div>
              <div className="flex flex-wrap gap-1.5">
                {opts.map(opt => {
                  const active = selEntry?.answers?.[f.id] === opt.label;
                  return (
                    <button key={opt.label} onClick={() => setAnswer(f.id, opt.label)}
                      className="px-3 py-1.5 rounded-lg border text-sm font-medium transition-all"
                      style={active ? { background: opt.color, borderColor: opt.color, color: '#fff' } : { borderColor: 'var(--border)', color: 'var(--text-muted)' }}>
                      {opt.label}
                    </button>
                  );
                })}
              </div>
            </div>
            );
          })}
        </div>
        {selEntry && (
          <button onClick={() => deleteDay(selDate)}
            className="w-full text-xs text-[var(--text-subtle)] hover:text-red-400 py-1 transition-colors">
            Убрать все отметки за {fmtDate(selDate)}
          </button>
        )}
      </div>

      {/* Графики по каждому пункту */}
      {fields.map(f => (
        <ChecklistFieldChart key={f.id} field={f} log={log} today={today} formatDate={fmtDate} />
      ))}

      {/* История */}
      {log.length > 0 && (
        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
          <button onClick={() => setShowHistory(!showHistory)}
            className="flex items-center justify-between w-full text-left">
            <h3 className="font-display text-lg">История</h3>
            <span className="flex items-center gap-2 text-sm text-[var(--text-muted)]">
              {log.length} {log.length < 5 ? 'дня' : 'дней'}
              <span className={`transition-transform ${showHistory ? 'rotate-180' : ''}`}><Icon name="chevronDown" size={16} /></span>
            </span>
          </button>
          {showHistory && (
            <div className="space-y-2 mt-4 fade-in">
              {log.slice(0, 45).map(e => (
                <div key={e.id} className="flex items-start justify-between gap-3 bg-[var(--bg)] rounded-xl px-3 py-2.5">
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-medium">{fmtDate(e.date)}</div>
                    <div className="flex flex-wrap gap-1.5 mt-1.5">
                      {fields.map(f => {
                        const ans = e.answers?.[f.id];
                        if (!ans) return null;
                        const color = getOptionColor(f, ans);
                        return (
                          <span key={f.id} className="text-[10px] px-2 py-0.5 rounded-full font-medium"
                            style={{ background: color + '22', color, border: `1px solid ${color}44` }}>
                            {f.label}: {ans}
                          </span>
                        );
                      })}
                    </div>
                  </div>
                  <button onClick={() => deleteDay(e.date)} className="p-1 text-red-400 hover:text-red-600 shrink-0">
                    <Icon name="trash" size={14} />
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function SupplementSettings({ data, setData, isWorkout }) {
  const [editing, setEditing] = useState(null); // объект или null
  const [showArchive, setShowArchive] = useState(false);
  const storageKey = isWorkout ? 'workoutSupplements' : 'supplements';

  const active = (data[storageKey] || []).filter(s => !s.archived);
  const archived = (data[storageKey] || []).filter(s => s.archived);

  const save = (supp) => {
    supp = { ...supp, updatedAt: Date.now() };
    setData(d => {
      const list = d[storageKey] || [];
      const exists = list.find(s => s.id === supp.id);
      const updated = exists
        ? list.map(s => s.id === supp.id ? supp : s)
        : [...list, supp];
      return { ...d, [storageKey]: updated };
    });
    setEditing(null);
  };

  const remove = (id) => {
    if (!confirm('Удалить БАДД полностью?')) return;
    setData(d => ({ ...d, [storageKey]: (d[storageKey] || []).filter(s => s.id !== id) }));
  };

  const toggleArchive = (id) => {
    setData(d => ({
      ...d,
      [storageKey]: (d[storageKey] || []).map(s =>
        s.id === id ? { ...s, archived: !s.archived } : s
      ),
    }));
  };

  return (
    <div>
      <button
        onClick={() => setEditing({
          id: crypto.randomUUID(),
          name: '', dosage: '', form: 'Таблетки',
          frequency: 'daily_morning', weekday: 1, comment: '',
          archived: false,
        })}
        className="btn-primary w-full flex items-center justify-center gap-2 mb-6"
      >
        <Icon name="plus" size={18} />
        Добавить БАДД
      </button>

      <div className="space-y-3 mb-8">
        {active.length === 0 && (
          <div className="text-center py-8 text-[var(--text-subtle)] text-sm">Нет активных БАДДов</div>
        )}
        {active.map(s => (
          <SettingsSupplementRow
            key={s.id} supp={s} hideFrequency={isWorkout}
            onEdit={() => setEditing(s)}
            onArchive={() => toggleArchive(s.id)}
            onDelete={() => remove(s.id)}
          />
        ))}
      </div>

      {archived.length > 0 && (
        <div>
          <button
            onClick={() => setShowArchive(!showArchive)}
            className="flex items-center gap-2 text-[var(--text-muted)] hover:text-[var(--text)] mb-4 text-sm"
          >
            <Icon name="archive" size={16} />
            Архив ({archived.length})
            <span className={`transition-transform ${showArchive ? 'rotate-180' : ''}`}>
              <Icon name="chevronDown" size={16} />
            </span>
          </button>
          {showArchive && (
            <div className="space-y-3 fade-in">
              {archived.map(s => (
                <SettingsSupplementRow
                  key={s.id} supp={s} archived hideFrequency={isWorkout}
                  onEdit={() => setEditing(s)}
                  onArchive={() => toggleArchive(s.id)}
                  onDelete={() => remove(s.id)}
                />
              ))}
            </div>
          )}
        </div>
      )}

      {editing && (
        <SupplementModal
          supp={editing}
          hideFrequency={isWorkout}
          onSave={save}
          onClose={() => setEditing(null)}
        />
      )}
    </div>
  );
}

            <div className="space-y-3 fade-in">
              {archived.map(m => (
                <SettingsMealRow
                  key={m.id} meal={m} archived
                  onEdit={() => setEditing(m)}
                  onArchive={() => toggleArchive(m.id)}
                  onDelete={() => remove(m.id)}
                />
              ))}
            </div>
          )}
        </div>
      )}

      {editing && (
        <MealModal meal={editing} onSave={save} onClose={() => setEditing(null)} />
      )}
    </div>
  );
}

              <div className="text-xs text-[var(--text-subtle)] text-center mt-1 uppercase tracking-wider">Белки</div>
            </div>
            <div>
              <input
                type="number" inputMode="decimal" min="0"

                placeholder="Ж"
                style={{ textAlign: 'center' }}

              <div className="text-xs text-[var(--text-subtle)] text-center mt-1 uppercase tracking-wider">Жиры</div>

// ============== DIET COMPLIANCE ==============

// 5-уровневая шкала соблюдения питания (по плану или нет)
const DIET_LEVELS = [
  { id: 'much_below', label: 'Ниже',          offset: -2, color: '#ef4444' },
  { id: 'below',      label: 'Чуть ниже',     offset: -1, color: '#f59e0b' },
  { id: 'on_plan',    label: 'По плану',      offset:  0, color: '#22c55e' },
  { id: 'above',      label: 'Чуть выше',     offset: +1, color: '#f59e0b' },
  { id: 'much_above', label: 'Выше',          offset: +2, color: '#ef4444' },
  { id: 'mini_cheat', label: 'Мини чит мил',  offset: +1, color: '#a855f7' },
  { id: 'cheat',      label: 'Чит мил',       offset: +2, color: '#7e22ce' },
];
const DIET_LEVEL_BY_ID = Object.fromEntries(DIET_LEVELS.map(l => [l.id, l]));
const DOW_SHORT = ['вс','пн','вт','ср','чт','пт','сб'];
const MONTHS_SHORT = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];

function DietComplianceView({ data, setData }) {
  const today = new Date().toISOString().split('T')[0];

  // Нормализация: старые записи (onPlan/калории) → уровень
  const normLevel = (e) => e.level || (e.onPlan ? 'on_plan' : null);
  const rawLog = data.dietLog || [];
  const log = rawLog.map(e => ({ ...e, level: normLevel(e) })).filter(e => e.level);

  const [selDate, setSelDate] = useState(today);
  const chartScrollRef = React.useRef(null);

  const selEntry = log.find(e => e.date === selDate);

  const setLevel = (level) => {
    const existing = rawLog.find(e => e.date === selDate);
    const entry = { id: existing ? existing.id : crypto.randomUUID(), date: selDate, level };
    setData(d => {
      const list = (d.dietLog || []).filter(e => e.date !== selDate);
      return { ...d, dietLog: [...list, entry].sort((a, b) => b.date.localeCompare(a.date)) };
    });
  };

  const deleteEntry = (date) => {
    deleteLogEntryOnServer('dietLog', date);
    setData(d => ({ ...d, dietLog: (d.dietLog || []).filter(e => e.date !== date) }));
  };

  const onPlanCount = log.filter(e => e.level === 'on_plan').length;
  const totalCount = log.length;
  const adherencePct = totalCount > 0 ? Math.round((onPlanCount / totalCount) * 100) : null;

  const formatDate = (dateStr) => {
    const d = new Date(dateStr + 'T00:00:00');
    return `${d.getDate()} ${MONTHS_SHORT[d.getMonth()]} (${DOW_SHORT[d.getDay()]})`;
  };

  const sortedLog = [...log].sort((a, b) => b.date.localeCompare(a.date));

  // ── Построение 90 дней для графика ──
  const CHART_DAYS = 90;
  const chartDays = [];
  for (let i = CHART_DAYS - 1; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().split('T')[0];
    chartDays.push({
      date: ds,
      entry: log.find(e => e.date === ds),
      dow: d.getDay(),
      dayNum: d.getDate(),
      month: d.getMonth(),
    });
  }
  const todayIndex = chartDays.findIndex(d => d.date === today);

  // Диаграмма отклонений: центр = «По плану», вверх = выше, вниз = ниже
  const barW = 16, gap = 8, totalBarW = barW + gap;
  const maxOffset = Math.max(1, ...DIET_LEVELS.map(l => Math.abs(l.offset)));
  const TOP = 22, plotH = 96, center = TOP + plotH / 2, unit = (plotH / 2 - 8) / maxOffset;
  const svgW = chartDays.length * totalBarW;
  const svgH = TOP + plotH + 36;

  // Авто-скролл к сегодняшнему дню
  React.useEffect(() => {
    const el = chartScrollRef.current;
    if (!el) return;
    const todayX = todayIndex * totalBarW + barW / 2;
    el.scrollLeft = todayX - el.offsetWidth / 2;
  }, [log.length]);

  return (
    <div className="fade-in space-y-5">
      {/* Header */}
      {adherencePct !== null && (
        <div className="text-[var(--text-subtle)] text-sm">
          По плану: <span className={`font-semibold ${adherencePct >= 80 ? 'text-green-500' : adherencePct >= 50 ? 'text-yellow-500' : 'text-red-400'}`}>{adherencePct}%</span>
          <span className="text-[var(--text-subtle)]"> ({onPlanCount}/{totalCount} дней)</span>
        </div>
      )}

      {/* Entry card */}
      <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5 space-y-4">
        {/* Date picker */}
        <div>
          <label className="block text-xs text-[var(--text-muted)] font-medium mb-1.5">Дата</label>
          <input type="date" value={selDate} max={today}
            onChange={e => setSelDate(e.target.value)}
            className="w-full bg-[var(--bg)] border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-[var(--text)]"
          />
        </div>

        {/* Rating buttons */}
        <div>
          <div className="text-xs text-[var(--text-muted)] font-medium mb-2">Как кушал в этот день?</div>
          <div className="grid grid-cols-4 gap-1.5">
            {DIET_LEVELS.map(lvl => {
              const active = selEntry?.level === lvl.id;
              return (
                <button key={lvl.id} onClick={() => setLevel(lvl.id)}
                  className="flex flex-col items-center justify-center gap-1.5 py-2.5 px-1 rounded-xl border text-[11px] font-medium leading-tight text-center transition-all"
                  style={active
                    ? { background: lvl.color, borderColor: lvl.color, color: '#fff' }
                    : { borderColor: 'var(--border)', color: 'var(--text-muted)' }}>
                  <span className="w-2.5 h-2.5 rounded-full" style={{ background: active ? '#fff' : lvl.color }} />
                  {lvl.label}
                </button>
              );
            })}
          </div>
          {selEntry && (
            <button onClick={() => deleteEntry(selDate)}
              className="mt-2 w-full text-xs text-[var(--text-subtle)] hover:text-red-400 py-1.5 transition-colors">
              Убрать отметку за {formatDate(selDate)}
            </button>
          )}
        </div>
      </div>

      {/* Chart — last 90 days */}
      {log.length > 0 && (
        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
          <div className="font-medium text-sm mb-4">90 дней</div>
          <div className="overflow-x-auto" ref={chartScrollRef}>
            <svg width={svgW} height={svgH} style={{ display: 'block' }}>
              {/* Baseline «По плану» */}
              <line x1={0} y1={center} x2={svgW} y2={center} stroke="#22c55e" strokeWidth={1} strokeDasharray="3 3" opacity={0.5} />
              {chartDays.map((day, i) => {
                const x = i * totalBarW;
                const cx = x + barW / 2;
                const lvl = day.entry ? DIET_LEVEL_BY_ID[day.entry.level] : null;
                const isToday = day.date === today;
                const weekend = day.dow === 0 || day.dow === 6;
                const showMonth = i === 0 || day.dayNum === 1;
                return (
                  <g key={day.date}>
                    {/* Метка месяца при смене */}
                    {showMonth && (
                      <text x={x} y={12} fontSize="9" fill="var(--text-subtle)" fontWeight="600">
                        {MONTHS_SHORT[day.month]}
                      </text>
                    )}
                    {/* Столбик отклонения / отметка «нет данных» */}
                    {!lvl ? (
                      <rect x={x} y={center - 1} width={barW} height={2} rx={1} fill="var(--border)" />
                    ) : lvl.offset === 0 ? (
                      <rect x={x} y={center - 5} width={barW} height={10} rx={3} fill={lvl.color} />
                    ) : lvl.offset > 0 ? (
                      <rect x={x} y={center - lvl.offset * unit} width={barW} height={lvl.offset * unit} rx={3} fill={lvl.color} />
                    ) : (
                      <rect x={x} y={center} width={barW} height={-lvl.offset * unit} rx={3} fill={lvl.color} />
                    )}
                    {/* Подсветка сегодня */}
                    {isToday && <rect x={x - 1} y={TOP - 4} width={barW + 2} height={plotH + 8} rx={4} fill="none" stroke="var(--text)" strokeWidth={1.5} opacity={0.35} />}
                    {/* День недели */}
                    <text x={cx} y={svgH - 20} textAnchor="middle" fontSize="8"
                      fill={weekend ? '#ef4444' : 'var(--text-subtle)'} opacity={weekend ? 0.75 : 0.6}>
                      {DOW_SHORT[day.dow]}
                    </text>
                    {/* Число */}
                    <text x={cx} y={svgH - 7} textAnchor="middle" fontSize="9"
                      fill="var(--text-muted)" fontWeight={isToday ? 700 : 400}>
                      {day.dayNum}
                    </text>
                    {lvl && <title>{formatDate(day.date)}: {lvl.label}</title>}
                  </g>
                );
              })}
            </svg>
          </div>
          {/* Легенда */}
          <div className="flex flex-wrap items-center gap-x-4 gap-y-1.5 mt-4 text-xs text-[var(--text-muted)]">
            {DIET_LEVELS.map(lvl => (
              <div key={lvl.id} className="flex items-center gap-1.5">
                <div className="w-2.5 h-2.5 rounded-sm" style={{ background: lvl.color }} /> {lvl.label}
              </div>
            ))}
            <div className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 rounded-sm" style={{ background: 'var(--border)' }} /> Нет данных</div>
          </div>
        </div>
      )}

      {/* Log list */}
      {sortedLog.length > 0 && (
        <div className="space-y-2">
          <div className="font-medium text-sm text-[var(--text-muted)] px-1">История</div>
          {sortedLog.map(entry => {
            const lvl = DIET_LEVEL_BY_ID[entry.level] || DIET_LEVELS[2];
            return (
              <div key={entry.id || entry.date} className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl px-4 py-3 flex items-center gap-3">
                <div className="w-2.5 h-2.5 rounded-full shrink-0" style={{ background: lvl.color }} />
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium">{formatDate(entry.date)}</div>
                  <div className="text-xs text-[var(--text-muted)] mt-0.5">{lvl.label}</div>
                </div>
                <button onClick={() => { setSelDate(entry.date); }} className="p-2.5 rounded-lg hover:bg-black/5 text-[var(--text-muted)]" title="Изменить"><Icon name="edit" size={16} /></button>
                <button onClick={() => { if (confirm('Удалить запись?')) deleteEntry(entry.date); }} className="p-2.5 rounded-lg hover:bg-black/5 text-[var(--text-muted)]"><Icon name="trash" size={16} /></button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ============== COOKING ==============
function CookingView({ data, setData }) {
  const [editing, setEditing] = useState(null);
  const [expanded, setExpanded] = useState(null);

  const plans = data.cookingPlans || [];

  const save = (plan) => {
    plan = { ...plan, updatedAt: Date.now() };
    setData(d => {
      const list = d.cookingPlans || [];
      const exists = list.find(p => p.id === plan.id);
      return {
        ...d,
        cookingPlans: exists
          ? list.map(p => p.id === plan.id ? plan : p)
          : [...list, plan],
      };
    });
    setEditing(null);
  };

  const remove = (id) => {
    if (!confirm('Удалить план готовки?')) return;
    setData(d => ({ ...d, cookingPlans: (d.cookingPlans || []).filter(p => p.id !== id) }));
    if (expanded === id) setExpanded(null);
  };

  const updateActual = (planId, ingId, field, value) => {
    setData(d => ({
      ...d,
      cookingPlans: (d.cookingPlans || []).map(p =>
        p.id !== planId ? p : {
          ...p,
          ingredients: p.ingredients.map(i =>
            i.id !== ingId ? i : { ...i, [field]: value }
          ),
        }
      ),
    }));
  };

  const newPlan = () => setEditing({
    id: crypto.randomUUID(),
    name: '',
    ingredients: [],
    createdAt: new Date().toISOString(),
  });

  return (
    <div className="space-y-4">
      <button
        onClick={newPlan}
        className="btn-primary w-full flex items-center justify-center gap-2"
      >
        <Icon name="plus" size={18} />
        Добавить план готовки
      </button>

      {plans.length === 0 && (
        <EmptyState title="Нет планов готовки" text="Добавьте первый план готовки" />
      )}

      {[...plans].reverse().map(plan => {
        const isOpen = expanded === plan.id;
        const count = plan.ingredients.length;
        const countLabel = count === 0 ? 'нет продуктов' : count === 1 ? '1 продукт' : count < 5 ? `${count} продукта` : `${count} продуктов`;
        return (
          <div key={plan.id} className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl overflow-hidden">
            <button
              onClick={() => setExpanded(isOpen ? null : plan.id)}
              className="w-full p-5 text-left flex items-center justify-between gap-4"
            >
              <div className="flex-1 min-w-0">
                <h3 className="font-display text-xl">{plan.name}</h3>
                <div className="text-sm text-[var(--text-subtle)] mt-1">{countLabel}</div>
              </div>
              <div className="flex items-center gap-1 shrink-0">
                <button
                  onClick={e => { e.stopPropagation(); setEditing(plan); }}
                  className="p-2.5 rounded-lg hover:bg-black/5 text-[var(--text-muted)]"
                  title="Редактировать"
                >
                  <Icon name="edit" size={18} />
                </button>
                <button
                  onClick={e => { e.stopPropagation(); remove(plan.id); }}
                  className="p-2.5 rounded-lg hover:bg-black/5 text-[var(--text-muted)]"
                  title="Удалить"
                >
                  <Icon name="trash" size={18} />
                </button>
                <div className={`text-[var(--text-muted)] transition-transform ml-1 ${isOpen ? 'rotate-180' : ''}`}>
                  <Icon name="chevronDown" size={20} />
                </div>
              </div>
            </button>

            {isOpen && (
              <div className="fade-in border-t border-[var(--border)] px-5 py-5 space-y-3">
                {plan.ingredients.length === 0 && (
                  <div className="text-sm text-[var(--text-subtle)] text-center py-4">Нет продуктов — нажмите редактировать</div>
                )}
                {plan.ingredients.map(ing => {
                  const hasCookedFact = ing.actualCooked !== '' && ing.actualCooked != null;
                  const hasRawFact = ing.actualRaw !== '' && ing.actualRaw != null;
                  const cardStyle = hasCookedFact
                    ? { border: '1px solid #22c55e', background: 'rgba(34,197,94,0.08)' }
                    : hasRawFact
                    ? { border: '1px solid #f59e0b', background: 'rgba(245,158,11,0.08)' }
                    : {};

                  const portions = ing.portions ? +ing.portions : null;
                  const portionSize = ing.portionSize ? +ing.portionSize : null;
                  const plannedRaw = (portions && portionSize) ? portions * portionSize : (ing.plannedRaw != null && ing.plannedRaw !== '' ? +ing.plannedRaw : null);

                  const kf = (hasCookedFact && hasRawFact && +ing.actualCooked > 0)
                    ? (+ing.actualRaw / +ing.actualCooked)
                    : null;
                  const cookedPortion = (kf && portionSize) ? Math.round(portionSize / kf) : null;

                  return (
                    <div key={ing.id} className="rounded-xl p-3 border border-[var(--border)] bg-[var(--bg)]" style={cardStyle}>
                      <div className="font-medium mb-3">{ing.name}</div>
                      <div className="grid grid-cols-3 gap-2">
                        <div className="text-center">
                          <div className="text-[10px] uppercase tracking-wider text-[var(--text-subtle)] mb-1.5">План</div>
                          {portions && portionSize ? (
                            <div>
                              <div className="text-[10px] text-[var(--text-subtle)] mb-0.5">{portions}×{portionSize}г</div>
                              <div className="font-display text-lg">{plannedRaw}<span className="text-xs text-[var(--text-subtle)] ml-0.5">г</span></div>
                            </div>
                          ) : (
                            <div className="font-display text-lg">
                              {plannedRaw != null ? plannedRaw : '—'}
                              {plannedRaw != null && <span className="text-xs text-[var(--text-subtle)] ml-0.5">г</span>}
                            </div>
                          )}
                        </div>
                        <div className="text-center">
                          <div className="text-[10px] uppercase tracking-wider text-[var(--text-subtle)] mb-1.5">Факт сыр.</div>
                          <input
                            type="number"
                            inputMode="decimal"
                            min="0"
                            value={ing.actualRaw ?? ''}
                            onChange={e => updateActual(plan.id, ing.id, 'actualRaw', e.target.value)}
                            placeholder="—"
                            className="input-display w-full"
                          />
                        </div>
                        <div className="text-center">
                          <div className="text-[10px] uppercase tracking-wider text-[var(--text-subtle)] mb-1.5">Факт гот.</div>
                          <input
                            type="number"
                            inputMode="decimal"
                            min="0"
                            value={ing.actualCooked ?? ''}
                            onChange={e => updateActual(plan.id, ing.id, 'actualCooked', e.target.value)}
                            placeholder="—"
                            className="input-display w-full"
                          />
                        </div>
                      </div>

                      {kf && (
                        <div className="mt-3 pt-3 border-t border-[var(--border)] flex items-center justify-between gap-3 flex-wrap">
                          <div className="text-xs text-[var(--text-subtle)]">
                            КФ готовки: <span className="font-medium text-[var(--text)]">{kf.toFixed(2)}</span>
                          </div>
                          {cookedPortion && portions ? (
                            <div className="text-sm font-medium text-green-600">
                              Готового раскладывать: {portions} порц. по {cookedPortion} г
                            </div>
                          ) : (
                            <div className="text-xs text-[var(--text-subtle)]">Укажи кол-во и размер порций для расчёта</div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}

      {editing && (

const KANBAN_SORT_OPTIONS = [
  { id: 'default',  label: 'По умолчанию' },
  { id: 'priority', label: 'По приоритету' },
  { id: 'date',     label: 'По дате' },
];
const PRIORITY_ORDER = { high: 0, medium: 1, low: 2, none: 3 };

function KanbanView({ data, setData }) {
  const columns = data.kanban?.columns || DEFAULT_KANBAN_COLUMNS;
  const setColumns = (cols) => setData(d => ({ ...d, kanban: { ...d.kanban, columns: cols } }));

  const [editingTask, setEditingTask] = useState(null); // { task, colId }
  const [editingCol, setEditingCol] = useState(null);   // column object or 'new'
  const [addingColIdx, setAddingColIdx] = useState(null);
  const [dragging, setDragging] = useState(null);       // { taskId, fromColId }
  const [dragOverCol, setDragOverCol] = useState(null);
  const sort = data.kanban?.sort || 'default';
  const setSort = (val) => setData(d => ({ ...d, kanban: { ...d.kanban, sort: val } }));

  const sortTasks = (tasks) => {
    const open = tasks.filter(t => !t.closed);
    const closed = tasks.filter(t => t.closed);
    if (sort === 'priority') {
      open.sort((a, b) => (PRIORITY_ORDER[a.priority] ?? 3) - (PRIORITY_ORDER[b.priority] ?? 3));
    } else if (sort === 'date') {
      const sortKey = t => t.startDate || t.dueDate || null;
      open.sort((a, b) => {
        const da = sortKey(a), db = sortKey(b);
        if (!da && !db) return 0;
        if (!da) return 1;
        if (!db) return -1;
        return new Date(da) - new Date(db);
      });
    } else {
      open.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    }
    return [...open, ...closed];
  };

  // ── columns ──
  const addColumn = (title) => {
    setColumns([...columns, { id: crypto.randomUUID(), title, tasks: [] }]);
    setEditingCol(null);
  };
  const updateColumn = (id, title) => {
    setColumns(columns.map(c => c.id === id ? { ...c, title } : c));
    setEditingCol(null);
  };
  const deleteColumn = (id) => {
    if (!confirm('Удалить колонку со всеми задачами?')) return;
    setColumns(columns.filter(c => c.id !== id));
  };
  const moveColumn = (id, dir) => {
    const idx = columns.findIndex(c => c.id === id);
    if (idx < 0) return;
    const next = idx + dir;
    if (next < 0 || next >= columns.length) return;
    const arr = [...columns];
    [arr[idx], arr[next]] = [arr[next], arr[idx]];
    setColumns(arr);
  };

  // ── tasks ──
  const saveTask = (task, colId) => {
    task = { ...task, updatedAt: Date.now() };
    const prevColId = editingTask?.colId;
    let cols = columns.map(c => ({ ...c, tasks: [...c.tasks] }));
    // remove from old column
    if (prevColId) cols = cols.map(c => ({ ...c, tasks: c.tasks.filter(t => t.id !== task.id) }));
    // add/update in target column
    const targetCol = cols.find(c => c.id === colId);
    if (!targetCol) return;
    const exists = targetCol.tasks.find(t => t.id === task.id);
    if (exists) targetCol.tasks = targetCol.tasks.map(t => t.id === task.id ? task : t);
    else targetCol.tasks.unshift(task);
    setColumns(cols);
    setEditingTask(null);
  };

  const deleteTask = (taskId, colId) => {
    if (!confirm('Удалить задачу?')) return;
    setColumns(columns.map(c => c.id === colId ? { ...c, tasks: c.tasks.filter(t => t.id !== taskId) } : c));
    setEditingTask(null);
  };

  const moveTask = (taskId, fromColId, dir) => {
    const fromIdx = columns.findIndex(c => c.id === fromColId);
    const toIdx = fromIdx + dir;
    if (toIdx < 0 || toIdx >= columns.length) return;
    const task = columns[fromIdx].tasks.find(t => t.id === taskId);
    if (!task) return;
    setColumns(columns.map((c, i) => {
      if (i === fromIdx) return { ...c, tasks: c.tasks.filter(t => t.id !== taskId) };
      if (i === toIdx) return { ...c, tasks: [...c.tasks, task] };
      return c;
    }));
  };

  const toggleClose = (taskId, colId, e) => {
    e.stopPropagation();
    setColumns(columns.map(c => c.id === colId
      ? { ...c, tasks: c.tasks.map(t => t.id === taskId ? { ...t, closed: !t.closed } : t) }
      : c
    ));
  };

  const handleDragStart = (taskId, fromColId) => setDragging({ taskId, fromColId });
  const handleDragEnd = () => { setDragging(null); setDragOverCol(null); };
  const handleDrop = (toColId) => {
    if (!dragging) return;
    const { taskId, fromColId } = dragging;
    if (fromColId === toColId) { handleDragEnd(); return; }
    const task = columns.find(c => c.id === fromColId)?.tasks.find(t => t.id === taskId);
    if (!task) { handleDragEnd(); return; }
    setColumns(columns.map(c => {
      if (c.id === fromColId) return { ...c, tasks: c.tasks.filter(t => t.id !== taskId) };
      if (c.id === toColId)   return { ...c, tasks: [task, ...c.tasks] };
      return c;
    }));
    handleDragEnd();
  };

  const priInfo = (id) => KANBAN_PRIORITIES.find(p => p.id === id) || KANBAN_PRIORITIES[0];
  const formatDate = (d) => d ? new Date(d + 'T00:00:00').toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' }) : null;
  const formatDue = (d) => {
    if (!d) return null;
    const dt = new Date(d + 'T00:00:00');
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const diff = Math.round((dt - today) / 86400000);
    if (diff < 0) return { label: `просрочено ${Math.abs(diff)} дн`, cls: 'text-red-500' };
    if (diff === 0) return { label: 'сегодня', cls: 'text-amber-500' };
    if (diff === 1) return { label: 'завтра', cls: 'text-amber-400' };
    return { label: dt.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' }), cls: 'text-[var(--text-subtle)]' };
  };

  return (
    <div>
    <div className="overflow-x-auto pb-4">
      <div className="mx-auto" style={{ width: 'fit-content' }}>

        {/* Header */}
        <div className="flex items-center justify-between gap-8 mb-6">
          <h2 className="font-display text-2xl">Задачи</h2>
          <div className="flex items-center gap-2">
            <div className="inline-flex bg-[var(--surface)] border border-[var(--border)] rounded-xl p-1">
              {KANBAN_SORT_OPTIONS.map(opt => (
                <button key={opt.id} onClick={() => setSort(opt.id)}
                  className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${sort === opt.id ? 'bg-[var(--text)] text-white' : 'text-[var(--text-muted)] hover:text-[var(--text)]'}`}>
                  {opt.label}
                </button>
              ))}
            </div>
            <button onClick={() => setEditingCol('new')} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium bg-[var(--text)] text-white transition-all hover:opacity-80">
              <Icon name="plus" size={13}/> Колонка
            </button>
          </div>
        </div>

      {columns.length === 0 ? (
        <div className="text-center py-16 text-[var(--text-subtle)]">
          <p className="mb-4">Нет колонок. Создайте первую колонку.</p>
          <button onClick={() => setEditingCol('new')} className="btn-primary">+ Добавить колонку</button>
        </div>
      ) : (
        <div className="flex gap-4">
            {columns.map((col, colIdx) => (
              <div key={col.id}
                className={`w-72 flex-shrink-0 flex flex-col bg-[var(--surface)] border rounded-2xl overflow-hidden transition-all ${dragOverCol === col.id ? 'border-[var(--text)] ring-2 ring-[var(--text)]/10' : 'border-[var(--border)]'}`}
                onDragOver={e => { e.preventDefault(); setDragOverCol(col.id); }}
                onDragLeave={e => { if (!e.currentTarget.contains(e.relatedTarget)) setDragOverCol(null); }}
                onDrop={() => handleDrop(col.id)}>
                {/* Column header */}
                <div className="flex items-center gap-2 px-4 pt-4 pb-3 border-b border-[var(--border)]">
                  <div className="flex-1 font-medium text-sm truncate">{col.title}</div>
                  <span className="text-xs text-[var(--text-subtle)] bg-[var(--bg)] border border-[var(--border)] rounded-full px-2 py-0.5">{col.tasks.length}</span>
                  <button onClick={() => moveColumn(col.id, -1)} disabled={colIdx === 0} className="p-1 rounded-lg hover:bg-black/5 text-[var(--text-muted)] disabled:opacity-30">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 18l-6-6 6-6"/></svg>
                  </button>
                  <button onClick={() => moveColumn(col.id, 1)} disabled={colIdx === columns.length - 1} className="p-1 rounded-lg hover:bg-black/5 text-[var(--text-muted)] disabled:opacity-30">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 18l6-6-6-6"/></svg>
                  </button>
                  <button onClick={() => setEditingCol(col)} className="p-1 rounded-lg hover:bg-black/5 text-[var(--text-muted)]"><Icon name="edit" size={14}/></button>
                  <button onClick={() => deleteColumn(col.id)} className="p-1 rounded-lg hover:bg-black/5 text-[var(--text-muted)] hover:text-red-500"><Icon name="trash" size={14}/></button>
                </div>

                {/* Add task */}
                <div className="p-3 border-b border-[var(--border)]">
                  <button onClick={() => setEditingTask({ task: newTask(), colId: col.id })}
                    className="w-full flex items-center gap-2 px-3 py-2 rounded-xl text-sm text-[var(--text-muted)] hover:text-[var(--text)] hover:bg-[var(--bg)] transition-all border border-dashed border-[var(--border)] hover:border-[var(--border-strong)]">
                    <Icon name="plus" size={15}/> Добавить задачу
                  </button>
                </div>

                {/* Tasks */}
                <div className="flex-1 p-3 space-y-2 overflow-y-auto" style={{ maxHeight: '60vh' }}>
                  {sortTasks(col.tasks).map(task => {
                    const p = priInfo(task.priority);
                    const due = formatDue(task.dueDate);
                    return (
                      <div key={task.id}
                        draggable
                        onDragStart={() => handleDragStart(task.id, col.id)}
                        onDragEnd={handleDragEnd}
                        onClick={() => setEditingTask({ task, colId: col.id })}
                        className={`bg-[var(--bg)] border border-[var(--border)] rounded-xl p-3 cursor-grab active:cursor-grabbing hover:border-[var(--border-strong)] transition-all group select-none ${dragging?.taskId === task.id ? 'opacity-40' : ''} ${task.closed ? 'opacity-50' : ''}`}>
                        {task.priority !== 'none' && (
                          <div className={`text-[10px] font-semibold uppercase tracking-wide mb-1.5 ${p.color}`}>{p.label}</div>
                        )}
                        <div className="flex items-start gap-2 mb-2">
                          <button
                            onClick={(e) => toggleClose(task.id, col.id, e)}
                            title={task.closed ? 'Открыть задачу' : 'Закрыть задачу'}
                            className={`flex-shrink-0 mt-0.5 w-4 h-4 rounded border flex items-center justify-center transition-all ${task.closed ? 'bg-[var(--text)] border-[var(--text)]' : 'border-[var(--border-strong)] hover:border-[var(--text)]'}`}>
                            {task.closed && <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>}
                          </button>
                          <div className={`text-sm font-medium leading-snug flex-1 ${task.closed ? 'line-through text-[var(--text-subtle)]' : ''}`}>{task.title}</div>
                        </div>
                        <div className="flex items-center gap-2 flex-wrap">
                          {task.startDate && due ? (
                            <span className="text-[10px] text-[var(--text-subtle)]">{formatDate(task.startDate)} <span className="opacity-50">→</span> <span className={due.cls}>{due.label}</span></span>
                          ) : due ? (
                            <span className={`text-[10px] ${due.cls}`}>{due.label}</span>
                          ) : null}
                          {task.subtasks?.length > 0 && (() => {
                            const done = task.subtasks.filter(s => s.done).length;
                            const all = task.subtasks.length;
                            return (
                              <span className={`text-[10px] flex items-center gap-0.5 ${done === all ? 'text-green-500' : 'text-[var(--text-subtle)]'}`}>
                                <Icon name="check" size={10}/> {done}/{all}
                              </span>
                            );
                          })()}
                          {task.comments?.length > 0 && (
                            <span className="text-[10px] text-[var(--text-subtle)] flex items-center gap-0.5">
                              <Icon name="messageCircle" size={10}/> {task.comments.length}
                            </span>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
      )}

      </div>
    </div>

      {editingTask && (
        <KanbanTaskModal
          task={editingTask.task}
          columns={columns}
          colId={editingTask.colId}
          onSave={saveTask}
          onDelete={(id) => deleteTask(id, editingTask.colId)}
          onClose={() => setEditingTask(null)}
        />
      )}
      {editingCol && (
        <KanbanColumnModal
          column={editingCol === 'new' ? null : editingCol}
          onSave={(title) => editingCol === 'new' ? addColumn(title) : updateColumn(editingCol.id, title)}
          onClose={() => setEditingCol(null)}
        />
      )}
    </div>
  );
}

      <div className="inline-flex bg-[var(--surface)] border border-[var(--border)] rounded-xl p-1">
        {tabs.map(t => (

function ChoreSection({ data, setData, dataKey, title }) {
  const [showSettings, setShowSettings] = useState(false);

  const chores = (data[dataKey] || []).filter(c => !c.archived);
  const todayChores = chores.filter(isChoreDueToday);
  const upcomingChores = chores
    .filter(isChoreUpcoming)
    .sort((a, b) => getChoreNextDate(a) - getChoreNextDate(b));

  const markDone = (id) => {
    setData(d => ({
      ...d,
      [dataKey]: (d[dataKey] || []).map(c => c.id === id ? { ...c, lastDone: getTodayKey() } : c),
    }));
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-6">
        <h2 className="font-display text-2xl">{title}</h2>
        <button
          onClick={() => setShowSettings(s => !s)}
          className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium transition-all border ${
            showSettings
              ? 'bg-[var(--text)] text-white border-[var(--text)]'
              : 'border-[var(--border)] text-[var(--text-muted)] hover:text-[var(--text)]'
          }`}
        >
          <Icon name="settings" size={16} />
          Управление
        </button>
      </div>

      {showSettings ? (
        <ChoreSettings data={data} setData={setData} dataKey={dataKey} />
      ) : (
        <>
          <div className="mb-8">
            <div className="text-xs uppercase tracking-widest text-[var(--text-subtle)] mb-3 font-medium">Сегодня</div>
            {todayChores.length === 0 ? (
              <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-8 text-center">
                <div className="font-display text-xl mb-1">Всё сделано</div>
                <div className="text-sm text-[var(--text-muted)]">Дел на сегодня нет</div>
              </div>
            ) : (
              <div className="space-y-3">
                {todayChores.map(c => (
                  <ChoreCard key={c.id} chore={c} onDone={() => markDone(c.id)} />
                ))}
              </div>
            )}
          </div>

          <div>
            <div className="text-xs uppercase tracking-widest text-[var(--text-subtle)] mb-3 font-medium">Ближайшие 7 дней</div>
            {upcomingChores.length === 0 ? (
              <div className="text-center py-6 text-[var(--text-subtle)] text-sm">Нет запланированных дел</div>
            ) : (
              <div className="space-y-3">
                {upcomingChores.map(c => (
                  <ChoreCard key={c.id} chore={c} upcoming />
                ))}
              </div>
            )}
          </div>
        </>
      )}
    </div>
  );
}

function ChoreCard({ chore, onDone, upcoming }) {
  const next = getChoreNextDate(chore);
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const daysUntil = Math.round((next - today) / 86400000);
  const freqEntry = CHORE_FREQUENCIES.find(f => f.id === chore.frequency);
  const freqLabel = chore.frequency === 'custom'
    ? `Каждые ${chore.customDays} дн.`
    : freqEntry?.label || '';

  return (
    <div
      onClick={!upcoming ? onDone : undefined}
      className={`bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5 flex items-center gap-5 transition-all ${
        !upcoming ? 'cursor-pointer hover:border-[var(--border-strong)]' : ''
      }`}
    >
      {upcoming ? (
        <div className="w-12 text-center flex-shrink-0">
          <div className="font-display text-3xl leading-none">{daysUntil}</div>
          <div className="text-xs text-[var(--text-subtle)] mt-0.5">дн.</div>
        </div>
      ) : (
        <div className="check-box flex-shrink-0">
          <Icon name="check" size={16} />
        </div>
      )}
      <div className="flex-1 min-w-0">
        <div className="font-display text-xl mb-1">{chore.name}</div>
        <div className="text-xs text-[var(--text-subtle)] uppercase tracking-wider">{freqLabel}</div>
        <div className="text-xs text-[var(--text-muted)] mt-1">
          Последний раз: {formatChoreDate(chore.lastDone)}
        </div>
      </div>
    </div>
  );
}

function ChoreSettings({ data, setData, dataKey }) {
  const [editing, setEditing] = useState(null);
  const [showArchive, setShowArchive] = useState(false);

  const active = (data[dataKey] || []).filter(c => !c.archived);
  const archived = (data[dataKey] || []).filter(c => c.archived);

  const save = (chore) => {
    chore = { ...chore, updatedAt: Date.now() };
    setData(d => {
      const list = d[dataKey] || [];
      const exists = list.find(c => c.id === chore.id);
      const updated = exists
        ? list.map(c => c.id === chore.id ? chore : c)
        : [...list, chore];
      return { ...d, [dataKey]: updated };
    });
    setEditing(null);
  };

  const remove = (id) => {
    if (!confirm('Удалить дело полностью?')) return;
    setData(d => ({ ...d, [dataKey]: (d[dataKey] || []).filter(c => c.id !== id) }));
  };

  const toggleArchive = (id) => {
    setData(d => ({
      ...d,
      [dataKey]: (d[dataKey] || []).map(c => c.id === id ? { ...c, archived: !c.archived } : c),
    }));
  };

  return (
    <div>
      <button
        onClick={() => setEditing({
          id: crypto.randomUUID(),
          name: '', frequency: 'weekly', customDays: 7, lastDone: null,
          notify: false, notifyTime: '09:00', archived: false,
        })}
        className="btn-primary w-full flex items-center justify-center gap-2 mb-6"
      >
        <Icon name="plus" size={18} />
        Добавить дело
      </button>

      <div className="space-y-3 mb-8">
        {active.length === 0 && (
          <div className="text-center py-8 text-[var(--text-subtle)] text-sm">Нет активных дел</div>
        )}
        {active.map(c => (
          <ChoreSettingsRow
            key={c.id} chore={c}
            onEdit={() => setEditing(c)}
            onArchive={() => toggleArchive(c.id)}
            onDelete={() => remove(c.id)}
          />
        ))}
      </div>

      {archived.length > 0 && (
        <div>
          <button
            onClick={() => setShowArchive(s => !s)}
            className="flex items-center gap-2 text-[var(--text-muted)] hover:text-[var(--text)] mb-4 text-sm"
          >
            <Icon name="archive" size={16} />
            Архив ({archived.length})
            <span className={`transition-transform ${showArchive ? 'rotate-180' : ''}`}>
              <Icon name="chevronDown" size={16} />
            </span>
          </button>
          {showArchive && (
            <div className="space-y-3 fade-in">
              {archived.map(c => (
                <ChoreSettingsRow
                  key={c.id} chore={c} archived
                  onEdit={() => setEditing(c)}
                  onArchive={() => toggleArchive(c.id)}
                  onDelete={() => remove(c.id)}
                />
              ))}
            </div>
          )}
        </div>
      )}

      {editing && (
        <ChoreModal chore={editing} onSave={save} onClose={() => setEditing(null)} />
      )}
    </div>
  );
}

function ChoreSettingsRow({ chore, archived, onEdit, onArchive, onDelete }) {
  const freqEntry = CHORE_FREQUENCIES.find(f => f.id === chore.frequency);
  const freqLabel = chore.frequency === 'custom'
    ? `Каждые ${chore.customDays} дн.`
    : freqEntry?.label || '';

  return (
    <div className={`bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5 ${archived ? 'opacity-60' : ''}`}>
      <div className="flex items-start justify-between gap-4">
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 mb-1">
            <div className="font-display text-lg truncate">{chore.name}</div>
            {chore.notify && (
              <span className="text-[var(--text-subtle)] flex-shrink-0" title={`Уведомление в ${chore.notifyTime}`}>
                <Icon name="bell" size={14} />
              </span>
            )}
          </div>
          <div className="text-sm text-[var(--text-muted)]">{freqLabel}</div>
          {chore.notify && chore.notifyTime && (
            <div className="text-xs text-[var(--text-subtle)] mt-0.5">Напоминание в {chore.notifyTime}</div>
          )}
          {chore.lastDone && (
            <div className="text-xs text-[var(--text-subtle)] mt-0.5">
              Последний раз: {formatChoreDate(chore.lastDone)}
            </div>
          )}
        </div>
        <div className="flex gap-1 flex-shrink-0">
          <button onClick={onEdit} className="p-2.5 rounded-lg hover:bg-black/5 text-[var(--text-muted)]" title="Редактировать">
            <Icon name="edit" size={18} />
          </button>
          <button onClick={onArchive} className="p-2.5 rounded-lg hover:bg-black/5 text-[var(--text-muted)]" title={archived ? 'Восстановить' : 'В архив'}>
            <Icon name={archived ? 'restore' : 'archive'} size={18} />
          </button>
          <button onClick={onDelete} className="p-2.5 rounded-lg hover:bg-black/5 text-[var(--text-muted)]" title="Удалить">
            <Icon name="trash" size={18} />
          </button>
        </div>
      </div>
    </div>
  );
}

function ChoreModal({ chore, onSave, onClose }) {
  const [form, setForm] = useState(chore);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const submit = () => {
    if (!form.name.trim()) return alert('Введите название');
    onSave(form);
  };

  return (
    <Modal onClose={onClose} title={chore.name ? 'Редактировать дело' : 'Новое дело'}>
      <div className="space-y-4">
        <div>
          <label>Название</label>
          <input value={form.name} onChange={e => set('name', e.target.value)} placeholder="Например, Пылесосить" />
        </div>
        <div>
          <label>Периодичность</label>
          <select value={form.frequency} onChange={e => set('frequency', e.target.value)}>
            {CHORE_FREQUENCIES.map(f => <option key={f.id} value={f.id}>{f.label}</option>)}
          </select>
        </div>
        {form.frequency === 'custom' && (
          <div>
            <label>Каждые N дней</label>
            <input
              type="number" min="1"
              value={form.customDays || ''}
              onChange={e => set('customDays', Math.max(1, parseInt(e.target.value) || 1))}
              placeholder="7"
            />
          </div>
        )}
        <div>
          <label>Последний раз выполнено</label>
          <input
            type="date"
            value={form.lastDone || ''}
            onChange={e => set('lastDone', e.target.value || null)}
          />
          <p className="text-xs text-[var(--text-subtle)] mt-1">Оставьте пустым — появится в «Сегодня» сразу</p>
        </div>

        <div className="bg-[var(--bg)] border border-[var(--border)] rounded-xl p-4 space-y-3">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2">
              <Icon name="bell" size={16} />
              <span className="text-sm font-medium">Уведомление в Telegram</span>
            </div>
            <Toggle checked={!!form.notify} onChange={v => set('notify', v)} />
          </div>
          {form.notify && (
            <div className="fade-in">
              <label>Время напоминания</label>
              <MskTimeInput
                value={form.notifyTime || '09:00'}
                onChange={t => set('notifyTime', t)}
              />
            </div>
          )}
        </div>

        <div className="flex gap-3 pt-2">
          <button onClick={onClose} className="btn-secondary flex-1">Отмена</button>
          <button onClick={submit} className="btn-primary flex-1">Сохранить</button>
        </div>
      </div>
    </Modal>
  );
}

// ============== BOSS VIEW ==============
function BossView({ data, setData }) {
  const [showSettings, setShowSettings] = useState(false);
  const tasks = (data.bossTasks || []).filter(t => !t.archived);
  const today = new Date().getDay();

  const getCell = (dayId, period) =>
    tasks.filter(t => (t.period === period || t.period === 'allday') && t.days.includes(dayId));

  const periods = [
    { id: 'morning', label: 'Утро',  icon: 'sun'  },
    { id: 'evening', label: 'Вечер', icon: 'moon' },
  ];

  return (
    <div>
      <div className="flex items-center justify-between mb-6">
        <h2 className="font-display text-2xl">Босс</h2>
        <button
          onClick={() => setShowSettings(s => !s)}
          className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium transition-all border ${
            showSettings
              ? 'bg-[var(--text)] text-white border-[var(--text)]'
              : 'border-[var(--border)] text-[var(--text-muted)] hover:text-[var(--text)]'
          }`}
        >
          <Icon name="settings" size={16} />
          Управление
        </button>
      </div>

      {showSettings ? (
        <BossSettings data={data} setData={setData} />
      ) : (
        <div className="overflow-x-auto -mx-6 px-6 scrollbar-hide">
          {/* Сегодня — крупная карточка сверху */}
          <div className="mb-4 space-y-2">
            {periods.map(p => {
              const cellTasks = getCell(today, p.id);
              return (
                <div
                  key={p.id}
                  className="rounded-2xl border-2 border-[var(--border-strong)] bg-[var(--surface)] p-4"
                >
                  <div className="flex items-center gap-2 mb-2 text-[var(--text-muted)]">
                    <Icon name={p.icon} size={16} />
                    <span className="text-sm font-medium">{p.label}</span>
                    <span className="text-xs text-[var(--text-subtle)] ml-auto">сегодня</span>
                  </div>
                  {cellTasks.length === 0 ? (
                    <div className="text-sm text-[var(--text-subtle)]">Нет задач</div>
                  ) : (
                    <div className="space-y-1">
                      {cellTasks.map(t => (
                        <div key={t.id} className="text-sm font-medium text-[var(--text)] px-2 py-1.5 rounded-lg bg-[var(--bg)] break-words">
                          {t.name}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Остальные дни — компактная таблица */}
          <div style={{ minWidth: '480px' }}>
            <div className="grid mb-1" style={{ gridTemplateColumns: '44px repeat(7, minmax(0, 1fr))', gap: '3px' }}>
              <div />
              {WEEKDAYS.map(d => (
                <div
                  key={d.id}
                  className={`text-center text-[10px] font-medium uppercase tracking-wider py-1.5 rounded-lg min-w-0 ${
                    today === d.id
                      ? 'bg-[var(--text)] text-white'
                      : 'text-[var(--text-subtle)]'
                  }`}
                >
                  {d.label}
                </div>
              ))}
            </div>

            {periods.map(p => (
              <div
                key={p.id}
                className="grid mb-1"
                style={{ gridTemplateColumns: '44px repeat(7, minmax(0, 1fr))', gap: '3px' }}
              >
                <div className="flex flex-col items-center justify-center gap-0.5 text-[var(--text-muted)] py-1">
                  <Icon name={p.icon} size={12} />

  const active   = (data.bossTasks || []).filter(t => !t.archived);

  const dayLabel = { 1:'Пн', 2:'Вт', 3:'Ср', 4:'Чт', 5:'Пт', 6:'Сб', 0:'Вс' };

  const save = (task) => {
    task = { ...task, updatedAt: Date.now() };
    setData(d => {
      const list = d.bossTasks || [];
      const exists = list.find(t => t.id === task.id);
      const updated = exists
        ? list.map(t => t.id === task.id ? task : t)

const _ENG_RU_MON = {'январ':0,'феврал':1,'март':2,'апрел':3,'мая':4,'май':4,'июн':5,'июл':6,'август':7,'сентябр':8,'октябр':9,'ноябр':10,'декабр':11};
function engParseDate(s,inferYear){
  if(s===null||s===undefined||s==='') return null;
  if(typeof s==='number'){const d=new Date((s-25569)*86400000);return isNaN(d)?null:d;}
  const str=String(s).trim();
  const iso=new Date(str);if(!isNaN(iso)&&/\d{4}/.test(str)) return iso;
  const ru=str.match(/(\d{1,2})\s+([а-яё]+)\s*(\d{4})?/i);
  if(ru){let mon=-1;const ms=ru[2].toLowerCase();for(const k in _ENG_RU_MON)if(ms.startsWith(k)){mon=_ENG_RU_MON[k];break;}if(mon>=0)return new Date(ru[3]?+ru[3]:(inferYear||new Date().getFullYear()),mon,+ru[1]);}
  const m=str.match(/(\d{1,4})[./-](\d{1,2})[./-](\d{1,4})/);
  if(m){const[,a,b,c]=m;return a.length===4?new Date(+a,+b-1,+c):new Date(+c,+b-1,+a);}
  return null;
}
function engParseRows(rows){
  return rows.slice(1).filter(r=>r&&r[1]).map((r,i)=>({
    rowIndex:i+2,date:r[0]||'',en:String(r[1]||'').trim(),ru:String(r[2]||'').trim(),
    syn:String(r[3]||'').trim(),sentence:String(r[4]||'').trim(),
    showNew:!!r[5],showTrans:!!r[6],showSent:!!r[7],hard:!!r[8]
  }));
}
function engLev(a,b){
  const m=a.length,n=b.length,dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function engEscRe(s){return String(s).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function engHighlight(sentence,word){
  if(!word) return sentence;
  return sentence.replace(new RegExp('\\b('+engEscRe(word.split(' ')[0])+'\\w*)','ig'),'<b>$1</b>');
}
async function engCallAI(ai,prompt){
  if(ai.provider==='anthropic'){
    if(!ai.anthropicKey) throw new Error('Нет Anthropic API ключа');
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':ai.anthropicKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:ai.anthropicModel,max_tokens:1500,messages:[{role:'user',content:prompt}]})});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||'HTTP '+r.status);}
    return(await r.json()).content?.[0]?.text||'';
  }
  if(ai.provider==='openai'){
    if(!ai.openaiKey) throw new Error('Нет OpenAI API ключа');
    const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+ai.openaiKey},body:JSON.stringify({model:ai.openaiModel,max_tokens:1500,messages:[{role:'user',content:prompt}]})});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||'HTTP '+r.status);}
    return(await r.json()).choices?.[0]?.message?.content||'';
  }
  if(ai.provider==='ollama'){
    const r=await fetch(ai.ollamaUrl+'/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:ai.ollamaModel,prompt,stream:false})});
    if(!r.ok) throw new Error('Ollama HTTP '+r.status);
    return(await r.json()).response||'';
  }
  throw new Error('Unknown provider');
}
