<style>
  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --border: #e8e8e8;
    --border-strong: #d4d4d4;
    --text: #0a0a0a;
    --text-muted: #6b6b6b;
    --text-subtle: #9a9a9a;
    --accent: #0a0a0a;
  }
  * { -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  .font-display { font-family: 'Fraunces', serif; font-optical-sizing: auto; letter-spacing: -0.02em; }
  .font-body { font-family: 'Inter', sans-serif; }

  /* Чекбокс */
  .check-box {
    width: 28px;
    height: 28px;
    border: 1.5px solid var(--border-strong);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    flex-shrink: 0;
    background: var(--surface);
  }
  .check-box.checked {
    background: var(--text);
    border-color: var(--text);
  }
  .check-box svg { opacity: 0; transition: opacity 0.2s ease; }
  .check-box.checked svg { opacity: 1; }

  /* Анимации */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn 0.3s ease both; }

  @keyframes slideDown {
    from { opacity: 0; max-height: 0; }
    to { opacity: 1; max-height: 1000px; }
  }
  .slide-down { animation: slideDown 0.3s ease both; overflow: hidden; }

  /* Скрыть скроллбар */
  .scrollbar-hide::-webkit-scrollbar { display: none; }
  .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

  /* iOS safe area */
  .pb-safe { padding-bottom: max(8px, env(safe-area-inset-bottom)); }
  .bottom-nav { padding-bottom: env(safe-area-inset-bottom, 0); }

  /* Инпуты */
  input, select, textarea {
    font-family: 'Inter', sans-serif;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 15px;
    color: var(--text);
    width: 100%;
    transition: border-color 0.15s ease;
    outline: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--text);
  }
  label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 6px;
    display: block;
    font-weight: 500;
  }

  /* Кнопки */
  .btn-primary {
    background: var(--text);
    color: white;
    padding: 14px 20px;
    border-radius: 10px;
    font-weight: 500;
    transition: opacity 0.15s ease;
    border: none;
    cursor: pointer;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    padding: 14px 20px;
    border-radius: 10px;
    font-weight: 500;
    border: 1px solid var(--border-strong);
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .btn-secondary:hover { background: #f3f3f3; }
  .btn-ghost {
    color: var(--text-muted);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .btn-ghost:hover { color: var(--text); }

  /* Voice button pulse animation */
  @keyframes pulse-ring {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  .voice-pulse {
    position: relative;
  }
  .voice-pulse::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 9999px;
    background: #ef4444;
    animation: pulse-ring 1.2s ease-out infinite;
    pointer-events: none;
  }
</style>
</head>

  { id: 'neck',          label: 'Шея',              unit: 'см'   },

  { id: 'shoulder',      label: 'Плечи',            unit: 'см'   },
  { id: 'proteinPct',    label: 'Белок',            unit: '%'    },
];

const DEFAULT_BODY_PHOTO_CATEGORIES = ['Спереди', 'Сбоку', 'Спина'];

const DEFAULT_DATA = () => ({
  supplements: [], meals: [], taken: {}, rationStock: 0,
  bodyFields: DEFAULT_BODY_FIELDS.map(f => ({ ...f })),
  bodyEntries: [],
  bodyPhotoCategories: [...DEFAULT_BODY_PHOTO_CATEGORIES],
  cars: [],
  serviceRecords: [],
  settings: { ...DEFAULT_SETTINGS },
});

// backward compat: photos were stored as strings, now as {filename, category}
const normalizePhoto = (p) => typeof p === 'string' ? { filename: p, category: '' } : p;

const loadData = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return DEFAULT_DATA();
    const parsed = JSON.parse(raw);
    parsed.settings = { ...DEFAULT_SETTINGS, ...(parsed.settings || {}) };
    return parsed;
  } catch {
    return DEFAULT_DATA();
  }
};

const saveData = (data) => {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
};

const fetchServerData = async () => {
  try {
    const res = await fetch('/api/data', { cache: 'no-store' });
    if (!res.ok) return null;
    const json = await res.json();
    if (!json || Object.keys(json).length === 0) return null;
    json.settings = { ...DEFAULT_SETTINGS, ...(json.settings || {}) };
    return json;
  } catch {
    return null;
  }
};

const pushServerData = (() => {
  let timer = null;
  return (data) => {
    clearTimeout(timer);
    timer = setTimeout(() => {
      fetch('/api/data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      }).catch(() => {});
    }, 1500);
  };
})();

  { id: 'weekends_evening', label: 'По выходным — вечером' },
  { id: 'weekly_morning', label: 'Раз в неделю — утром (выбрать день)' },
  { id: 'weekly_evening', label: 'Раз в неделю — вечером (выбрать день)' },
];

const WEEKDAYS = [
  { id: 1, label: 'Пн' },
  { id: 2, label: 'Вт' },
  { id: 3, label: 'Ср' },
  { id: 4, label: 'Чт' },
  { id: 5, label: 'Пт' },
  { id: 6, label: 'Сб' },
  { id: 0, label: 'Вс' },
];

// ============== HELPERS ==============
// Утро: 6:00–12:00, Вечер: 18:00–23:00
const getCurrentPeriod = () => {
  const h = new Date().getHours();
  if (h >= 6 && h < 12) return 'morning';
  if (h >= 18 && h < 23) return 'evening';
  // Между периодами — показываем ближайший
  if (h >= 12 && h < 18) return 'evening';
  return 'morning';
};

const getTodayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

// Сколько дней прошло с эпохи (для "через день")
const getDayNumber = () => {
  return Math.floor(new Date().setHours(0,0,0,0) / 86400000);
};

const isSupplementForPeriod = (supp, period) => {
  if (supp.archived) return false;
  const f = supp.frequency;
  const today = new Date().getDay(); // 0=вс, 1=пн ...
  const isWeekend = today === 0 || today === 6;
  const isWeekday = !isWeekend;
  const dayNum = getDayNumber();
  const isEvenDay = dayNum % 2 === 0;

  if (period === 'morning') {
    if (f === 'daily_morning' || f === 'daily_both') return true;
    if (f === 'every_other_morning') return isEvenDay;
    if (f === 'weekdays_morning') return isWeekday;
    if (f === 'weekends_morning') return isWeekend;
    if (f === 'weekly_morning') return today === supp.weekday;
  }
  if (period === 'evening') {
    if (f === 'daily_evening' || f === 'daily_both') return true;
    if (f === 'every_other_evening') return isEvenDay;
    if (f === 'weekdays_evening') return isWeekday;
    if (f === 'weekends_evening') return isWeekend;
    if (f === 'weekly_evening') return today === supp.weekday;
  }
  return false;
};

const getFrequencyLabel = (id) => FREQUENCIES.find(f => f.id === id)?.label || id;

const CHORE_FREQUENCIES = [
  { id: 'daily',     label: 'Каждый день',      days: 1 },
  { id: 'every2',    label: 'Каждые 2 дня',     days: 2 },
  { id: 'every3',    label: 'Каждые 3 дня',     days: 3 },
  { id: 'weekly',    label: 'Раз в неделю',     days: 7 },
  { id: 'biweekly',  label: 'Раз в 2 недели',   days: 14 },
  { id: 'monthly',   label: 'Раз в месяц',      days: 30 },
  { id: 'custom',    label: 'Своя периодичность', days: null },
];

const getChoreFrequencyDays = (chore) => {
  if (chore.frequency === 'custom') return Math.max(1, chore.customDays || 7);
  return CHORE_FREQUENCIES.find(f => f.id === chore.frequency)?.days || 7;
};

const getChoreNextDate = (chore) => {
  const days = getChoreFrequencyDays(chore);
  if (!chore.lastDone) {
    const d = new Date(); d.setHours(0, 0, 0, 0); return d;
  }
  const last = new Date(chore.lastDone); last.setHours(0, 0, 0, 0);
  last.setDate(last.getDate() + days);
  return last;
};

const isChoreDueToday = (chore) => {
  if (chore.archived) return false;
  const next = getChoreNextDate(chore);
  const today = new Date(); today.setHours(0, 0, 0, 0);
  return next <= today;
};

const isChoreUpcoming = (chore) => {
  if (chore.archived) return false;
  const next = getChoreNextDate(chore);
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const week = new Date(today); week.setDate(week.getDate() + 7);
  return next > today && next <= week;
};

const getBossPeriod = () => {
  const h = new Date().getHours();
  if (h >= 5  && h < 13) return 'morning';
  if (h >= 13 && h < 24) return 'evening';
  return null;
};

const formatChoreDate = (dateStr) => {
  if (!dateStr) return 'ещё не делалось';
  const d = new Date(dateStr);
  const months = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
  return `${d.getDate()} ${months[d.getMonth()]}`;
};

// ============== APP ==============
function App() {
  const [data, setData] = useState(loadData());
  const [tab, setTab] = useState('home'); // home | supplements | meals | weather | house | settings
  const [settingsTab, setSettingsTab] = useState('supplements');
  const [houseTab, setHouseTab] = useState('boss');
  const [mealTab, setMealTab] = useState('plan');
  const initialLoad = React.useRef(true);

  // On mount: try to load from server (overrides localStorage if server has data)
  useEffect(() => {
    fetchServerData().then(serverData => {
      if (serverData) {
        setData(serverData);
        saveData(serverData);
      }
    });
  }, []);

  // Auto-reload at midnight (iPad screen always on, JS never frozen)
  useEffect(() => {
    const todayAtMount = new Date().toISOString().slice(0, 10);
    const timer = setInterval(() => {
      if (new Date().toISOString().slice(0, 10) !== todayAtMount) {
        window.location.reload();
      }
    }, 60 * 1000);
    return () => clearInterval(timer);
  }, []);

  // On every change: save locally + push to server (debounced)
  useEffect(() => {
    if (initialLoad.current) { initialLoad.current = false; return; }
    saveData(data);
    pushServerData(data);
  }, [data]);

  // Очистка отметок старше сегодняшнего дня
  useEffect(() => {
    const today = getTodayKey();
    const cleaned = {};
    Object.keys(data.taken || {}).forEach(k => {
      if (k.startsWith(today)) cleaned[k] = data.taken[k];
    });
    if (Object.keys(cleaned).length !== Object.keys(data.taken || {}).length) {
      setData(d => ({ ...d, taken: cleaned }));
    }
  }, []);

  // Авто-переключение на Погоду при бездействии
  const { weatherAutoSwitch, weatherAutoSwitchMinutes } = data.settings || DEFAULT_SETTINGS;
  useEffect(() => {
    if (!weatherAutoSwitch) return;
    const intervalMs = Math.max(0.5, Number(weatherAutoSwitchMinutes) || 2) * 60 * 1000;
    let timerId = null;

    const reset = () => {
      if (timerId) clearTimeout(timerId);
      timerId = setTimeout(() => {
        setTab(current => current === 'home' ? current : 'home');
      }, intervalMs);
    };

    const events = ['mousedown', 'mousemove', 'keydown', 'touchstart', 'wheel', 'click'];
    events.forEach(ev => window.addEventListener(ev, reset, { passive: true }));
    reset();

    return () => {
      if (timerId) clearTimeout(timerId);
      events.forEach(ev => window.removeEventListener(ev, reset));
    };
  }, [weatherAutoSwitch, weatherAutoSwitchMinutes]);

  // Авто-синхронизация конфига уведомлений с jarvis.py
  useEffect(() => {
    const token = data.settings?.telegramToken;
    if (!token) return;
    const timer = setTimeout(() => {
      const config = {
        telegram: { token },
        chores: (data.chores || []).filter(c => !c.archived).map(c => ({
          name: c.name,
          frequency: c.frequency,
          customDays: c.customDays || null,
          lastDone: c.lastDone || null,
          notify: !!c.notify,
          notifyTime: c.notifyTime || '09:00',
        })),
      };
      fetch('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(config),
      }).catch(() => {});
    }, 1000);
    return () => clearTimeout(timer);
  }, [data.settings?.telegramToken, data.chores]);

  return (
    <div className="min-h-screen pb-24 md:pb-8">
      <Header tab={tab} setTab={setTab} />
      <main className="max-w-3xl mx-auto px-4 sm:px-6 pt-6 md:pt-8">
        {tab === 'home' && <HomeView data={data} setData={setData} setTab={setTab} setHouseTab={setHouseTab} setMealTab={setMealTab} />}
        {tab === 'supplements' && <SupplementsView data={data} setData={setData} />}
        {tab === 'meals' && <MealsView data={data} setData={setData} mealTab={mealTab} setMealTab={setMealTab} />}
        {tab === 'weather' && <WeatherView settings={data.settings} />}
        {tab === 'house' && <HouseView data={data} setData={setData} houseTab={houseTab} setHouseTab={setHouseTab} />}
        {tab === 'body' && <BodyView data={data} setData={setData} />}
        {tab === 'cars' && <CarsView data={data} setData={setData} />}
        {tab === 'settings' && (
          <SettingsView
            data={data}
            setData={setData}
            settingsTab={settingsTab}
            setSettingsTab={setSettingsTab}
          />
        )}
      </main>
      <BottomNav tab={tab} setTab={setTab} />
      <VoiceButton data={data} setData={setData} settings={data.settings} />
    </div>
  );
}

  const list = useMemo(() => {
    if (period === 'workout') {
      return (data.workoutSupplements || []).filter(s => !s.archived);
    }
    return (data.supplements || []).filter(s => isSupplementForPeriod(s, period));
  }, [data.supplements, data.workoutSupplements, period]);

  const isTaken = (id) => !!data.taken?.[`${todayKey}_${period}_${id}`];

  const toggle = (id) => {
    const key = `${todayKey}_${period}_${id}`;
    setData(d => {
      const taken = { ...(d.taken || {}) };
      if (taken[key]) delete taken[key];
      else taken[key] = Date.now();
      return { ...d, taken };
    });
  };

  const takeAll = () => {
    setData(d => {
      const taken = { ...(d.taken || {}) };
      list.forEach(s => { taken[`${todayKey}_${period}_${s.id}`] = Date.now(); });

                <MealSection title="Перекус" content={meal.snack} />
                <MealSection title="Обед" content={meal.lunch} />
                <MealSection title="Ужин" content={meal.dinner} />

function RationCounter({ data, setData }) {
  const rations = data.rationStock ?? 0;
  const RATIONS_PER_DAY = 2;
  const daysLeft = rations / RATIONS_PER_DAY;
  const wholeDays = Math.floor(daysLeft);
  const halfDay = (rations % RATIONS_PER_DAY) > 0;

  const [inputVal, setInputVal] = useState('');
  const [showAdd, setShowAdd] = useState(false);

  const consume = () => {
    if (rations <= 0) return;
    setData(d => ({ ...d, rationStock: (d.rationStock ?? 0) - 1 }));
  };

  const addRations = (n) => {
    if (!n || n <= 0) return;
    setData(d => ({ ...d, rationStock: (d.rationStock ?? 0) + n }));
    setInputVal('');
    setShowAdd(false);
  };

  const daysLabel = () => {
    if (rations === 0) return 'Рационов нет';
    const parts = [];
    if (wholeDays > 0) parts.push(`${wholeDays} ${wholeDays === 1 ? 'день' : wholeDays < 5 ? 'дня' : 'дней'}`);
    if (halfDay) parts.push('½ дня');
    return `Хватит на ${parts.join(' и ')}`;
  };

  const urgencyColor = rations === 0
    ? 'text-red-500'
    : wholeDays < 2
    ? 'text-amber-500'
    : 'text-[var(--text)]';

  return (
    <div className="space-y-4">
      <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-8 text-center">
        <div className="text-xs uppercase tracking-widest text-[var(--text-subtle)] mb-4">Остаток рационов</div>

        <div className={`font-display text-8xl leading-none mb-3 ${urgencyColor}`}>
          {rations}
        </div>
        <div className={`text-base mb-8 ${rations === 0 ? 'text-red-400' : wholeDays < 2 ? 'text-amber-500' : 'text-[var(--text-muted)]'}`}>
          {daysLabel()}
        </div>

        <button
          onClick={consume}
          disabled={rations <= 0}
          className={`w-full py-4 rounded-2xl font-medium text-base transition-all ${
            rations > 0
              ? 'bg-[var(--text)] text-white active:scale-95'
              : 'bg-[var(--border)] text-[var(--text-subtle)] cursor-not-allowed'
          }`}
        >
          Съел рацион  −1
        </button>
      </div>

      <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
        {!showAdd ? (
          <button
            onClick={() => setShowAdd(true)}
            className="w-full flex items-center justify-center gap-2 py-2 text-[var(--text-muted)] text-sm font-medium hover:text-[var(--text)] transition-colors"
          >
            <Icon name="plus" size={16} />
            Добавить рационы
          </button>
        ) : (
          <div className="flex gap-2">
            <input
              type="number"
              inputMode="numeric"
              min="1"
              value={inputVal}
              onChange={e => setInputVal(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && addRations(parseInt(inputVal))}
              placeholder="Сколько рационов приготовил?"
              autoFocus
              className="flex-1"
            />
            <button
              onClick={() => addRations(parseInt(inputVal))}
              className="px-4 py-2 bg-[var(--text)] text-white rounded-xl text-sm font-medium"
            >
              Добавить
            </button>
            <button
              onClick={() => { setShowAdd(false); setInputVal(''); }}
              className="px-3 py-2 border border-[var(--border)] rounded-xl text-[var(--text-muted)]"
            >
              <Icon name="x" size={16} />
            </button>
          </div>
        )}
        <p className="text-xs text-[var(--text-subtle)] text-center mt-3">1 день = {RATIONS_PER_DAY} рациона</p>
      </div>
    </div>
  );
}

const WEATHER_CACHE_KEY = 'weather_cache_v1';
const WEATHER_MINI_CACHE_KEY = 'weather_mini_cache_v2';
const WEATHER_LOC_KEY = 'weather_location_v1';
const COMMUTE_CACHE_KEY = 'commute_cache_v1';

// WMO Weather codes → иконка + описание
const getWeatherInfo = (code) => {
  if (code === 0) return { icon: 'sun', label: 'Ясно' };
  if (code === 1) return { icon: 'cloudSun', label: 'Преимущественно ясно' };
  if (code === 2) return { icon: 'cloudSun', label: 'Переменная облачность' };
  if (code === 3) return { icon: 'cloud', label: 'Пасмурно' };
  if (code === 45 || code === 48) return { icon: 'cloudFog', label: 'Туман' };
  if (code >= 51 && code <= 57) return { icon: 'cloudRain', label: 'Морось' };
  if (code >= 61 && code <= 67) return { icon: 'cloudRain', label: 'Дождь' };
  if (code >= 71 && code <= 77) return { icon: 'cloudSnow', label: 'Снег' };
  if (code >= 80 && code <= 82) return { icon: 'cloudRain', label: 'Ливень' };
  if (code >= 85 && code <= 86) return { icon: 'cloudSnow', label: 'Снегопад' };
  if (code >= 95 && code <= 99) return { icon: 'cloudLightning', label: 'Гроза' };
  return { icon: 'cloud', label: 'Облачно' };
};

function MiniWeatherCard({ onClick }) {
  const [state, setState] = useState({ loading: true, error: null, data: null, location: null });

  useEffect(() => {
    let cancelled = false;

    const fetchByCoords = async (loc) => {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}` +
        `&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m` +
        `&daily=temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=1`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('Ошибка загрузки');
      const weather = await res.json();
      localStorage.setItem(WEATHER_MINI_CACHE_KEY, JSON.stringify({ ts: Date.now(), weather, location: loc }));
      if (!cancelled) setState({ loading: false, error: null, data: weather, location: loc });
    };

    const load = async () => {
      try {
        // Читаем город из настроек
        const weatherCity = (() => {
          try {
            const raw = localStorage.getItem(STORAGE_KEY);
            return JSON.parse(raw || '{}')?.settings?.weatherCity || '';
          } catch { return ''; }
        })();

        // Кэш: использовать только если совпадает источник (с городом или без)
        const cached = JSON.parse(localStorage.getItem(WEATHER_MINI_CACHE_KEY) || 'null');
        if (cached && Date.now() - cached.ts < 30 * 60 * 1000) {
          if (!cancelled) setState({ loading: false, error: null, data: cached.weather, location: cached.location });
          return;
        }

        if (weatherCity) {
          const res = await fetch(
            `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(weatherCity)}&format=json&limit=1`,
            { headers: { 'Accept-Language': 'ru' } }
          );
          const results = res.ok ? await res.json() : [];
          if (!results.length) throw new Error(`Город «${weatherCity}» не найден`);
          const { lat, lon, display_name } = results[0];
          const loc = { lat: parseFloat(lat), lon: parseFloat(lon), name: display_name.split(',')[0].trim() };
          await fetchByCoords(loc);
          return;
        }

        const savedLoc = JSON.parse(localStorage.getItem(WEATHER_LOC_KEY) || 'null');
        if (!savedLoc) {
          if (!cancelled) setState({ loading: false, error: 'Задайте город в Настройках → Общее', data: null, location: null });
          return;
        }
        await fetchByCoords(savedLoc);
      } catch (e) {
        if (!cancelled) setState({ loading: false, error: e.message, data: null, location: null });
      }
    };

    load();
    const interval = setInterval(load, 30 * 60 * 1000);
    return () => { cancelled = true; clearInterval(interval); };
  }, []);

  return (
    <div
      onClick={onClick}
      className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-6 cursor-pointer transition-all hover:border-[var(--border-strong)]"
    >
      <div className="flex items-center justify-between mb-4">
        <div className="text-xs uppercase tracking-widest text-[var(--text-subtle)] font-medium">Погода</div>
        {state.location && (
          <div className="flex items-center gap-1 text-xs text-[var(--text-subtle)]">
            <Icon name="mapPin" size={12} />
            <span className="truncate max-w-[120px]">{state.location.name}</span>
          </div>
        )}
      </div>

      {state.loading && (
        <div className="text-[var(--text-muted)] text-sm py-6">Загрузка...</div>
      )}

      {!state.loading && state.error && (
        <div className="py-2">
          <div className="text-[var(--text-muted)] text-sm">{state.error}</div>
          <div className="text-xs text-[var(--text-subtle)] mt-1">Нажмите чтобы открыть Погоду</div>
        </div>
      )}

      {!state.loading && state.data && (() => {
        const cur = state.data.current;
        const daily = state.data.daily;
        const info = getWeatherInfo(cur.weather_code);
        return (
          <div className="flex items-center justify-between gap-4">
            <div>
              <div className="font-display text-6xl leading-none mb-2">
                {Math.round(cur.temperature_2m)}°
              </div>
              <div className="text-[var(--text-muted)] text-sm">{info.label}</div>
              <div className="text-xs text-[var(--text-subtle)] mt-1">
                ↑ {Math.round(daily.temperature_2m_max[0])}° / ↓ {Math.round(daily.temperature_2m_min[0])}°
              </div>
              <div className="text-xs text-[var(--text-subtle)] mt-1 flex items-center gap-3">
                <span>Ощущается {Math.round(cur.apparent_temperature)}°</span>
                <span className="flex items-center gap-1">
                  <Icon name="wind" size={11} />
                  {Math.round(cur.wind_speed_10m)} км/ч
                </span>
              </div>
            </div>
            <div className="text-[var(--text)] opacity-90 flex-shrink-0">
              <Icon name={info.icon} size={72} />
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function CommuteCard({ settings }) {
  const { homeAddress, workAddress, tomtomKey } = settings || {};
  const [state, setState] = useState({ loading: true, error: null, data: null });

  const isConfigured = homeAddress && workAddress && tomtomKey;

  const fetchCommute = async () => {
    setState(s => ({ ...s, loading: true, error: null }));
    try {
      // 1. Геокод через Nominatim (бесплатно, без ключа)
      const geocode = async (q) => {
        const u = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`;
        const r = await fetch(u, { headers: { 'Accept-Language': 'ru' } });
        if (!r.ok) throw new Error(`Геокод не удался (${r.status})`);
        const j = await r.json();
        if (!j.length) throw new Error(`Адрес не найден: ${q}`);
        return { lat: parseFloat(j[0].lat), lon: parseFloat(j[0].lon) };
      };

      const [from, to] = await Promise.all([geocode(homeAddress), geocode(workAddress)]);

      // 2. Маршрут с пробками
      const routeUrl = `https://api.tomtom.com/routing/1/calculateRoute/${from.lat},${from.lon}:${to.lat},${to.lon}/json` +
        `?key=${tomtomKey}&traffic=true&travelMode=car&computeTravelTimeFor=all`;
      const r = await fetch(routeUrl);
      if (!r.ok) throw new Error(`Маршрут не удался (${r.status})`);
      const j = await r.json();
      if (!j.routes?.length) throw new Error('Маршрут не найден');

      const summary = j.routes[0].summary;
      const result = {
        travelTimeSec: summary.travelTimeInSeconds, // с учётом пробок
        noTrafficTimeSec: summary.noTrafficTravelTimeInSeconds,
        distanceMeters: summary.lengthInMeters,
        ts: Date.now(),
      };
      localStorage.setItem(COMMUTE_CACHE_KEY, JSON.stringify(result));
      setState({ loading: false, error: null, data: result });
    } catch (e) {
      // Попробовать показать кэш
      try {
        const cached = JSON.parse(localStorage.getItem(COMMUTE_CACHE_KEY) || 'null');
        if (cached) {
          setState({ loading: false, error: e.message, data: { ...cached, stale: true } });
          return;
        }
      } catch {}
      setState({ loading: false, error: e.message, data: null });
    }
  };

  useEffect(() => {
    if (!isConfigured) {
      setState({ loading: false, error: null, data: null });
      return;
    }
    fetchCommute();
    const interval = setInterval(fetchCommute, 10 * 60 * 1000); // 10 минут
    return () => clearInterval(interval);
  }, [homeAddress, workAddress, tomtomKey]);

  return (
    <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-6">
      <div className="flex items-center justify-between mb-4">
        <div className="text-xs uppercase tracking-widest text-[var(--text-subtle)] font-medium">До работы</div>
        <div className="flex items-center gap-3">
          {isConfigured && !state.loading && (
            <button onClick={fetchCommute} className="text-[10px] text-[var(--text-subtle)] hover:text-[var(--text-muted)] transition-colors leading-none">
              обновить
            </button>
          )}
          <div className="text-[var(--text-muted)] flex-shrink-0">
            <Icon name="car" size={18} />
          </div>
        </div>
      </div>

      {!isConfigured && (
        <div className="py-2">
          <div className="text-[var(--text-muted)] text-sm">Не настроено</div>
          <div className="text-xs text-[var(--text-subtle)] mt-1">
            Укажите адреса и TomTom API-ключ в Настройках → Общее
          </div>
        </div>
      )}

      {isConfigured && state.loading && (
        <div className="text-[var(--text-muted)] text-sm py-6">Загрузка...</div>
      )}

      {isConfigured && !state.loading && state.data && (() => {
        const min = Math.round(state.data.travelTimeSec / 60);
        const noTrafficMin = Math.round(state.data.noTrafficTimeSec / 60);
        const trafficDelay = min - noTrafficMin;
        const km = (state.data.distanceMeters / 1000).toFixed(1);
        return (
          <div>
            <div className="flex items-baseline gap-2 mb-2">
              <div className="font-display text-6xl leading-none">{min}</div>
              <div className="text-[var(--text-muted)] text-xl">мин</div>
            </div>
            <div className="text-[var(--text-muted)] text-sm">
              {km} км · в пути ~{noTrafficMin} мин
            </div>
            {trafficDelay > 1 && (
              <div className="text-sm mt-2" style={{ color: trafficDelay > 10 ? '#b00020' : 'var(--text-muted)' }}>
                Пробки: +{trafficDelay} мин
              </div>
            )}
            {trafficDelay <= 1 && (
              <div className="text-sm mt-2 text-[var(--text-subtle)]">Без пробок</div>
            )}
            {state.data.stale && (
              <div className="text-xs text-[var(--text-subtle)] mt-2 italic">Данные из кэша</div>
            )}
          </div>
        );
      })()}

      {isConfigured && !state.loading && state.error && !state.data && (
        <div className="py-2">
          <div className="text-[var(--text-muted)] text-sm">Ошибка</div>
          <div className="text-xs text-[var(--text-subtle)] mt-1 break-words">{state.error}</div>
          <button onClick={fetchCommute} className="btn-ghost text-xs mt-2 p-0">Повторить</button>
        </div>
      )}
    </div>
  );
}

  const consume = (e) => {
    e.stopPropagation();
    if (rations <= 0) return;
    setData(d => ({ ...d, rationStock: (d.rationStock ?? 0) - 1 }));

function RationBanner({ data, setData, onGo }) {
  const rations = data.rationStock ?? 0;
  const daysLeft = Math.floor(rations / 2);
  const half = rations % 2 > 0;

  const consume = (e) => {
    e.stopPropagation();
    if (rations <= 0) return;
    setData(d => ({ ...d, rationStock: (d.rationStock ?? 0) - 1 }));
  };

  const urgency = rations === 0 ? '#ef4444' : daysLeft < 2 ? '#f59e0b' : 'var(--text)';

  const daysStr = rations === 0
    ? 'Рационов нет'
    : `${daysLeft > 0 ? `${daysLeft} ${daysLeft === 1 ? 'день' : daysLeft < 5 ? 'дня' : 'дней'}` : ''}${half ? (daysLeft > 0 ? ' и ½' : '½ дня') : ''}`;

  return (

function WeatherView({ settings }) {
  const [status, setStatus] = useState('loading'); // loading | ready | error | denied
  const [data, setData] = useState(null);
  const [location, setLocation] = useState(null);
  const [error, setError] = useState('');
  const weatherCity = (settings || {}).weatherCity || '';

  const fetchWeather = async (lat, lon) => {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      `&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m,is_day` +
      `&hourly=temperature_2m,weather_code,precipitation_probability` +
      `&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_probability_max,wind_speed_10m_max` +
      `&timezone=auto&forecast_days=7`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Не удалось загрузить погоду');
    return await res.json();
  };

  const reverseGeocode = async (lat, lon) => {
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=ru`);
      if (!res.ok) return null;
      const j = await res.json();
      return j.address?.city || j.address?.town || j.address?.village || j.address?.county || null;
    } catch { return null; }
  };

  const loadByCoords = async (lat, lon, cityName) => {
    try {
      const weather = await fetchWeather(lat, lon);
      const name = cityName || await reverseGeocode(lat, lon) || `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
      setData(weather);
      setLocation({ lat, lon, name });
      localStorage.setItem(WEATHER_LOC_KEY, JSON.stringify({ lat, lon, name }));
      localStorage.setItem(WEATHER_CACHE_KEY, JSON.stringify({
        ts: Date.now(), weather, location: { lat, lon, name }
      }));
      setStatus('ready');
    } catch (e) {
      setError(e.message);
      setStatus('error');
    }
  };

  const geocodeCity = async (cityName) => {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(cityName)}&format=json&limit=1&accept-language=ru`,
      { headers: { 'Accept-Language': 'ru' } }
    );
    if (!res.ok) throw new Error('Не удалось геокодировать город');
    const results = await res.json();
    if (!results.length) throw new Error(`Город «${cityName}» не найден`);
    const { lat, lon, display_name } = results[0];
    const shortName = display_name.split(',')[0].trim();
    return { lat: parseFloat(lat), lon: parseFloat(lon), name: shortName };
  };

  const loadByCity = async (cityName) => {
    try {
      setStatus('loading');
      const coords = await geocodeCity(cityName);
      await loadByCoords(coords.lat, coords.lon, coords.name);
    } catch (e) {
      setError(e.message);
      setStatus('error');
    }
  };

  const loadByIP = async () => {
    try {
      setStatus('loading');
      const res = await fetch('https://ipapi.co/json/');
      if (!res.ok) throw new Error('Не удалось определить местоположение по IP');
      const j = await res.json();
      if (!j.latitude || !j.longitude) throw new Error('IP-сервис не вернул координаты');
      await loadByCoords(j.latitude, j.longitude, j.city || j.region || null);
    } catch (e) {
      setError(`Не удалось определить по IP: ${e.message}`);
      setStatus('error');
    }
  };

  const requestLocation = () => {
    if (weatherCity) { loadByCity(weatherCity); return; }
    if (!navigator.geolocation) {
      setError('Геолокация не поддерживается. Попробуйте определить по IP.');
      setStatus('error');
      return;
    }
    if (!window.isSecureContext) {
      setError('Геолокация работает только по HTTPS. Откройте сайт через https:// или используйте IP.');
      setStatus('error');
      return;
    }
    setStatus('loading');
    navigator.geolocation.getCurrentPosition(
      (pos) => loadByCoords(pos.coords.latitude, pos.coords.longitude),
      (err) => {
        const messages = {
          1: 'Доступ к геолокации запрещён',
          2: 'Местоположение недоступно (нет сигнала GPS/WiFi)',
          3: 'Время ожидания истекло',
        };
        const msg = messages[err.code] || err.message || 'Неизвестная ошибка';
        if (err.code === 1) setStatus('denied');
        else { setError(`${msg} (код ${err.code})`); setStatus('error'); }
      },
      { enableHighAccuracy: false, timeout: 15000, maximumAge: 600000 }
    );
  };

  useEffect(() => {
    // Если задан город в настройках — всегда загружаем по нему (кэш только если город не менялся)
    if (weatherCity) {
      try {
        const cached = JSON.parse(localStorage.getItem(WEATHER_CACHE_KEY) || 'null');
        if (cached && cached.location?.name && Date.now() - cached.ts < 30 * 60 * 1000) {
          setData(cached.weather);
          setLocation(cached.location);
          setStatus('ready');
          return;
        }
      } catch {}
      loadByCity(weatherCity);
      return;
    }
    // Иначе: кэш → сохранённые координаты → геолокация
    try {
      const cached = JSON.parse(localStorage.getItem(WEATHER_CACHE_KEY) || 'null');
      if (cached && Date.now() - cached.ts < 30 * 60 * 1000) {
        setData(cached.weather);
        setLocation(cached.location);
        setStatus('ready');
        return;
      }
      const savedLoc = JSON.parse(localStorage.getItem(WEATHER_LOC_KEY) || 'null');
      if (savedLoc) {
        loadByCoords(savedLoc.lat, savedLoc.lon, savedLoc.name);
        return;
      }
    } catch {}
    requestLocation();
  }, [weatherCity]);

  return (
    <div className="fade-in">
      <div className="mb-8 flex items-end justify-between gap-4 flex-wrap">
        <div>
          <div className="text-[var(--text-subtle)] text-xs uppercase tracking-widest mb-2">Прогноз</div>
          <h1 className="font-display text-3xl md:text-4xl">Погода</h1>
          {location && (
            <div className="flex items-center gap-1.5 text-[var(--text-muted)] mt-2">
              <Icon name="mapPin" size={14} />
              <span className="text-sm">{location.name}</span>
            </div>
          )}
        </div>
        {status === 'ready' && (
          <button onClick={requestLocation} className="btn-ghost flex items-center gap-2 text-sm">
            <Icon name="restore" size={14} />
            Обновить
          </button>
        )}
      </div>

      {status === 'loading' && (
        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-12 text-center">
          <div className="text-[var(--text-muted)]">Загрузка...</div>
        </div>
      )}

      {status === 'denied' && (
        <div className="bg-[var(--surface)] border border-dashed border-[var(--border-strong)] rounded-2xl p-10 text-center">
          <div className="font-display text-2xl mb-2">Нужен доступ к местоположению</div>
          <div className="text-[var(--text-muted)] text-sm mb-6">Разрешите доступ в настройках браузера или определите по IP</div>
          <div className="flex gap-3 justify-center flex-wrap">
            <button onClick={requestLocation} className="btn-primary">Попробовать снова</button>
            <button onClick={loadByIP} className="btn-secondary">По IP</button>
          </div>
        </div>
      )}

      {status === 'error' && (
        <div className="bg-[var(--surface)] border border-dashed border-[var(--border-strong)] rounded-2xl p-10 text-center">
          <div className="font-display text-2xl mb-2">Не удалось получить погоду</div>
          <div className="text-[var(--text-muted)] text-sm mb-6 max-w-md mx-auto">{error}</div>
          <div className="flex gap-3 justify-center flex-wrap">
            <button onClick={requestLocation} className="btn-primary">Повторить</button>
            <button onClick={loadByIP} className="btn-secondary">По IP</button>
          </div>
        </div>
      )}

      {status === 'ready' && data && (
        <>
          <WeatherCurrent data={data} />
          <WeatherToday data={data} />
          <WeatherWeek data={data} />
        </>
      )}
    </div>
  );
}

function WeatherToday({ data }) {
  const now = new Date();
  const nowISO = now.toISOString().slice(0, 13);

  // Берём 24 часа начиная с текущего
  const hourly = data.hourly;
  const startIdx = hourly.time.findIndex(t => t.slice(0, 13) >= nowISO);
  const idx = startIdx === -1 ? 0 : startIdx;
  const slice = hourly.time.slice(idx, idx + 24);

  return (
    <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5 mb-6">
      <div className="text-xs uppercase tracking-widest text-[var(--text-subtle)] mb-4 font-medium">Сегодня по часам</div>
      <div className="overflow-x-auto scrollbar-hide -mx-5 px-5">
        <div className="flex gap-2 pb-1" style={{ minWidth: 'min-content' }}>
          {slice.map((t, i) => {
            const realIdx = idx + i;
            const hour = new Date(t).getHours();
            const code = hourly.weather_code[realIdx];
            const temp = Math.round(hourly.temperature_2m[realIdx]);
            const pop = hourly.precipitation_probability[realIdx];
            const info = getWeatherInfo(code);
            const isNow = i === 0;
            return (
              <div
                key={t}
                className={`flex-shrink-0 w-16 rounded-xl py-3 px-1 text-center ${
                  isNow ? 'bg-[var(--text)] text-white' : ''
                }`}
              >
                <div className={`text-xs ${isNow ? 'text-white/70' : 'text-[var(--text-subtle)]'}`}>
                  {isNow ? 'сейчас' : `${hour}:00`}
                </div>
                <div className={`my-2 flex justify-center ${isNow ? 'text-white' : 'text-[var(--text)]'}`}>
                  <Icon name={info.icon} size={22} />
                </div>
                <div className={`font-medium text-sm ${isNow ? 'text-white' : ''}`}>{temp}°</div>
                {pop > 10 && (
                  <div className={`text-[10px] mt-1 ${isNow ? 'text-white/60' : 'text-[var(--text-subtle)]'}`}>
                    {pop}%
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

const formatTime = (iso) => {
  const d = new Date(iso);
  return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
};
const monthShort = (m) => ['янв', 'фев', 'мар', 'апр', 'мая', 'июн', 'июл', 'авг', 'сен', 'окт', 'ноя', 'дек'][m];
const monthFullLower = (m) => ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'][m];

function GeneralSettings({ data, setData }) {
  const settings = { ...DEFAULT_SETTINGS, ...(data.settings || {}) };

  const updateSetting = (key, value) => {
    setData(d => ({
      ...d,
      settings: { ...DEFAULT_SETTINGS, ...(d.settings || {}), [key]: value },
    }));
  };

  return (
    <div className="space-y-3">
      <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
        <div className="flex items-start justify-between gap-4 mb-1">
          <div className="flex-1 min-w-0">

            <p className="text-sm text-[var(--text-muted)]">
              При бездействии возвращаться на Главную автоматически
            </p>
          </div>
          <Toggle
            checked={settings.weatherAutoSwitch}
            onChange={v => updateSetting('weatherAutoSwitch', v)}
          />
        </div>
      </div>

      {settings.weatherAutoSwitch && (
        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5 fade-in">
          <label>Интервал бездействия (минуты)</label>
          <input
            type="number"
            min="0.5"
            step="0.5"
            value={settings.weatherAutoSwitchMinutes}
            onChange={e => {
              const val = e.target.value === '' ? '' : Number(e.target.value);
              updateSetting('weatherAutoSwitchMinutes', val);

function SupplementSettings({ data, setData, isWorkout }) {
  const [editing, setEditing] = useState(null); // объект или null
  const [showArchive, setShowArchive] = useState(false);
  const storageKey = isWorkout ? 'workoutSupplements' : 'supplements';

  const active = (data[storageKey] || []).filter(s => !s.archived);
  const archived = (data[storageKey] || []).filter(s => s.archived);

  const save = (supp) => {
    setData(d => {
      const list = d[storageKey] || [];
      const exists = list.find(s => s.id === supp.id);
      const updated = exists
        ? list.map(s => s.id === supp.id ? supp : s)
        : [...list, supp];
      return { ...d, [storageKey]: updated };
    });
    setEditing(null);
  };

  const remove = (id) => {
    if (!confirm('Удалить БАДД полностью?')) return;
    setData(d => ({ ...d, [storageKey]: (d[storageKey] || []).filter(s => s.id !== id) }));
  };

  const toggleArchive = (id) => {
    setData(d => ({
      ...d,
      [storageKey]: (d[storageKey] || []).map(s =>
        s.id === id ? { ...s, archived: !s.archived } : s
      ),
    }));
  };

  return (
    <div>
      <button
        onClick={() => setEditing({
          id: crypto.randomUUID(),
          name: '', dosage: '', form: 'Таблетки',
          frequency: 'daily_morning', weekday: 1, comment: '',
          archived: false,
        })}
        className="btn-primary w-full flex items-center justify-center gap-2 mb-6"
      >
        <Icon name="plus" size={18} />
        Добавить БАДД
      </button>

      <div className="space-y-3 mb-8">
        {active.length === 0 && (
          <div className="text-center py-8 text-[var(--text-subtle)] text-sm">Нет активных БАДДов</div>
        )}
        {active.map(s => (
          <SettingsSupplementRow
            key={s.id} supp={s} hideFrequency={isWorkout}
            onEdit={() => setEditing(s)}
            onArchive={() => toggleArchive(s.id)}
            onDelete={() => remove(s.id)}
          />
        ))}
      </div>

      {archived.length > 0 && (
        <div>
          <button
            onClick={() => setShowArchive(!showArchive)}
            className="flex items-center gap-2 text-[var(--text-muted)] hover:text-[var(--text)] mb-4 text-sm"
          >
            <Icon name="archive" size={16} />
            Архив ({archived.length})
            <span className={`transition-transform ${showArchive ? 'rotate-180' : ''}`}>
              <Icon name="chevronDown" size={16} />
            </span>
          </button>
          {showArchive && (
            <div className="space-y-3 fade-in">
              {archived.map(s => (
                <SettingsSupplementRow
                  key={s.id} supp={s} archived hideFrequency={isWorkout}
                  onEdit={() => setEditing(s)}
                  onArchive={() => toggleArchive(s.id)}
                  onDelete={() => remove(s.id)}
                />
              ))}
            </div>
          )}
        </div>
      )}

      {editing && (
        <SupplementModal
          supp={editing}
          hideFrequency={isWorkout}
          onSave={save}
          onClose={() => setEditing(null)}
        />
      )}
    </div>
  );
}

function ChoreSection({ data, setData, dataKey, title }) {
  const [showSettings, setShowSettings] = useState(false);

  const chores = (data[dataKey] || []).filter(c => !c.archived);
  const todayChores = chores.filter(isChoreDueToday);
  const upcomingChores = chores
    .filter(isChoreUpcoming)
    .sort((a, b) => getChoreNextDate(a) - getChoreNextDate(b));

  const markDone = (id) => {
    setData(d => ({
      ...d,
      [dataKey]: (d[dataKey] || []).map(c => c.id === id ? { ...c, lastDone: getTodayKey() } : c),
    }));
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-6">
        <h2 className="font-display text-2xl">{title}</h2>
        <button
          onClick={() => setShowSettings(s => !s)}
          className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium transition-all border ${
            showSettings
              ? 'bg-[var(--text)] text-white border-[var(--text)]'
              : 'border-[var(--border)] text-[var(--text-muted)] hover:text-[var(--text)]'
          }`}
        >
          <Icon name="settings" size={16} />
          Управление
        </button>
      </div>

      {showSettings ? (
        <ChoreSettings data={data} setData={setData} dataKey={dataKey} />
      ) : (
        <>
          <div className="mb-8">
            <div className="text-xs uppercase tracking-widest text-[var(--text-subtle)] mb-3 font-medium">Сегодня</div>
            {todayChores.length === 0 ? (
              <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-8 text-center">
                <div className="font-display text-xl mb-1">Всё сделано</div>
                <div className="text-sm text-[var(--text-muted)]">Дел на сегодня нет</div>
              </div>
            ) : (
              <div className="space-y-3">
                {todayChores.map(c => (
                  <ChoreCard key={c.id} chore={c} onDone={() => markDone(c.id)} />
                ))}
              </div>
            )}
          </div>

          <div>
            <div className="text-xs uppercase tracking-widest text-[var(--text-subtle)] mb-3 font-medium">Ближайшие 7 дней</div>
            {upcomingChores.length === 0 ? (
              <div className="text-center py-6 text-[var(--text-subtle)] text-sm">Нет запланированных дел</div>
            ) : (
              <div className="space-y-3">
                {upcomingChores.map(c => (
                  <ChoreCard key={c.id} chore={c} upcoming />
                ))}
              </div>
            )}
          </div>
        </>
      )}
    </div>
  );
}

function ChoreCard({ chore, onDone, upcoming }) {
  const next = getChoreNextDate(chore);
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const daysUntil = Math.round((next - today) / 86400000);
  const freqEntry = CHORE_FREQUENCIES.find(f => f.id === chore.frequency);
  const freqLabel = chore.frequency === 'custom'
    ? `Каждые ${chore.customDays} дн.`
    : freqEntry?.label || '';

  return (
    <div
      onClick={!upcoming ? onDone : undefined}
      className={`bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5 flex items-center gap-5 transition-all ${
        !upcoming ? 'cursor-pointer hover:border-[var(--border-strong)]' : ''
      }`}
    >
      {upcoming ? (
        <div className="w-12 text-center flex-shrink-0">
          <div className="font-display text-3xl leading-none">{daysUntil}</div>
          <div className="text-xs text-[var(--text-subtle)] mt-0.5">дн.</div>
        </div>
      ) : (
        <div className="check-box flex-shrink-0">
          <Icon name="check" size={16} />
        </div>
      )}
      <div className="flex-1 min-w-0">
        <div className="font-display text-xl mb-1">{chore.name}</div>
        <div className="text-xs text-[var(--text-subtle)] uppercase tracking-wider">{freqLabel}</div>
        <div className="text-xs text-[var(--text-muted)] mt-1">
          Последний раз: {formatChoreDate(chore.lastDone)}
        </div>
      </div>
    </div>
  );
}

function ChoreSettings({ data, setData, dataKey }) {
  const [editing, setEditing] = useState(null);
  const [showArchive, setShowArchive] = useState(false);

  const active = (data[dataKey] || []).filter(c => !c.archived);
  const archived = (data[dataKey] || []).filter(c => c.archived);

  const save = (chore) => {
    setData(d => {
      const list = d[dataKey] || [];
      const exists = list.find(c => c.id === chore.id);
      const updated = exists
        ? list.map(c => c.id === chore.id ? chore : c)
        : [...list, chore];
      return { ...d, [dataKey]: updated };
    });
    setEditing(null);
  };

  const remove = (id) => {
    if (!confirm('Удалить дело полностью?')) return;
    setData(d => ({ ...d, [dataKey]: (d[dataKey] || []).filter(c => c.id !== id) }));
  };

  const toggleArchive = (id) => {
    setData(d => ({
      ...d,
      [dataKey]: (d[dataKey] || []).map(c => c.id === id ? { ...c, archived: !c.archived } : c),
    }));
  };

  return (
    <div>
      <button
        onClick={() => setEditing({
          id: crypto.randomUUID(),
          name: '', frequency: 'weekly', customDays: 7, lastDone: null,
          notify: false, notifyTime: '09:00', archived: false,
        })}
        className="btn-primary w-full flex items-center justify-center gap-2 mb-6"
      >
        <Icon name="plus" size={18} />
        Добавить дело
      </button>

      <div className="space-y-3 mb-8">
        {active.length === 0 && (
          <div className="text-center py-8 text-[var(--text-subtle)] text-sm">Нет активных дел</div>
        )}
        {active.map(c => (
          <ChoreSettingsRow
            key={c.id} chore={c}
            onEdit={() => setEditing(c)}
            onArchive={() => toggleArchive(c.id)}
            onDelete={() => remove(c.id)}
          />
        ))}
      </div>

      {archived.length > 0 && (
        <div>
          <button
            onClick={() => setShowArchive(s => !s)}
            className="flex items-center gap-2 text-[var(--text-muted)] hover:text-[var(--text)] mb-4 text-sm"
          >
            <Icon name="archive" size={16} />
            Архив ({archived.length})
            <span className={`transition-transform ${showArchive ? 'rotate-180' : ''}`}>
              <Icon name="chevronDown" size={16} />
            </span>
          </button>
          {showArchive && (
            <div className="space-y-3 fade-in">
              {archived.map(c => (
                <ChoreSettingsRow
                  key={c.id} chore={c} archived
                  onEdit={() => setEditing(c)}
                  onArchive={() => toggleArchive(c.id)}
                  onDelete={() => remove(c.id)}
                />
              ))}
            </div>
          )}
        </div>
      )}

      {editing && (
        <ChoreModal chore={editing} onSave={save} onClose={() => setEditing(null)} />
      )}
    </div>
  );
}

function ChoreSettingsRow({ chore, archived, onEdit, onArchive, onDelete }) {

  const tasks = (data.bossTasks || []).filter(t => !t.archived);
  const today = new Date().getDay();

  const getCell = (dayId, period) =>
    tasks.filter(t => (t.period === period || t.period === 'allday') && t.days.includes(dayId));

  const periods = [
    { id: 'morning', label: 'Утро',  icon: 'sun'  },
    { id: 'evening', label: 'Вечер', icon: 'moon' },
  ];

  return (
    <div>
      <div className="flex items-center justify-between mb-6">

            showSettings

          }`}

          <Icon name="settings" size={16} />
          Управление

        <BossSettings data={data} setData={setData} />

        <div className="overflow-x-auto -mx-6 px-6 scrollbar-hide">
          {/* Сегодня — крупная карточка сверху */}
          <div className="mb-4 space-y-2">
            {periods.map(p => {
              const cellTasks = getCell(today, p.id);
              return (
                <div
                  key={p.id}
                  className="rounded-2xl border-2 border-[var(--border-strong)] bg-[var(--surface)] p-4"
                >
                  <div className="flex items-center gap-2 mb-2 text-[var(--text-muted)]">
                    <Icon name={p.icon} size={16} />
                    <span className="text-sm font-medium">{p.label}</span>
                    <span className="text-xs text-[var(--text-subtle)] ml-auto">сегодня</span>
                  </div>
                  {cellTasks.length === 0 ? (
                    <div className="text-sm text-[var(--text-subtle)]">Нет задач</div>
                  ) : (
                    <div className="space-y-1">
                      {cellTasks.map(t => (
                        <div key={t.id} className="text-sm font-medium text-[var(--text)] px-2 py-1.5 rounded-lg bg-[var(--bg)] break-words">
                          {t.name}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Остальные дни — компактная таблица */}
          <div style={{ minWidth: '480px' }}>
            <div className="grid mb-1" style={{ gridTemplateColumns: '44px repeat(7, minmax(0, 1fr))', gap: '3px' }}>
              <div />
              {WEEKDAYS.map(d => (
                <div
                  key={d.id}
                  className={`text-center text-[10px] font-medium uppercase tracking-wider py-1.5 rounded-lg min-w-0 ${
                    today === d.id
                      ? 'bg-[var(--text)] text-white'
                      : 'text-[var(--text-subtle)]'
                  }`}
                >
                  {d.label}
                </div>
              ))}
            </div>

            {periods.map(p => (
              <div
                key={p.id}
                className="grid mb-1"
                style={{ gridTemplateColumns: '44px repeat(7, minmax(0, 1fr))', gap: '3px' }}
              >
                <div className="flex flex-col items-center justify-center gap-0.5 text-[var(--text-muted)] py-1">
                  <Icon name={p.icon} size={12} />
                  <span className="text-[9px]">{p.label}</span>
                </div>
                {WEEKDAYS.map(d => {
                  const cellTasks = getCell(d.id, p.id);
                  const isToday = today === d.id;
                  return (
                    <div
                      key={d.id}
                      className={`rounded-lg border min-h-[40px] min-w-0 overflow-hidden p-1 ${
                        isToday
                          ? 'border-[var(--border-strong)] bg-[var(--text)]/5'
                          : 'border-[var(--border)] bg-[var(--surface)]'
                      }`}
                    >
                      {cellTasks.map(t => (
                        <div
                          key={t.id}
                          className="text-[9px] leading-tight mb-0.5 last:mb-0 px-0.5 py-0.5 rounded bg-[var(--bg)] text-[var(--text)] break-words overflow-hidden"
                        >
                          {t.name}
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function buildVoiceSystemPrompt(appData) {
  const DAY_NAMES = ['вс','пн','вт','ср','чт','пт','сб'];
  const PERIOD_NAMES = { morning: 'утро', evening: 'вечер', allday: 'весь день' };
  const FREQ_LABELS = { daily:'каждый день', every2:'каждые 2 дня', every3:'каждые 3 дня', weekly:'раз в неделю', biweekly:'раз в 2 нед', monthly:'раз в месяц', custom:'своя' };

  const today = new Date();
  const todayStr = today.toISOString().split('T')[0];
  const todayDayName = DAY_NAMES[today.getDay()];

  const chores = (appData.chores || []).filter(c => !c.archived);
  const bossTasks = (appData.bossTasks || []).filter(t => !t.archived);

  const choreLines = chores.length
    ? chores.map(c => {
        const next = getChoreNextDate(c);
        const nextStr = isChoreDueToday(c) ? 'СЕГОДНЯ' : next.toISOString().split('T')[0];
        const freq = FREQ_LABELS[c.frequency] || c.frequency;
        const custom = c.frequency === 'custom' ? ` (${c.customDays} дн)` : '';
        return `  • ${c.name} | ${freq}${custom} | последний раз: ${c.lastDone || 'никогда'} | следующий: ${nextStr}`;
      }).join('\n')
    : '  (пусто)';

  const bossLines = bossTasks.length
    ? bossTasks.map(t => {
        const days = (t.days || []).map(d => DAY_NAMES[d]).join(',');
        return `  • ${t.name} | ${PERIOD_NAMES[t.period] || t.period} | дни: ${days}`;
      }).join('\n')
    : '  (пусто)';

  return `Ты голосовой помощник приложения Jarvis. Отвечай кратко, по-русски.

СЕГОДНЯ: ${todayStr} (${todayDayName})

РАЗДЕЛ "ПО ДОМУ" — регулярные домашние дела:
${choreLines}

РАЗДЕЛ "БОСС" — задачи по расписанию:
${bossLines}

ТЫ УМЕЕШЬ:
1. Ответить на любой вопрос о делах пользователя (что сегодня, что просрочено, когда последний раз, что на этой неделе и т.д.)
2. Добавить новое дело в один из разделов

ФОРМАТ ОТВЕТА — только JSON, без markdown, без пояснений:

Ответить на вопрос:
{"action":"answer","text":"краткий разговорный ответ на русском"}

Добавить в "По дому":
{"action":"add","section":"chores","name":"...","frequency":"daily|every2|every3|weekly|biweekly|monthly|custom","customDays":null}

Добавить в "Босс":
{"action":"add","section":"boss","name":"...","period":"morning|evening|allday","days":[1,2,3,4,5]}

Уточнить (если непонятно):
{"action":"clarify","question":"короткий вопрос"}`;
}

async function callAI(messages, settings, appData) {
  const systemPrompt = buildVoiceSystemPrompt(appData || {});
  const provider = settings.voiceProvider || 'claude';
  const key = (settings.voiceApiKey || '').trim();
  if (!key) throw new Error('no_key');

  const model = (settings.voiceModel || '').trim() ||
    (provider === 'claude' ? 'claude-sonnet-4-6' : 'gpt-4o');

  if (provider === 'claude') {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model,
        max_tokens: 400,
        system: systemPrompt,
        messages,
      }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `Claude API ${res.status}`);
    }
    const resp = await res.json();
    const text = resp.content?.[0]?.text || '';
    return JSON.parse(text);
  } else {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${key}`,
      },
      body: JSON.stringify({
        model,
        max_tokens: 400,
        messages: [{ role: 'system', content: systemPrompt }, ...messages],
      }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `OpenAI API ${res.status}`);
    }
    const resp = await res.json();
    const text = resp.choices?.[0]?.message?.content || '';
    return JSON.parse(text);
  }
}

function applyVoiceTask(parsed, setData) {
  if (parsed.section === 'chores') {
    setData(d => ({
      ...d,
      chores: [...(d.chores || []), {
        id: crypto.randomUUID(),
        name: parsed.name,
        frequency: parsed.frequency || 'weekly',
        customDays: parsed.customDays || null,
        notify: false,
        notifyTime: '09:00',
        archived: false,
      }],
    }));
  } else if (parsed.section === 'boss') {
    setData(d => ({
      ...d,
      bossTasks: [...(d.bossTasks || []), {
        id: crypto.randomUUID(),
        name: parsed.name,
        period: parsed.period || 'morning',
        days: parsed.days || [1, 2, 3, 4, 5],
        archived: false,
      }],
    }));
  }
}

let _currentAudio = null;

function speak(text, settings) {
  // Stop any currently playing audio
  if (_currentAudio) { _currentAudio.pause(); _currentAudio = null; }
  window.speechSynthesis?.cancel();

  const key = (settings?.voiceApiKey || '').trim();
  if (key) {
    // OpenAI TTS — returns promise that resolves when audio finishes
    const voice = settings?.voiceTtsVoice || 'nova';
    return fetch('https://api.openai.com/v1/audio/speech', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${key}`,
      },
      body: JSON.stringify({ model: 'tts-1', voice, input: text }),
    }).then(res => {
      if (!res.ok) throw new Error('tts_fail');
      return res.blob();
    }).then(blob => {
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      _currentAudio = audio;
      return new Promise(resolve => {
        audio.onended = () => { URL.revokeObjectURL(url); _currentAudio = null; resolve(); };
        audio.onerror = () => { URL.revokeObjectURL(url); _currentAudio = null; resolve(); };
        audio.play().catch(resolve);
      });
    }).catch(() => Promise.resolve());
  }

  // Fallback: browser SpeechSynthesis — returns promise that resolves when done
  if (!window.speechSynthesis) return Promise.resolve();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ru-RU';
  u.rate = 1.05;
  const voices = window.speechSynthesis.getVoices();
  const ruVoice = voices.find(v => v.lang.startsWith('ru'));
  if (ruVoice) u.voice = ruVoice;
  return new Promise(resolve => {
    u.onend = resolve;
    u.onerror = resolve;
    window.speechSynthesis.speak(u);
  });
}

function VoiceButton({ data, setData, settings }) {
  const [phase, setPhase] = useState('idle'); // idle|recording|processing|clarifying|success|answered|error
  const [transcript, setTranscript] = useState('');
  const [clarifyQuestion, setClarifyQuestion] = useState('');
  const [messages, setMessages] = useState([]);
  const [lastAdded, setLastAdded] = useState('');
  const [answerText, setAnswerText] = useState('');
  const [errorMsg, setErrorMsg] = useState('');
  const recogRef = React.useRef(null);
  const transcriptRef = React.useRef(''); // kept in sync for onend closure

  const processTranscript = async (text, existingMessages) => {
    if (!text) {
      setPhase(existingMessages.length > 0 ? 'clarifying' : 'idle');
      return;
    }
    const newMessages = [...existingMessages, { role: 'user', content: text }];
    setMessages(newMessages);
    setPhase('processing');
    try {
      const parsed = await callAI(newMessages, settings, data);
      if (parsed.action === 'add') {
        applyVoiceTask(parsed, setData);
        const name = parsed.name || 'задача';
        setLastAdded(name);
        speak(`Добавлено: ${name}`, settings);
        setPhase('success');
        setTimeout(() => { setPhase('idle'); setMessages([]); }, 2500);
      } else if (parsed.action === 'answer') {
        const answerStr = parsed.text || 'Готово';
        setAnswerText(answerStr);
        setPhase('answered');
        await speak(answerStr, settings);
        setPhase('idle');
        setMessages([]);
      } else if (parsed.action === 'clarify') {
        const q = parsed.question || 'Уточните запрос';
        const updatedMessages = [...newMessages, { role: 'assistant', content: q }];
        setClarifyQuestion(q);
        setMessages(updatedMessages);
        setPhase('clarifying');
        await speak(q, settings);
        startRecording(updatedMessages);
      } else {
        setErrorMsg('Непонятный ответ ИИ. Попробуйте ещё раз.');
        setPhase('error');
        setTimeout(() => setPhase('idle'), 3000);
      }
    } catch (e) {
      const msg = e.message === 'no_key'
        ? 'Настройте API-ключ в Настройках → Ассистент'
        : `Ошибка: ${e.message}`;
      setErrorMsg(msg);
      setPhase('error');
      setTimeout(() => setPhase('idle'), 4000);
    }
  };

  const startRecording = (existingMessages) => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      setErrorMsg('Браузер не поддерживает распознавание речи');
      setPhase('error');
      setTimeout(() => setPhase('idle'), 3000);
      return;
    }
    const r = new SR();
    r.lang = 'ru-RU';
    r.interimResults = true;
    r.maxAlternatives = 1;
    // continuous=false (default): auto-stops after a natural speech pause
    transcriptRef.current = '';
    recogRef.current = r;

    r.onresult = (e) => {
      let t = '';
      for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript;
      transcriptRef.current = t;
      setTranscript(t);
    };

    r.onerror = (e) => {
      recogRef.current = null;
      if (e.error === 'no-speech') { setPhase('idle'); return; }
      setErrorMsg(`Ошибка записи: ${e.error}`);
      setPhase('error');
      setTimeout(() => setPhase('idle'), 3000);
    };

    // Auto-triggered when user stops speaking (or manually via r.stop())
    r.onend = () => {
      recogRef.current = null;
      processTranscript(transcriptRef.current.trim(), existingMessages);
    };

    r.start();
    setPhase('recording');
    setTranscript('');
  };

  const handleMainButton = () => {
    if (phase === 'idle') {
      const key = (settings?.voiceApiKey || '').trim();
      if (!key) {
        setErrorMsg('Настройте API-ключ в Настройках → Ассистент');
        setPhase('error');
        setTimeout(() => setPhase('idle'), 4000);
        return;
      }
      setMessages([]);
      startRecording([]);
    } else if (phase === 'recording') {
      // Manual early stop — triggers onend which calls processTranscript
      if (recogRef.current) recogRef.current.stop();
    } else if (phase === 'clarifying') {
      startRecording(messages);
    }
    // processing/success/error: do nothing
  };

  const cancel = () => {
    window.speechSynthesis?.cancel();
    if (_currentAudio) { _currentAudio.pause(); _currentAudio = null; }
    if (recogRef.current) { recogRef.current.onend = null; recogRef.current.stop(); recogRef.current = null; }
    setPhase('idle');
    setMessages([]);
    setTranscript('');
  };

  const showPanel = phase !== 'idle';

  const btnBg = {
    idle: 'bg-[var(--text)] text-white',
    recording: 'bg-red-500 text-white',
    processing: 'bg-[var(--text)] text-white',
    clarifying: 'bg-blue-500 text-white',
    answered: 'bg-blue-500 text-white',
    success: 'bg-green-500 text-white',
    error: 'bg-red-500 text-white',
  }[phase] || 'bg-[var(--text)] text-white';

  return (
    <div className="fixed bottom-24 right-4 z-30 flex flex-col items-end gap-2 md:bottom-8">
      {/* Mini panel */}
      {showPanel && (
        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl shadow-lg p-4 max-w-[260px] w-[260px] fade-in">
          {phase === 'recording' && (
            <div>
              <div className="text-xs text-red-500 font-medium mb-1 flex items-center gap-1">
                <span className="w-2 h-2 rounded-full bg-red-500 animate-pulse inline-block"></span>
                Слушаю...
              </div>
              <div className="text-sm text-[var(--text)] min-h-[40px] leading-snug">
                {transcript || <span className="text-[var(--text-subtle)]">Говорите...</span>}
              </div>
              <div className="text-xs text-[var(--text-subtle)] mt-2">Остановится автоматически после паузы</div>
            </div>
          )}
          {phase === 'processing' && (
            <div className="flex items-center gap-2">
              <div className="w-4 h-4 border-2 border-[var(--text)] border-t-transparent rounded-full animate-spin flex-shrink-0"></div>
              <span className="text-sm text-[var(--text-muted)]">Обрабатываю...</span>
            </div>
          )}
          {phase === 'clarifying' && (
            <div>
              <div className="text-xs text-blue-500 font-medium mb-1">Уточнение</div>
              <div className="text-sm text-[var(--text)] mb-3">{clarifyQuestion}</div>
              <div className="flex items-center gap-2">
                <button
                  onClick={() => startRecording(messages)}
                  className="flex-1 flex items-center justify-center gap-1.5 bg-blue-500 text-white rounded-xl py-2 text-sm font-medium"
                >
                  <Icon name="mic" size={16} />
                  Ответить
                </button>
                <button onClick={cancel} className="p-2 rounded-xl hover:bg-black/5 text-[var(--text-muted)]">
                  <Icon name="x" size={18} />
                </button>
              </div>
            </div>
          )}
          {phase === 'success' && (
            <div className="flex items-center gap-2">
              <span className="text-green-500"><Icon name="check" size={18} /></span>
              <span className="text-sm text-[var(--text)]">Добавлено: <b>{lastAdded}</b></span>
            </div>
          )}
          {phase === 'answered' && (
            <div>
              <div className="text-xs text-blue-500 font-medium mb-1 flex items-center gap-1">
                <span className="w-2 h-2 rounded-full bg-blue-500 animate-pulse inline-block"></span>
                Ответ
              </div>
              <div className="text-sm text-[var(--text)] leading-snug">{answerText}</div>
            </div>
          )}
          {phase === 'error' && (
            <div>
              <div className="text-xs text-red-500 font-medium mb-1">Ошибка</div>
              <div className="text-sm text-[var(--text-muted)]">{errorMsg}</div>
            </div>
          )}
        </div>
      )}

      {/* Main button */}
      <button
        onClick={handleMainButton}
        disabled={phase === 'processing' || phase === 'success'}
        className={`w-14 h-14 rounded-full shadow-lg flex items-center justify-center transition-all ${btnBg} ${phase === 'recording' ? 'voice-pulse' : ''} ${phase === 'processing' ? 'opacity-70' : ''}`}
        title="Голосовой ассистент"
      >
        {phase === 'processing' ? (
          <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
        ) : phase === 'success' ? (
          <Icon name="check" size={24} />
        ) : (
          <Icon name="mic" size={24} />
        )}
      </button>
    </div>
  );
}

function formatBodyDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const months = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
  const days = ['вс','пн','вт','ср','чт','пт','сб'];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()} (${days[d.getDay()]})`;
}

async function compressImage(file, maxPx = 1200, quality = 0.85) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { width, height } = img;
      if (width > maxPx || height > maxPx) {
        if (width > height) { height = Math.round(height * maxPx / width); width = maxPx; }
        else { width = Math.round(width * maxPx / height); height = maxPx; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('compress failed')), 'image/jpeg', quality);
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('load failed')); };
    img.src = url;
  });
}

async function uploadPhoto(file) {
  let blob;
  try {
    blob = await compressImage(file);
  } catch {
    blob = file;
  }
  const res = await fetch('/api/photos?ext=jpg', {
    method: 'POST',
    headers: { 'Content-Type': 'image/jpeg' },
    body: blob,
  });
  if (!res.ok) throw new Error('upload failed');
  return (await res.json()).filename;
}
