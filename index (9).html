function CarsSettings({ data, setData }) {
  const [editing, setEditing] = useState(null);
  const [showArchive, setShowArchive] = useState(false);

  const active   = (data.cars || []).filter(c => !c.archived);
  const archived = (data.cars || []).filter(c =>  c.archived);

  const save = (car) => {
    car = { ...car, updatedAt: Date.now() };
    setData(d => {
      const list = d.cars || [];
      const exists = list.find(c => c.id === car.id);
      return { ...d, cars: exists ? list.map(c => c.id === car.id ? car : c) : [...list, car] };
    });
    setEditing(null);
  };

  const remove = (id) => {
    if (!confirm('Удалить автомобиль? Вся история обслуживания этого автомобиля будет удалена.')) return;
    setData(d => ({
      ...d,
      cars: (d.cars || []).filter(c => c.id !== id),
      serviceRecords: (d.serviceRecords || []).filter(r => r.carId !== id),
    }));
  };

  const toggleArchive = (id) => {
    setData(d => ({
      ...d,
      cars: (d.cars || []).map(c => c.id === id ? { ...c, archived: !c.archived } : c),
    }));
  };

  return (
    <div>
      <button
        onClick={() => setEditing({ id: crypto.randomUUID(), name: '', year: '', plate: '', notes: '', archived: false })}
        className="btn-primary w-full flex items-center justify-center gap-2 mb-6"
      >
        <Icon name="plus" size={18} />
        Добавить автомобиль
      </button>

      <div className="space-y-3 mb-8">
        {active.length === 0 && (
          <div className="text-center py-8 text-[var(--text-subtle)] text-sm">Нет автомобилей</div>
        )}
        {active.map(car => (
          <CarSettingsRow key={car.id} car={car}
            onEdit={() => setEditing(car)}
            onArchive={() => toggleArchive(car.id)}
            onDelete={() => remove(car.id)}
          />
        ))}
      </div>

      {archived.length > 0 && (
        <div>
          <button onClick={() => setShowArchive(!showArchive)}
            className="flex items-center gap-2 text-[var(--text-muted)] hover:text-[var(--text)] mb-4 text-sm">
            <Icon name="archive" size={16} />
            Архив ({archived.length})
            <span className={`transition-transform ${showArchive ? 'rotate-180' : ''}`}>
              <Icon name="chevronDown" size={16} />
            </span>
          </button>
          {showArchive && (
            <div className="space-y-3 fade-in">
              {archived.map(car => (
                <CarSettingsRow key={car.id} car={car} archived
                  onEdit={() => setEditing(car)}
                  onArchive={() => toggleArchive(car.id)}
                  onDelete={() => remove(car.id)}
                />
              ))}
            </div>
          )}
        </div>
      )}

      {editing && <CarModal car={editing} onSave={save} onClose={() => setEditing(null)} />}
    </div>
  );
}

function ServiceHistoryView({ data, setData }) {
  const [filterCar, setFilterCar] = useState('all');
  const [filterService, setFilterService] = useState('');
  const [editRecord, setEditRecord] = useState(null);

  const cars = (data.cars || []).filter(c => !c.archived);
  const allRecords = data.serviceRecords || [];

  // Нормализация: старые записи имели service+price на верхнем уровне
  const getItems = (r) =>
    r.items || (r.service ? [{ id: 'legacy', service: r.service, price: r.price || 0 }] : []);

  const visibleServiceNames = [...new Set(
    allRecords
      .filter(r => filterCar === 'all' || r.carId === filterCar)
      .flatMap(r => getItems(r).map(i => i.service))
      .filter(Boolean)
  )].sort();

  const filtered = allRecords
    .filter(r => filterCar === 'all' || r.carId === filterCar)
    .filter(r => !filterService || getItems(r).some(i => i.service === filterService))
    .sort((a, b) => b.date.localeCompare(a.date));

  const getCarName = (carId) => (data.cars || []).find(c => c.id === carId)?.name || '—';

  const saveRecord = (record) => {
    record = { ...record, updatedAt: Date.now() };
    setData(d => {
      const list = d.serviceRecords || [];
      const exists = list.find(r => r.id === record.id);
      return { ...d, serviceRecords: exists ? list.map(r => r.id === record.id ? record : r) : [...list, record] };
    });
    setEditRecord(null);
  };

  const deleteRecord = (id) => {
    if (!confirm('Удалить запись?')) return;
    setData(d => ({ ...d, serviceRecords: (d.serviceRecords || []).filter(r => r.id !== id) }));
  };

  const fmtDate = (s) => {
    if (!s) return '';
    const d = new Date(s + 'T00:00:00');
    const mo = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
    return `${d.getDate()} ${mo[d.getMonth()]} ${d.getFullYear()}`;
  };

  const fmtMoney = (n) => n ? new Intl.NumberFormat('ru-RU').format(n) + ' ₽' : null;
  const fmtKm    = (n) => n ? new Intl.NumberFormat('ru-RU').format(n) + ' км' : null;
  const totalCost = filtered.reduce((s, r) => s + getItems(r).reduce((a, i) => a + (Number(i.price) || 0), 0), 0);

  const newRecord = () => ({
    id: crypto.randomUUID(),
    carId: filterCar !== 'all' ? filterCar : cars[0].id,
    date: new Date().toISOString().split('T')[0],
    items: [{ id: crypto.randomUUID(), service: '', price: '' }],
    mileage: '', notes: '',
  });

  if (cars.length === 0) {
    return <EmptyState title="Нет автомобилей" text="Добавьте автомобиль во вкладке «Автомобили»" />;
  }

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <h2 className="font-display text-2xl">История</h2>
        <button onClick={() => setEditRecord(newRecord())} className="btn-primary flex items-center gap-2 text-sm">
          <Icon name="plus" size={16} />
          Добавить
        </button>
      </div>

      {/* Фильтры */}
      <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-4 mb-4 space-y-3">
        <div>
          <label>Автомобиль</label>
          <select value={filterCar} onChange={e => { setFilterCar(e.target.value); setFilterService(''); }}>
            <option value="all">Все автомобили</option>
            {cars.map(c => <option key={c.id} value={c.id}>{c.name}{c.year ? ` (${c.year})` : ''}</option>)}
          </select>
        </div>
        {visibleServiceNames.length > 0 && (
          <div>
            <label>Вид работ</label>
            <select value={filterService} onChange={e => setFilterService(e.target.value)}>
              <option value="">Все работы</option>
              {visibleServiceNames.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
        )}
      </div>

      {/* Итог */}
      {filtered.length > 0 && (
        <div className="flex items-center gap-4 text-sm text-[var(--text-muted)] mb-4 px-1">
          <span>
            {filtered.length}{' '}
            {filtered.length === 1 ? 'запись' : filtered.length < 5 ? 'записи' : 'записей'}
          </span>
          {totalCost > 0 && (
            <span>Итого: <strong className="text-[var(--text)]">{fmtMoney(totalCost)}</strong></span>
          )}
        </div>
      )}

      {filtered.length === 0 ? (
        <EmptyState title="Нет записей" text="Нажмите «Добавить» чтобы внести первое обслуживание" />
      ) : (
        <div className="space-y-3">
          {filtered.map(record => {
            const items = getItems(record);
            const recTotal = items.reduce((s, i) => s + (Number(i.price) || 0), 0);
            return (
              <div key={record.id} className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
                <div className="flex items-start justify-between gap-4">
                  <div className="flex-1 min-w-0">
                    {/* Шапка: дата, авто, пробег */}
                    <div className="flex flex-wrap items-center gap-x-3 gap-y-0.5 text-sm mb-3">
                      <span className="font-medium text-[var(--text)]">{fmtDate(record.date)}</span>
                      {filterCar === 'all' && (
                        <span className="text-[var(--text-subtle)]">{getCarName(record.carId)}</span>
                      )}
                      {record.mileage > 0 && (
                        <span className="text-[var(--text-muted)]">{fmtKm(record.mileage)}</span>
                      )}
                    </div>
                    {/* Таблица работ */}
                    <div className="border border-[var(--border)] rounded-xl overflow-hidden text-sm">
                      {items.map((item, idx) => (
                        <div key={item.id || idx}
                          className={`flex items-center gap-3 px-3 py-2 ${idx > 0 ? 'border-t border-[var(--border)]' : ''}`}>
                          <span className="flex-1">{item.service}</span>
                          {Number(item.price) > 0 && (
                            <span className="text-[var(--text-muted)] flex-shrink-0 tabular-nums">{fmtMoney(item.price)}</span>
                          )}
                        </div>
                      ))}
                      {items.length > 1 && recTotal > 0 && (
                        <div className="flex items-center gap-3 px-3 py-2 border-t border-[var(--border-strong)] bg-[var(--bg)]">
                          <span className="flex-1 text-xs uppercase tracking-wide text-[var(--text-subtle)]">Итого</span>
                          <span className="font-semibold flex-shrink-0 tabular-nums">{fmtMoney(recTotal)}</span>
                        </div>
                      )}
                    </div>
                    {record.notes && <div className="text-sm text-[var(--text-muted)] mt-2 italic">{record.notes}</div>}
                  </div>
                  <div className="flex gap-1 flex-shrink-0">
                    <button onClick={() => setEditRecord(record)} className="p-2 rounded-lg hover:bg-black/5 text-[var(--text-muted)]">
                      <Icon name="edit" size={16} />
                    </button>
                    <button onClick={() => deleteRecord(record.id)} className="p-2 rounded-lg hover:bg-black/5 text-[var(--text-muted)]">
                      <Icon name="trash" size={16} />
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {editRecord && (
        <ServiceRecordModal
          record={editRecord}
          cars={cars}
          allServiceNames={[...new Set((data.serviceRecords || []).flatMap(r =>
            (r.items || (r.service ? [{ service: r.service }] : [])).map(i => i.service)
          ).filter(Boolean))].sort()}
          onSave={saveRecord}
          onClose={() => setEditRecord(null)}
        />
      )}
    </div>
  );
}

function ServiceRecordModal({ record, cars, allServiceNames, onSave, onClose }) {
  const initItems = () =>
    record.items
      ? record.items.map(i => ({ ...i }))
      : record.service
        ? [{ id: crypto.randomUUID(), service: record.service, price: record.price || '' }]
        : [{ id: crypto.randomUUID(), service: '', price: '' }];

  const [carId,   setCarId]   = useState(record.carId);
  const [date,    setDate]    = useState(record.date);
  const [mileage, setMileage] = useState(record.mileage || '');
  const [notes,   setNotes]   = useState(record.notes || '');
  const [items,   setItems]   = useState(initItems);
  const [activeSuggId, setActiveSuggId] = useState(null);

  const addItem    = () => setItems(it => [...it, { id: crypto.randomUUID(), service: '', price: '' }]);
  const removeItem = (id) => setItems(it => it.filter(i => i.id !== id));
  const updateItem = (id, key, val) => setItems(it => it.map(i => i.id === id ? { ...i, [key]: val } : i));

  const getSugg = (service) =>
    allServiceNames
      .filter(s => s !== service && s.toLowerCase().includes((service || '').toLowerCase()))
      .slice(0, 5);

  const total = items.reduce((s, i) => s + (Number(i.price) || 0), 0);

  const submit = () => {
    if (!carId) return alert('Выберите автомобиль');
    if (!date)  return alert('Укажите дату');
    const filled = items.filter(i => i.service.trim());
    if (!filled.length) return alert('Добавьте хотя бы одну работу');
    onSave({
      id: record.id,
      carId, date, notes,
      mileage: Number(mileage) || 0,
      items: filled.map(i => ({ ...i, service: i.service.trim(), price: Number(i.price) || 0 })),
    });
  };

  const isNew = !record.items && !record.service;

  return (
    <Modal onClose={onClose} title={isNew ? 'Новая запись' : 'Редактировать запись'}>
      <div className="space-y-4">
        <div>
          <label>Автомобиль</label>
          <select value={carId} onChange={e => setCarId(e.target.value)}>
            {cars.map(c => <option key={c.id} value={c.id}>{c.name}{c.year ? ` (${c.year})` : ''}</option>)}
          </select>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label>Дата</label>
            <input type="date" value={date} max={new Date().toISOString().split('T')[0]} onChange={e => setDate(e.target.value)} />
          </div>
          <div>
            <label>Пробег (км)</label>
            <input type="number" min="0" value={mileage} onChange={e => setMileage(e.target.value)} placeholder="50000" />
          </div>
        </div>

        {/* Таблица работ */}
        <div>
          <label>Работы</label>
          <div className="space-y-2">
            {items.map((item, idx) => (
              <div key={item.id} className="flex gap-2 items-start">
                <div className="flex-1 relative">
                  <input
                    value={item.service}
                    onChange={e => { updateItem(item.id, 'service', e.target.value); setActiveSuggId(item.id); }}
                    onFocus={() => setActiveSuggId(item.id)}
                    onBlur={() => setTimeout(() => setActiveSuggId(null), 150)}
                    placeholder={`Работа ${idx + 1}...`}
                  />
                  {activeSuggId === item.id && getSugg(item.service).length > 0 && (
                    <div className="absolute left-0 right-0 top-full mt-1 bg-[var(--surface)] border border-[var(--border)] rounded-xl shadow-lg z-20 overflow-hidden">
                      {getSugg(item.service).map(s => (
                        <button key={s}
                          onMouseDown={() => { updateItem(item.id, 'service', s); setActiveSuggId(null); }}
                          className="w-full text-left px-4 py-2.5 text-sm hover:bg-black/5 text-[var(--text)]">
                          {s}
                        </button>
                      ))}
                    </div>
                  )}
                </div>
                <div style={{ width: 100, flexShrink: 0 }}>
                  <input
                    type="number" min="0"
                    value={item.price}
                    onChange={e => updateItem(item.id, 'price', e.target.value)}
                    placeholder="₽"
                  />
                </div>
                {items.length > 1 && (
                  <button onClick={() => removeItem(item.id)}
                    className="flex-shrink-0 p-2.5 text-[var(--text-subtle)] hover:text-red-400 transition-colors mt-0.5">
                    <Icon name="x" size={16} />
                  </button>
                )}
              </div>
            ))}
          </div>

          {total > 0 && (
            <div className="flex justify-between items-center px-1 pt-2 text-sm">
              <span className="text-[var(--text-subtle)]">Итого</span>
              <span className="font-semibold tabular-nums">{new Intl.NumberFormat('ru-RU').format(total)} ₽</span>
            </div>
          )}

          <button onClick={addItem}
            className="mt-2 flex items-center gap-1.5 text-sm text-[var(--text-muted)] hover:text-[var(--text)] transition-colors">
            <Icon name="plus" size={15} />
            Добавить работу
          </button>
        </div>

        <div>
          <label>Заметки</label>
          <textarea value={notes} onChange={e => setNotes(e.target.value)} rows={2} placeholder="Сервис, мастер, бренд запчасти..." />
        </div>
        <div className="flex gap-3 pt-2">
          <button onClick={onClose} className="btn-secondary flex-1">Отмена</button>
          <button onClick={submit} className="btn-primary flex-1">Сохранить</button>
        </div>
      </div>
    </Modal>
  );
}

const HOLIDAY_MONTHS_SHORT = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];

function formatHolidayDate(dateStr) {
  if (!dateStr) return '';
  const [mm, dd] = dateStr.split('-');
  return `${parseInt(dd)} ${HOLIDAY_MONTHS_SHORT[parseInt(mm) - 1]}`;
}

function getDaysUntilHoliday(dateStr) {
  if (!dateStr) return Infinity;
  const today = new Date(); today.setHours(0,0,0,0);
  const [mm, dd] = dateStr.split('-').map(Number);
  let target = new Date(today.getFullYear(), mm - 1, dd);
  target.setHours(0,0,0,0);
  if (target < today) target = new Date(today.getFullYear() + 1, mm - 1, dd);
  return Math.round((target - today) / 86400000);
}

const getAge = (dateStr, birthYear) => {
  if (!birthYear || !dateStr) return null;
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const [mm, dd] = dateStr.split('-').map(Number);
  const birthdayThisYear = new Date(today.getFullYear(), mm - 1, dd);
  const age = today.getFullYear() - parseInt(birthYear);
  // Если ДР ещё не было в этом году — человеку на 1 год меньше
  return birthdayThisYear <= today ? age : age - 1;
};

function HolidaysView({ data, setData }) {
  const [editing, setEditing] = useState(null);
  const [filter, setFilter] = useState('all');
  const [sortBy, setSortBy] = useState('days');

  const holidays = (data.holidays || []).filter(h => !h.archived);

  const save = (holiday) => {
    holiday = { ...holiday, updatedAt: Date.now() };
    setData(d => {
      const list = d.holidays || [];
      const exists = list.find(h => h.id === holiday.id);
      return {
        ...d,
        holidays: exists
          ? list.map(h => h.id === holiday.id ? holiday : h)
          : [...list, holiday],
      };
    });
    setEditing(null);
  };

  const remove = (id) => {
    if (!confirm('Удалить событие?')) return;
    setData(d => ({ ...d, holidays: (d.holidays || []).filter(h => h.id !== id) }));
  };

  const newHoliday = () => setEditing({
    id: crypto.randomUUID(),
    name: '', type: 'birthday', date: '', description: '',
    birthYear: '',
    notify: true,
    reminders: [
      { id: crypto.randomUUID(), daysBefore: 7, time: '09:00' },
      { id: crypto.randomUUID(), daysBefore: 0, time: '09:00' },
    ],
    archived: false,
  });

  const EMOJI = { birthday: '🎂', anniversary: '💑', other: '🎉' };

  const FILTERS = [
    { id: 'all',         label: 'Все' },
    { id: 'birthday',    label: '🎂 ДР' },
    { id: 'anniversary', label: '💑 Юбилеи' },
    { id: 'other',       label: '🎉 Другие' },
  ];

  const filtered = filter === 'all' ? holidays : holidays.filter(h => h.type === filter);

  const sorted = [...filtered].sort((a, b) =>
    sortBy === 'name'
      ? a.name.localeCompare(b.name, 'ru')
      : getDaysUntilHoliday(a.date) - getDaysUntilHoliday(b.date)
  );

  return (
    <div className="fade-in">
      <div className="mb-6 flex items-baseline justify-between gap-4">
        <div className="font-display text-2xl">Праздники</div>
        <div className="text-[var(--text-subtle)] text-xs uppercase tracking-widest flex-shrink-0">События</div>
      </div>

      <button onClick={newHoliday} className="btn-primary w-full flex items-center justify-center gap-2 mb-4">
        <Icon name="plus" size={18} />
        Добавить событие
      </button>

      {holidays.length > 0 && (
        <div className="flex items-center justify-between gap-3 mb-4 flex-wrap">
          <div className="flex gap-1.5 flex-wrap">
            {FILTERS.map(f => (
              <button
                key={f.id}
                onClick={() => setFilter(f.id)}
                className={`px-3 py-1.5 rounded-xl text-sm font-medium transition-all ${
                  filter === f.id
                    ? 'bg-[var(--text)] text-white'
                    : 'bg-[var(--surface)] border border-[var(--border)] text-[var(--text-muted)]'
                }`}
              >{f.label}</button>
            ))}
          </div>
          <select
            value={sortBy}
            onChange={e => setSortBy(e.target.value)}
            style={{ width: 'auto' }}
            className="text-sm py-1.5 px-3 rounded-xl border border-[var(--border)] bg-[var(--surface)] text-[var(--text-muted)]"
          >
            <option value="days">По дате</option>
            <option value="name">По имени</option>
          </select>
        </div>
      )}

      {sorted.length === 0 ? (
        <EmptyState title="Нет событий" text={filter === 'all' ? 'Добавьте дни рождения, юбилеи и другие праздники' : 'Нет событий этого типа'} />
      ) : (
        <div className="space-y-3">
          {sorted.map(h => {
            const days = getDaysUntilHoliday(h.date);
            const daysText = days === 0 ? 'Сегодня!' : `через ${days} ${days === 1 ? 'день' : days < 5 ? 'дня' : 'дней'}`;
            const age = h.type === 'birthday' ? getAge(h.date, h.birthYear) : null;
            return (
              <div key={h.id} className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-4 flex items-start gap-3">
                <div className="text-2xl flex-shrink-0 mt-0.5">{EMOJI[h.type] || '🎉'}</div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap mb-0.5">
                    <span className="font-medium">{h.name}</span>
                    {age !== null && (
                      <span className="text-xs font-medium px-2 py-0.5 rounded-full bg-purple-50 text-purple-600">
                        {age} лет
                      </span>
                    )}
                  </div>
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="text-sm text-[var(--text-muted)]">{formatHolidayDate(h.date)}</span>
                    <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${
                      days === 0 ? 'bg-red-100 text-red-700' :
                      days <= 7 ? 'bg-amber-100 text-amber-700' :
                      'bg-[var(--bg)] text-[var(--text-subtle)]'
                    }`}>{daysText}</span>
                  </div>
                  {h.description ? <div className="text-xs text-[var(--text-muted)] mt-1">{h.description}</div> : null}
                  {h.notify && h.reminders?.length > 0 ? (

function HolidayForm({ initial, onSave, onClose }) {
  const [form, setForm] = useState(initial);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  // Инициализируем текстовое поле из сохранённых date + birthYear
  const [dateInput, setDateInput] = useState(() => {
    if (!initial.date) return '';
    const [mm, dd] = initial.date.split('-');
    if (initial.type === 'birthday' && initial.birthYear) return `${dd}.${mm}.${initial.birthYear}`;
    return `${dd}.${mm}`;
  });

  const handleDateChange = (val) => {
    setDateInput(val);
    const parts = val.trim().split(/[.\-\/]+/);
    if (parts.length >= 2 && parts[0] && parts[1]) {
      const dd = parts[0].padStart(2, '0');
      const mm = parts[1].padStart(2, '0');
      const yyyy = (parts[2] || '').replace(/\D/g, '');
      const d = parseInt(dd), m = parseInt(mm);
      if (d >= 1 && d <= 31 && m >= 1 && m <= 12) {
        setForm(f => ({
          ...f,
          date: `${mm}-${dd}`,
          birthYear: yyyy.length === 4 ? yyyy : (yyyy ? f.birthYear : ''),
        }));
      }
    } else if (!val.trim()) {
      setForm(f => ({ ...f, date: '', birthYear: '' }));
    }
  };

  const addReminder = () => setForm(f => ({
    ...f,
    reminders: [...(f.reminders || []), { id: crypto.randomUUID(), daysBefore: 0, time: '09:00' }],
  }));

  const removeReminder = (id) => setForm(f => ({
    ...f,
    reminders: (f.reminders || []).filter(r => r.id !== id),
  }));

  const setReminder = (id, k, v) => setForm(f => ({
    ...f,
    reminders: (f.reminders || []).map(r => r.id === id ? { ...r, [k]: v } : r),
  }));

  const submit = () => {
    if (!form.name.trim() || !form.date) return;
    onSave(form);
  };

  const DAYS_OPTIONS = [
    { value: 0,  label: 'В сам день'  },
    { value: 1,  label: 'За 1 день'   },
    { value: 3,  label: 'За 3 дня'    },
    { value: 7,  label: 'За 7 дней'   },
    { value: 14, label: 'За 2 недели' },
    { value: 30, label: 'За месяц'    },
  ];

  return (
    <Modal title={initial.name ? 'Редактировать' : 'Новое событие'} onClose={onClose}>
      <div className="space-y-4">
        <div>
          <label>Название</label>
          <input value={form.name} onChange={e => set('name', e.target.value)} placeholder="День рождения Мамы" />
        </div>

        <div>
          <label>Тип</label>
          <select value={form.type} onChange={e => set('type', e.target.value)}>
            <option value="birthday">🎂 День рождения</option>
            <option value="anniversary">💑 Юбилей / Годовщина</option>
            <option value="other">🎉 Другое событие</option>
          </select>
        </div>

        <div>
          <label>
            {form.type === 'birthday' ? 'Дата рождения' : 'Дата события (повторяется ежегодно)'}
          </label>
          <input
            value={dateInput}
            onChange={e => handleDateChange(e.target.value)}
            inputMode="numeric"
            placeholder={form.type === 'birthday' ? '20.04.2003' : '20.04'}
          />
          <p className="text-xs text-[var(--text-subtle)] mt-1">
            {form.type === 'birthday'
              ? 'ДД.ММ.ГГГГ — год необязателен, но нужен для отображения возраста'
              : 'ДД.ММ — год не нужен, событие повторяется ежегодно'}
          </p>
        </div>

        <div>
          <label>Описание (необязательно)</label>
          <textarea
            value={form.description || ''}
            onChange={e => set('description', e.target.value)}
            rows={2}
            placeholder="Заметки..."
          />
        </div>

        <div className="bg-[var(--bg)] border border-[var(--border)] rounded-xl p-4 space-y-3">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2">
              <Icon name="bell" size={16} />
              <span className="text-sm font-medium">Уведомления в Telegram</span>
            </div>
            <Toggle checked={!!form.notify} onChange={v => set('notify', v)} />
          </div>

          {form.notify && (
            <div className="space-y-2 fade-in">
              {(form.reminders || []).map(r => (
                <div key={r.id} className="flex items-center gap-2">
                  <select
                    value={r.daysBefore}
                    onChange={e => setReminder(r.id, 'daysBefore', parseInt(e.target.value))}
                    style={{ flex: '1', minWidth: 0 }}
                  >
                    {DAYS_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                  </select>
                  <MskTimeInput
                    value={r.time}
                    onChange={t => setReminder(r.id, 'time', t)}
                    style={{ width: '110px', flexShrink: 0 }}
                  />
                  <button
                    onClick={() => removeReminder(r.id)}
                    className="p-1.5 rounded-lg text-[var(--text-muted)] hover:text-red-500 flex-shrink-0"
                  >
                    <Icon name="x" size={16} />
                  </button>
                </div>
              ))}
              <button
                onClick={addReminder}
                className="btn-secondary w-full flex items-center justify-center gap-2 text-sm"
              >
                <Icon name="plus" size={15} />
                Добавить напоминание
              </button>
            </div>
          )}
        </div>

        <div className="flex gap-3 pt-2">
          <button onClick={onClose} className="btn-secondary flex-1">Отмена</button>
          <button onClick={submit} className="btn-primary flex-1">Сохранить</button>
        </div>
      </div>
    </Modal>
  );
}

const getCurrentMonthStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
};

const addMonthsStr = (ym, n) => {
  if (!ym) return '';
  const [y, m] = ym.split('-').map(Number);
  const d = new Date(y, m - 1 + n, 1);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
};

const monthsBetweenStr = (start, end) => {
  if (!start || !end) return 0;
  const [sy, sm] = start.split('-').map(Number);
  const [ey, em] = end.split('-').map(Number);
  return Math.max(1, (ey - sy) * 12 + (em - sm) + 1);
};

const formatMonthFull = (ym) => {
  if (!ym) return '';
  const [y, m] = ym.split('-').map(Number);
  const names = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  return `${names[m - 1]} ${y}`;
};

const formatMonthShortBudget = (ym) => {
  if (!ym) return '';
  const [y, m] = ym.split('-').map(Number);
  const names = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
  return `${names[m - 1]} ${y}`;
};

const calcMonthly = (exp, balance) => {
  const curMonth = getCurrentMonthStr();
  const remaining = Math.max((exp.amount || 0) - (balance || 0), 0);
  if (remaining <= 0) return 0;
  const mLeft = exp.targetDate <= curMonth ? 1 : monthsBetweenStr(curMonth, exp.targetDate);
  return Math.ceil(remaining / mLeft);
};

const formatRub = (n) => {
  if (n == null || n === '') return '—';
  return new Intl.NumberFormat('ru-RU').format(Math.round(n));
};

const pluralMonths = (n) => n === 1 ? 'месяц' : n < 5 ? 'месяца' : 'месяцев';

function BudgetMonthlyView({ data, setData }) {
  const curYear  = new Date().getFullYear();
  const curMonth = `${curYear}-${String(new Date().getMonth() + 1).padStart(2, '0')}`;

  const [year,         setYear]         = useState(curYear);
  const [showSettings, setShowSettings] = useState(false);
  const [showCopyMonth, setShowCopyMonth] = useState(false);
  const [editCell,     setEditCell]     = useState(null);
  const [editVal,      setEditVal]      = useState('');
  const scrollRef = useRef(null);

  const userCats = data.budgetPlanCategories || [];
  const vals     = data.budgetPlanValues     || {};

  // ── Income (Приход) ──────────────────────────────────────────────────────
  const incomeSources = data.budgetIncomeSources || [];
  const incomeVals    = data.budgetIncomeValues  || {};

  const getIncomeVal    = (srcId, month) => incomeVals[`${srcId}_${month}`] || 0;
  const incomeSrcTotal  = (month) => incomeSources.reduce((s, src) => s + getIncomeVal(src.id, month), 0);

  const startIncomeEdit = (srcId, month) => {
    setEditCell({ itemId: `__inc_${srcId}`, month, isIncome: true, srcId });
    setEditVal((incomeVals[`${srcId}_${month}`] || 0) > 0 ? String(incomeVals[`${srcId}_${month}`]) : '');
  };
  const commitIncomeEdit = (srcId, month, value) => {
    const num = parseInt(value.replace(/\s/g, ''), 10);
    setData(d => ({
      ...d,
      budgetIncomeValues: { ...(d.budgetIncomeValues || {}), [`${srcId}_${month}`]: isNaN(num) || num < 0 ? 0 : num }
    }));
    setEditCell(null);
  };
  const handleIncomeKeyDown = (e, srcId, month) => {
    if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); commitIncomeEdit(srcId, month, editVal); }
    if (e.key === 'Escape') setEditCell(null);
  };

  const MONTH_NAMES = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
  const months = MONTH_NAMES.map((_, i) => `${year}-${String(i + 1).padStart(2, '0')}`);

  // ── Auto-categories from Накопления and Постоянные tabs ──────────────────
  const expCats      = getExpenseCats(data);
  const recCats      = getRecurringCats(data);
  const activeExp    = (data.budgetExpenses  || []).filter(e => !e.archived);
  const activeRec    = (data.budgetRecurring || []).filter(r => !r.archived);
  const savTx        = data.savingsTransactions || [];

  const getExpBalance = (exp) => {
    let b = 0;
    savTx.forEach(t => { if (t.expenseId === exp.id) b += (t.type === 'income' ? 1 : -1) * (t.amount || 0); });
    return b;
  };

  // Накопления: per savings-category, sum calcMonthly for expenses active in that month
  const getExpCatVal = (catId, month) =>
    activeExp
      .filter(e => e.category === catId && e.startDate <= month && e.targetDate >= month)
      .reduce((s, e) => s + calcMonthly(e, getExpBalance(e)), 0);

  // Постоянные: per recurring-category, fixed monthly sum (same every month)
  const getRecCatVal = (catId) =>
    activeRec.filter(r => r.category === catId).reduce((s, r) => s + (r.amount || 0), 0);

  const usedExpCatIds = [...new Set(activeExp.map(e => e.category))];
  const usedRecCatIds = [...new Set(activeRec.map(r => r.category))];

  // Order: Постоянные first, Накопления second (appended after user cats)
  const autoCategories = [
    usedRecCatIds.length > 0 ? {
      id: '__recurring', emoji: '🔄', label: 'Постоянные', isAuto: true, autoColor: 'emerald',
      items: usedRecCatIds.map(cid => {
        const c = recCats.find(x => x.id === cid) || { emoji: '📌', label: cid };
        return { id: `__rec_${cid}`, emoji: c.emoji, label: c.label, isAuto: true,
                 getAutoVal: () => getRecCatVal(cid) };
      }),
    } : null,
    usedExpCatIds.length > 0 ? {
      id: '__savings', emoji: '💰', label: 'Накопления', isAuto: true, autoColor: 'violet',
      items: usedExpCatIds.map(cid => {
        const c = expCats.find(x => x.id === cid) || { emoji: '💡', label: cid };
        return { id: `__sav_${cid}`, emoji: c.emoji, label: c.label, isAuto: true,
                 getAutoVal: (m) => getExpCatVal(cid, m) };
      }),
    } : null,
    (() => {
      const suppAssign = data.budgetSupplementAssignments || {};
      const suppItems  = data.budgetSupplements || [];
      const normalize  = (arr) => (arr || []).map(x => typeof x === 'string' ? { id: x, qty: 1 } : x);
      const monthsWithSupp = months.filter(m => {
        return normalize(suppAssign[m]).some(e => suppItems.find(s => s.id === e.id && !s.archived));
      });
      if (monthsWithSupp.length === 0) return null;
      return {
        id: '__supplements', emoji: '💊', label: 'Спортпит и БАДы', isAuto: true, autoColor: 'orange',
        items: [{
          id: '__supp_total', emoji: '💊', label: 'Спортпит и БАДы', isAuto: true,
          getAutoVal: (m) => {
            return normalize(suppAssign[m]).reduce((s, e) => {
              const item = suppItems.find(x => x.id === e.id && !x.archived);
              return s + (item ? (item.cost || 0) * (e.qty || 1) : 0);
            }, 0);
          }
        }]
      };
    })(),
  ].filter(Boolean);

  // Merge user + auto, then sort by saved order
  const allCatsUnsorted = [...userCats, ...autoCategories];
  const savedOrder = data.budgetCategoryOrder || [];
  const allCats = [...allCatsUnsorted].sort((a, b) => {
    const ai = savedOrder.indexOf(a.id);
    const bi = savedOrder.indexOf(b.id);
    if (ai === -1 && bi === -1) return 0;
    if (ai === -1) return 1;
    if (bi === -1) return 1;
    return ai - bi;
  });

  // ── Value helpers ─────────────────────────────────────────────────────────
  const getItemVal   = (item, month) => item.getAutoVal ? item.getAutoVal(month) : (vals[`${item.id}_${month}`] || 0);
  const catTotal     = (cat, month)  => (cat.items || []).reduce((s, it) => s + getItemVal(it, month), 0);
  const grandTotal   = (month)       => allCats.flatMap(c => c.items || []).reduce((s, it) => s + getItemVal(it, month), 0);

  const startEdit = (itemId, month) => {
    setEditCell({ itemId, month });
    setEditVal((vals[`${itemId}_${month}`] || 0) > 0 ? String(vals[`${itemId}_${month}`]) : '');
  };

  const commitEdit = (itemId, month, value) => {
    const num = parseInt(value.replace(/\s/g, ''), 10);
    setData(d => ({
      ...d,
      budgetPlanValues: { ...(d.budgetPlanValues || {}), [`${itemId}_${month}`]: isNaN(num) || num < 0 ? 0 : num }
    }));
    setEditCell(null);
  };

  const handleKeyDown = (e, itemId, month) => {
    if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); commitEdit(itemId, month, editVal); }
    if (e.key === 'Escape') setEditCell(null);
  };

  // ── Scroll to current month on year change ────────────────────────────────
  useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;
    const curIdx = months.indexOf(curMonth);
    el.scrollLeft = curIdx > 0 ? curIdx * 116 : 0;
  }, [year]);

  // ── CSS helpers ───────────────────────────────────────────────────────────
  const planHeaderCls = "px-1 py-1.5 text-center text-xs font-semibold tracking-wide border-b border-l-2 border-[var(--border)] w-[62px] bg-blue-50 text-blue-600";
  const factHeaderCls = "px-1 py-1.5 text-center text-xs font-medium tracking-wide border-b border-[var(--border)] w-[54px] bg-gray-50 text-gray-400";
  const planDivCls    = "border-l-2 border-[var(--border)]";



  return (
    <div>
      {/* Toolbar */}
      <div className="flex items-center gap-2 sm:gap-3 mb-4 flex-wrap">
        <div className="flex items-center gap-0 bg-[var(--surface)] border border-[var(--border)] rounded-xl overflow-hidden">
          <button onClick={() => setYear(y => y - 1)}
            className="px-3 py-2 text-[var(--text-muted)] hover:text-[var(--text)] hover:bg-black/5 transition-colors text-base leading-none">‹</button>
          <span className="px-3 py-2 text-sm font-semibold min-w-[56px] text-center">{year}</span>
          <button onClick={() => setYear(y => y + 1)}
            className="px-3 py-2 text-[var(--text-muted)] hover:text-[var(--text)] hover:bg-black/5 transition-colors text-base leading-none">›</button>
        </div>
        <button onClick={() => setShowSettings(true)}
          className="p-2 rounded-xl border border-[var(--border)] bg-[var(--surface)] text-[var(--text-muted)] hover:text-[var(--text)] transition-colors"
          title="Настройки статей бюджета">
          <Icon name="settings" size={16} />
        </button>
        <button onClick={() => setShowCopyMonth(true)}
          className="px-3 py-1.5 rounded-xl text-xs border border-[var(--border)] bg-[var(--surface)] text-[var(--text-muted)] hover:text-[var(--text)] transition-colors inline-flex items-center gap-1.5"
          title="Скопировать план из другого месяца">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Копировать месяц
        </button>
        {year !== curYear && (
          <button onClick={() => setYear(curYear)}
            className="px-3 py-1.5 rounded-xl text-xs border border-[var(--border)] bg-[var(--surface)] text-[var(--text-muted)] hover:text-[var(--text)] transition-colors">
            Текущий год
          </button>
        )}
      </div>

      {!allCats.length && !incomeSources.length ? (
        <div className="text-center py-16 text-[var(--text-subtle)]">
          <div className="text-4xl mb-3">📊</div>
          <div className="font-medium mb-1">Нет данных для отображения</div>
          <div className="text-sm mb-4">Добавьте накопления или постоянные платежи — они появятся здесь автоматически. Или нажмите на шестерёнку, чтобы добавить ручные статьи.</div>
          <button onClick={() => setShowSettings(true)} className="btn-primary inline-flex items-center gap-2">
            <Icon name="settings" size={16} />Настроить статьи
          </button>
        </div>
      ) : (
        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl overflow-hidden">
          <div className="overflow-x-auto" ref={scrollRef}>
            <table className="text-sm border-collapse" style={{minWidth:`${180 + months.length * 116}px`}}>
              <thead>
                <tr>
                  <th className="sticky left-0 z-20 bg-[var(--bg)] px-4 py-2.5 text-left text-xs font-semibold uppercase tracking-wide text-[var(--text-subtle)] border-b border-r border-[var(--border)]"
                    style={{minWidth:'180px'}}>
                    Статья
                  </th>
                  {months.map((m, i) => (
                    <th key={m} colSpan={2} data-month={m}
                      className={`px-1 py-2.5 text-center text-xs font-semibold uppercase tracking-wide border-b border-l-2 border-[var(--border)] whitespace-nowrap
                        ${m === curMonth ? 'bg-blue-50 text-blue-700' : 'bg-[var(--bg)] text-[var(--text-subtle)]'}`}
                      style={{minWidth:'116px'}}>
                      {m === curMonth
                        ? <span className="px-2 py-0.5 rounded-md bg-blue-600 text-white text-[10px]">{MONTH_NAMES[i]}</span>
                        : MONTH_NAMES[i]}
                    </th>
                  ))}
                </tr>
                <tr>
                  <th className="sticky left-0 z-20 bg-[var(--bg)] border-b border-r border-[var(--border)]" />
                  {months.map(m => (
                    <React.Fragment key={m}>
                      <th className={planHeaderCls}>План</th>
                      <th className={factHeaderCls}>Факт</th>
                    </React.Fragment>
                  ))}
                </tr>
              </thead>

              <tbody>
                {/* ── Income section ─────────────────────────────── */}
                {incomeSources.length > 0 && (
                  <React.Fragment>
                    <tr className="bg-emerald-50">
                      <td className="sticky left-0 z-10 bg-emerald-50 px-4 py-2 border-b border-r border-[var(--border)] font-semibold text-xs">
                        <span className="mr-1.5">💰</span>
                        <span className="uppercase tracking-wide text-emerald-700">Приход</span>
                      </td>
                      {months.map(m => {
                        const t = incomeSrcTotal(m);
                        return (
                          <React.Fragment key={m}>
                            <td className={`px-1 py-2 text-center text-xs font-semibold border-b border-[var(--border)] whitespace-nowrap ${planDivCls} ${t > 0 ? 'text-emerald-600' : 'text-[var(--border)]'}`}>
                              {t > 0 ? formatRub(t) : '—'}
                            </td>
                            <td className="px-1 py-2 text-center text-[10px] text-gray-300 border-b border-[var(--border)]">—</td>
                          </React.Fragment>
                        );
                      })}
                    </tr>
                    {incomeSources.map(src => (
                      <tr key={src.id} className="border-b border-[var(--border)] transition-colors hover:bg-emerald-50/30 bg-white">
                        <td className="sticky left-0 z-10 bg-white px-4 py-1.5 border-r border-[var(--border)] text-[var(--text-muted)] text-sm pl-8">
                          <span className="before:content-['·'] before:mr-2 before:text-[var(--border-strong)]">{src.label}</span>
                        </td>
                        {months.map(m => {
                          const v = getIncomeVal(src.id, m);
                          const isEditing = editCell?.isIncome && editCell?.srcId === src.id && editCell?.month === m;
                          return (
                            <React.Fragment key={m}>
                              <td className={`px-1 py-1 w-[62px] ${planDivCls}`}>
                                {isEditing ? (
                                  <input
                                    type="number" inputMode="numeric"
                                    className="w-full text-center text-xs px-1 py-1 border border-emerald-400 rounded-md focus:outline-none bg-white text-emerald-700"
                                    value={editVal}
                                    onChange={e => setEditVal(e.target.value)}
                                    onBlur={() => commitIncomeEdit(src.id, m, editVal)}
                                    onKeyDown={e => handleIncomeKeyDown(e, src.id, m)}
                                    autoFocus
                                  />
                                ) : (
                                  <button
                                    onClick={() => startIncomeEdit(src.id, m)}
                                    className={`w-full text-center text-xs px-1 py-1.5 rounded hover:bg-emerald-50 transition-colors whitespace-nowrap font-medium ${v > 0 ? 'text-emerald-600' : ''}`}>
                                    {v > 0 ? formatRub(v) : <span className="text-gray-300 text-[10px]">·</span>}
                                  </button>
                                )}
                              </td>
                              <td className="px-1 py-1 text-center text-[10px] text-gray-300 w-[54px]">—</td>
                            </React.Fragment>
                          );
                        })}
                      </tr>
                    ))}
                    <tr><td colSpan={1 + months.length * 2} className="h-1 bg-[var(--border)]" /></tr>
                  </React.Fragment>
                )}

                {/* ── Expense categories ─────────────────────────── */}
                {allCats.map((cat) => {
                  const isAutoCat = !!cat.isAuto;

                  return (
                    <React.Fragment key={cat.id}>
                      {/* Category total row */}
                      <tr className="bg-gray-100">
                        <td className="sticky left-0 z-10 bg-gray-100 px-4 py-2 border-b border-r border-[var(--border)] font-semibold text-xs">
                          {cat.emoji && <span className="mr-1.5">{cat.emoji}</span>}
                          <span className="uppercase tracking-wide text-[var(--text)]">{cat.label}</span>
                          {isAutoCat && <span className="ml-2 text-[9px] font-normal opacity-50 normal-case tracking-normal">авто</span>}
                        </td>
                        {months.map(m => {
                          const t = catTotal(cat, m);
                          return (
                            <React.Fragment key={m}>
                              <td className={`px-1 py-2 text-center text-xs font-semibold border-b border-[var(--border)] whitespace-nowrap ${planDivCls} ${t > 0 ? 'text-blue-600' : 'text-[var(--border)]'}`}>
                                {t > 0 ? formatRub(t) : '—'}
                              </td>
                              <td className="px-1 py-2 text-center text-[10px] text-gray-300 border-b border-[var(--border)]">—</td>
                            </React.Fragment>
                          );
                        })}
                      </tr>

                      {/* Item rows */}
                      {(cat.items || []).map((item, ii) => (
                        <tr key={item.id} className={"border-b border-[var(--border)] transition-colors hover:bg-blue-50/20 bg-white"}>
                          <td className="sticky left-0 z-10 bg-white px-4 py-1.5 border-r border-[var(--border)] text-[var(--text-muted)] text-sm pl-8">
                            {!isAutoCat && item.emoji && <span className="mr-1">{item.emoji}</span>}
                            <span className="before:content-['·'] before:mr-2 before:text-[var(--border-strong)]">{item.label}</span>
                          </td>
                          {months.map(m => {
                            const v         = getItemVal(item, m);
                            const isEditing = !isAutoCat && editCell?.itemId === item.id && editCell?.month === m;
                            const valColor  = 'text-blue-600';

                            return (
                              <React.Fragment key={m}>
                                <td className={`px-1 py-1 w-[62px] ${planDivCls}`}>
                                  {isEditing ? (
                                    <input
                                      type="number" inputMode="numeric"
                                      className="w-full text-center text-xs px-1 py-1 border border-blue-400 rounded-md focus:outline-none bg-white text-blue-700"
                                      value={editVal}
                                      onChange={e => setEditVal(e.target.value)}
                                      onBlur={() => commitEdit(item.id, m, editVal)}
                                      onKeyDown={e => handleKeyDown(e, item.id, m)}
                                      autoFocus
                                    />
                                  ) : isAutoCat ? (
                                    // Auto-computed: display only, no editing
                                    <span className={`block w-full text-center text-xs px-1 py-1.5 font-medium ${v > 0 ? valColor : 'text-gray-300'}`}>
                                      {v > 0 ? formatRub(v) : <span className="text-[10px]">·</span>}
                                    </span>
                                  ) : (
                                    // Manual: click to edit
                                    <button
                                      onClick={() => startEdit(item.id, m)}
                                      className={`w-full text-center text-xs px-1 py-1.5 rounded hover:bg-blue-50 transition-colors whitespace-nowrap font-medium ${v > 0 ? valColor : ''}`}>
                                      {v > 0 ? formatRub(v) : <span className="text-gray-300 text-[10px]">·</span>}
                                    </button>
                                  )}
                                </td>
                                <td className="px-1 py-1 text-center text-[10px] text-gray-300 w-[54px]">—</td>
                              </React.Fragment>
                            );
                          })}
                        </tr>
                      ))}
                    </React.Fragment>
                  );
                })}

                {/* Grand total */}
                <tr className="border-t-2 border-[var(--border-strong)] bg-gray-200">
                  <td className="sticky left-0 z-10 bg-gray-200 px-4 py-3 border-r border-[var(--border)] font-bold text-xs uppercase tracking-wide text-[var(--text)]">
                    Итого расходы
                  </td>
                  {months.map(m => {
                    const t = grandTotal(m);
                    return (
                      <React.Fragment key={m}>
                        <td className={`px-1 py-3 text-center text-xs font-bold whitespace-nowrap ${planDivCls} ${t > 0 ? 'text-blue-700' : 'text-gray-300'}`}>
                          {t > 0 ? formatRub(t) : '—'}
                        </td>
                        <td className="px-1 py-3 text-center text-[10px] text-gray-300">—</td>
                      </React.Fragment>
                    );
                  })}
                </tr>

                {/* Delta: Income − Expenses */}
                {incomeSources.length > 0 && (
                  <tr className="bg-gray-100 border-t border-[var(--border)]">
                    <td className="sticky left-0 z-10 bg-gray-100 px-4 py-3 border-r border-[var(--border)] font-bold text-xs uppercase tracking-wide text-[var(--text)]">
                      Остаток
                    </td>
                    {months.map(m => {
                      const income  = incomeSrcTotal(m);
                      const expense = grandTotal(m);
                      const delta   = income - expense;
                      const hasData = income > 0 || expense > 0;
                      return (
                        <React.Fragment key={m}>
                          <td className={`px-1 py-3 text-center text-xs font-bold whitespace-nowrap ${planDivCls} ${!hasData ? 'text-gray-300' : delta >= 0 ? 'text-emerald-600' : 'text-red-500'}`}>
                            {!hasData ? '—' : (delta >= 0 ? '+' : '') + formatRub(delta)}
                          </td>
                          <td className="px-1 py-3 text-center text-[10px] text-gray-300">—</td>
                        </React.Fragment>
                      );
                    })}
                  </tr>
                )}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {showSettings && (
        <BudgetPlanSettingsModal data={data} setData={setData} autoCategories={autoCategories} allCatsOrdered={allCats} onClose={() => setShowSettings(false)} />
      )}

      {showCopyMonth && (
        <BudgetCopyMonthModal
          year={year}
          userCats={userCats}
          incomeSources={incomeSources}
          data={data}
          setData={setData}
          onClose={() => setShowCopyMonth(false)}
        />
      )}
    </div>
  );
}


function BudgetCopyMonthModal({ year, userCats, incomeSources, data, setData, onClose }) {
  const MONTH_NAMES = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const months = MONTH_NAMES.map((_, i) => `${year}-${String(i + 1).padStart(2, '0')}`);

  const [srcMonth,   setSrcMonth]   = useState('');
  const [dstMonths,  setDstMonths]  = useState([]);

  const manualItemIds = userCats.flatMap(c => (c.items || []).map(it => it.id));
  const incomeIds     = incomeSources.map(s => s.id);

  const vals       = data.budgetPlanValues  || {};
  const incomeVals = data.budgetIncomeValues || {};

  const srcHasData = srcMonth && (
    manualItemIds.some(id => (vals[`${id}_${srcMonth}`] || 0) > 0) ||
    incomeIds.some(id => (incomeVals[`${id}_${srcMonth}`] || 0) > 0)
  );

  const toggleDst = (m) => setDstMonths(d => d.includes(m) ? d.filter(x => x !== m) : [...d, m]);
  const availableDst = months.filter(m => m !== srcMonth);
  const selectAllDst = () => setDstMonths(dstMonths.length === availableDst.length ? [] : availableDst);

  const canCopy = srcMonth && dstMonths.length > 0 && srcHasData;

  const doCopy = () => {
    if (!canCopy) return;
    const newVals = { ...(data.budgetPlanValues || {}) };
    const newInc = { ...(data.budgetIncomeValues || {}) };

    dstMonths.forEach(dstMonth => {
      manualItemIds.forEach(id => {
        const v = vals[`${id}_${srcMonth}`] || 0;
        if (v > 0) newVals[`${id}_${dstMonth}`] = v;
      });
      incomeIds.forEach(id => {
        const v = incomeVals[`${id}_${srcMonth}`] || 0;
        if (v > 0) newInc[`${id}_${dstMonth}`] = v;
      });
    });

    setData(d => ({ ...d, budgetPlanValues: newVals, budgetIncomeValues: newInc }));
    onClose();
  };

  return (
    <Modal title="Копировать план месяца" onClose={onClose}>
      <div className="space-y-4">
        <div>
          <label className="block text-xs font-medium text-[var(--text-muted)] mb-1.5">Откуда (источник)</label>
          <select value={srcMonth} onChange={e => { setSrcMonth(e.target.value); setDstMonths(d => d.filter(m => m !== e.target.value)); }}
            className="w-full border border-[var(--border)] rounded-xl px-3 py-2.5 text-sm bg-[var(--surface)]">
            <option value="">Выберите месяц…</option>
            {months.map((m, i) => <option key={m} value={m}>{MONTH_NAMES[i]} {year}</option>)}
          </select>
        </div>

        <div>
          <div className="flex items-center justify-between mb-1.5">
            <label className="block text-xs font-medium text-[var(--text-muted)]">Куда (можно несколько)</label>
            {srcMonth && (
              <button onClick={selectAllDst} className="text-[10px] text-blue-600 hover:underline">
                {dstMonths.length === availableDst.length ? 'Снять все' : 'Выбрать все'}
              </button>
            )}
          </div>
          <div className="border border-[var(--border)] rounded-xl overflow-hidden bg-[var(--surface)] max-h-[200px] overflow-y-auto">
            {months.map((m, i) => {
              const disabled = m === srcMonth;
              const checked = dstMonths.includes(m);
              return (
                <label key={m} className={`flex items-center gap-2.5 px-3 py-2 border-b border-[var(--border)] last:border-0 cursor-pointer transition-colors
                  ${disabled ? 'opacity-30 cursor-not-allowed' : checked ? 'bg-blue-50' : 'hover:bg-black/[0.02]'}`}>
                  <input type="checkbox" checked={checked} disabled={disabled}
                    onChange={() => !disabled && toggleDst(m)}
                    className="rounded border-gray-300" />
                  <span className="text-sm">{MONTH_NAMES[i]}</span>
                  {m === srcMonth && <span className="text-[10px] text-[var(--text-subtle)] ml-auto">источник</span>}
                </label>
              );
            })}
          </div>
          {dstMonths.length > 0 && (
            <div className="text-xs text-blue-600 mt-1.5">Выбрано: {dstMonths.length} мес.</div>
          )}
        </div>

        {srcMonth && !srcHasData && (
          <div className="text-xs text-amber-600 bg-amber-50 rounded-xl px-3 py-2">
            В выбранном месяце нет данных для копирования
          </div>
        )}

        <div className="text-xs text-[var(--text-subtle)]">
          Копируются только ручные плановые значения статей расходов и источников дохода. Авто-статьи (Постоянные, Накопления) не затрагиваются.
        </div>
      </div>

      <div className="flex gap-3 mt-5 pt-4 border-t border-[var(--border)]">
        <button onClick={onClose} className="btn-secondary">Отмена</button>
        <button onClick={doCopy} disabled={!canCopy}
          className="btn-primary flex-1 disabled:opacity-40 disabled:cursor-not-allowed">
          Копировать{dstMonths.length > 1 ? ` в ${dstMonths.length} мес.` : ''}
        </button>
      </div>
    </Modal>
  );
}


function BudgetPlanSettingsModal({ data, setData, autoCategories, allCatsOrdered, onClose }) {
  const [cats,        setCats]        = useState(() => JSON.parse(JSON.stringify(data.budgetPlanCategories || [])));
  const [incomeSrcs,  setIncomeSrcs]  = useState(() => JSON.parse(JSON.stringify(data.budgetIncomeSources || [])));
  const [catOrder,    setCatOrder]    = useState(() => allCatsOrdered.map(c => c.id));
  const [expanded,    setExpanded]    = useState({});
  const [editCat,     setEditCat]     = useState(null);
  const [editItem,    setEditItem]    = useState(null);
  const [editIncome,  setEditIncome]  = useState(null);
  const [newCatEmoji, setNewCatEmoji] = useState('');
  const [newCatLabel, setNewCatLabel] = useState('');
  const [newItemLbls, setNewItemLbls] = useState({});
  const [newIncLabel, setNewIncLabel] = useState('');

  const autoMap = Object.fromEntries(autoCategories.map(c => [c.id, c]));

  const orderedAll = (() => {
    const allIds = [...new Set([...catOrder, ...cats.map(c => c.id), ...autoCategories.map(c => c.id)])];
    const sorted = allIds.filter(id => cats.find(c => c.id === id) || autoMap[id]);
    return sorted.map(id => autoMap[id] ? { ...autoMap[id], _isAuto: true } : { ...cats.find(c => c.id === id), _isAuto: false }).filter(Boolean);
  })();

  const moveInOrder = (id, dir) => {
    const all = orderedAll.map(c => c.id);
    const idx = all.indexOf(id);
    if (idx + dir < 0 || idx + dir >= all.length) return;
    const n = [...all]; [n[idx], n[idx + dir]] = [n[idx + dir], n[idx]];
    setCatOrder(n);
  };

  const save = () => {
    const finalOrder = orderedAll.map(c => c.id);
    setData(d => ({ ...d, budgetPlanCategories: cats, budgetIncomeSources: incomeSrcs, budgetCategoryOrder: finalOrder }));
    onClose();
  };

  /* ---- Income source ops ---- */
  const addIncomeSrc = () => {
    if (!newIncLabel.trim()) return;
    setIncomeSrcs(s => [...s, { id: crypto.randomUUID(), label: newIncLabel.trim() }]);
    setNewIncLabel('');
  };
  const removeIncomeSrc = (id) => setIncomeSrcs(s => s.filter(x => x.id !== id));
  const moveIncomeSrc = (id, dir) => {
    setIncomeSrcs(s => {
      const idx = s.findIndex(x => x.id === id);
      if (idx + dir < 0 || idx + dir >= s.length) return s;
      const n = [...s]; [n[idx], n[idx + dir]] = [n[idx + dir], n[idx]]; return n;
    });
  };
  const saveIncomeEdit = () => {
    if (!editIncome?.label?.trim()) return;
    setIncomeSrcs(s => s.map(x => x.id === editIncome.id ? { ...x, label: editIncome.label.trim() } : x));
    setEditIncome(null);
  };

  /* ---- Category ops ---- */
  const addCat = () => {
    if (!newCatLabel.trim()) return;
    const nc = { id: crypto.randomUUID(), emoji: newCatEmoji.trim() || '📊', label: newCatLabel.trim(), items: [] };
    setCats(c => [...c, nc]);
    setCatOrder(o => [...o, nc.id]);
    setExpanded(e => ({ ...e, [nc.id]: true }));
    setNewCatEmoji(''); setNewCatLabel('');
  };
  const removeCat = (id) => {
    if (!confirm('Удалить категорию со всеми статьями?')) return;
    setCats(c => c.filter(cat => cat.id !== id));
    setCatOrder(o => o.filter(x => x !== id));
  };
  const saveCatEdit = () => {
    if (!editCat?.label?.trim()) return;
    setCats(c => c.map(cat => cat.id === editCat.id
      ? { ...cat, emoji: editCat.emoji.trim() || '📊', label: editCat.label.trim() } : cat));
    setEditCat(null);
  };

  /* ---- Item ops ---- */
  const addItem = (catId) => {
    const lbl = (newItemLbls[catId] || '').trim();
    if (!lbl) return;
    setCats(c => c.map(cat => cat.id === catId
      ? { ...cat, items: [...(cat.items || []), { id: crypto.randomUUID(), label: lbl }] } : cat));
    setNewItemLbls(n => ({ ...n, [catId]: '' }));
  };
  const removeItem = (catId, itemId) => {
    setCats(c => c.map(cat => cat.id === catId
      ? { ...cat, items: (cat.items || []).filter(it => it.id !== itemId) } : cat));
  };
  const moveItem = (catId, itemId, dir) => {
    setCats(c => c.map(cat => {
      if (cat.id !== catId) return cat;
      const items = [...(cat.items || [])];
      const idx = items.findIndex(it => it.id === itemId);
      if (idx + dir < 0 || idx + dir >= items.length) return cat;
      [items[idx], items[idx + dir]] = [items[idx + dir], items[idx]];
      return { ...cat, items };
    }));
  };
  const saveItemEdit = () => {
    if (!editItem?.label?.trim()) return;
    setCats(c => c.map(cat => cat.id === editItem.catId
      ? { ...cat, items: (cat.items || []).map(it => it.id === editItem.id ? { ...it, label: editItem.label.trim() } : it) } : cat));
    setEditItem(null);
  };

  return (
    <Modal title="Структура бюджета" onClose={onClose}>
      <div className="max-h-[62vh] overflow-y-auto space-y-2 pr-0.5">

        {/* ── Income sources section ────────────────────────── */}
        <div className="border border-emerald-200 rounded-xl overflow-hidden">
          <div className="flex items-center gap-2 px-3 py-2.5 bg-emerald-50">
            <span className="text-lg">💰</span>
            <span className="font-semibold text-sm text-emerald-700">Источники дохода</span>
            <span className="text-xs text-emerald-500">({incomeSrcs.length})</span>
          </div>
          <div className="border-t border-emerald-100 px-3 py-2 space-y-1">
            {incomeSrcs.length === 0 && (
              <div className="text-xs text-[var(--text-subtle)] pl-5 py-1">Добавьте источники дохода ниже</div>
            )}
            {incomeSrcs.map((src, si) => (
              <div key={src.id} className="flex items-center gap-1.5 pl-4">
                {editIncome?.id === src.id ? (
                  <div className="flex items-center gap-1.5 flex-1">
                    <input className="flex-1 text-sm border border-[var(--border)] rounded-lg p-1.5 bg-[var(--surface)]"
                      value={editIncome.label} onChange={e => setEditIncome(ei => ({ ...ei, label: e.target.value }))}
                      onKeyDown={e => e.key === 'Enter' && saveIncomeEdit()} autoFocus />
                    <button onClick={saveIncomeEdit} className="p-1.5 rounded-lg bg-[var(--text)] text-white shrink-0"><Icon name="check" size={12} /></button>
                    <button onClick={() => setEditIncome(null)} className="p-1.5 rounded-lg hover:bg-black/5 text-[var(--text-muted)] shrink-0"><Icon name="x" size={12} /></button>
                  </div>
                ) : (
                  <>
                    <span className="w-1 h-1 rounded-full bg-emerald-400 shrink-0 ml-1" />
                    <span className="flex-1 text-sm text-[var(--text-muted)] truncate">{src.label}</span>
                    <button onClick={() => moveIncomeSrc(src.id, -1)} disabled={si === 0}
                      className="p-1 rounded hover:bg-black/5 text-[var(--text-muted)] disabled:opacity-25 shrink-0">
                      <Icon name="chevronDown" size={12} style={{transform:'rotate(180deg)'}} />
                    </button>
                    <button onClick={() => moveIncomeSrc(src.id, 1)} disabled={si === incomeSrcs.length - 1}
                      className="p-1 rounded hover:bg-black/5 text-[var(--text-muted)] disabled:opacity-25 shrink-0">
                      <Icon name="chevronDown" size={12} />
                    </button>
                    <button onClick={() => setEditIncome({ id: src.id, label: src.label })}
                      className="p-1 rounded hover:bg-black/5 text-[var(--text-muted)] shrink-0"><Icon name="edit" size={12} /></button>
                    <button onClick={() => removeIncomeSrc(src.id)}
                      className="p-1 rounded hover:bg-red-50 text-[var(--text-muted)] hover:text-red-500 shrink-0"><Icon name="trash" size={12} /></button>
                  </>
                )}
              </div>
            ))}
            <div className="flex items-center gap-1.5 pl-4 pt-1">
              <span className="w-1 h-1 shrink-0 ml-1" />
              <input className="flex-1 text-sm border border-dashed border-emerald-200 rounded-lg p-1.5 bg-transparent"
                value={newIncLabel}
                onChange={e => setNewIncLabel(e.target.value)}
                placeholder="Зарплата, фриланс, дивиденды..."
                onKeyDown={e => e.key === 'Enter' && addIncomeSrc()} />
              <button onClick={addIncomeSrc} className="p-1.5 rounded-lg bg-emerald-600 text-white hover:opacity-90 shrink-0"><Icon name="plus" size={13} /></button>
            </div>
          </div>
        </div>

        <div className="text-xs text-[var(--text-subtle)] uppercase tracking-wide font-semibold px-1 pt-2">Статьи расходов</div>

        {orderedAll.length === 0 && (
          <div className="text-center py-6 text-[var(--text-subtle)] text-sm">Добавьте первую категорию ниже</div>
        )}

        {orderedAll.map((cat, ci) => {
          const isAuto = cat._isAuto;
          const userCat = !isAuto ? cats.find(c => c.id === cat.id) : null;

          return (
          <div key={cat.id} className={`border rounded-xl overflow-hidden ${isAuto ? 'border-blue-200' : 'border-[var(--border)]'}`}>

            {/* Category header row */}
            <div className={`flex items-center gap-1.5 px-3 py-2.5 ${isAuto ? 'bg-blue-50/60' : 'bg-[var(--bg)]'}`}>
              {!isAuto && editCat?.id === cat.id ? (
                <div className="flex items-center gap-1.5 flex-1">
                  <input className="w-10 text-center text-base border border-[var(--border)] rounded-lg p-1 bg-[var(--surface)]"
                    value={editCat.emoji} onChange={e => setEditCat(ec => ({ ...ec, emoji: e.target.value }))} placeholder="📊" />
                  <input className="flex-1 text-sm font-semibold border border-[var(--border)] rounded-lg p-1.5 bg-[var(--surface)]"
                    value={editCat.label} onChange={e => setEditCat(ec => ({ ...ec, label: e.target.value }))}
                    onKeyDown={e => e.key === 'Enter' && saveCatEdit()} autoFocus />
                  <button onClick={saveCatEdit}        className="p-1.5 rounded-lg bg-[var(--text)] text-white shrink-0"><Icon name="check" size={13} /></button>
                  <button onClick={() => setEditCat(null)} className="p-1.5 rounded-lg hover:bg-black/5 text-[var(--text-muted)] shrink-0"><Icon name="x" size={13} /></button>
                </div>
              ) : (
                <>
                  {!isAuto ? (
                    <button
                      onClick={() => setExpanded(e => ({ ...e, [cat.id]: !e[cat.id] }))}
                      className="flex-1 flex items-center gap-2 text-left min-w-0">
                      <span className="text-lg shrink-0">{cat.emoji || '📊'}</span>
                      <span className="font-semibold text-sm truncate">{cat.label}</span>
                      <span className="text-xs text-[var(--text-subtle)] shrink-0">({(userCat?.items || []).length})</span>
                      <Icon name="chevronDown" size={14}
                        style={{ transform: expanded[cat.id] ? 'rotate(180deg)' : 'none', transition: 'transform .2s', color: 'var(--text-subtle)', marginLeft: 'auto', flexShrink: 0 }} />
                    </button>
                  ) : (
                    <div className="flex-1 flex items-center gap-2 min-w-0">
                      <span className="text-lg shrink-0">{cat.emoji}</span>
                      <span className="font-semibold text-sm truncate">{cat.label}</span>
                      <span className="ml-1 text-[9px] font-normal text-blue-500 bg-blue-100 px-1.5 py-0.5 rounded-full">авто</span>
                    </div>
                  )}
                  <button onClick={() => moveInOrder(cat.id, -1)} disabled={ci === 0}
                    className="p-1.5 rounded-lg hover:bg-black/5 text-[var(--text-muted)] disabled:opacity-25 shrink-0">
                    <Icon name="chevronDown" size={13} style={{transform:'rotate(180deg)'}} />
                  </button>
                  <button onClick={() => moveInOrder(cat.id, 1)} disabled={ci === orderedAll.length - 1}
                    className="p-1.5 rounded-lg hover:bg-black/5 text-[var(--text-muted)] disabled:opacity-25 shrink-0">
                    <Icon name="chevronDown" size={13} />
                  </button>
                  {!isAuto && (
                    <>
                      <button onClick={() => setEditCat({ id: cat.id, emoji: cat.emoji || '', label: cat.label })}
                        className="p-1.5 rounded-lg hover:bg-black/5 text-[var(--text-muted)] shrink-0"><Icon name="edit" size={13} /></button>
                      <button onClick={() => removeCat(cat.id)}
                        className="p-1.5 rounded-lg hover:bg-red-50 text-[var(--text-muted)] hover:text-red-500 shrink-0"><Icon name="trash" size={13} /></button>
                    </>
                  )}
                </>
              )}
            </div>

            {/* Items list (expanded) — only for user categories */}
            {!isAuto && expanded[cat.id] && (
              <div className="border-t border-[var(--border)] px-3 py-2 space-y-1">
                {(userCat?.items || []).length === 0 && (
                  <div className="text-xs text-[var(--text-subtle)] pl-5 py-1">Нет статей — добавьте ниже</div>
                )}
                {(userCat?.items || []).map((item, ii) => (
                  <div key={item.id} className="flex items-center gap-1.5 pl-4">
                    {editItem?.id === item.id ? (
                      <div className="flex items-center gap-1.5 flex-1">
                        <input className="flex-1 text-sm border border-[var(--border)] rounded-lg p-1.5 bg-[var(--surface)]"
                          value={editItem.label} onChange={e => setEditItem(ei => ({ ...ei, label: e.target.value }))}
                          onKeyDown={e => e.key === 'Enter' && saveItemEdit()} autoFocus />
                        <button onClick={saveItemEdit}          className="p-1.5 rounded-lg bg-[var(--text)] text-white shrink-0"><Icon name="check" size={12} /></button>
                        <button onClick={() => setEditItem(null)} className="p-1.5 rounded-lg hover:bg-black/5 text-[var(--text-muted)] shrink-0"><Icon name="x" size={12} /></button>
                      </div>
                    ) : (
                      <>
                        <span className="w-1 h-1 rounded-full bg-[var(--border-strong)] shrink-0 ml-1" />
                        <span className="flex-1 text-sm text-[var(--text-muted)] truncate">{item.label}</span>
                        <button onClick={() => moveItem(cat.id, item.id, -1)} disabled={ii === 0}
                          className="p-1 rounded hover:bg-black/5 text-[var(--text-muted)] disabled:opacity-25 shrink-0">
                          <Icon name="chevronDown" size={12} style={{transform:'rotate(180deg)'}} />
                        </button>
                        <button onClick={() => moveItem(cat.id, item.id, 1)} disabled={ii === (userCat?.items || []).length - 1}
                          className="p-1 rounded hover:bg-black/5 text-[var(--text-muted)] disabled:opacity-25 shrink-0">
                          <Icon name="chevronDown" size={12} />
                        </button>
                        <button onClick={() => setEditItem({ catId: cat.id, id: item.id, label: item.label })}
                          className="p-1 rounded hover:bg-black/5 text-[var(--text-muted)] shrink-0"><Icon name="edit" size={12} /></button>
                        <button onClick={() => removeItem(cat.id, item.id)}
                          className="p-1 rounded hover:bg-red-50 text-[var(--text-muted)] hover:text-red-500 shrink-0"><Icon name="trash" size={12} /></button>
                      </>
                    )}
                  </div>
                ))}
                {/* Add item */}
                <div className="flex items-center gap-1.5 pl-4 pt-1">
                  <span className="w-1 h-1 shrink-0 ml-1" />
                  <input className="flex-1 text-sm border border-dashed border-[var(--border)] rounded-lg p-1.5 bg-transparent"
                    value={newItemLbls[cat.id] || ''}
                    onChange={e => setNewItemLbls(n => ({ ...n, [cat.id]: e.target.value }))}
                    placeholder="Новая статья..."
                    onKeyDown={e => e.key === 'Enter' && addItem(cat.id)} />
                  <button onClick={() => addItem(cat.id)} className="p-1.5 rounded-lg bg-[var(--text)] text-white hover:opacity-90 shrink-0"><Icon name="plus" size={13} /></button>
                </div>
              </div>
            )}
          </div>
          );
        })}

        {/* Add category */}
        <div className="flex items-center gap-2 border-2 border-dashed border-[var(--border)] rounded-xl px-3 py-2.5 mt-1">
          <input className="w-10 text-center text-base border border-[var(--border)] rounded-lg p-1 bg-[var(--surface)]"
            value={newCatEmoji} onChange={e => setNewCatEmoji(e.target.value)} placeholder="📊" />
          <input className="flex-1 text-sm border border-[var(--border)] rounded-lg p-1.5 bg-[var(--surface)]"
            value={newCatLabel} onChange={e => setNewCatLabel(e.target.value)}
            placeholder="Новая категория..."
            onKeyDown={e => e.key === 'Enter' && addCat()} />
          <button onClick={addCat} className="p-1.5 rounded-lg bg-[var(--text)] text-white hover:opacity-90 shrink-0"><Icon name="plus" size={14} /></button>
        </div>
      </div>

      <div className="flex gap-3 mt-5 pt-4 border-t border-[var(--border)]">
        <button onClick={onClose} className="btn-secondary">Отмена</button>
        <button onClick={save}    className="btn-primary flex-1">Сохранить</button>
      </div>
    </Modal>
  );
}


function BudgetMultiSelect({ label, options, selected, onChange }) {
  const [open, setOpen] = useState(false);
  const hasSelected = selected.length > 0;

  const toggle = (val) => {
    onChange(selected.includes(val) ? selected.filter(v => v !== val) : [...selected, val]);
  };

  return (
    <div className="relative w-36">
      <button
        onClick={() => setOpen(v => !v)}
        className={`w-full flex items-center justify-between gap-2 px-4 py-2.5 rounded-xl border text-sm font-medium transition-all ${
          hasSelected || open
            ? 'bg-[var(--text)] text-white border-[var(--text)]'
            : 'bg-[var(--surface)] border-[var(--border)] text-[var(--text-muted)] hover:border-[var(--border-strong)]'
        }`}
      >
        <span>{label}{hasSelected ? ` · ${selected.length}` : ''}</span>
        <Icon name="chevronDown" size={14} style={{ transform: open ? 'rotate(180deg)' : 'none', transition: 'transform 0.2s ease' }} />
      </button>

      {open && (
        <>
          <div className="fixed inset-0 z-10" onClick={() => setOpen(false)} />
          <div className="absolute left-0 top-full mt-1.5 z-20 bg-[var(--surface)] border border-[var(--border)] rounded-2xl shadow-lg min-w-full max-h-64 overflow-y-auto fade-in" style={{ overscrollBehavior: 'contain' }}>
            <div className="py-1">
              {options.map(opt => (
                <button
                  key={opt.value}
                  onClick={(e) => { e.stopPropagation(); toggle(opt.value); }}
                  className="w-full flex items-center gap-3 px-4 py-2.5 text-sm transition-all hover:bg-black/[0.04] text-left"
                >
                  <div className={`w-4 h-4 rounded-[4px] border flex items-center justify-center flex-shrink-0 transition-all ${
                    selected.includes(opt.value)
                      ? 'bg-[var(--text)] border-[var(--text)]'
                      : 'border-[var(--border-strong)] bg-[var(--surface)]'
                  }`}>
                    {selected.includes(opt.value) && (
                      <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M20 6 9 17l-5-5"/>
                      </svg>
                    )}
                  </div>
                  <span className={selected.includes(opt.value) ? 'text-[var(--text)] font-medium' : 'text-[var(--text-muted)]'}>
                    {opt.label}
                  </span>
                </button>
              ))}
            </div>
            <div className="border-t border-[var(--border)] px-3 py-2">
              <button
                onClick={(e) => { e.stopPropagation(); onChange([]); setOpen(false); }}
                className="w-full text-xs text-[var(--text-subtle)] hover:text-[var(--text)] py-1.5 transition-colors font-medium tracking-wide uppercase"
              >
                Сбросить
              </button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}
