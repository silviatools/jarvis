<style>
  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --border: #e8e8e8;
    --border-strong: #d4d4d4;
    --text: #0a0a0a;
    --text-muted: #6b6b6b;
    --text-subtle: #9a9a9a;
    --accent: #0a0a0a;
  }
  * { -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;

  .font-display { font-family: 'Fraunces', serif; font-optical-sizing: auto; letter-spacing: -0.02em; }
  .font-body { font-family: 'Inter', sans-serif; }

  /* Чекбокс */
  .check-box {
    width: 28px;
    height: 28px;
    border: 1.5px solid var(--border-strong);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    flex-shrink: 0;
    background: var(--surface);
  }
  .check-box.checked {
    background: var(--text);
    border-color: var(--text);
  }
  .check-box svg { opacity: 0; transition: opacity 0.2s ease; }
  .check-box.checked svg { opacity: 1; }

  /* Анимации */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn 0.3s ease both; }

  @keyframes slideDown {
    from { opacity: 0; max-height: 0; }
    to { opacity: 1; max-height: 1000px; }
  }
  .slide-down { animation: slideDown 0.3s ease both; overflow: hidden; }
  .input-display {
    font-family: 'Fraunces', serif;
    font-size: 1.25rem;
    letter-spacing: -0.02em;
    padding: 4px 6px;
    text-align: center;
    background: transparent;
    border-color: var(--border);
  }

  /* Скрыть скроллбар */
  .scrollbar-hide::-webkit-scrollbar { display: none; }
  .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

  /* iOS safe area */
  .pb-safe { padding-bottom: max(8px, env(safe-area-inset-bottom)); }
  .bottom-nav { padding-bottom: env(safe-area-inset-bottom, 0); }

  /* Инпуты */
  input, select, textarea {
    font-family: 'Inter', sans-serif;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 15px;
    color: var(--text);
    width: 100%;
    transition: border-color 0.15s ease;
    outline: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--text);
  }
  label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 6px;
    display: block;
    font-weight: 500;
  }

  /* Кнопки */
  .btn-primary {
    background: var(--text);
    color: white;
    padding: 14px 20px;
    border-radius: 10px;
    font-weight: 500;
    transition: opacity 0.15s ease;
    border: none;
    cursor: pointer;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    padding: 14px 20px;
    border-radius: 10px;
    font-weight: 500;
    border: 1px solid var(--border-strong);
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .btn-secondary:hover { background: #f3f3f3; }
  .btn-ghost {
    color: var(--text-muted);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .btn-ghost:hover { color: var(--text); }

  /* Voice button pulse animation */
  @keyframes pulse-ring {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  .voice-pulse {
    position: relative;
  }
  .voice-pulse::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 9999px;
    background: #ef4444;
    animation: pulse-ring 1.2s ease-out infinite;
    pointer-events: none;
  }

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

// ============== STORAGE ==============
const STORAGE_KEY = 'assistant_data_v1';

const DEFAULT_SETTINGS = {
  weatherAutoSwitch: true,
  weatherAutoSwitchMinutes: 2,
  weatherCity: '',
  homeAddress: '',
  workAddress: '',
  tomtomKey: '',
  telegramToken: '',
  voiceProvider: 'claude',
  voiceApiKey: '',
  voiceModel: '',
  voiceTtsVoice: 'nova',
};

// ── MSK time helpers ─────────────────────────────────────────────────────
// All Telegram reminder times (chores, boss tasks, holidays, debts, diet,
// checklist) are compared against the SERVER's Moscow-time clock. If the
// user's device is not in the Moscow timezone, a time entered "as-is" would
// never match. MskTimeInput below shows/edits the value in the user's own
// local time while transparently storing/comparing it as MSK — so the
// notification fires at the moment the user actually intends, regardless of
// which timezone their device is in.
const MSK_OFFSET_MS = 3 * 60 * 60 * 1000; // MSK = UTC+3, no DST
const HHMM_RE = /^\d{2}:\d{2}$/;

function localTimeToMsk(hhmm) {
  if (!hhmm || !HHMM_RE.test(hhmm)) return hhmm;
  const [h, m] = hhmm.split(':').map(Number);
  const now = new Date();
  const localInstantMs = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0, 0).getTime();
  const msk = new Date(localInstantMs + MSK_OFFSET_MS);
  return `${String(msk.getUTCHours()).padStart(2, '0')}:${String(msk.getUTCMinutes()).padStart(2, '0')}`;
}

function mskTimeToLocal(hhmm) {
  if (!hhmm || !HHMM_RE.test(hhmm)) return hhmm;
  const [h, m] = hhmm.split(':').map(Number);
  const now = new Date();
  const asUtcInstantMs = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), h, m, 0, 0);
  const local = new Date(asUtcInstantMs - MSK_OFFSET_MS);
  return `${String(local.getHours()).padStart(2, '0')}:${String(local.getMinutes()).padStart(2, '0')}`;
}

// Drop-in replacement for <input type="time">: displays/edits in the user's
// local time, stores/reports the MSK-equivalent value via onChange.
function MskTimeInput({ value, onChange, className, style }) {
  return (
    <input
      type="time"
      value={mskTimeToLocal(value || '')}
      onChange={e => onChange(localTimeToMsk(e.target.value))}
      className={className}
      style={style}
    />
  );
}

const DEFAULT_BODY_FIELDS = [
  { id: 'weight',       label: 'Вес',               unit: 'кг'  },
  { id: 'bodyFat',      label: 'Жир',               unit: '%'   },
  { id: 'muscleMass',   label: 'Мышцы',             unit: '%'   },
  { id: 'water',        label: 'Вода',               unit: '%'   },
  { id: 'bmi',          label: 'BMI',                unit: ''    },
  { id: 'visceralFat',  label: 'Висцеральный жир',  unit: 'ур.' },
  { id: 'waist',        label: 'Талия',             unit: 'см'  },
  { id: 'chest',        label: 'Грудь',             unit: 'см'  },
  { id: 'hips',         label: 'Бёдра',             unit: 'см'  },
  { id: 'bicep',        label: 'Бицепс',            unit: 'см'  },
  { id: 'thigh',        label: 'Бедро',             unit: 'см'  },
];

const PRESET_BODY_FIELDS = [
  { id: 'neck',          label: 'Шея',              unit: 'см'   },
  { id: 'boneMass',      label: 'Кости',            unit: 'кг'   },
  { id: 'metabolicAge',  label: 'Метаб. возраст',   unit: 'лет'  },
  { id: 'calories',      label: 'Базовый обмен',    unit: 'ккал' },
  { id: 'calf',          label: 'Икра',             unit: 'см'   },
  { id: 'shoulder',      label: 'Плечи',            unit: 'см'   },
  { id: 'proteinPct',    label: 'Белок',            unit: '%'    },
];

const DEFAULT_BODY_PHOTO_CATEGORIES = ['Спереди', 'Сбоку', 'Спина'];

const DEFAULT_DATA = () => ({
  supplements: [], meals: [], taken: {}, rationStock: 0, cookingPlans: [], containers: [],
  dietLog: [],
  dietPlan: { calories: '', protein: '', fat: '', carbs: '' },
  bodyFields: DEFAULT_BODY_FIELDS.map(f => ({ ...f })),
  bodyEntries: [],
  bodyPhotoCategories: [...DEFAULT_BODY_PHOTO_CATEGORIES],
  cars: [],
  serviceRecords: [],
  budgetExpenses: [],
  budgetCategories: [],
  budgetRecurring: [],
  budgetPlanCategories: [],
  budgetPlanValues: {},
  budgetRecurringCategories: [],
  savingsActual: {},
  savingsCorrections: [],
  savingsTransactions: [],
  budgetDebts: [],
  bodyModes: [],
  activeBodyModeId: null,
  bodyProgressStartDate: '',
  bodyFieldTargets: {},
  dietReminder: { enabled: false, time: '20:00', days: [0, 1, 2, 3, 4, 5, 6] },
  dailyChecklistFields: [],
  dailyChecklistReminder: { enabled: false, time: '21:00', days: [0, 1, 2, 3, 4, 5, 6] },
  dailyChecklistLog: [],
  deletedIds: {},
  settings: { ...DEFAULT_SETTINGS },
});

// backward compat: photos were stored as strings, now as {filename, category}
const normalizePhoto = (p) => typeof p === 'string' ? { filename: p, category: '' } : p;

const loadData = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return DEFAULT_DATA();
    const parsed = JSON.parse(raw);
    parsed.settings = { ...DEFAULT_SETTINGS, ...(parsed.settings || {}) };
    return parsed;
  } catch {
    return DEFAULT_DATA();
  }
};

//  • dietLog / dailyChecklistLog on pull → server wins (Telegram bot)
//  • everything else on pull → local wins (user edits, bodyModes, reminders…)
//  • on push → local wins, bot date-logs merged in
const isPlainObject = (v) => v && typeof v === 'object' && !Array.isArray(v);
const DATE_LOG_KEYS = new Set(['dietLog', 'dailyChecklistLog']);

const preferLocalForKey = (key, mode) => mode === 'push' || !DATE_LOG_KEYS.has(key);

// Merge two per-collection "deleted id" tombstone maps ({ [id]: deletedAtMs }),
// keeping the newest timestamp for any id present on both sides.
const mergeDeletedIdsMaps = (localAll, serverAll) => {
  const merged = {};
  const collKeys = new Set([...Object.keys(localAll || {}), ...Object.keys(serverAll || {})]);
  collKeys.forEach(ck => {
    const l = (localAll || {})[ck] || {};
    const s = (serverAll || {})[ck] || {};
    const out = {};
    new Set([...Object.keys(l), ...Object.keys(s)]).forEach(id => {
      out[id] = Math.max(l[id] || 0, s[id] || 0);
    });
    merged[ck] = out;
  });
  return merged;
};

// Records that an item was explicitly deleted from a collection, so a later
// merge (pull/push) with a server snapshot that still has it can never
// resurrect it. Use alongside filtering the item out of the array itself.
const withDeletedId = (d, collectionKey, id) => {
  const all = { ...(d.deletedIds || {}) };
  all[collectionKey] = { ...(all[collectionKey] || {}), [String(id)]: Date.now() };
  return all;
};

// True if this array holds objects identifiable by `.id` (the normal case
// for entity lists). False for plain-value arrays (category name strings,
// id-order lists etc.) which have no per-item id to merge by.
const looksLikeIdArray = (arr) => (Array.isArray(arr) ? arr : []).some(e => e && typeof e === 'object' && e.id != null);

const mergeIdArrays = (localArr, serverArr, preferLocal, deletedForKey) => {
  const la = Array.isArray(localArr) ? localArr : [];
  const sa = Array.isArray(serverArr) ? serverArr : [];

  if (!looksLikeIdArray(la) && !looksLikeIdArray(sa)) {
    // Plain-value array — no id to merge by. Union unique values so neither
    // side's entries are ever silently wiped out by a merge (this used to
    // always collapse to [] since nothing in a string array has `.id`),
    // while still respecting explicit deletions recorded by value.
    const seen = new Set();
    const out = [];
    [...la, ...sa].forEach(v => {
      const k = v && typeof v === 'object' ? JSON.stringify(v) : v;
      if (!seen.has(k) && !(deletedForKey && deletedForKey[k] !== undefined)) { seen.add(k); out.push(v); }
    });
    return out;
  }

  // Last-write-wins by `updatedAt` when BOTH sides have a real timestamp for
  // the same id — this is what makes edits from a DIFFERENT device actually
  // show up everywhere else, instead of always losing to whichever copy
  // happens to be "local" on a given device. Falls back to the old bias
  // (preferLocal decides) when timestamps are missing, for legacy data.
  const byId = new Map();
  const consider = (e, isPreferredPass) => {
    if (e?.id == null) return;
    const key = String(e.id);
    const cur = byId.get(key);
    if (!cur) { byId.set(key, e); return; }
    const curTs = typeof cur.updatedAt === 'number' ? cur.updatedAt : null;
    const eTs = typeof e.updatedAt === 'number' ? e.updatedAt : null;
    if (curTs == null && eTs == null) {
      if (isPreferredPass) byId.set(key, e);
      return;
    }
    if (eTs != null && (curTs == null || eTs > curTs)) byId.set(key, e);
  };
  const first = preferLocal ? sa : la;
  const second = preferLocal ? la : sa;
  first.forEach(e => consider(e, false));
  second.forEach(e => consider(e, true));
  if (deletedForKey) {
    Object.keys(deletedForKey).forEach(id => byId.delete(id));
  }
  return [...byId.values()];
};

const mergeDateLogEntries = (localArr, serverArr, preferLocal) => {
  const norm = (e) => ({ ...e, answers: { ...(e.answers || {}) } });
  const local = (Array.isArray(localArr) ? localArr : []).filter(e => e?.date).map(norm);
  const server = (Array.isArray(serverArr) ? serverArr : []).filter(e => e?.date).map(norm);
  const serverByDate = new Map(server.map(e => [e.date, e]));

  if (preferLocal) {
    // push: локальный список дат — источник правды (удаления сохраняются)
    return local.map(localEntry => {
      const srv = serverByDate.get(localEntry.date);
      if (!srv) return localEntry;
      return {
        ...srv,
        ...localEntry,
        answers: { ...(srv.answers || {}), ...(localEntry.answers || {}) },
        level: localEntry.level !== undefined ? localEntry.level : srv.level,
        id: localEntry.id || srv.id,
      };
    }).sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  }

  // pull: сервер/бот побеждает, но новые дни с бота добавляются
  const byDate = new Map();
  local.forEach(e => byDate.set(e.date, { ...e }));
  server.forEach(e => {
    const prev = byDate.get(e.date);
    if (!prev) {
      byDate.set(e.date, { ...e });
      return;
    }
    byDate.set(e.date, {
      ...prev,
      ...e,
      answers: { ...(prev.answers || {}), ...(e.answers || {}) },
      level: e.level !== undefined ? e.level : prev.level,
      id: e.id || prev.id,
    });
  });
  return [...byDate.values()].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
};

const mergeAppData = (local, server, mode = 'pull') => {
  const merged = { ...local, ...server };
  const mergedDeletedIds = mergeDeletedIdsMaps(local?.deletedIds, server?.deletedIds);
  const keys = new Set([...Object.keys(local || {}), ...Object.keys(server || {})]);
  for (const key of keys) {
    if (key === 'deletedIds') { merged[key] = mergedDeletedIds; continue; }
    const l = local ? local[key] : undefined;
    const s = server ? server[key] : undefined;
    if (s === undefined) { merged[key] = l; continue; }
    if (l === undefined) { merged[key] = s; continue; }
    const preferLocal = preferLocalForKey(key, mode);
    if (DATE_LOG_KEYS.has(key) && (Array.isArray(l) || Array.isArray(s))) {
      merged[key] = mergeDateLogEntries(l, s, preferLocal);
    } else if (Array.isArray(l) || Array.isArray(s)) {
      merged[key] = mergeIdArrays(l, s, preferLocal, mergedDeletedIds[key]);
    } else if (isPlainObject(l) && isPlainObject(s)) {
      merged[key] = preferLocal ? { ...s, ...l } : { ...l, ...s };
    } else {
      merged[key] = preferLocal ? l : s;
    }
  }
  return merged;
};

const saveData = (data) => {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
};

const fetchServerData = async () => {
  try {
    const res = await fetch('/api/data', { cache: 'no-store' });
    if (!res.ok) return null;
    const json = await res.json();
    if (!json || Object.keys(json).length === 0) return null;
    json.settings = { ...DEFAULT_SETTINGS, ...(json.settings || {}) };
    return json;
  } catch {
    return null;
  }
};

let getAppDataSnapshot = () => null;

// Dedicated, immediate delete for date-log entries (dailyChecklistLog / dietLog).
// Uses keepalive so the request survives even if the user reloads the page
// right after clicking delete — avoids the race where a later pull-merge
// (which trusts the server for these bot-writable logs) would resurrect
// the entry from a stale server snapshot fetched before this delete landed.
const deleteLogEntryOnServer = (key, date) => {
  try {
    fetch('/api/data/delete-log-entry', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key, date }),
      keepalive: true,
    }).catch(() => {});
  } catch (_) {}
};

const pushServerData = (() => {
  let timer = null;
  const doPush = async (snapshot) => {
    const local = snapshot || getAppDataSnapshot();
    if (!local) return;
    try {
      const serverData = await fetchServerData();
      const toPush = serverData ? mergeAppData(local, serverData, 'push') : local;
      await fetch('/api/data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(toPush),
      });
    } catch (_) {}
  };
  return {
    schedule: () => {
      clearTimeout(timer);
      timer = setTimeout(() => doPush(), 400);
    },
    flush: (snapshot) => {
      clearTimeout(timer);
      timer = null;
      return doPush(snapshot);
    },
  };
})();

    settings: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,

// ============== HELPERS ==============
// Утро: 6:00–12:00, Вечер: 18:00–23:00
const getCurrentPeriod = () => {
  const h = new Date().getHours();
  if (h >= 6 && h < 12) return 'morning';
  if (h >= 18 && h < 23) return 'evening';
  // Между периодами — показываем ближайший
  if (h >= 12 && h < 18) return 'evening';
  return 'morning';
};

const getTodayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

// Сколько дней прошло с эпохи (для "через день")
const getDayNumber = () => {
  return Math.floor(new Date().setHours(0,0,0,0) / 86400000);
};

const isSupplementForPeriod = (supp, period) => {
  if (supp.archived) return false;
  const f = supp.frequency;
  const today = new Date().getDay(); // 0=вс, 1=пн ...
  const isWeekend = today === 0 || today === 6;
  const isWeekday = !isWeekend;
  const dayNum = getDayNumber();
  const isEvenDay = dayNum % 2 === 0;

  if (period === 'morning') {
    if (f === 'daily_morning' || f === 'daily_both') return true;
    if (f === 'every_other_morning') return isEvenDay;
    if (f === 'weekdays_morning') return isWeekday;
    if (f === 'weekends_morning') return isWeekend;
    if (f === 'weekly_morning') return today === supp.weekday;
  }
  if (period === 'evening') {
    if (f === 'daily_evening' || f === 'daily_both') return true;
    if (f === 'every_other_evening') return isEvenDay;
    if (f === 'weekdays_evening') return isWeekday;
    if (f === 'weekends_evening') return isWeekend;
    if (f === 'weekly_evening') return today === supp.weekday;
  }
  return false;
};

const getFrequencyLabel = (id) => FREQUENCIES.find(f => f.id === id)?.label || id;

const CHORE_FREQUENCIES = [
  { id: 'daily',     label: 'Каждый день',      days: 1 },
  { id: 'every2',    label: 'Каждые 2 дня',     days: 2 },
  { id: 'every3',    label: 'Каждые 3 дня',     days: 3 },
  { id: 'weekly',    label: 'Раз в неделю',     days: 7 },
  { id: 'biweekly',  label: 'Раз в 2 недели',   days: 14 },
  { id: 'monthly',   label: 'Раз в месяц',      days: 30 },
  { id: 'custom',    label: 'Своя периодичность', days: null },
];

const getChoreFrequencyDays = (chore) => {
  if (chore.frequency === 'custom') return Math.max(1, chore.customDays || 7);
  return CHORE_FREQUENCIES.find(f => f.id === chore.frequency)?.days || 7;
};

const getChoreNextDate = (chore) => {
  const days = getChoreFrequencyDays(chore);
  if (!chore.lastDone) {
    const d = new Date(); d.setHours(0, 0, 0, 0); return d;
  }
  const last = new Date(chore.lastDone); last.setHours(0, 0, 0, 0);
  last.setDate(last.getDate() + days);
  return last;
};

const isChoreDueToday = (chore) => {
  if (chore.archived) return false;
  const next = getChoreNextDate(chore);
  const today = new Date(); today.setHours(0, 0, 0, 0);
  return next <= today;
};

const isChoreUpcoming = (chore) => {
  if (chore.archived) return false;
  const next = getChoreNextDate(chore);
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const week = new Date(today); week.setDate(week.getDate() + 7);
  return next > today && next <= week;
};

const getBossPeriod = () => {
  const h = new Date().getHours();
  if (h >= 5  && h < 13) return 'morning';
  if (h >= 13 && h < 24) return 'evening';
  return null;
};

const formatChoreDate = (dateStr) => {
  if (!dateStr) return 'ещё не делалось';
  const d = new Date(dateStr);
  const months = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
  return `${d.getDate()} ${months[d.getMonth()]}`;
};

// ============== APP ==============

// Clean-URL deep links: /mybody → «Моё тело», etc. Keep in sync with
// SPA_ROUTES in jarvis.py (the server serves index.html for these paths).
const PATH_TAB_MAP = {
  '/mybody': 'body',
  '/budget': 'budget',
  '/supplements': 'supplements',
  '/meals': 'meals',
  '/weather': 'weather',
  '/house': 'house',
  '/cars': 'cars',
  '/holidays': 'holidays',
  '/settings': 'settings',
};
const TAB_PATH_MAP = Object.fromEntries(Object.entries(PATH_TAB_MAP).map(([p, t]) => [t, p]));

const getTabFromPath = () => {
  try {
    const path = window.location.pathname.replace(/\/+$/, '') || '/';
    return PATH_TAB_MAP[path] || 'home';
  } catch { return 'home'; }
};

function App() {
  const [data, setData] = useState(loadData());
  const [tab, setTab] = useState(getTabFromPath); // home | supplements | meals | weather | house | settings
  const [settingsTab, setSettingsTab] = useState('general');
  const [houseTab, setHouseTab] = useState('boss');
  const [mealTab, setMealTab] = useState('plan');
  const initialLoad = React.useRef(true);
  const serverLoaded = React.useRef(false);

  // On mount: try to load from server, merge with localStorage to prevent data loss
  useEffect(() => {
    fetchServerData().then(serverData => {
      if (serverData) {
        setData(prev => {
          // Whitelist-free merge so no entered data is ever lost, for any field
          const merged = mergeAppData(prev, serverData);
          saveData(merged);
          return merged;
        });
      }
      serverLoaded.current = true;
    });
  }, []);

  // Перезагрузка при смене дня через Web Worker.
  // Worker работает в отдельном потоке — Safari его не throttleит
  // даже при полном отсутствии активности на экране.
  useEffect(() => {
    const todayAtMount = new Date().toISOString().slice(0, 10);

    const checkDate = () => {
      if (new Date().toISOString().slice(0, 10) !== todayAtMount) {
        window.location.reload();
      }
    };

    // Основной механизм: Web Worker тикает каждую минуту
    let worker = null;
    try {
      const blob = new Blob(
        [`setInterval(() => postMessage('tick'), 60000);`],
        { type: 'application/javascript' }
      );
      const url = URL.createObjectURL(blob);
      worker = new Worker(url);
      worker.onmessage = checkDate;
      URL.revokeObjectURL(url);
    } catch (_) {}

    // Страховки если Workers недоступны
    const timer = setInterval(checkDate, 60 * 1000);
    const onVisible = () => { if (document.visibilityState === 'visible') checkDate(); };
    document.addEventListener('visibilitychange', onVisible);
    window.addEventListener('pageshow', checkDate);

    return () => {
      if (worker) worker.terminate();
      clearInterval(timer);
      document.removeEventListener('visibilitychange', onVisible);
      window.removeEventListener('pageshow', checkDate);
    };
  }, []);

  // On every change: save locally + push to server (debounced)
  // Don't push to server until initial server load completes to avoid overwriting
  const dataRef = React.useRef(data);
  useEffect(() => {
    dataRef.current = data;
    getAppDataSnapshot = () => dataRef.current;
    if (initialLoad.current) { initialLoad.current = false; return; }
    saveData(data);
    if (serverLoaded.current) {
      pushServerData.schedule();
    }
  }, [data]);

  // Flush latest data to the server synchronously when the page is hidden/closed,
  // so a change made just before closing (before the debounce fires) isn't lost.
  useEffect(() => {
    const flush = () => {
      if (!serverLoaded.current) return;
      try {
        const body = JSON.stringify(dataRef.current);
        const blob = new Blob([body], { type: 'application/json' });
        if (navigator.sendBeacon) {
          navigator.sendBeacon('/api/data', blob);
        } else {
          fetch('/api/data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body,
            keepalive: true,
          });
        }
      } catch (_) {}
      pushServerData.flush();
    };
    const onHide = () => { if (document.visibilityState === 'hidden') flush(); };
    document.addEventListener('visibilitychange', onHide);
    window.addEventListener('pagehide', flush);
    return () => {
      document.removeEventListener('visibilitychange', onHide);
      window.removeEventListener('pagehide', flush);
    };
  }, []);

  // Re-sync from server when the app becomes visible again, so entries written
  // server-side (e.g. diet answers from the Telegram bot) merge back in and
  // aren't clobbered by a later local push.
  useEffect(() => {
    const syncFromServer = () => {
      if (!serverLoaded.current) return;
      fetchServerData().then(serverData => {
        if (serverData) setData(prev => { const m = mergeAppData(prev, serverData, 'pull'); saveData(m); return m; });
      });
    };
    const onVisible = () => {
      if (document.visibilityState === 'visible') syncFromServer();
    };
    document.addEventListener('visibilitychange', onVisible);
    const pollId = setInterval(() => {
      if (document.visibilityState === 'visible') syncFromServer();
    }, 20000);
    return () => {
      document.removeEventListener('visibilitychange', onVisible);
      clearInterval(pollId);
    };
  }, []);

  // Keep the URL in sync with the active tab (clean deep links like /mybody),
  // and follow browser back/forward between tabs.
  useEffect(() => {
    const path = TAB_PATH_MAP[tab] || '/';
    const currentPath = window.location.pathname.replace(/\/+$/, '') || '/';
    if (currentPath !== path) {
      window.history.replaceState(null, '', path);
    }
  }, [tab]);

  useEffect(() => {
    const onPopState = () => setTab(getTabFromPath());
    window.addEventListener('popstate', onPopState);
    return () => window.removeEventListener('popstate', onPopState);
  }, []);

  // Очистка отметок старше сегодняшнего дня
  useEffect(() => {
    const today = getTodayKey();
    const cleaned = {};
    Object.keys(data.taken || {}).forEach(k => {
      if (k.startsWith(today)) cleaned[k] = data.taken[k];
    });
    if (Object.keys(cleaned).length !== Object.keys(data.taken || {}).length) {
      setData(d => ({ ...d, taken: cleaned }));
    }
  }, []);

  // Авто-переключение на Погоду при бездействии
  const { weatherAutoSwitch, weatherAutoSwitchMinutes } = data.settings || DEFAULT_SETTINGS;
  useEffect(() => {
    if (!weatherAutoSwitch) return;
    const intervalMs = Math.max(0.5, Number(weatherAutoSwitchMinutes) || 2) * 60 * 1000;
    let timerId = null;

    const reset = () => {
      if (timerId) clearTimeout(timerId);
      timerId = setTimeout(() => {
        setTab(current => current === 'home' ? current : 'home');
      }, intervalMs);
    };

    const events = ['mousedown', 'mousemove', 'keydown', 'touchstart', 'wheel', 'click'];
    events.forEach(ev => window.addEventListener(ev, reset, { passive: true }));
    reset();

    return () => {
      if (timerId) clearTimeout(timerId);
      events.forEach(ev => window.removeEventListener(ev, reset));
    };
  }, [weatherAutoSwitch, weatherAutoSwitchMinutes]);

  // Авто-синхронизация конфига уведомлений с jarvis.py
  useEffect(() => {
    const token = data.settings?.telegramToken;
    if (!token) return;
    const timer = setTimeout(() => {
      const config = {
        telegram: { token },
        chores: (data.chores || []).filter(c => !c.archived).map(c => ({
          name: c.name,
          frequency: c.frequency,
          customDays: c.customDays || null,
          lastDone: c.lastDone || null,
          notify: !!c.notify,
          notifyTime: c.notifyTime || '09:00',
        })),
      };
      fetch('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(config),
      }).catch(() => {});
    }, 1000);
    return () => clearTimeout(timer);
  }, [data.settings?.telegramToken, data.chores]);

  return (
    <div className="min-h-screen pb-24 md:pb-8">
      <Header tab={tab} setTab={setTab} />
      {tab === 'english' ? (
        <EngErrorBoundary><EnglishView /></EngErrorBoundary>
      ) : tab === 'house' ? (
        <HouseView data={data} setData={setData} houseTab={houseTab} setHouseTab={setHouseTab} />
      ) : tab === 'budget' ? (
        <BudgetView data={data} setData={setData} />
      ) : (
        <main className="max-w-3xl mx-auto px-4 sm:px-6 pt-6 md:pt-8">
          {tab === 'home' && <HomeView data={data} setData={setData} setTab={setTab} setHouseTab={setHouseTab} setMealTab={setMealTab} />}
          {tab === 'supplements' && <SupplementsView data={data} setData={setData} />}
          {tab === 'meals' && <MealsView data={data} setData={setData} mealTab={mealTab} setMealTab={setMealTab} />}
          {tab === 'weather' && <WeatherView settings={data.settings} />}
          {tab === 'body' && <BodyView data={data} setData={setData} />}
          {tab === 'cars' && <CarsView data={data} setData={setData} />}
          {tab === 'holidays' && <HolidaysView data={data} setData={setData} />}
          {tab === 'settings' && (
            <SettingsView
              data={data}
              setData={setData}
              settingsTab={settingsTab}
              setSettingsTab={setSettingsTab}
            />
          )}
        </main>
      )}
      <BottomNav tab={tab} setTab={setTab} />
      <VoiceButton data={data} setData={setData} settings={data.settings} />
    </div>
  );
}

function SupplementsView({ data, setData }) {
  const [period, setPeriod] = useState(getCurrentPeriod());
  const [showSettings, setShowSettings] = useState(false);
  const [settingsSubTab, setSettingsSubTab] = useState('supplements');
  const todayKey = getTodayKey();

  // Авто-переключение утро/вечер без участия пользователя
  useEffect(() => {
    const timer = setInterval(() => {
      setPeriod(prev => {
        const current = getCurrentPeriod();
        return current !== prev ? current : prev;
      });
    }, 60 * 1000);
    return () => clearInterval(timer);
  }, []);

  const list = useMemo(() => {
    if (period === 'workout') {
      return (data.workoutSupplements || []).filter(s => !s.archived);
    }
    return (data.supplements || []).filter(s => isSupplementForPeriod(s, period));
  }, [data.supplements, data.workoutSupplements, period]);

  const isTaken = (id) => !!data.taken?.[`${todayKey}_${period}_${id}`];

  const toggle = (id) => {
    const key = `${todayKey}_${period}_${id}`;
    setData(d => {
      const taken = { ...(d.taken || {}) };
      if (taken[key]) delete taken[key];
      else taken[key] = Date.now();
      return { ...d, taken };
    });
  };

  const takeAll = () => {
    setData(d => {
      const taken = { ...(d.taken || {}) };
      list.forEach(s => { taken[`${todayKey}_${period}_${s.id}`] = Date.now(); });
      return { ...d, taken };
    });
  };

  const remaining = list.filter(s => !isTaken(s.id));
  const allTaken = list.length > 0 && remaining.length === 0;

  const periodLabels = { morning: 'утро', evening: 'вечер', workout: 'тренировку' };
  const emptyTexts = {
    morning: 'Нет БАДДов на это время',
    evening: 'Нет БАДДов на это время',
    workout: 'Нет БАДДов для тренировки',
  };

  return (
    <div className="fade-in">
      <div className="mb-6 flex items-center justify-between gap-4">
        <div className="font-display text-2xl">БАДДы</div>
        <button
          onClick={() => setShowSettings(s => !s)}
          className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium transition-all border ${
            showSettings
              ? 'bg-[var(--text)] text-white border-[var(--text)]'
              : 'border-[var(--border)] text-[var(--text-muted)] hover:text-[var(--text)]'
          }`}
        >
          <Icon name="settings" size={16} />
          Управление
        </button>
      </div>

      {showSettings ? (
        <div className="fade-in">
          <div className="inline-flex bg-[var(--surface)] border border-[var(--border)] rounded-xl p-1 mb-6">
            <button
              onClick={() => setSettingsSubTab('supplements')}
              className={`px-5 py-2.5 rounded-lg text-sm font-medium transition-all ${settingsSubTab === 'supplements' ? 'bg-[var(--text)] text-white' : 'text-[var(--text-muted)]'}`}
            >
              БАДДы
            </button>
            <button
              onClick={() => setSettingsSubTab('workout')}
              className={`px-5 py-2.5 rounded-lg text-sm font-medium transition-all ${settingsSubTab === 'workout' ? 'bg-[var(--text)] text-white' : 'text-[var(--text-muted)]'}`}
            >
              Тренировки
            </button>
          </div>
          <SupplementSettings data={data} setData={setData} isWorkout={settingsSubTab === 'workout'} />
        </div>
      ) : (
        <>
          {/* Переключатель Утро/Вечер + Тренировки */}
          <div className="flex flex-wrap gap-3 mb-8">
            <div className="inline-flex bg-[var(--surface)] border border-[var(--border)] rounded-xl p-1">
              <button
                onClick={() => setPeriod('morning')}
                className={`flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-medium transition-all ${
                  period === 'morning' ? 'bg-[var(--text)] text-white' : 'text-[var(--text-muted)]'
                }`}
              >
                <Icon name="sun" size={16} />
                Утро
              </button>
              <button
                onClick={() => setPeriod('evening')}
                className={`flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-medium transition-all ${
                  period === 'evening' ? 'bg-[var(--text)] text-white' : 'text-[var(--text-muted)]'
                }`}
              >
                <Icon name="moon" size={16} />
                Вечер
              </button>
            </div>
            <div className="inline-flex bg-[var(--surface)] border border-[var(--border)] rounded-xl p-1">
              <button
                onClick={() => setPeriod('workout')}
                className={`flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-medium transition-all ${
                  period === 'workout' ? 'bg-[var(--text)] text-white' : 'text-[var(--text-muted)]'
                }`}
              >
                <Icon name="dumbbell" size={16} />
                Тренировки
              </button>
            </div>
          </div>

          {list.length === 0 ? (
            <EmptyState
              title={emptyTexts[period]}
              text="Добавьте БАДДы через кнопку Управление"
            />
      ) : (
        <>
          {allTaken && (
            <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-6 text-center fade-in mb-6 flex items-center justify-center gap-3">
              <div className="inline-flex items-center justify-center w-9 h-9 rounded-full bg-[var(--text)] text-white">
                <Icon name="check" size={18} />
              </div>
              <div className="font-display text-lg">Все БАДДы на {periodLabels[period]} приняты</div>
            </div>
          )}
          <div className="space-y-3 mb-6">
            {list.map(s => (
              <SupplementCard
                key={s.id}
                supp={s}
                taken={isTaken(s.id)}
                onToggle={() => toggle(s.id)}
              />
            ))}
          </div>
          {!allTaken && (
            <button onClick={takeAll} className="btn-primary w-full flex items-center justify-center gap-2">
              <Icon name="check" size={18} />
              Принял все
            </button>
          )}
        </>
      )}
        </>
      )}
    </div>
  );
}

function MealPlanView({ data, setData }) {
  const [expanded, setExpanded] = useState(null);
  const meals = (data.meals || []).filter(m => !m.archived);
  const starredIds = data.starredMealIds || [];

  const toggleStar = (e, mealId) => {
    e.stopPropagation();
    setData(d => {
      const ids = d.starredMealIds || [];
      return {
        ...d,
        starredMealIds: ids.includes(mealId) ? ids.filter(id => id !== mealId) : [mealId, ...ids],
      };
    });
  };

  const sorted = [...meals].sort((a, b) => {
    const aStarred = starredIds.includes(a.id);
    const bStarred = starredIds.includes(b.id);
    if (aStarred && !bStarred) return -1;
    if (!aStarred && bStarred) return 1;
    return 0;
  });

  if (sorted.length === 0) return <EmptyState title="Нет рационов" text="Создайте рацион в настройках" />;

  return (
    <div className="space-y-3">
      {sorted.map(meal => {
        const isOpen = expanded === meal.id;
        const isStarred = starredIds.includes(meal.id);
        const summary = [
          meal.breakfast && `Завтрак: ${meal.breakfast.split('\n')[0]}`,
          meal.snack && `Перекус: ${meal.snack.split('\n')[0]}`,
          meal.lunch && `Обед: ${meal.lunch.split('\n')[0]}`,
          meal.dinner && `Ужин: ${meal.dinner.split('\n')[0]}`,
        ].filter(Boolean).join(' · ');

        return (
          <div
            key={meal.id}
            className={`bg-[var(--surface)] border rounded-2xl overflow-hidden transition-all ${isStarred ? 'border-amber-400' : 'border-[var(--border)]'}`}
          >
            <button
              onClick={() => setExpanded(isOpen ? null : meal.id)}
              className="w-full p-5 text-left flex items-start gap-4"
            >

function RationCounter({ data, setData }) {
  const rations = data.rationStock ?? 0;
  const RATIONS_PER_DAY = 2;
  const daysLeft = rations / RATIONS_PER_DAY;
  const wholeDays = Math.floor(daysLeft);
  const halfDay = (rations % RATIONS_PER_DAY) > 0;

  const [inputVal, setInputVal] = useState('');
  const [showAdd, setShowAdd] = useState(false);

  const consume = () => {
    if (rations <= 0) return;
    setData(d => ({ ...d, rationStock: (d.rationStock ?? 0) - 1 }));
  };

  const addRations = (n) => {
    if (!n || n <= 0) return;
    setData(d => ({ ...d, rationStock: (d.rationStock ?? 0) + n }));
    setInputVal('');
    setShowAdd(false);
  };

  const daysLabel = () => {
    if (rations === 0) return 'Рационов нет';
    const parts = [];
    if (wholeDays > 0) parts.push(`${wholeDays} ${wholeDays === 1 ? 'день' : wholeDays < 5 ? 'дня' : 'дней'}`);
    if (halfDay) parts.push('½ дня');
    return `Хватит на ${parts.join(' и ')}`;
  };

  const urgencyColor = rations === 0
    ? 'text-red-500'
    : wholeDays < 2
    ? 'text-amber-500'
    : 'text-[var(--text)]';

  return (
    <div className="space-y-4">
      <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5 text-center">
        <div className="text-xs uppercase tracking-widest text-[var(--text-subtle)] mb-4">Остаток рационов</div>

        <div className={`font-display text-8xl leading-none mb-3 ${urgencyColor}`}>
          {rations}
        </div>
        <div className={`text-base mb-8 ${rations === 0 ? 'text-red-400' : wholeDays < 2 ? 'text-amber-500' : 'text-[var(--text-muted)]'}`}>
          {daysLabel()}
        </div>

        <button
          onClick={consume}
          disabled={rations <= 0}
          className={`w-full py-4 rounded-2xl font-medium text-base transition-all ${
            rations > 0
              ? 'bg-[var(--text)] text-white active:scale-95'
              : 'bg-[var(--border)] text-[var(--text-subtle)] cursor-not-allowed'
          }`}
        >
          Съел рацион  −1
        </button>
      </div>

      <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5">
        {!showAdd ? (
          <button
            onClick={() => setShowAdd(true)}
            className="w-full flex items-center justify-center gap-2 py-2 text-[var(--text-muted)] text-sm font-medium hover:text-[var(--text)] transition-colors"
          >
            <Icon name="plus" size={16} />
            Добавить рационы
          </button>
        ) : (
          <div className="flex gap-2">
            <input
              type="number"
              inputMode="numeric"
              min="1"
              value={inputVal}
              onChange={e => setInputVal(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && addRations(parseInt(inputVal))}
              placeholder="Сколько рационов приготовил?"
              autoFocus
              className="flex-1"
            />
            <button
              onClick={() => addRations(parseInt(inputVal))}
              className="px-4 py-2 bg-[var(--text)] text-white rounded-xl text-sm font-medium"
            >
              Добавить
            </button>
            <button
              onClick={() => { setShowAdd(false); setInputVal(''); }}
              className="px-3 py-2 border border-[var(--border)] rounded-xl text-[var(--text-muted)]"
            >
              <Icon name="x" size={16} />
            </button>
          </div>
        )}
        <p className="text-xs text-[var(--text-subtle)] text-center mt-3">1 день = {RATIONS_PER_DAY} рациона</p>
      </div>
    </div>
  );
}

const WEATHER_CACHE_KEY = 'weather_cache_v1';
const WEATHER_MINI_CACHE_KEY = 'weather_mini_cache_v2';
const WEATHER_LOC_KEY = 'weather_location_v1';
const COMMUTE_CACHE_KEY = 'commute_cache_v1';

// WMO Weather codes → иконка + описание
const getWeatherInfo = (code) => {
  if (code === 0) return { icon: 'sun', label: 'Ясно' };
  if (code === 1) return { icon: 'cloudSun', label: 'Преимущественно ясно' };
  if (code === 2) return { icon: 'cloudSun', label: 'Переменная облачность' };
  if (code === 3) return { icon: 'cloud', label: 'Пасмурно' };
  if (code === 45 || code === 48) return { icon: 'cloudFog', label: 'Туман' };
  if (code >= 51 && code <= 57) return { icon: 'cloudRain', label: 'Морось' };
  if (code >= 61 && code <= 67) return { icon: 'cloudRain', label: 'Дождь' };
  if (code >= 71 && code <= 77) return { icon: 'cloudSnow', label: 'Снег' };
  if (code >= 80 && code <= 82) return { icon: 'cloudRain', label: 'Ливень' };
  if (code >= 85 && code <= 86) return { icon: 'cloudSnow', label: 'Снегопад' };
  if (code >= 95 && code <= 99) return { icon: 'cloudLightning', label: 'Гроза' };
  return { icon: 'cloud', label: 'Облачно' };
};

function MiniWeatherCard({ onClick }) {
  const [state, setState] = useState({ loading: true, error: null, data: null, location: null });

  useEffect(() => {
    let cancelled = false;

    const fetchByCoords = async (loc) => {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}` +
        `&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m` +
        `&daily=temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=1`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('Ошибка загрузки');
      const weather = await res.json();
      localStorage.setItem(WEATHER_MINI_CACHE_KEY, JSON.stringify({ ts: Date.now(), weather, location: loc }));
      if (!cancelled) setState({ loading: false, error: null, data: weather, location: loc });
    };

    const load = async () => {
      try {
        // Читаем город из настроек
        const weatherCity = (() => {
          try {
            const raw = localStorage.getItem(STORAGE_KEY);
            return JSON.parse(raw || '{}')?.settings?.weatherCity || '';
          } catch { return ''; }
        })();

        // Кэш: использовать только если совпадает источник (с городом или без)
        const cached = JSON.parse(localStorage.getItem(WEATHER_MINI_CACHE_KEY) || 'null');
        if (cached && Date.now() - cached.ts < 30 * 60 * 1000) {
          if (!cancelled) setState({ loading: false, error: null, data: cached.weather, location: cached.location });
          return;
        }

        if (weatherCity) {
          const res = await fetch(
            `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(weatherCity)}&format=json&limit=1`,
            { headers: { 'Accept-Language': 'ru' } }
          );
          const results = res.ok ? await res.json() : [];
          if (!results.length) throw new Error(`Город «${weatherCity}» не найден`);
          const { lat, lon, display_name } = results[0];
          const loc = { lat: parseFloat(lat), lon: parseFloat(lon), name: display_name.split(',')[0].trim() };
          await fetchByCoords(loc);
          return;
        }

        const savedLoc = JSON.parse(localStorage.getItem(WEATHER_LOC_KEY) || 'null');
        if (savedLoc) {
          await fetchByCoords(savedLoc);
          return;
        }

        // Нет сохранённых координат — пробуем геолокацию браузера
        if (navigator.geolocation && window.isSecureContext) {
          await new Promise((resolve) => {
            navigator.geolocation.getCurrentPosition(
              async (pos) => {
                try {
                  const loc = { lat: pos.coords.latitude, lon: pos.coords.longitude, name: '' };
                  try {
                    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${loc.lat}&lon=${loc.lon}&format=json&accept-language=ru`);
                    if (r.ok) {
                      const j = await r.json();
                      loc.name = j.address?.city || j.address?.town || j.address?.village || `${loc.lat.toFixed(2)}, ${loc.lon.toFixed(2)}`;
                    }
                  } catch {}
                  localStorage.setItem(WEATHER_LOC_KEY, JSON.stringify(loc));
                  await fetchByCoords(loc);
                } catch (e2) {
                  if (!cancelled) setState({ loading: false, error: e2.message, data: null, location: null });
                }
                resolve();
              },
              async () => {
                // Геолокация запрещена — пробуем по IP
                try {
                  const r = await fetch('https://ipapi.co/json/');
                  if (!r.ok) throw new Error();
                  const j = await r.json();
                  if (!j.latitude || !j.longitude) throw new Error();
                  const loc = { lat: j.latitude, lon: j.longitude, name: j.city || j.region || '' };
                  localStorage.setItem(WEATHER_LOC_KEY, JSON.stringify(loc));
                  await fetchByCoords(loc);
                } catch {
                  if (!cancelled) setState({ loading: false, error: 'Задайте город в Настройках → Общее', data: null, location: null });
                }
                resolve();
              },
              { enableHighAccuracy: false, timeout: 10000, maximumAge: 600000 }
            );
          });
          return;
        }

        // Геолокация недоступна — по IP
        try {
          const r = await fetch('https://ipapi.co/json/');
          if (!r.ok) throw new Error();
          const j = await r.json();
          if (!j.latitude || !j.longitude) throw new Error();
          const loc = { lat: j.latitude, lon: j.longitude, name: j.city || j.region || '' };
          localStorage.setItem(WEATHER_LOC_KEY, JSON.stringify(loc));
          await fetchByCoords(loc);
        } catch {
          if (!cancelled) setState({ loading: false, error: 'Задайте город в Настройках → Общее', data: null, location: null });
        }
      } catch (e) {
        if (!cancelled) setState({ loading: false, error: e.message, data: null, location: null });
      }
    };

    load();
    const interval = setInterval(load, 30 * 60 * 1000);
    return () => { cancelled = true; clearInterval(interval); };
  }, []);

  return (
    <div
      onClick={onClick}
      className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-6 cursor-pointer transition-all hover:border-[var(--border-strong)]"
    >
      <div className="flex items-center justify-between mb-4">
        <div className="text-xs uppercase tracking-widest text-[var(--text-subtle)] font-medium">Погода</div>
        {state.location && (
          <div className="flex items-center gap-1 text-xs text-[var(--text-subtle)]">
            <Icon name="mapPin" size={12} />
            <span className="truncate max-w-[120px]">{state.location.name}</span>
          </div>
        )}
      </div>

      {state.loading && (
        <div className="text-[var(--text-muted)] text-sm py-6">Загрузка...</div>
      )}

      {!state.loading && state.error && (
        <div className="py-2">
          <div className="text-[var(--text-muted)] text-sm">{state.error}</div>
          <div className="text-xs text-[var(--text-subtle)] mt-1">Нажмите чтобы открыть Погоду</div>
        </div>
      )}

      {!state.loading && state.data && (() => {
        const cur = state.data.current;
        const daily = state.data.daily;
        const info = getWeatherInfo(cur.weather_code);
        return (
          <div className="flex items-center justify-between gap-4">
            <div>
              <div className="font-display text-6xl leading-none mb-2">
                {Math.round(cur.temperature_2m)}°
              </div>
              <div className="text-[var(--text-muted)] text-sm">{info.label}</div>
              <div className="text-xs text-[var(--text-subtle)] mt-1">
                ↑ {Math.round(daily.temperature_2m_max[0])}° / ↓ {Math.round(daily.temperature_2m_min[0])}°
              </div>
              <div className="text-xs text-[var(--text-subtle)] mt-1 flex items-center gap-3">
                <span>Ощущается {Math.round(cur.apparent_temperature)}°</span>
                <span className="flex items-center gap-1">
                  <Icon name="wind" size={11} />
                  {Math.round(cur.wind_speed_10m)} км/ч
                </span>
              </div>
            </div>
            <div className="text-[var(--text)] opacity-90 flex-shrink-0">
              <Icon name={info.icon} size={72} />
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function CommuteCard({ settings }) {
  const { homeAddress, workAddress, tomtomKey } = settings || {};
  const [state, setState] = useState({ loading: true, error: null, data: null });

  const isConfigured = homeAddress && workAddress && tomtomKey;

  const fetchCommute = async () => {
    setState(s => ({ ...s, loading: true, error: null }));
    try {
      // 1. Геокод через Nominatim (бесплатно, без ключа)
      const geocode = async (q) => {
        const u = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`;
        const r = await fetch(u, { headers: { 'Accept-Language': 'ru' } });
        if (!r.ok) throw new Error(`Геокод не удался (${r.status})`);
        const j = await r.json();
        if (!j.length) throw new Error(`Адрес не найден: ${q}`);
        return { lat: parseFloat(j[0].lat), lon: parseFloat(j[0].lon) };
      };

      const [from, to] = await Promise.all([geocode(homeAddress), geocode(workAddress)]);

      // 2. Маршрут с пробками
      const routeUrl = `https://api.tomtom.com/routing/1/calculateRoute/${from.lat},${from.lon}:${to.lat},${to.lon}/json` +
        `?key=${tomtomKey}&traffic=true&travelMode=car&computeTravelTimeFor=all`;
      const r = await fetch(routeUrl);
      if (!r.ok) throw new Error(`Маршрут не удался (${r.status})`);
      const j = await r.json();
      if (!j.routes?.length) throw new Error('Маршрут не найден');

      const summary = j.routes[0].summary;
      const result = {
        travelTimeSec: summary.travelTimeInSeconds, // с учётом пробок
        noTrafficTimeSec: summary.noTrafficTravelTimeInSeconds,
        distanceMeters: summary.lengthInMeters,
        ts: Date.now(),
      };
      localStorage.setItem(COMMUTE_CACHE_KEY, JSON.stringify(result));
      setState({ loading: false, error: null, data: result });
    } catch (e) {
      // Попробовать показать кэш
      try {
        const cached = JSON.parse(localStorage.getItem(COMMUTE_CACHE_KEY) || 'null');
        if (cached) {
          setState({ loading: false, error: e.message, data: { ...cached, stale: true } });
          return;
        }
      } catch {}
      setState({ loading: false, error: e.message, data: null });
    }
  };

  useEffect(() => {
    if (!isConfigured) {
      setState({ loading: false, error: null, data: null });
      return;
    }
    fetchCommute();
    const interval = setInterval(fetchCommute, 10 * 60 * 1000); // 10 минут
    return () => clearInterval(interval);
  }, [homeAddress, workAddress, tomtomKey]);

  return (
    <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-6">
      <div className="flex items-center justify-between mb-4">
        <div className="text-xs uppercase tracking-widest text-[var(--text-subtle)] font-medium">До работы</div>
        <div className="flex items-center gap-3">
          {isConfigured && !state.loading && (
            <button onClick={fetchCommute} className="text-[10px] text-[var(--text-subtle)] hover:text-[var(--text-muted)] transition-colors leading-none">
              обновить
            </button>
          )}
          <div className="text-[var(--text-muted)] flex-shrink-0">
            <Icon name="car" size={18} />
          </div>
        </div>
      </div>

      {!isConfigured && (
        <div className="py-2">
          <div className="text-[var(--text-muted)] text-sm">Не настроено</div>
          <div className="text-xs text-[var(--text-subtle)] mt-1">
            Укажите адреса и TomTom API-ключ в Настройках → Общее
          </div>
        </div>
      )}

      {isConfigured && state.loading && (
        <div className="text-[var(--text-muted)] text-sm py-6">Загрузка...</div>
      )}

      {isConfigured && !state.loading && state.data && (() => {
        const min = Math.round(state.data.travelTimeSec / 60);
        const noTrafficMin = Math.round(state.data.noTrafficTimeSec / 60);
        const trafficDelay = min - noTrafficMin;
        const km = (state.data.distanceMeters / 1000).toFixed(1);
        return (
          <div>
            <div className="flex items-baseline gap-2 mb-2">
              <div className="font-display text-6xl leading-none">{min}</div>
              <div className="text-[var(--text-muted)] text-xl">мин</div>
            </div>
            <div className="text-[var(--text-muted)] text-sm">
              {km} км · в пути ~{noTrafficMin} мин
            </div>
            {trafficDelay > 1 && (
              <div className="text-sm mt-2" style={{ color: trafficDelay > 10 ? '#b00020' : 'var(--text-muted)' }}>
                Пробки: +{trafficDelay} мин
              </div>
            )}
            {trafficDelay <= 1 && (
              <div className="text-sm mt-2 text-[var(--text-subtle)]">Без пробок</div>
            )}
            {state.data.stale && (
              <div className="text-xs text-[var(--text-subtle)] mt-2 italic">Данные из кэша</div>
            )}
          </div>
        );
      })()}

      {isConfigured && !state.loading && state.error && !state.data && (
        <div className="py-2">
          <div className="text-[var(--text-muted)] text-sm">Ошибка</div>
          <div className="text-xs text-[var(--text-subtle)] mt-1 break-words">{state.error}</div>
          <button onClick={fetchCommute} className="btn-ghost text-xs mt-2 p-0">Повторить</button>
        </div>
      )}
    </div>
  );
}

function RationWidget({ data, setData, onGo }) {
  const rations = data.rationStock ?? 0;
  const RATIONS_PER_DAY = 2;
  const wholeDays = Math.floor(rations / RATIONS_PER_DAY);
  const halfDay = (rations % RATIONS_PER_DAY) > 0;

  const consume = (e) => {
    e.stopPropagation();
    if (rations <= 0) return;
    setData(d => ({ ...d, rationStock: (d.rationStock ?? 0) - 1 }));
  };

  const daysLabel = () => {
    if (rations === 0) return 'Рационов нет';
    const parts = [];
    if (wholeDays > 0) parts.push(`${wholeDays} ${wholeDays === 1 ? 'день' : wholeDays < 5 ? 'дня' : 'дней'}`);
    if (halfDay) parts.push('½ дня');
    return `На ${parts.join(' и ')}`;
  };

  const urgency = rations === 0 ? '#ef4444' : wholeDays < 2 ? '#f59e0b' : 'var(--text)';

  return (
    <div

    >

}

function WeatherView({ settings }) {
  const [status, setStatus] = useState('loading'); // loading | ready | error | denied
  const [data, setData] = useState(null);
  const [location, setLocation] = useState(null);
  const [error, setError] = useState('');
  const weatherCity = (settings || {}).weatherCity || '';

  const fetchWeather = async (lat, lon) => {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      `&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m,is_day` +
      `&hourly=temperature_2m,weather_code,precipitation_probability` +
      `&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_probability_max,wind_speed_10m_max` +
      `&timezone=auto&forecast_days=7`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Не удалось загрузить погоду');
    return await res.json();
  };

  const reverseGeocode = async (lat, lon) => {
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=ru`);
      if (!res.ok) return null;
      const j = await res.json();
      return j.address?.city || j.address?.town || j.address?.village || j.address?.county || null;
    } catch { return null; }
  };

  const loadByCoords = async (lat, lon, cityName) => {
    try {
      const weather = await fetchWeather(lat, lon);
      const name = cityName || await reverseGeocode(lat, lon) || `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
      setData(weather);
      setLocation({ lat, lon, name });
      localStorage.setItem(WEATHER_LOC_KEY, JSON.stringify({ lat, lon, name }));
      localStorage.setItem(WEATHER_CACHE_KEY, JSON.stringify({
        ts: Date.now(), weather, location: { lat, lon, name }
      }));
      setStatus('ready');
    } catch (e) {
      setError(e.message);
      setStatus('error');
    }
  };

  const geocodeCity = async (cityName) => {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(cityName)}&format=json&limit=1&accept-language=ru`,
      { headers: { 'Accept-Language': 'ru' } }
    );
    if (!res.ok) throw new Error('Не удалось геокодировать город');
    const results = await res.json();
    if (!results.length) throw new Error(`Город «${cityName}» не найден`);
    const { lat, lon, display_name } = results[0];
    const shortName = display_name.split(',')[0].trim();
    return { lat: parseFloat(lat), lon: parseFloat(lon), name: shortName };
  };

  const loadByCity = async (cityName) => {
    try {
      setStatus('loading');
      const coords = await geocodeCity(cityName);
      await loadByCoords(coords.lat, coords.lon, coords.name);
    } catch (e) {
      setError(e.message);
      setStatus('error');
    }
  };

  const loadByIP = async () => {
    try {
      setStatus('loading');
      const res = await fetch('https://ipapi.co/json/');
      if (!res.ok) throw new Error('Не удалось определить местоположение по IP');
      const j = await res.json();
      if (!j.latitude || !j.longitude) throw new Error('IP-сервис не вернул координаты');
      await loadByCoords(j.latitude, j.longitude, j.city || j.region || null);
    } catch (e) {
      setError(`Не удалось определить по IP: ${e.message}`);
      setStatus('error');
    }
  };

  const requestLocation = () => {
    if (weatherCity) { loadByCity(weatherCity); return; }
    if (!navigator.geolocation) {
      setError('Геолокация не поддерживается. Попробуйте определить по IP.');
      setStatus('error');
      return;
    }
    if (!window.isSecureContext) {
      setError('Геолокация работает только по HTTPS. Откройте сайт через https:// или используйте IP.');
      setStatus('error');
      return;
    }
    setStatus('loading');
    navigator.geolocation.getCurrentPosition(
      (pos) => loadByCoords(pos.coords.latitude, pos.coords.longitude),
      (err) => {
        const messages = {
          1: 'Доступ к геолокации запрещён',
          2: 'Местоположение недоступно (нет сигнала GPS/WiFi)',
          3: 'Время ожидания истекло',
        };
        const msg = messages[err.code] || err.message || 'Неизвестная ошибка';
        if (err.code === 1) setStatus('denied');
        else { setError(`${msg} (код ${err.code})`); setStatus('error'); }
      },
      { enableHighAccuracy: false, timeout: 15000, maximumAge: 600000 }
    );
  };

  useEffect(() => {
    // Если задан город в настройках — всегда загружаем по нему (кэш только если город не менялся)
    if (weatherCity) {
      try {
        const cached = JSON.parse(localStorage.getItem(WEATHER_CACHE_KEY) || 'null');
        if (cached && cached.location?.name && Date.now() - cached.ts < 30 * 60 * 1000) {
          setData(cached.weather);
          setLocation(cached.location);
          setStatus('ready');
          return;
        }
      } catch {}
      loadByCity(weatherCity);
      return;
    }
    // Иначе: кэш → сохранённые координаты → геолокация
    try {
      const cached = JSON.parse(localStorage.getItem(WEATHER_CACHE_KEY) || 'null');
      if (cached && Date.now() - cached.ts < 30 * 60 * 1000) {
        setData(cached.weather);
        setLocation(cached.location);
        setStatus('ready');
        return;
      }
      const savedLoc = JSON.parse(localStorage.getItem(WEATHER_LOC_KEY) || 'null');
      if (savedLoc) {
        loadByCoords(savedLoc.lat, savedLoc.lon, savedLoc.name);
        return;
      }
    } catch {}
    requestLocation();
  }, [weatherCity]);

  return (
    <div className="fade-in">
      <div className="mb-6 flex items-center justify-between gap-4">
        <div className="flex items-baseline gap-3 min-w-0">
          <div className="font-display text-2xl">Погода</div>
          {location
            ? <div className="flex items-center gap-1 text-[var(--text-subtle)] text-xs flex-shrink-0"><Icon name="mapPin" size={12} /><span>{location.name}</span></div>
            : <div className="text-[var(--text-subtle)] text-xs uppercase tracking-widest flex-shrink-0">Прогноз</div>
          }
        </div>
        {status === 'ready' && (
          <button onClick={requestLocation} className="btn-ghost flex items-center gap-2 text-sm flex-shrink-0">
            <Icon name="restore" size={14} />
            Обновить
          </button>
        )}
      </div>

      {status === 'loading' && (
        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-12 text-center">
          <div className="text-[var(--text-muted)]">Загрузка...</div>
        </div>
      )}

      {status === 'denied' && (
        <div className="bg-[var(--surface)] border border-dashed border-[var(--border-strong)] rounded-2xl p-10 text-center">
          <div className="font-display text-2xl mb-2">Нужен доступ к местоположению</div>
          <div className="text-[var(--text-muted)] text-sm mb-6">Разрешите доступ в настройках браузера или определите по IP</div>
          <div className="flex gap-3 justify-center flex-wrap">
            <button onClick={requestLocation} className="btn-primary">Попробовать снова</button>
            <button onClick={loadByIP} className="btn-secondary">По IP</button>
          </div>
        </div>
      )}

      {status === 'error' && (
        <div className="bg-[var(--surface)] border border-dashed border-[var(--border-strong)] rounded-2xl p-10 text-center">
          <div className="font-display text-2xl mb-2">Не удалось получить погоду</div>
          <div className="text-[var(--text-muted)] text-sm mb-6 max-w-md mx-auto">{error}</div>
          <div className="flex gap-3 justify-center flex-wrap">
            <button onClick={requestLocation} className="btn-primary">Повторить</button>
            <button onClick={loadByIP} className="btn-secondary">По IP</button>
          </div>
        </div>
      )}

      {status === 'ready' && data && (
        <>
          <WeatherCurrent data={data} />
          <WeatherToday data={data} />
          <WeatherWeek data={data} />
        </>
      )}
    </div>
  );
}

  const tMax = Math.round(today.temperature_2m_max[0]);
  const tMin = Math.round(today.temperature_2m_min[0]);

  return (
    <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-6 mb-6">
      <div className="flex items-center justify-between gap-6 mb-6">

function WeatherStat({ icon, label, value }) {

function WeatherToday({ data }) {
  const now = new Date();
  const nowISO = now.toISOString().slice(0, 13);

  // Берём 24 часа начиная с текущего
  const hourly = data.hourly;
  const startIdx = hourly.time.findIndex(t => t.slice(0, 13) >= nowISO);
  const idx = startIdx === -1 ? 0 : startIdx;
  const slice = hourly.time.slice(idx, idx + 24);

  return (
    <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5 mb-6">
      <div className="text-xs uppercase tracking-widest text-[var(--text-subtle)] mb-4 font-medium">Сегодня по часам</div>
      <div className="overflow-x-auto scrollbar-hide -mx-5 px-5">
        <div className="flex gap-2 pb-1" style={{ minWidth: 'min-content' }}>
          {slice.map((t, i) => {
            const realIdx = idx + i;
            const hour = new Date(t).getHours();
            const code = hourly.weather_code[realIdx];
            const temp = Math.round(hourly.temperature_2m[realIdx]);
            const pop = hourly.precipitation_probability[realIdx];
            const info = getWeatherInfo(code);
            const isNow = i === 0;
            return (
              <div
                key={t}
                className={`flex-shrink-0 w-16 rounded-xl py-3 px-1 text-center ${
                  isNow ? 'bg-[var(--text)] text-white' : ''
                }`}
              >
                <div className={`text-xs ${isNow ? 'text-white/70' : 'text-[var(--text-subtle)]'}`}>
                  {isNow ? 'сейчас' : `${hour}:00`}
                </div>
                <div className={`my-2 flex justify-center ${isNow ? 'text-white' : 'text-[var(--text)]'}`}>
                  <Icon name={info.icon} size={22} />
                </div>
                <div className={`font-medium text-sm ${isNow ? 'text-white' : ''}`}>{temp}°</div>
                {pop > 10 && (
                  <div className={`text-[10px] mt-1 ${isNow ? 'text-white/60' : 'text-[var(--text-subtle)]'}`}>
                    {pop}%
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function WeatherWeek({ data }) {

                <div className="text-sm truncate">{info.label}</div>
                <div className="text-xs text-[var(--text-subtle)] flex items-center gap-3">
                  {pop > 10 && (
                    <span className="flex items-center gap-1">
                      <Icon name="droplet" size={11} />

const formatTime = (iso) => {
  const d = new Date(iso);
  return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
};
const monthShort = (m) => ['янв', 'фев', 'мар', 'апр', 'мая', 'июн', 'июл', 'авг', 'сен', 'окт', 'ноя', 'дек'][m];
const monthFullLower = (m) => ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'][m];

// ============== DAILY CHECKLIST ==============

const CHECKLIST_OPTION_COLORS = ['#22c55e', '#ef4444', '#f59e0b', '#3b82f6', '#8b5cf6', '#ec4899', '#14b8a6', '#f97316'];
const CHECKLIST_CHART_DAYS = 90;

function normChecklistOption(opt, index) {
  if (typeof opt === 'string') {
    return { label: opt, color: CHECKLIST_OPTION_COLORS[index % CHECKLIST_OPTION_COLORS.length] };
  }
  return {
    label: (opt.label || opt.text || '').trim(),
    color: opt.color || CHECKLIST_OPTION_COLORS[index % CHECKLIST_OPTION_COLORS.length],
  };
}

function getFieldOptions(field) {
  return (field.options || []).map(normChecklistOption);
}

function getOptionColor(field, labelOrIndex) {
  const opts = getFieldOptions(field);
  if (typeof labelOrIndex === 'number') {
    return opts[labelOrIndex]?.color || CHECKLIST_OPTION_COLORS[0];
  }
  const idx = opts.findIndex(o => o.label === labelOrIndex);
  return opts[idx >= 0 ? idx : 0]?.color || CHECKLIST_OPTION_COLORS[0];
}

function labelsToOptions(labels) {
  return labels.map((label, i) => ({
    label,
    color: CHECKLIST_OPTION_COLORS[i % CHECKLIST_OPTION_COLORS.length],
  }));
}

function buildChecklistChartDays(log, days = CHECKLIST_CHART_DAYS) {
  const byDate = Object.fromEntries(log.map(e => [e.date, e]));
  const chartDays = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().split('T')[0];
    chartDays.push({
      date: ds,
      entry: byDate[ds] || null,
      dow: d.getDay(),
      dayNum: d.getDate(),
      month: d.getMonth(),
    });
  }
  return chartDays;
}

function getChecklistFieldStats(field, log, periodDays) {
  const from = new Date();
  from.setDate(from.getDate() - periodDays + 1);
  const fromIso = from.toISOString().split('T')[0];
  const today = new Date().toISOString().split('T')[0];

  const periodDaysList = [];
  for (let i = periodDays - 1; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    periodDaysList.push(d.toISOString().split('T')[0]);
  }

  const answered = log.filter(e => e.date >= fromIso && e.answers?.[field.id]);
  const opts = getFieldOptions(field);
  const counts = {};
  opts.forEach(o => { counts[o.label] = 0; });
  answered.forEach(e => {
    const v = e.answers[field.id];
    if (v != null) counts[v] = (counts[v] || 0) + 1;
  });

  const totalAnswered = answered.length;
  const fillPct = Math.round((totalAnswered / periodDays) * 100);

  let streak = 0;
  for (let i = periodDaysList.length - 1; i >= 0; i--) {
    const ds = periodDaysList[i];
    if (ds > today) continue;
    const entry = log.find(e => e.date === ds);
    if (entry?.answers?.[field.id]) streak++;
    else break;
  }

  const primaryOpt = opts[0]?.label;
  const primaryCount = primaryOpt ? (counts[primaryOpt] || 0) : 0;
  const primaryPct = totalAnswered > 0 ? Math.round((primaryCount / totalAnswered) * 100) : 0;

  const segments = opts
    .map(opt => ({ label: opt.label, value: counts[opt.label] || 0, color: opt.color }))
    .filter(s => s.value > 0);

  return { fromIso, totalAnswered, fillPct, streak, primaryOpt, primaryPct, primaryCount, counts, segments, periodDays };
}

function ChecklistDonut({ segments, size = 96 }) {
  const total = segments.reduce((s, x) => s + x.value, 0);
  if (total === 0) {
    return (
      <div className="relative flex-shrink-0 rounded-full border-4 border-[var(--border)] bg-[var(--bg)]"
        style={{ width: size, height: size }}>
        <div className="absolute inset-0 flex items-center justify-center text-[10px] text-[var(--text-subtle)]">—</div>
      </div>
    );
  }
  let acc = 0;
  const stops = segments.map(seg => {
    const start = (acc / total) * 100;
    acc += seg.value;
    const end = (acc / total) * 100;
    return `${seg.color} ${start}% ${end}%`;
  }).join(', ');
  const lead = segments.reduce((best, s) => s.value > best.value ? s : best, segments[0]);
  const leadPct = Math.round((lead.value / total) * 100);
  return (
    <div className="relative flex-shrink-0" style={{ width: size, height: size }}>
      <div className="rounded-full" style={{
        width: size, height: size,
        background: `conic-gradient(${stops})`,
        WebkitMask: 'radial-gradient(circle, transparent 58%, black 59%)',
        mask: 'radial-gradient(circle, transparent 58%, black 59%)',
      }} />
      <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
        <span className="text-lg font-semibold leading-none">{leadPct}%</span>
        <span className="text-[9px] text-[var(--text-muted)] mt-0.5 max-w-[52px] truncate text-center">{lead.label}</span>
      </div>
    </div>
  );
}

function ChecklistFieldChart({ field, log, today, formatDate }) {
  const chartScrollRef = React.useRef(null);
  const chartDays = buildChecklistChartDays(log);
  const todayIndex = chartDays.findIndex(d => d.date === today);
  const stats30 = getChecklistFieldStats(field, log, 30);
  const stats90 = getChecklistFieldStats(field, log, CHECKLIST_CHART_DAYS);

  const opts = getFieldOptions(field);
  const optionColor = (label) => getOptionColor(field, label);

  const barW = 14, gap = 5, totalBarW = barW + gap;
  const TOP = 20, plotH = 64, svgH = TOP + plotH + 34;
  const bandH = plotH / Math.max(opts.length, 1);
  const svgW = chartDays.length * totalBarW;

  React.useEffect(() => {
    const el = chartScrollRef.current;
    if (!el || todayIndex < 0) return;
    const todayX = todayIndex * totalBarW + barW / 2;
    el.scrollLeft = todayX - el.offsetWidth / 2;
  }, [log.length, field.id]);

  return (
    <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5 space-y-4">
      <div className="flex items-start gap-4">
        <ChecklistDonut segments={stats30.segments} />
        <div className="flex-1 min-w-0">
          <h3 className="font-display text-lg leading-tight">{field.label}</h3>
          <div className="text-xs text-[var(--text-muted)] mt-1">за 30 дней</div>
          <div className="grid grid-cols-2 gap-2 mt-3">
            <div className="bg-[var(--bg)] rounded-xl px-3 py-2">
              <div className="text-[10px] uppercase tracking-wide text-[var(--text-subtle)]">Заполнено</div>
              <div className="text-sm font-semibold mt-0.5">{stats30.fillPct}% <span className="text-[var(--text-muted)] font-normal">({stats30.totalAnswered}/30)</span></div>
            </div>
            <div className="bg-[var(--bg)] rounded-xl px-3 py-2">
              <div className="text-[10px] uppercase tracking-wide text-[var(--text-subtle)]">Серия</div>
              <div className="text-sm font-semibold mt-0.5">{stats30.streak} {stats30.streak === 1 ? 'день' : stats30.streak < 5 ? 'дня' : 'дней'}</div>
            </div>
            {stats30.primaryOpt && (
              <div className="bg-[var(--bg)] rounded-xl px-3 py-2 col-span-2">
                <div className="text-[10px] uppercase tracking-wide text-[var(--text-subtle)]">{stats30.primaryOpt}</div>
                <div className="text-sm font-semibold mt-0.5">{stats30.primaryPct}% <span className="text-[var(--text-muted)] font-normal">({stats30.primaryCount} из {stats30.totalAnswered || '—'})</span></div>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Распределение */}
      {stats30.totalAnswered > 0 && (
        <div className="space-y-2">
          {opts.map((opt, oi) => {
            const count = stats30.counts[opt.label] || 0;
            if (count === 0 && stats30.totalAnswered > 0) return null;
            const pct = stats30.totalAnswered > 0 ? Math.round((count / stats30.totalAnswered) * 100) : 0;
            return (
              <div key={opt.label}>
                <div className="flex justify-between text-xs mb-1">
                  <span className="flex items-center gap-1.5 text-[var(--text-muted)]">
                    <span className="w-2 h-2 rounded-full shrink-0" style={{ background: opt.color }} />
                    {opt.label}
                  </span>
                  <span className="text-[var(--text-subtle)]">{pct}% · {count}</span>
                </div>
                <div className="h-2 bg-[var(--bg)] rounded-full overflow-hidden">
                  <div className="h-full rounded-full transition-all duration-500" style={{ width: `${pct}%`, background: opt.color }} />
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* График 90 дней */}
      <div>
        <div className="flex items-baseline justify-between mb-3">
          <span className="text-sm font-medium">90 дней</span>
          <span className="text-xs text-[var(--text-subtle)]">{stats90.totalAnswered} отметок</span>
        </div>
        <div className="overflow-x-auto scrollbar-hide -mx-1 px-1" ref={chartScrollRef}>
          <svg width={svgW} height={svgH} style={{ display: 'block' }}>
            {chartDays.map((day, i) => {
              const x = i * totalBarW;
              const cx = x + barW / 2;
              const answer = day.entry?.answers?.[field.id];
              const optIdx = answer != null ? opts.findIndex(o => o.label === answer) : -1;
              const isToday = day.date === today;
              const weekend = day.dow === 0 || day.dow === 6;
              const showMonth = i === 0 || day.dayNum === 1;
              const hasAnswer = optIdx >= 0;
              const color = hasAnswer ? optionColor(answer) : 'var(--border)';
              const y = hasAnswer ? TOP + plotH - (optIdx + 1) * bandH + 1 : TOP + plotH - 2;
              const h = hasAnswer ? Math.max(bandH - 2, 6) : 2;
              return (
                <g key={day.date}>
                  {showMonth && (
                    <text x={x} y={11} fontSize="9" fill="var(--text-subtle)" fontWeight="600">
                      {['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'][day.month]}
