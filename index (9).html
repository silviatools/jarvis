  const isNew = !debt.debtor && !debt.amount;

  return (
    <Modal title={isNew ? 'Новый долг' : 'Редактировать долг'} onClose={onClose}>
      <div className="space-y-4">
        <div>
          <label>Сумма (₽)</label>
          <input type="number" inputMode="numeric" min="1" autoFocus
            value={form.amount || ''}
            onChange={e => set('amount', e.target.value)}
            placeholder="5 000" />
        </div>

        <div>
          <label>Кому даётся долг</label>
          <input value={form.debtor} onChange={e => set('debtor', e.target.value)} placeholder="Имя" />
        </div>

        <div>
          <label>Откуда даётся долг</label>
          <select value={form.source} onChange={e => set('source', e.target.value)}>
            {DEBT_SOURCES.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
        </div>

        <div>
          <label>Вернуть до</label>
          <input type="date" value={form.returnDate || ''} onChange={e => set('returnDate', e.target.value)} />
        </div>

        <div className="border border-[var(--border)] rounded-xl p-3 space-y-3">
          <label className="flex items-center gap-2 cursor-pointer !mb-0">
            <input type="checkbox" className="!w-auto" checked={!!form.notify} onChange={e => set('notify', e.target.checked)} />
            <span className="text-sm font-medium">Напоминание в Telegram</span>
          </label>
          {form.notify && (
            <div className="flex gap-2">
              <div className="flex-1">
                <label>Дата</label>
                <input type="date" value={form.notifyDate || ''} onChange={e => set('notifyDate', e.target.value)} />
              </div>
              <div className="w-28">
                <label>Время</label>
                <MskTimeInput value={form.notifyTime || '12:00'} onChange={t => set('notifyTime', t)} />
              </div>
            </div>
          )}
        </div>

        <div>
          <label>Комментарий (необязательно)</label>
          <textarea value={form.comment || ''} onChange={e => set('comment', e.target.value)} rows={2} placeholder="Дополнительная информация..." />
        </div>

        <div className="flex gap-3 pt-2">
          <button onClick={onClose} className="btn-secondary flex-1">Отмена</button>
          <button onClick={submit}  className="btn-primary flex-1">Сохранить</button>
        </div>
      </div>
    </Modal>
  );
}


// ============== SUPPLEMENTS ==============

function BudgetSupplementsView({ data, setData }) {
  const [editing, setEditing] = useState(null);
  const [showAssign, setShowAssign] = useState(false);
  const [editingMonth, setEditingMonth] = useState(null);
  const [selected, setSelected] = useState([]);
  const [sortCol, setSortCol] = useState('name');
  const [sortDir, setSortDir] = useState('asc');
  const [filters, setFilters] = useState({});
  const [filterOpen, setFilterOpen] = useState(null);
  const [filterAnchor, setFilterAnchor] = useState(null);

  const items = (data.budgetSupplements || []).filter(s => !s.archived);
  const rawAssignments = data.budgetSupplementAssignments || {};
  const assignments = Object.fromEntries(
    Object.entries(rawAssignments).map(([m, arr]) => [m,
      (arr || []).map(x => typeof x === 'string' ? { id: x, qty: 1 } : x)
    ])
  );

  const save = (item) => {
    item = { ...item, updatedAt: Date.now() };
    setData(d => {
      const list = d.budgetSupplements || [];
      const exists = list.find(s => s.id === item.id);
      return { ...d, budgetSupplements: exists ? list.map(s => s.id === item.id ? item : s) : [...list, item] };
    });
    setEditing(null);
  };

  const remove = (id) => {
    if (!confirm('Удалить позицию?')) return;
    setData(d => {
      const newAssign = { ...d.budgetSupplementAssignments };
      Object.keys(newAssign).forEach(m => {
        newAssign[m] = (newAssign[m] || []).map(x => typeof x === 'string' ? { id: x, qty: 1 } : x).filter(x => x.id !== id);
        if (newAssign[m].length === 0) delete newAssign[m];
      });
      return { ...d, budgetSupplements: (d.budgetSupplements || []).filter(s => s.id !== id), budgetSupplementAssignments: newAssign };
    });
  };

  const newItem = () => setEditing({
    id: crypto.randomUUID(), name: '', brand: '', qtyPerPack: '', dailyIntake: '',
    cost: '', link: '', notes: '', archived: false,
  });

  const toggleSelect = (id) => setSelected(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
  const selectAll = () => setSelected(items.length === selected.length ? [] : items.map(i => i.id));

  const assignToMonth = (month, quantities) => {
    setData(d => {
      const a = { ...(d.budgetSupplementAssignments || {}) };
      const existing = (a[month] || []).map(x => typeof x === 'string' ? { id: x, qty: 1 } : x);
      const merged = [...existing];
      selected.forEach(id => {
        const idx = merged.findIndex(x => x.id === id);
        const qty = quantities[id] || 1;
        if (idx >= 0) merged[idx] = { ...merged[idx], qty };
        else merged.push({ id, qty });
      });
      return { ...d, budgetSupplementAssignments: { ...a, [month]: merged } };
    });
    setSelected([]);
    setShowAssign(false);
  };

  const removeFromMonth = (month, itemId) => {
    setData(d => {
      const a = { ...(d.budgetSupplementAssignments || {}) };
      a[month] = (a[month] || []).map(x => typeof x === 'string' ? { id: x, qty: 1 } : x).filter(x => x.id !== itemId);
      if (a[month].length === 0) delete a[month];
      return { ...d, budgetSupplementAssignments: a };
    });
  };

  const saveMonthEntries = (month, entries) => {
    setData(d => {
      const a = { ...(d.budgetSupplementAssignments || {}) };
      const valid = entries.filter(e => e.qty > 0);
      if (valid.length === 0) delete a[month];
      else a[month] = valid;
      return { ...d, budgetSupplementAssignments: a };
    });
    setEditingMonth(null);
  };

  const daysLast = (item) => {
    const qty = Number(item.qtyPerPack) || 0;
    const daily = Number(item.dailyIntake) || 0;
    return daily > 0 ? Math.floor(qty / daily) : 0;
  };

  const COLUMNS = [
    { id: 'name',       label: 'Название',  align: 'left',  getValue: x => x.name || '' },
    { id: 'brand',      label: 'Бренд',     align: 'left',  getValue: x => x.brand || '' },
    { id: 'qtyPerPack', label: 'В уп.',     align: 'right', getValue: x => Number(x.qtyPerPack) || 0 },
    { id: 'dailyIntake',label: 'В день',    align: 'right', getValue: x => Number(x.dailyIntake) || 0 },
    { id: 'daysLast',   label: 'Хватит, дн',align: 'right', getValue: x => daysLast(x) },
    { id: 'cost',       label: 'Цена',      align: 'right', getValue: x => Number(x.cost) || 0 },
    { id: 'notes',      label: 'Коммент',   align: 'left',  getValue: x => x.notes || '' },
  ];

  const getUniqueVals = (colId) => {
    const col = COLUMNS.find(c => c.id === colId);
    if (!col) return [];
    const vals = [...new Set(items.map(x => {
      const v = col.getValue(x);
      return typeof v === 'number' ? (v || 0) : (v || '');
    }))];
    return vals.sort((a, b) => typeof a === 'string' ? a.localeCompare(b, 'ru') : a - b);
  };

  const toggleSort = (col) => {
    if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortCol(col); setSortDir('asc'); }
  };

  const setFilter = (colId, values) => {
    setFilters(f => {
      const next = { ...f };
      if (!values || values.length === 0) delete next[colId];
      else next[colId] = values;
      return next;
    });
  };

  const toggleFilterValue = (colId, val) => {
    setFilters(f => {
      const cur = f[colId] || [];
      const next = cur.includes(val) ? cur.filter(v => v !== val) : [...cur, val];
      const updated = { ...f };
      if (next.length === 0) delete updated[colId];
      else updated[colId] = next;
      return updated;
    });
  };

  const activeFilterCount = Object.keys(filters).length;

  const filtered = items.filter(item => {
    return Object.entries(filters).every(([colId, allowed]) => {
      const col = COLUMNS.find(c => c.id === colId);
      if (!col) return true;
      const v = col.getValue(item);
      return allowed.includes(typeof v === 'number' ? v : v);
    });
  });

  const sorted = [...filtered].sort((a, b) => {
    const col = COLUMNS.find(c => c.id === sortCol);
    if (!col) return 0;
    const av = col.getValue(a);
    const bv = col.getValue(b);
    const cmp = typeof av === 'string' ? av.localeCompare(bv, 'ru') : av - bv;
    return sortDir === 'asc' ? cmp : -cmp;
  });

  const totalSelected = selected.filter(id => sorted.find(x => x.id === id)).reduce((s, id) => {
    const it = items.find(x => x.id === id);
    return s + (it ? (it.cost || 0) : 0);
  }, 0);

  const MONTH_NAMES_FULL = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const curYear = new Date().getFullYear();

  const assignedMonths = Object.keys(assignments).filter(m => (assignments[m] || []).length > 0).sort();

  return (
    <div>
      <div className="flex items-center gap-2 flex-wrap mb-6">
        <button onClick={newItem} className="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl bg-[var(--text)] text-white text-sm font-medium hover:opacity-85 transition-all">
          <Icon name="plus" size={16} />Добавить
        </button>
        {selected.length > 0 && (
          <button onClick={() => setShowAssign(true)}
            className="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl bg-blue-600 text-white text-sm font-medium hover:opacity-85 transition-all">
            📅 В месяц ({selected.length} поз.)
          </button>
        )}
        {activeFilterCount > 0 && (
          <button onClick={() => setFilters({})}
            className="inline-flex items-center gap-1.5 px-3 py-2.5 rounded-xl text-xs border border-amber-200 bg-amber-50 text-amber-700 hover:bg-amber-100 transition-colors">
            Сбросить фильтры ({activeFilterCount})
          </button>
        )}
      </div>

      {!items.length ? (
        <EmptyState title="Нет добавок" text="Добавьте БАДы или спортивное питание — укажите количество, дозировку и стоимость" />
      ) : (
        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm" style={{ minWidth: '640px' }}>
              <thead>
                <tr className="bg-[var(--bg)] border-b border-[var(--border)]">
                  <th className="px-3 py-3 w-10">
                    <input type="checkbox" checked={sorted.length > 0 && selected.length === sorted.length}
                      onChange={() => setSelected(sorted.length === selected.length ? [] : sorted.map(i => i.id))}
                      className="rounded border-gray-300" />
                  </th>
                  {COLUMNS.map(col => (
                    <th key={col.id} className={`px-3 py-3 text-${col.align} text-xs font-semibold uppercase tracking-wide text-[var(--text-subtle)] whitespace-nowrap relative`}>
                      <div className={`flex items-center gap-1 ${col.align === 'right' ? 'justify-end' : ''}`}>
                        <button onClick={() => toggleSort(col.id)}
                          className="hover:text-[var(--text)] transition-colors select-none flex items-center gap-0.5">
                          {col.label}
                          <span className={`text-[11px] ${sortCol === col.id ? 'opacity-100' : 'opacity-25'}`}>
                            {sortCol === col.id ? (sortDir === 'asc' ? '↑' : '↓') : '↕'}
                          </span>
                        </button>
                        <button onClick={(e) => { e.stopPropagation(); if (filterOpen === col.id) { setFilterOpen(null); return; } setFilterAnchor(e.currentTarget); setFilterOpen(col.id); }}
                          className={`p-0.5 rounded hover:bg-black/5 transition-colors ${filters[col.id] ? 'text-blue-600' : 'text-[var(--text-subtle)] opacity-40 hover:opacity-100'}`}>
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />
                          </svg>
                        </button>
                      </div>
                    </th>
                  ))}
                  <th className="px-3 py-3 w-20" />
                </tr>
              </thead>
              <tbody>
                {sorted.map((item, i) => {
                  const days = daysLast(item);
                  return (
                    <tr key={item.id} className={`border-b border-[var(--border)] last:border-0 hover:bg-black/[0.02] transition-colors ${selected.includes(item.id) ? 'bg-blue-50/50' : ''}`}>
                      <td className="px-3 py-3">
                        <input type="checkbox" checked={selected.includes(item.id)} onChange={() => toggleSelect(item.id)}
                          className="rounded border-gray-300" />
                      </td>
                      <td className="px-3 py-3 font-medium">
                        {item.link ? (
                          <a href={item.link} target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:underline">{item.name}</a>
                        ) : item.name}
                      </td>
                      <td className="px-3 py-3 text-[var(--text-muted)]">{item.brand || '—'}</td>
                      <td className="px-3 py-3 text-right text-[var(--text-muted)]">{item.qtyPerPack || '—'}</td>
                      <td className="px-3 py-3 text-right text-[var(--text-muted)]">{item.dailyIntake || '—'}</td>
                      <td className="px-3 py-3 text-right font-medium">{days > 0 ? days : '—'}</td>
                      <td className="px-3 py-3 text-right font-semibold whitespace-nowrap">{item.cost ? formatRub(item.cost) + ' ₽' : '—'}</td>
                      <td className="px-3 py-3 text-[var(--text-subtle)] max-w-[180px] truncate">{item.notes || '—'}</td>
                      <td className="px-2 py-3">
                        <div className="flex gap-1 justify-end">
                          <button onClick={() => setEditing(item)} className="p-1.5 rounded-lg hover:bg-black/5 text-[var(--text-muted)]"><Icon name="edit" size={14} /></button>
                          <button onClick={() => remove(item.id)} className="p-1.5 rounded-lg hover:bg-red-50 text-[var(--text-muted)] hover:text-red-500"><Icon name="trash" size={14} /></button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div className="px-4 py-3 bg-[var(--bg)] border-t border-[var(--border)] flex justify-between items-center">
            <span className="text-xs text-[var(--text-subtle)]">
              {filtered.length !== items.length ? `${sorted.length} из ${items.length} позиций` : `${items.length} позиций`}
            </span>
            <span className="font-display text-base">{formatRub(sorted.reduce((s, x) => s + (x.cost || 0), 0))} ₽</span>
          </div>
        </div>
      )}

      {/* Assigned months overview */}
      {assignedMonths.length > 0 && (
        <div className="mt-6">
          <h3 className="text-sm font-semibold text-[var(--text-subtle)] uppercase tracking-wide mb-3">Распределено по месяцам</h3>
          <div className="space-y-3">
            {assignedMonths.map(month => {
              const entries = assignments[month] || [];
              const monthEntries = entries.map(e => {
                const item = items.find(x => x.id === e.id);
                return item ? { ...item, qty: e.qty || 1 } : null;
              }).filter(Boolean);
              if (monthEntries.length === 0) return null;
              const [y, m] = month.split('-');
              const monthLabel = `${MONTH_NAMES_FULL[parseInt(m, 10) - 1]} ${y}`;
              const total = monthEntries.reduce((s, x) => s + (x.cost || 0) * x.qty, 0);
              return (
                <div key={month} className="bg-[var(--surface)] border border-[var(--border)] rounded-xl p-3">
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-sm font-semibold">{monthLabel}</span>
                    <div className="flex items-center gap-2">
                      <span className="text-sm font-display font-semibold">{formatRub(total)} ₽</span>
                      <button onClick={() => setEditingMonth(month)}
                        className="p-1 rounded-lg hover:bg-black/5 text-[var(--text-muted)] hover:text-[var(--text)]">
                        <Icon name="edit" size={14} />
                      </button>
                    </div>
                  </div>
                  <div className="space-y-1">
                    {monthEntries.map(item => (
                      <div key={item.id} className="flex items-center justify-between text-sm text-[var(--text-muted)]">
                        <span>{item.name}{item.qty > 1 ? ` ×${item.qty}` : ''}</span>
                        <div className="flex items-center gap-2">
                          <span>{item.cost ? formatRub(item.cost * item.qty) + ' ₽' : ''}</span>
                          <button onClick={() => removeFromMonth(month, item.id)}
                            className="p-1 rounded hover:bg-red-50 text-[var(--text-subtle)] hover:text-red-500">
                            <Icon name="x" size={12} />
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {editing && <BudgetSupplementModal item={editing} onSave={save} onClose={() => setEditing(null)} />}

      {showAssign && (
        <BudgetSupplementAssignModal
          selectedItems={selected.map(id => items.find(x => x.id === id)).filter(Boolean)}
          onAssign={assignToMonth}
          onClose={() => setShowAssign(false)}
        />
      )}

      {editingMonth && (
        <BudgetSupplementEditMonthModal
          month={editingMonth}
          entries={assignments[editingMonth] || []}
          allItems={items}
          onSave={(entries) => saveMonthEntries(editingMonth, entries)}
          onClose={() => setEditingMonth(null)}
        />
      )}

      <FilterDropdownPortal anchorRef={filterAnchor} isOpen={!!filterOpen} onClose={() => setFilterOpen(null)}>
        {filterOpen && (() => {
          const col = COLUMNS.find(c => c.id === filterOpen);
          if (!col) return null;
          return (
            <>
              <div className="flex items-center justify-between mb-1.5 px-1">
                <span className="text-[10px] font-semibold text-gray-400 uppercase">Фильтр: {col.label}</span>
                {filters[filterOpen] && (
                  <button onClick={() => setFilter(filterOpen, null)} className="text-[10px] text-blue-600 hover:underline">Сбросить</button>
                )}
              </div>
              {getUniqueVals(filterOpen).map(val => {
                const display = typeof val === 'number'
                  ? (filterOpen === 'cost' ? formatRub(val) + ' ₽' : (val || '—'))
                  : (val || '(пусто)');
                return (
                  <label key={String(val)} className="flex items-center gap-2 px-1.5 py-1.5 rounded-lg hover:bg-gray-50 cursor-pointer text-sm">
                    <input type="checkbox" checked={(filters[filterOpen] || []).includes(val)}
                      onChange={() => toggleFilterValue(filterOpen, val)} className="rounded border-gray-300" />
                    <span>{display}</span>
                  </label>
                );
              })}
            </>
          );
        })()}
      </FilterDropdownPortal>
    </div>
  );
}

function BudgetSupplementEditMonthModal({ month, entries, allItems, onSave, onClose }) {
  const MONTH_NAMES_FULL = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const [y, m] = month.split('-');
  const monthLabel = `${MONTH_NAMES_FULL[parseInt(m, 10) - 1]} ${y}`;

  const [localEntries, setLocalEntries] = useState(() =>
    entries.map(e => ({ id: e.id, qty: e.qty || 1 }))
  );

  const assignedIds = localEntries.map(e => e.id);
  const unassigned = allItems.filter(x => !assignedIds.includes(x.id));

  const setQty = (id, val) => setLocalEntries(arr =>
    arr.map(e => e.id === id ? { ...e, qty: Math.max(1, parseInt(val) || 1) } : e)
  );
  const removeEntry = (id) => setLocalEntries(arr => arr.filter(e => e.id !== id));
  const addEntry = (id) => setLocalEntries(arr => [...arr, { id, qty: 1 }]);

  const total = localEntries.reduce((s, e) => {
    const item = allItems.find(x => x.id === e.id);
    return s + (item ? (item.cost || 0) * e.qty : 0);
  }, 0);

  return (
    <Modal title={`Редактировать — ${monthLabel}`} onClose={onClose}>
      <div className="space-y-3 max-h-[50vh] overflow-y-auto">
        {localEntries.length === 0 && (
          <div className="text-center py-4 text-sm text-[var(--text-subtle)]">Список пуст</div>
        )}
        {localEntries.map(entry => {
          const item = allItems.find(x => x.id === entry.id);
          if (!item) return null;
          return (
            <div key={entry.id} className="flex items-center gap-3 bg-[var(--bg)] rounded-xl px-3 py-2">
              <div className="flex-1 min-w-0">
                <div className="text-sm font-medium truncate">{item.name}</div>
                {item.brand && <div className="text-xs text-[var(--text-subtle)]">{item.brand}</div>}
              </div>
              <div className="flex items-center gap-1.5 shrink-0">
                <button onClick={() => setQty(entry.id, entry.qty - 1)}
                  className="w-7 h-7 rounded-lg bg-[var(--surface)] border border-[var(--border)] text-sm flex items-center justify-center hover:bg-black/5">−</button>
                <input type="number" min="1" value={entry.qty}
                  onChange={e => setQty(entry.id, e.target.value)}
                  className="w-12 text-center text-sm border border-[var(--border)] rounded-lg py-1 bg-[var(--surface)]" />
                <button onClick={() => setQty(entry.id, entry.qty + 1)}
                  className="w-7 h-7 rounded-lg bg-[var(--surface)] border border-[var(--border)] text-sm flex items-center justify-center hover:bg-black/5">+</button>
              </div>
              <span className="text-sm font-medium whitespace-nowrap w-20 text-right">{item.cost ? formatRub(item.cost * entry.qty) + ' ₽' : '—'}</span>
              <button onClick={() => removeEntry(entry.id)}
                className="p-1 rounded-lg hover:bg-red-50 text-[var(--text-muted)] hover:text-red-500 shrink-0">
                <Icon name="trash" size={14} />
              </button>
            </div>
          );
        })}

        {unassigned.length > 0 && (
          <div className="pt-2 border-t border-[var(--border)]">
            <div className="text-xs text-[var(--text-subtle)] uppercase tracking-wide font-semibold mb-2">Добавить</div>
            <div className="space-y-1">
              {unassigned.map(item => (
                <button key={item.id} onClick={() => addEntry(item.id)}
                  className="w-full flex items-center gap-2 px-3 py-2 rounded-xl hover:bg-blue-50 transition-colors text-left">
                  <Icon name="plus" size={14} />
                  <span className="text-sm flex-1 truncate">{item.name}{item.brand ? ` (${item.brand})` : ''}</span>
                  <span className="text-xs text-[var(--text-subtle)]">{item.cost ? formatRub(item.cost) + ' ₽' : ''}</span>
                </button>
              ))}
            </div>
          </div>
        )}
      </div>

      <div className="bg-blue-50 rounded-xl px-4 py-2.5 text-sm text-blue-700 font-medium flex justify-between mt-4">
        <span>Итого:</span>
        <span>{formatRub(total)} ₽</span>
      </div>

      <div className="flex gap-3 mt-4 pt-4 border-t border-[var(--border)]">
        <button onClick={onClose} className="btn-secondary">Отмена</button>
        <button onClick={() => onSave(localEntries)} className="btn-primary flex-1">Сохранить</button>
      </div>
    </Modal>
  );
}

function BudgetSupplementModal({ item, onSave, onClose }) {
  const [form, setForm] = useState({ ...item });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const days = (() => {
    const qty = Number(form.qtyPerPack) || 0;
    const daily = Number(form.dailyIntake) || 0;
    return daily > 0 ? Math.floor(qty / daily) : 0;
  })();

  const submit = () => {
    if (!form.name.trim()) return;
    onSave({
      ...form,
      qtyPerPack: Number(form.qtyPerPack) || 0,
      dailyIntake: Number(form.dailyIntake) || 0,
      cost: Number(form.cost) || 0,
    });
  };

  return (
    <Modal title={item.name ? 'Редактировать' : 'Новая добавка'} onClose={onClose}>
      <div className="space-y-4">
        <div>
          <label>Название</label>
          <input value={form.name} onChange={e => set('name', e.target.value)} placeholder="Креатин, Омега-3, Витамин D..." />
        </div>

        <div>
          <label>Бренд (необязательно)</label>
          <input value={form.brand || ''} onChange={e => set('brand', e.target.value)} placeholder="NOW Foods, Solgar, ON..." />
        </div>

        <div className="grid grid-cols-2 gap-3">
          <div>
            <label>Кол-во в упаковке</label>
            <input type="number" inputMode="numeric" min="1"
              value={form.qtyPerPack || ''} onChange={e => set('qtyPerPack', e.target.value)} placeholder="90" />
          </div>
          <div>
            <label>Приём в день (шт)</label>
            <input type="number" inputMode="numeric" min="1" step="0.5"
              value={form.dailyIntake || ''} onChange={e => set('dailyIntake', e.target.value)} placeholder="3" />
          </div>
        </div>

        {days > 0 && (
          <div className="bg-blue-50 rounded-xl px-4 py-2.5 text-sm text-blue-700 font-medium">
            Хватит на <span className="font-display text-lg">{days}</span> дней
          </div>
        )}

        <div>
          <label>Стоимость (₽)</label>
          <input type="number" inputMode="numeric" min="0"
            value={form.cost || ''} onChange={e => set('cost', e.target.value)} placeholder="1 500" />
        </div>

        <div>
          <label>Ссылка (необязательно)</label>
          <input type="url" value={form.link || ''} onChange={e => set('link', e.target.value)} placeholder="https://..." />
        </div>

        <div>
          <label>Комментарий (необязательно)</label>
          <textarea value={form.notes || ''} onChange={e => set('notes', e.target.value)} rows={2} placeholder="Заметки..." />
        </div>

        <div className="flex gap-3 pt-2">
          <button onClick={onClose} className="btn-secondary flex-1">Отмена</button>
          <button onClick={submit} className="btn-primary flex-1">Сохранить</button>
        </div>
      </div>
    </Modal>
  );
}

function BudgetSupplementAssignModal({ selectedItems, onAssign, onClose }) {
  const MONTH_NAMES_FULL = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const now = new Date();
  const [selYear, setSelYear] = useState(now.getFullYear());
  const [selMonth, setSelMonth] = useState('');
  const [quantities, setQuantities] = useState(() =>
    Object.fromEntries(selectedItems.map(x => [x.id, 1]))
  );

  const setQty = (id, val) => setQuantities(q => ({ ...q, [id]: Math.max(1, parseInt(val) || 1) }));

  const totalCost = selectedItems.reduce((s, x) => s + (x.cost || 0) * (quantities[x.id] || 1), 0);

  const monthOptions = MONTH_NAMES_FULL.map((name, i) => {
    const m = `${selYear}-${String(i + 1).padStart(2, '0')}`;
    return { value: m, label: `${name} ${selYear}` };
  });

  return (
    <Modal title="Добавить в месяц" onClose={onClose}>
      <div className="space-y-4">
        <div className="space-y-2">
          {selectedItems.map(item => (
            <div key={item.id} className="flex items-center gap-3 bg-[var(--bg)] rounded-xl px-3 py-2">
              <span className="flex-1 text-sm truncate">{item.name}{item.brand ? ` (${item.brand})` : ''}</span>
              <div className="flex items-center gap-1.5 shrink-0">
                <button onClick={() => setQty(item.id, (quantities[item.id] || 1) - 1)}
                  className="w-7 h-7 rounded-lg bg-[var(--surface)] border border-[var(--border)] text-sm flex items-center justify-center hover:bg-black/5">−</button>
                <input type="number" min="1" value={quantities[item.id] || 1}
                  onChange={e => setQty(item.id, e.target.value)}
                  className="w-12 text-center text-sm border border-[var(--border)] rounded-lg py-1 bg-[var(--surface)]" />
                <button onClick={() => setQty(item.id, (quantities[item.id] || 1) + 1)}
                  className="w-7 h-7 rounded-lg bg-[var(--surface)] border border-[var(--border)] text-sm flex items-center justify-center hover:bg-black/5">+</button>
              </div>
              <span className="text-sm font-medium whitespace-nowrap w-20 text-right">{item.cost ? formatRub(item.cost * (quantities[item.id] || 1)) + ' ₽' : '—'}</span>
            </div>
          ))}
        </div>

        <div className="bg-blue-50 rounded-xl px-4 py-2.5 text-sm text-blue-700 font-medium flex justify-between">
          <span>Итого:</span>
          <span>{formatRub(totalCost)} ₽</span>
        </div>

        <div className="flex items-center gap-2">
          <div className="flex items-center gap-0 bg-[var(--surface)] border border-[var(--border)] rounded-xl overflow-hidden">
            <button onClick={() => setSelYear(y => y - 1)} className="px-3 py-2 text-[var(--text-muted)] hover:text-[var(--text)] text-base leading-none">‹</button>
            <span className="px-3 py-2 text-sm font-semibold min-w-[56px] text-center">{selYear}</span>
            <button onClick={() => setSelYear(y => y + 1)} className="px-3 py-2 text-[var(--text-muted)] hover:text-[var(--text)] text-base leading-none">›</button>
          </div>
        </div>

        <select value={selMonth} onChange={e => setSelMonth(e.target.value)}
          className="w-full border border-[var(--border)] rounded-xl px-3 py-2.5 text-sm bg-[var(--surface)]">
          <option value="">Выберите месяц…</option>
          {monthOptions.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
        </select>
      </div>

      <div className="flex gap-3 mt-5 pt-4 border-t border-[var(--border)]">
        <button onClick={onClose} className="btn-secondary">Отмена</button>
        <button onClick={() => selMonth && onAssign(selMonth, quantities)} disabled={!selMonth}
          className="btn-primary flex-1 disabled:opacity-40 disabled:cursor-not-allowed">
          Добавить в месяц
        </button>
      </div>
    </Modal>
  );
}


// ============== SHARED ==============
function FilterDropdownPortal({ anchorRef, isOpen, onClose, children }) {
  const dropRef = useRef(null);
  const [pos, setPos] = useState({ top: 0, left: 0 });

  useEffect(() => {
    if (!isOpen || !anchorRef) return;
    const el = anchorRef instanceof Element ? anchorRef : anchorRef.current;
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const dropW = 240;
    let left = rect.left;
    if (left + dropW > window.innerWidth) left = window.innerWidth - dropW - 8;
    if (left < 8) left = 8;
    setPos({ top: rect.bottom + 4, left });
  }, [isOpen, anchorRef]);

  useEffect(() => {
    if (!isOpen) return;
    const handler = (e) => {
      if (dropRef.current && !dropRef.current.contains(e.target)) onClose();
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [isOpen, onClose]);

  if (!isOpen) return null;

  return ReactDOM.createPortal(
    <div ref={dropRef}
      className="fixed z-[9999] bg-white border border-gray-200 rounded-xl shadow-xl p-2.5"
      style={{ top: pos.top, left: pos.left, minWidth: 230, maxHeight: 300, overflowY: 'auto' }}>
      {children}
    </div>,
    document.body
  );
}

function Modal({ title, children, onClose }) {
  useEffect(() => {
    const handler = (e) => e.key === 'Escape' && onClose();
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);

  return ReactDOM.createPortal(
    <div
      className="fixed inset-0 z-50 overflow-y-auto bg-black/30 backdrop-blur-sm fade-in"
      onClick={onClose}
    >
      <div className="min-h-full flex items-start justify-center p-4 sm:py-10">
        <div
          onClick={e => e.stopPropagation()}
          className="bg-[var(--bg)] w-full max-w-lg rounded-2xl my-auto"
        >
          <div className="bg-[var(--bg)] px-4 py-4 sm:px-6 sm:py-5 flex items-center justify-between border-b border-[var(--border)] rounded-t-2xl">
            <h2 className="font-display text-xl sm:text-2xl">{title}</h2>
            <button onClick={onClose} className="p-2.5 rounded-lg hover:bg-black/5 text-[var(--text-muted)]">
              <Icon name="x" size={20} />
            </button>
          </div>
          <div className="p-4 sm:p-6">{children}</div>
        </div>
      </div>
    </div>,
    document.body
  );
}

function EmptyState({ title, text }) {
  return (
    <div className="bg-[var(--surface)] border border-dashed border-[var(--border-strong)] rounded-2xl p-12 text-center">
      <div className="font-display text-2xl mb-2">{title}</div>
      <div className="text-[var(--text-muted)] text-sm">{text}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
